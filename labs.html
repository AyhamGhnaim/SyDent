<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SyDent">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<title>SyDent — المخابر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a1628;
  --bg2:       #0f2038;
  --bg3:       #132840;
  --border:    rgba(46,232,158,0.15);
  --green:     #2ee89e;
  --green-dim: rgba(46,232,158,0.12);
  --red:       #ef5350;
  --yellow:    #f5c842;
  --blue:      #63b3ed;
  --gray:      #a3a3a3;
  --text:      #e1f4ee;
  --text2:     #8a9ab5;
  --radius:    12px;
  --sidebar:   240px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

.main {
  flex: 1;
  margin-right: var(--sb-width, 240px);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-size: 20px; font-weight: 700; flex: 1; }
.topbar-title span { color: var(--green); }

.search-wrap { position: relative; flex: 1; max-width: 380px; }
.search-wrap input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 40px 10px 14px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--green); }
.search-wrap input::placeholder { color: var(--text2); }
.search-icon {
  position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
  color: var(--text2); font-size: 15px; pointer-events: none;
}

.btn-add {
  background: var(--green);
  color: #0a1628;
  border: none; border-radius: 10px;
  padding: 10px 20px;
  font-family: 'Cairo', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  transition: opacity .2s, transform .15s;
  white-space: nowrap;
}
.btn-add:hover { opacity: .88; transform: translateY(-1px); }

.content { padding: 28px; flex: 1; }

/* Stats */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex; align-items: center; gap: 14px;
}
.stat-icon {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.stat-icon.b { background: rgba(99,179,237,0.15); }
.stat-icon.g { background: rgba(46,232,158,0.15); }
.stat-icon.y { background: rgba(245,200,66,0.15); }
.stat-icon.r { background: rgba(239,83,80,0.15); }
.stat-num { font-size: 22px; font-weight: 800; line-height: 1; }
.stat-lbl { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* Filters */
.filters {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.filter-btn {
  padding: 7px 16px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-family: 'Cairo', sans-serif; font-size: 13px;
  cursor: pointer; transition: all .2s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

/* Table */
.table-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.table-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
}
.table-head-title { font-size: 15px; font-weight: 700; }
.count-badge {
  background: var(--green-dim);
  color: var(--green);
  padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
thead th {
  padding: 12px 16px;
  text-align: right;
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(46,232,158,0.04); }
td {
  padding: 12px 16px;
  font-size: 13px;
  vertical-align: middle;
}
td.patient-link a {
  color: var(--green);
  text-decoration: none;
  font-weight: 600;
}
td.patient-link a:hover { text-decoration: underline; }

.tooth-badge {
  display: inline-block;
  background: rgba(99,179,237,0.15);
  color: var(--blue);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
}

.lab-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}

.lab-action-btn {
  padding: 5px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text2);
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  margin-left: 3px;
  white-space: nowrap;
}
.lab-action-btn:hover { border-color: var(--green); color: var(--green); }
.lab-action-btn.next { border-color: rgba(46,232,158,.4); color: var(--green); }
.lab-action-btn.reject { border-color: rgba(239,83,80,.3); color: var(--red); }
.lab-action-btn.reject:hover { background: rgba(239,83,80,.1); }
.del-btn {
  background: transparent; border: none;
  color: var(--text2); cursor: pointer;
  font-size: 14px; padding: 4px 6px;
  border-radius: 6px; transition: all .15s;
}
.del-btn:hover { color: var(--red); background: rgba(239,83,80,.1); }

.row-overdue td { background: rgba(239,83,80,0.06) !important; }
.row-overdue:hover td { background: rgba(239,83,80,0.12) !important; }

.overdue-tag {
  display: inline-block;
  background: rgba(239,83,80,0.15);
  color: var(--red);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 8px;
  margin-right: 4px;
}

/* Empty */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text2);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 16px; margin-bottom: 6px; color: var(--text); }
.empty-sub { font-size: 13px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.7); z-index: 100;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 520px;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-head h3 { font-size: 16px; font-weight: 700; }
.modal-close {
  background: transparent; border: none;
  color: var(--text2); font-size: 20px; cursor: pointer;
}
.modal-body {
  padding: 20px;
  max-height: 75vh;
  overflow-y: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.modal-body::-webkit-scrollbar { display: none; width: 0; height: 0; }
.form-group { margin-bottom: 15px; }
.form-group label {
  display: block; font-size: 12px;
  color: var(--text2); font-weight: 600; margin-bottom: 5px;
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 13px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
  direction: rtl;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--green);
}
.form-group textarea { resize: vertical; min-height: 65px; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.modal-foot {
  display: flex; gap: 10px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  justify-content: flex-end;
}
.btn-cancel-m {
  padding: 9px 22px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 9px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
}
.btn-save-m {
  padding: 9px 26px;
  background: var(--green);
  border: none;
  color: var(--bg);
  border-radius: 9px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background .2s;
}
.btn-save-m:hover { background: #26d48e; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 24px;
  border-radius: 30px;
  font-size: 13px; font-weight: 600;
  z-index: 999;
  opacity: 0;
  transition: all .3s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 900px) {
  .stats-strip { grid-template-columns: repeat(2, 1fr); }
  .content { padding: 18px; }
}
@media (max-width: 600px) {
  .topbar { padding: 12px 14px; gap: 8px; flex-wrap: wrap; }
  .topbar-title { font-size: 16px; }
  .search-wrap { max-width: 100%; width: 100%; order: 3; }
  .btn-add { padding: 9px 14px; font-size: 13px; }
  .stat-num { font-size: 18px; }
  .stat-lbl { font-size: 11px; }
  .stat-icon { width: 38px; height: 38px; font-size: 16px; }
  .form-row { grid-template-columns: 1fr; }
  .modal-overlay { align-items: flex-end; }
  .modal {
    border-radius: 20px 20px 0 0;
    max-height: 95vh;
    width: 100%;
    max-width: 100%;
  }
  .modal-foot { flex-direction: column; gap: 10px; }
  .btn-cancel-m, .btn-save-m { width: 100%; text-align: center; padding: 12px; font-size: 15px; }
}
</style>
<script src="sidebar.js"></script>

<body>
<script>
// SyDent auth guard
(async function(){
  await new Promise(r => setTimeout(r, 50));
  if (!window.sb) { console.warn('Supabase not loaded'); return; }
  const { data } = await window.sb.auth.getUser();
  if (!data || !data.user) { window.location.href = 'auth.html'; }
})();
</script>

<div class="main" id="sbMainContent">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-title">إدارة <span>المخابر</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="بحث باسم المريض أو المخبر…">
    </div>
    <button class="btn-add" onclick="openLabOrderModal()">＋ طلب جديد</button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Stats -->
    <div class="stats-strip">
      <div class="stat-card">
        <div class="stat-icon b">🔵</div>
        <div>
          <div class="stat-num" id="statInProgress">0</div>
          <div class="stat-lbl">قيد العمل</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon g">✓</div>
        <div>
          <div class="stat-num" id="statReady">0</div>
          <div class="stat-lbl">جاهز للتركيب</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon y">📊</div>
        <div>
          <div class="stat-num" id="statThisMonth">0</div>
          <div class="stat-lbl">طلبات هذا الشهر</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon r">💰</div>
        <div>
          <div class="stat-num" id="statDue">0</div>
          <div class="stat-lbl">مستحق للمخابر (ل.س)</div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="applyFilter('all', this)">الكل</button>
      <button class="filter-btn" data-filter="sent" onclick="applyFilter('sent', this)">🔵 قيد العمل</button>
      <button class="filter-btn" data-filter="received" onclick="applyFilter('received', this)">🟡 مستلَم</button>
      <button class="filter-btn" data-filter="checked" onclick="applyFilter('checked', this)">🟢 جاهز للتركيب</button>
      <button class="filter-btn" data-filter="delivered" onclick="applyFilter('delivered', this)">⚫ سُلِّم</button>
      <button class="filter-btn" data-filter="rejected" onclick="applyFilter('rejected', this)">🔴 مرفوض</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-head">
        <div class="table-head-title">طلبات المخابر</div>

        <table id="ordersTable">
          <thead>
            <tr>
              <th>المريض</th>
              <th>السن</th>
              <th>نوع العمل</th>

              <th>الاستحقاق</th>
              <th style="text-align:left;">التكلفة</th>
              <th>الحالة</th>
              <th></th>
            </tr>
          </thead>

      </div>
      <div id="emptyState" style="display:none;" class="empty">

      </div>
    </div>

  </div>
</div>

<!-- Modal: طلب مخبر -->

  <div class="modal">
    <div class="modal-head">
      <h3 id="labOrderTitle">🧪 طلب مخبر جديد</h3>
      <button class="modal-close" onclick="closeModal('labOrderModal')">✕</button>

    <div class="modal-body">
      <input type="hidden" id="labOrderId">
      <div class="form-group">
        <label>المريض</label>
        <select id="labOrderPatient"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>رقم السن</label>

        </div>
        <div class="form-group">
          <label>نوع العمل</label>
          <select id="labOrderWorkType"></select>
        </div>
      </div>
      <div class="form-group">
        <label>اسم المخبر</label>
        <input type="text" id="labOrderLabName" placeholder="مثال: مخبر النور">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>اللون (Shade)</label>
          <input type="text" id="labOrderShade" placeholder="مثال: A2">
        </div>
        <div class="form-group">
          <label>التكلفة (ل.س)</label>
          <input type="number" id="labOrderCost" placeholder="مثال: 80000" min="0" inputmode="numeric">

      </div>
      <div class="form-row">
        <div class="form-group">
          <label>تاريخ الإرسال</label>
          <input type="date" id="labOrderDateSent">

          <label>تاريخ الاستحقاق</label>
          <input type="date" id="labOrderDateDue">
        </div>

        <label>ملاحظات (اختياري)</label>

      <button class="btn-cancel-m" onclick="closeModal('labOrderModal')">إلغاء</button>
      <button class="btn-save-m" onclick="saveLabOrder()">حفظ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─── State ─── */
var currentUser = null;
var allOrders   = [];
var allPatients = [];
var TREATMENTS  = [];
var currentFilter = 'all';
var searchQuery   = '';

/* ─── Constants ─── */
var LAB_REQUIRED_KEYS = ['crown', 'bridge', 'denture', 'denture_full', 'denture_partial', 'veneer', 'ortho_plate'];
var LAB_OPTIONAL_KEYS = ['implant', 'ortho_fixed'];

function needsLab(key) {
  if (!key) return false;
  return LAB_REQUIRED_KEYS.indexOf(key) !== -1 || LAB_OPTIONAL_KEYS.indexOf(key) !== -1;
}

var LAB_STATUSES = {
  'sent':      { ar: 'قيد العمل',     color: '#63b3ed', bg: 'rgba(99,179,237,0.15)' },
  'received':  { ar: 'مستلَم',         color: '#f5c842', bg: 'rgba(245,200,66,0.15)' },
  'checked':   { ar: 'جاهز للتركيب',  color: '#2ee89e', bg: 'rgba(46,232,158,0.15)' },
  'delivered': { ar: 'سُلِّم للمريض',   color: '#a3a3a3', bg: 'rgba(163,163,163,0.15)' },
  'rejected':  { ar: 'مرفوض',         color: '#ef5350', bg: 'rgba(239,83,80,0.15)' }
};

var LAB_NEXT_STATUS = {
  'sent':     { next: 'received',  label: '📦 وصل' },
  'received': { next: 'checked',   label: '✓ فحص' },
  'checked':  { next: 'delivered', label: '🤝 سُلِّم' }
};

/* ─── Utils ─── */
function fmt(n) { return Number(n||0).toLocaleString('ar-SY'); }
function fmtD(ds) {
  if (!ds) return '—';
  return new Date(ds).toLocaleDateString('ar-SY', { year:'numeric', month:'short', day:'numeric' });
}
function toDay() { return new Date().toISOString().slice(0,10); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function isOverdue(lo) {
  if (!lo.date_due) return false;
  if (lo.status === 'delivered' || lo.status === 'checked' || lo.status === 'rejected') return false;
  return new Date(lo.date_due) < new Date();
}

var toastT;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

/* ─── Load Data ─── */
async function loadAll() {
  if (!currentUser) return;

  // Patients (for select + name lookup)
  const { data: pats } = await window.sb.from('patients')
    .select('id, name, local_id')
    .eq('doctor_id', currentUser.id)
    .order('name', { ascending: true });
  allPatients = pats || [];

  // Treatments
  const { data: tr } = await window.sb.from('treatments')
    .select('*').order('sort_order', { ascending: true });
  TREATMENTS = (tr || []).map(function(t){
    return { id: t.treatment_key, name: t.name, label: t.label, fill: t.fill, stroke: t.stroke, price: t.price };
  });

  // Lab orders
  try {
    const { data: lo, error: loErr } = await window.sb.from('lab_orders')
      .select('*')
      .order('date_sent', { ascending: false });
    if (loErr) { console.warn('lab_orders error:', loErr); allOrders = []; }
    else allOrders = lo || [];
  } catch(e) { console.warn(e); allOrders = []; }

  renderStats();
  renderTable();
}

/* ─── Render Stats ─── */
function renderStats() {
  var inProgress = 0, ready = 0, thisMonth = 0, due = 0;
  var now = new Date();
  var thisMonthStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  allOrders.forEach(function(lo){
    if (lo.status === 'sent' || lo.status === 'received') inProgress++;
    if (lo.status === 'checked') ready++;
    if (lo.date_sent && lo.date_sent.slice(0,7) === thisMonthStr) thisMonth++;
    // Due = cost of orders not yet delivered
    if (lo.status !== 'delivered' && lo.status !== 'rejected') {
      due += Number(lo.cost || 0);
    }
  });

  document.getElementById('statInProgress').textContent = inProgress;
  document.getElementById('statReady').textContent      = ready;
  document.getElementById('statThisMonth').textContent  = thisMonth;
  document.getElementById('statDue').textContent        = fmt(due);
}

/* ─── Render Table ─── */
function getPatientName(id) {
  var p = allPatients.find(function(x){ return x.id === id; });
  return p ? p.name : '—';
}

function getFilteredOrders() {
  var q = searchQuery.trim().toLowerCase();
  return allOrders.filter(function(lo){
    if (currentFilter !== 'all' && lo.status !== currentFilter) return false;
    if (q) {
      var pname = (getPatientName(lo.patient_id) || '').toLowerCase();
      var lname = (lo.lab_name || '').toLowerCase();
      var wtype = (lo.work_type || '').toLowerCase();
      if (pname.indexOf(q) === -1 && lname.indexOf(q) === -1 && wtype.indexOf(q) === -1) return false;
    }
    return true;
  });
}

function renderTable() {
  var orders = getFilteredOrders();
  var tbody = document.getElementById('ordersBody');
  var empty = document.getElementById('emptyState');
  document.getElementById('resultCount').textContent = orders.length;

  if (!orders.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  var rows = '';
  orders.forEach(function(lo){
    var st = LAB_STATUSES[lo.status] || LAB_STATUSES['sent'];
    var pill = '<span class="lab-pill" style="background:' + st.bg + ';color:' + st.color + ';">' + st.ar + '</span>';
    var actions = '';
    var nx = LAB_NEXT_STATUS[lo.status];
    if (nx) actions += '<button class="lab-action-btn next" onclick="advanceLabOrder(\'' + lo.id + '\')">' + nx.label + '</button>';
    if (lo.status !== 'rejected' && lo.status !== 'delivered') {
      actions += '<button class="lab-action-btn reject" onclick="rejectLabOrder(\'' + lo.id + '\')">رفض</button>';
    }
    actions += '<button class="lab-action-btn" onclick="editLabOrder(\'' + lo.id + '\')">✏️</button>';
    actions += '<button class="del-btn" onclick="delLabOrder(\'' + lo.id + '\')">🗑</button>';

    var pname = getPatientName(lo.patient_id);
    var pLink = lo.patient_id
      ? '<a href="patient-profile.html?id=' + lo.patient_id + '">' + escapeHtml(pname) + '</a>'
      : escapeHtml(pname);
    var overdue = isOverdue(lo);
    var overdueTag = overdue ? '<span class="overdue-tag">متأخر</span>' : '';
    var rowClass = overdue ? 'row-overdue' : '';

    rows += '<tr class="' + rowClass + '">'
      + '<td class="patient-link">' + pLink + '</td>'
      + '<td>' + (lo.tooth_num ? '<span class="tooth-badge">سن ' + lo.tooth_num + '</span>' : '—') + '</td>'
      + '<td>' + escapeHtml(lo.work_type || '—') + '</td>'
      + '<td style="color:var(--text2)">' + escapeHtml(lo.lab_name || '—') + '</td>'
      + '<td style="color:var(--text2)">' + escapeHtml(lo.shade || '—') + '</td>'
      + '<td>' + fmtD(lo.date_sent) + '</td>'
      + '<td>' + overdueTag + (lo.date_due ? fmtD(lo.date_due) : '—') + '</td>'
      + '<td style="text-align:left;color:var(--text2)">' + fmt(lo.cost) + ' ل.س</td>'
      + '<td>' + pill + '</td>'
      + '<td style="white-space:nowrap;">' + actions + '</td>'
      + '</tr>';
  });
  tbody.innerHTML = rows;
}

/* ─── Filters & Search ─── */
function applyFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderTable();
}

document.getElementById('searchInput').addEventListener('input', function(e){
  searchQuery = e.target.value;
  renderTable();
});

/* ─── Modal Helpers ─── */
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('open');
  el.style.display = 'none';
  setTimeout(function(){ el.style.display = ''; }, 50);
}

var overlays = document.querySelectorAll('.modal-overlay');
for (var _o = 0; _o < overlays.length; _o++) {
  (function(el){ el.addEventListener('click', function(e){ if (e.target === el) closeModal(el.id); }); })(overlays[_o]);
}

/* ─── Populate selects ─── */
function populatePatientSelect(selectedId) {
  var sel = document.getElementById('labOrderPatient');
  sel.innerHTML = '<option value="">— اختر مريضاً —</option>';
  allPatients.forEach(function(p){
    var opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = (p.local_id ? '#' + p.local_id + ' — ' : '') + p.name;
    sel.appendChild(opt);
  });
  if (selectedId) sel.value = selectedId;
}

function populateWorkTypeSelect(selectedKey) {
  var sel = document.getElementById('labOrderWorkType');
  sel.innerHTML = '';
  var labOnly = TREATMENTS.filter(function(t){ return needsLab(t.id); });
  var list = labOnly.length ? labOnly : TREATMENTS;
  list.forEach(function(t){
    var opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });
  var other = document.createElement('option');
  other.value = '_other'; other.textContent = 'أخرى';
  sel.appendChild(other);
  if (selectedKey) sel.value = selectedKey;
}

/* ─── CRUD ─── */
function openLabOrderModal() {
  document.getElementById('labOrderTitle').textContent = '🧪 طلب مخبر جديد';
  document.getElementById('labOrderId').value = '';
  populatePatientSelect();
  populateWorkTypeSelect();
  document.getElementById('labOrderTooth').value = '';
  document.getElementById('labOrderLabName').value = '';
  document.getElementById('labOrderShade').value = '';
  document.getElementById('labOrderCost').value = '';
  document.getElementById('labOrderDateSent').value = toDay();
  document.getElementById('labOrderDateDue').value = '';
  document.getElementById('labOrderNotes').value = '';
  openModal('labOrderModal');
}

function editLabOrder(id) {
  var lo = allOrders.find(function(x){ return x.id === id; });
  if (!lo) return;
  document.getElementById('labOrderTitle').textContent = '🧪 تعديل طلب المخبر';
  document.getElementById('labOrderId').value = lo.id;
  populatePatientSelect(lo.patient_id);
  populateWorkTypeSelect(lo.treatment_key);
  document.getElementById('labOrderTooth').value = lo.tooth_num || '';
  document.getElementById('labOrderLabName').value = lo.lab_name || '';
  document.getElementById('labOrderShade').value = lo.shade || '';
  document.getElementById('labOrderCost').value = lo.cost || '';
  document.getElementById('labOrderDateSent').value = lo.date_sent ? lo.date_sent.slice(0,10) : toDay();
  document.getElementById('labOrderDateDue').value = lo.date_due ? lo.date_due.slice(0,10) : '';
  document.getElementById('labOrderNotes').value = lo.notes || '';
  openModal('labOrderModal');
}

async function saveLabOrder() {
  var id = document.getElementById('labOrderId').value;
  var patientId = document.getElementById('labOrderPatient').value;
  var toothRaw  = document.getElementById('labOrderTooth').value.trim();
  var workSel   = document.getElementById('labOrderWorkType');
  var workKey   = workSel.value;
  var workName;
  if (workKey === '_other' || !workKey) {
    workName = 'أخرى'; workKey = null;
  } else {
    var t = TREATMENTS.find(function(x){ return x.id === workKey; });
    workName = t ? t.name : workKey;
  }
  var labName  = document.getElementById('labOrderLabName').value.trim();
  var shade    = document.getElementById('labOrderShade').value.trim();
  var cost     = parseFloat(document.getElementById('labOrderCost').value) || 0;
  var dateSent = document.getElementById('labOrderDateSent').value;
  var dateDue  = document.getElementById('labOrderDateDue').value;
  var notes    = document.getElementById('labOrderNotes').value.trim();

  if (!patientId) { showToast('⚠️ اختر المريض'); return; }
  if (!labName)   { showToast('⚠️ أدخل اسم المخبر'); return; }
  if (!workName || workName === '—') { showToast('⚠️ اختر نوع العمل'); return; }
  if (!dateSent)  { showToast('⚠️ اختر تاريخ الإرسال'); return; }

  var payload = {
    doctor_id:    currentUser.id,
    patient_id:   patientId,
    tooth_num:    toothRaw ? parseInt(toothRaw, 10) : null,
    treatment_key: workKey,
    lab_name:     labName,
    work_type:    workName,
    shade:        shade || null,
    cost:         cost,
    notes:        notes || null,
    date_sent:    dateSent,
    date_due:     dateDue || null
  };

  if (id) {
    const { data, error } = await window.sb.from('lab_orders')
      .update(payload).eq('id', id).eq('doctor_id', currentUser.id).select().single();
    if (error) { showToast('⚠️ فشل الحفظ: ' + error.message); return; }
    if (data) {
      var idx = allOrders.findIndex(function(x){ return x.id === id; });
      if (idx !== -1) allOrders[idx] = data;
    }
    showToast('✅ تم تحديث الطلب');
  } else {
    payload.status = 'sent';
    const { data, error } = await window.sb.from('lab_orders')
      .insert(payload).select().single();
    if (error) { showToast('⚠️ فشل الحفظ: ' + error.message); return; }
    if (data) allOrders.unshift(data);
    showToast('✅ تم إرسال الطلب للمخبر');
  }

  renderStats();
  renderTable();
  closeModal('labOrderModal');
}

async function advanceLabOrder(id) {
  var lo = allOrders.find(function(x){ return x.id === id; });
  if (!lo) return;
  var nx = LAB_NEXT_STATUS[lo.status];
  if (!nx) return;
  var nowIso = new Date().toISOString();
  var update = { status: nx.next };
  if (nx.next === 'received')  update.date_received  = nowIso;
  if (nx.next === 'checked')   update.date_checked   = nowIso;
  if (nx.next === 'delivered') update.date_delivered = nowIso;

  const { data, error } = await window.sb.from('lab_orders')
    .update(update).eq('id', id).eq('doctor_id', currentUser.id).select().single();
  if (error) { showToast('⚠️ فشل التحديث'); return; }
  if (data) {
    var idx = allOrders.findIndex(function(x){ return x.id === id; });
    if (idx !== -1) allOrders[idx] = data;
  }
  renderStats();
  renderTable();
  showToast('✅ تم التحديث إلى: ' + LAB_STATUSES[nx.next].ar);
}

async function rejectLabOrder(id) {
  if (!confirm('هل أنت متأكد من رفض هذا الطلب وإعادته للمخبر؟')) return;
  const { data, error } = await window.sb.from('lab_orders')
    .update({ status: 'rejected' }).eq('id', id).eq('doctor_id', currentUser.id).select().single();
  if (error) { showToast('⚠️ فشل التحديث'); return; }
  if (data) {
    var idx = allOrders.findIndex(function(x){ return x.id === id; });
    if (idx !== -1) allOrders[idx] = data;
  }
  renderStats();
  renderTable();
  showToast('🔴 تم رفض الطلب');
}

async function delLabOrder(id) {
  if (!confirm('هل تريد حذف هذا الطلب نهائياً؟')) return;
  const { error } = await window.sb.from('lab_orders')
    .delete().eq('id', id).eq('doctor_id', currentUser.id);
  if (error) { showToast('⚠️ فشل الحذف'); return; }
  allOrders = allOrders.filter(function(x){ return x.id !== id; });
  renderStats();
  renderTable();
  showToast('🗑 تم حذف الطلب');
}

/* ─── Bootstrap ─── */
(async function bootstrap(){
  await new Promise(r => setTimeout(r, 80));
  const { data } = await window.sb.auth.getUser();
  if (!data || !data.user) { window.location.href = 'auth.html'; return; }
  currentUser = data.user;
  await loadAll();
})();

window.onPTRRefresh = function() { loadAll(); };

initSidebar('labs');

document.addEventListener('DOMContentLoaded', function() {
  var btn = document.createElement('button');
  btn.className = 'sb-hamburger';
  btn.id = 'sbHamburgerBtn';
  btn.setAttribute('aria-label', 'القائمة');
  btn.innerHTML = '<span></span><span></span><span></span>';
  btn.onclick = function() { window.sbToggle(); };
  var topbar = document.querySelector('.topbar');
  if (topbar) topbar.insertBefore(btn, topbar.firstChild);
});
</script>
