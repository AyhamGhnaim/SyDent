<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SyDent">

<title>SyDent — سجلّ أحداث الاشتراكات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===========================================================
 * SyDent — Subscription Events Viewer (Phase X4)
 *
 * Read-only audit log over subscription_events. Mirrors Stripe's
 * Events page model: server-side paginated table + multi-faceted
 * filters + drill-down JSON panel + CSV export.
 *
 * Design contract: NO mutations. Every action on this page is
 * either a filter, a navigation, or an export. The append-only
 * audit guarantee is enforced at the DB layer (no DELETE/UPDATE
 * RLS policy for non-admins) and reinforced visually here by the
 * absence of edit/delete affordances.
 * =========================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg2:#0f2038;--bg3:#132840;--bg4:#0d1e33;
  --border:rgba(46,232,158,0.15);--border2:rgba(46,232,158,0.28);
  --green:#2ee89e;--green2:#26d48e;--green-dim:rgba(46,232,158,0.1);
  --red:#ef5350;--red-dim:rgba(239,83,80,0.1);
  --yellow:#ffa726;--yellow-dim:rgba(255,167,38,0.1);
  --blue:#42a5f5;--blue-dim:rgba(66,165,245,0.1);
  --purple:#ab47bc;--purple-dim:rgba(171,71,188,0.1);
  --orange:#ff7043;--orange-dim:rgba(255,112,67,0.1);
  --text:#e1f4ee;--text2:#8a9ab5;--text3:#4a6080;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ===== Header (matches admin.html for visual continuity) ===== */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;background:var(--bg2);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;
}
.header-logo{display:flex;align-items:center;gap:10px;}
.header-logo svg{width:32px;height:36px;}
.header-logo .name{font-size:18px;font-weight:800;color:var(--green);letter-spacing:0.5px;}
.badge{
  display:inline-block;padding:2px 8px;border-radius:6px;
  background:var(--green-dim);color:var(--green);
  font-size:10px;font-weight:700;border:1px solid var(--border2);
}
.btn-back,.btn-logout{
  background:transparent;border:1px solid var(--border2);
  color:var(--text);padding:8px 14px;border-radius:8px;
  font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.15s;
}
.btn-back:hover,.btn-logout:hover{background:var(--bg3);border-color:var(--green);}

/* ===== Main container ===== */
.main{max-width:1200px;margin:0 auto;padding:20px;}
.page-title{
  font-size:20px;font-weight:800;margin-bottom:4px;color:var(--text);
}
.page-subtitle{
  font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.6;
}

/* ===== Filters bar ===== */
.filters{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:14px;margin-bottom:14px;
  display:grid;grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
  gap:10px;align-items:end;
}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-group label{
  font-size:11px;color:var(--text2);font-weight:600;
}
.filter-group input,.filter-group select{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:8px 10px;border-radius:8px;
  font-family:inherit;font-size:13px;width:100%;
}
.filter-group input:focus,.filter-group select:focus{
  outline:none;border-color:var(--green);
}
.filter-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:end;}
.btn-primary,.btn-secondary,.btn-export{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);padding:8px 14px;border-radius:8px;
  font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.btn-primary{background:var(--green);color:#0a1628;border-color:var(--green);}
.btn-primary:hover{background:var(--green2);}
.btn-secondary:hover,.btn-export:hover{background:var(--bg4);border-color:var(--green);}
.btn-export{background:var(--blue-dim);border-color:var(--blue);color:var(--blue);}
.btn-export:hover{background:var(--blue);color:#0a1628;}

/* ===== Event type chips (multi-select) ===== */
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.chip{
  padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;
  cursor:pointer;user-select:none;transition:all 0.15s;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);
}
.chip:hover{border-color:var(--green);color:var(--text);}
.chip.active{background:var(--green-dim);color:var(--green);border-color:var(--green);}

/* ===== Counter line ===== */
.counter{
  font-size:12px;color:var(--text2);margin:10px 0;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
}
.counter strong{color:var(--text);font-weight:700;}

/* ===== Events table (card-based for RTL friendliness) ===== */
.events-list{display:flex;flex-direction:column;gap:8px;}
.event-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;
  display:grid;grid-template-columns:1fr auto;gap:10px;
  cursor:pointer;transition:all 0.15s;
}
.event-card:hover{border-color:var(--border2);background:var(--bg3);}
.event-meta{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;font-size:13px;}
.event-time{color:var(--text2);font-size:11px;font-weight:600;}
.event-tenant{color:var(--text);font-weight:700;}
.event-tenant-email{color:var(--text3);font-size:11px;}
.event-by{color:var(--text3);font-size:11px;font-style:italic;}

/* ===== Event type badges ===== */
.evbadge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:10px;font-size:11px;font-weight:700;
  border:1px solid var(--border);background:var(--bg3);
}
.evbadge.lifecycle{background:var(--green-dim);color:var(--green);border-color:var(--green);}
.evbadge.auth{background:var(--blue-dim);color:var(--blue);border-color:var(--blue);}
.evbadge.config{background:var(--purple-dim);color:var(--purple);border-color:var(--purple);}
.evbadge.destructive{background:var(--red-dim);color:var(--red);border-color:var(--red);}
.evbadge.warning{background:var(--yellow-dim);color:var(--yellow);border-color:var(--yellow);}

.event-summary{font-size:12px;color:var(--text);line-height:1.6;}
.event-arrow{
  font-size:10px;color:var(--text2);align-self:center;
  padding:6px 10px;border-radius:6px;background:var(--bg3);
}

/* ===== Empty / loading / error states ===== */
.state-card{
  background:var(--bg2);border:1px dashed var(--border);
  border-radius:12px;padding:40px 20px;text-align:center;
  color:var(--text2);font-size:14px;
}
.state-card .state-icon{font-size:36px;margin-bottom:10px;display:block;}

/* ===== Pagination ===== */
.pagination{
  display:flex;justify-content:center;margin-top:14px;
}
.btn-load-more{
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);padding:10px 24px;border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.15s;
}
.btn-load-more:hover{background:var(--bg3);border-color:var(--green);}
.btn-load-more:disabled{opacity:0.5;cursor:not-allowed;}

/* ===== Drill-down modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  display:none;z-index:200;align-items:flex-start;justify-content:center;
  padding:40px 20px;overflow-y:auto;
}
.modal-overlay.open{display:flex;}
.modal-card{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:14px;width:100%;max-width:680px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal-head{
  padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.modal-head h3{font-size:16px;color:var(--text);font-weight:700;}
.modal-close{
  background:transparent;border:none;color:var(--text2);
  font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;
}
.modal-close:hover{background:var(--bg3);color:var(--text);}
.modal-body{padding:16px 18px;}
.detail-row{
  display:grid;grid-template-columns:130px 1fr;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--border);
  font-size:13px;
}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--text2);font-weight:600;}
.detail-value{color:var(--text);word-break:break-word;}
.json-block{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:10px;margin-top:10px;
  font-family:'Courier New', monospace;font-size:11px;
  color:var(--text2);white-space:pre-wrap;word-break:break-word;
  direction:ltr;text-align:left;max-height:300px;overflow-y:auto;
}
.diff-row{
  display:grid;grid-template-columns:100px 1fr 1fr;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--border);
  font-size:12px;align-items:center;
}
.diff-row:last-child{border-bottom:none;}
.diff-label{color:var(--text2);font-weight:600;font-size:11px;}
.diff-from{color:var(--red);text-decoration:line-through;text-decoration-color:rgba(239,83,80,0.5);font-family:monospace;}
.diff-to{color:var(--green);font-family:monospace;}

/* ===== Responsive ===== */
@media (max-width:680px){
  .filters{grid-template-columns:1fr 1fr;}
  .event-card{grid-template-columns:1fr;}
  .event-arrow{display:none;}
  .detail-row{grid-template-columns:1fr;gap:2px;}
  .diff-row{grid-template-columns:1fr;gap:2px;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js?v=20260523a26"></script>
</head>
<body>

<div id="page" style="display:none;">
  <header>
    <div class="header-logo">
      <svg viewBox="0 0 64 72" fill="none" stroke="#2ee89e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 8 C14 8 8 10 8 20 C8 30 12 34 14 40 C16 46 16 58 18 64 C19 67 22 68 24 64 C26 60 27 54 32 54 C37 54 38 60 40 64 C42 68 45 67 46 64 C48 58 48 46 50 40 C52 34 56 30 56 20 C56 10 50 8 50 8 C46 6 42 5 32 5 C22 5 18 6 14 8 Z"/>
      </svg>
      <div style="display:flex;flex-direction:column;line-height:1.15;">
        <span class="name">SyDent</span>
        <span style="font-size:9px;color:var(--text2);font-weight:600;letter-spacing:0.3px;">سجلّ أحداث الاشتراكات</span>
      </div>
      <span class="badge">Admin</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-back" onclick="goBack()">← لوحة الإدارة</button>
      <button class="btn-logout" onclick="doLogout()">خروج</button>
    </div>
  </header>

  <div class="main">
    <h1 class="page-title">📋 سجلّ أحداث الاشتراكات</h1>
    <p class="page-subtitle">
      كل تغيير على حسابات العملاء يُكتب هنا كحدث غير قابل للتعديل (Stripe-style audit log).
      الفلاتر أدناه تطبّق فوراً، والـ CSV يُصدّر كل النتائج المُفلترة (وليس الصفحة الحالية فقط).
    </p>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label for="fDateFrom">📅 من تاريخ</label>
        <input type="date" id="fDateFrom" onchange="applyFilters()">
      </div>
      <div class="filter-group">
        <label for="fDateTo">📅 إلى تاريخ</label>
        <input type="date" id="fDateTo" onchange="applyFilters()">
      </div>
      <div class="filter-group" style="grid-column:span 2;">
        <label for="fSearch">🔍 بحث عميل (الاسم / الإيميل / الهاتف)</label>
        <input type="text" id="fSearch" placeholder="مثال: محمد، 09xxxx" oninput="onSearchInput()">
      </div>
      <div class="filter-actions">
        <button class="btn-secondary" onclick="resetFilters()">↺ إعادة تعيين</button>
        <button class="btn-primary" onclick="applyFilters()">🔄 تحديث</button>
        <button class="btn-export" onclick="exportCsv()">📥 CSV</button>
      </div>
    </div>

    <!-- Event type chips -->
    <div class="filters" style="grid-template-columns:1fr;">
      <div class="filter-group">
        <label>🏷 نوع الحدث (متعدّد الاختيار)</label>
        <div class="chips-wrap" id="chipsWrap"></div>
      </div>
    </div>

    <!-- Counter -->
    <div class="counter">
      <div id="counterText">جارٍ التحميل...</div>
      <div id="counterAggregate" style="color:var(--text3);font-size:11px;"></div>
    </div>

    <!-- Events list -->
    <div class="events-list" id="eventsList">
      <div class="state-card">
        <span class="state-icon">⏳</span>
        <div>جارٍ تحميل سجلّ الأحداث...</div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="paginationWrap" style="display:none;">
      <button class="btn-load-more" id="btnLoadMore" onclick="loadMore()">⬇ تحميل المزيد (50)</button>
    </div>
  </div>
</div>

<!-- Drill-down modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfBackdrop(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>تفاصيل الحدث</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="إغلاق">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
/* ============================================================
 * Phase X4 — Subscription Events Viewer
 *
 * Read-only audit log browser. Architecture:
 *
 *   trial_requests ◀── tenantsCache (id → name/email/phone)
 *         │
 *         └── subscription_events (immutable, append-only)
 *                     │
 *                     ▼
 *              loadEvents (paginated, filtered server-side
 *                          for date+type, client-side for tenant
 *                          search after JOIN)
 *                     │
 *                     ▼
 *              renderList → click → openModal(event)
 *
 * Why a separate page (not a section in admin.html)?
 *   - admin.html is already 5043 lines + 2 large script blocks.
 *   - Audit viewer has its own modal, filters, CSV path — clean
 *     separation reduces blast radius of edits and lets the
 *     bundle size stay focused on lifecycle work.
 *   - Same auth gate (doctors.role='admin') is reused via
 *     DOMContentLoaded check.
 * ============================================================ */

/* ===== Event type catalog =====
 * Mapping: code → { label_ar, category, emoji }
 * Categories control badge color. Categories chosen to match
 * the four families of writes that hit subscription_events:
 *   lifecycle    — state machine transitions (accept/convert/...)
 *   destructive  — delete (separated for visibility, esp. CSV)
 *   auth         — promote/demote admin (Phase X1)
 *   config       — plan_updated / template_updated (Phase X2/X3)
 *
 * IMPORTANT: This list must match the DB CHECK constraint on
 * subscription_events.event_type. If a new event type is added,
 * extend this map AND the CHECK in the corresponding migration.
 */
var EVENT_TYPES = {
  // Lifecycle (Phase 7.6E + earlier)
  'accept':           { label_ar: 'قبول طلب',          category: 'lifecycle',   emoji: '✅' },
  'reject':           { label_ar: 'رفض طلب',           category: 'destructive', emoji: '🚫' },
  'convert_monthly':  { label_ar: 'تحويل لشهري',       category: 'lifecycle',   emoji: '💎' },
  'convert_yearly':   { label_ar: 'تحويل لسنوي',       category: 'lifecycle',   emoji: '💎' },
  'renew':            { label_ar: 'تجديد',             category: 'lifecycle',   emoji: '🔄' },
  'extend':           { label_ar: 'تمديد تجربة',       category: 'lifecycle',   emoji: '➕' },
  'shorten':          { label_ar: 'تقصير تجربة',       category: 'warning',     emoji: '➖' },
  'enter_grace':      { label_ar: 'فترة سماح',         category: 'warning',     emoji: '⏰' },
  'suspend':          { label_ar: 'إيقاف',             category: 'warning',     emoji: '⏸' },
  'reactivate':       { label_ar: 'إعادة تفعيل',       category: 'lifecycle',   emoji: '▶️' },
  'delete':           { label_ar: 'حذف',               category: 'destructive', emoji: '🗑' },
  // Auth (Phase X1)
  'promote_to_admin': { label_ar: 'ترقية لمسؤول',      category: 'auth',        emoji: '👑' },
  'demote_from_admin':{ label_ar: 'تنزيل من مسؤول',    category: 'auth',        emoji: '👤' },
  // Config (Phase X2, X3)
  'plan_updated':     { label_ar: 'تعديل خطة',         category: 'config',      emoji: '⚙️' },
  'template_updated': { label_ar: 'تعديل قالب رسالة',  category: 'config',      emoji: '💬' }
};

/* ===== State ===== */
var allEvents = [];          // accumulated events across "load more" pages
var tenantsCache = {};       // id → { name, email, phone }
var selectedTypes = new Set(); // empty = "all types"
var pageSize = 50;
var hasMore = false;
var searchDebounce = null;
// D6 (audit): request token to invalidate stale loadEvents results
// when the user changes filters mid-flight. The async query may take
// 300ms+ on slow connections; without this guard, a fast filter1 →
// filter2 sequence can let filter1's late response overwrite filter2.
var loadEventsToken = 0;

/* ===== Auth gate =====
 * Matches admin.html auth pattern (Phase X1 rule #39): require an
 * authenticated session AND a doctors row with role='admin'. The
 * admin user has no clinic_doctors/clinic_employees row (they're a
 * platform admin, not a tenant), so SyDentLock is NOT called here.
 *
 * Defensive logging: every branch logs to console + shows a visible
 * status indicator if redirect happens, so a "blank page" or
 * "back to admin.html" outcome can be diagnosed without browser
 * dev tools. Production-ready failure path (no silent redirects). */
window.addEventListener('DOMContentLoaded', async function() {
  console.log('[subscription-events] DOMContentLoaded');
  // Show a temporary loading state so the user knows JS is running
  // (rather than staring at a blank page during the auth check).
  var bodyEl = document.body;
  var splash = document.createElement('div');
  splash.id = 'authSplash';
  splash.style.cssText = 'position:fixed;inset:0;background:#0a1628;color:#e1f4ee;display:flex;align-items:center;justify-content:center;font-family:Cairo,sans-serif;z-index:9999;flex-direction:column;gap:12px;';
  splash.innerHTML = '<div style="font-size:32px;">⏳</div><div id="authSplashText">جارٍ التحقق من الجلسة...</div>';
  bodyEl.appendChild(splash);

  function setSplash(text) {
    var t = document.getElementById('authSplashText');
    if (t) t.textContent = text;
    console.log('[subscription-events] ' + text);
  }
  function showSplashError(text, detail) {
    splash.innerHTML = '<div style="font-size:48px;">⚠️</div>' +
      '<div style="font-size:16px;font-weight:700;">' + text + '</div>' +
      (detail ? '<div style="font-size:12px;color:#8a9ab5;max-width:400px;text-align:center;padding:0 20px;">' + detail + '</div>' : '') +
      '<button onclick="window.location.href=\'admin.html\'" style="margin-top:16px;padding:8px 20px;background:#2ee89e;color:#0a1628;border:none;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;">← عودة للإدارة</button>';
    console.error('[subscription-events] ' + text, detail);
  }

  setSplash('جارٍ انتظار تحميل Supabase...');
  var tries = 0;
  while (!window.sb && tries < 50) {
    await new Promise(function(r){ setTimeout(r, 100); });
    tries++;
  }
  if (!window.sb) {
    showSplashError('تعذّر تحميل Supabase', 'تأكد من الاتصال بالإنترنت وأعد تحميل الصفحة.');
    return;
  }

  setSplash('جارٍ التحقق من الجلسة...');
  // Retry loop: getSession() can return null on first call if the
  // refresh token is still being processed by the Supabase client.
  // We give it up to 3 seconds (10 retries × 300ms) before giving up.
  var session = null;
  var sessionTries = 0;
  while (!session && sessionTries < 10) {
    try {
      var sessRes = await window.sb.auth.getSession();
      session = sessRes && sessRes.data ? sessRes.data.session : null;
      if (session && session.user) break;
    } catch (e) {
      console.warn('[subscription-events] getSession retry', sessionTries, 'failed:', e);
    }
    sessionTries++;
    if (sessionTries < 10) {
      await new Promise(function(r){ setTimeout(r, 300); });
    }
  }
  if (!session || !session.user) {
    setSplash('لا توجد جلسة — تحويل لصفحة تسجيل الدخول...');
    setTimeout(function(){ window.location.replace('auth.html'); }, 800);
    return;
  }

  setSplash('جارٍ التحقق من صلاحية المدير...');
  var roleRes;
  try {
    roleRes = await window.sb.from('doctors').select('role').eq('id', session.user.id).maybeSingle();
  } catch (e) {
    showSplashError('فشل التحقق من الصلاحية', e && e.message ? e.message : String(e));
    return;
  }
  if (roleRes && roleRes.error) {
    showSplashError('خطأ في قاعدة البيانات', roleRes.error.message || 'تعذّر قراءة الصلاحية');
    return;
  }
  var roleData = roleRes ? roleRes.data : null;
  if (!roleData || roleData.role !== 'admin') {
    // No redirect — show a clear message. Redirecting to index.html
    // would bounce the admin back to admin.html (index.html itself
    // redirects admins there), making it look like "the link is
    // broken". A loud error with a back button is the right UX.
    showSplashError(
      'لا تمتلك صلاحية مدير',
      'هذه الصفحة متاحة فقط لمسؤولي منصّة SyDent. ' +
      'إذا كنت ترى هذا الخطأ بالخطأ، تأكد من تسجيل الدخول بحساب الإدارة.'
    );
    return;
  }

  // Auth passed — remove splash and show the page
  console.log('[subscription-events] auth OK, rendering page');
  splash.remove();
  document.getElementById('page').style.display = 'block';

  // Default date range = last 30 days (matches Stripe Events default)
  var today = new Date();
  var thirtyAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
  document.getElementById('fDateFrom').value = toIsoDate(thirtyAgo);
  document.getElementById('fDateTo').value = toIsoDate(today);

  renderChips();
  await loadTenants();
  await loadEvents(true);
});

function toIsoDate(d) {
  // Local-time YYYY-MM-DD (matches what <input type="date"> wants)
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

/* ===== XSS-safe helpers (same pattern as admin.html) ===== */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ===== Tenant cache =====
 * One-shot fetch on page load. The tenants set rarely changes
 * during a viewing session, and re-fetching on every page would
 * add latency to "load more". If a tenant was added since load,
 * its events show "—" for name (graceful degradation), and the
 * admin can press 🔄 تحديث to re-load. */
async function loadTenants() {
  try {
    var res = await window.sb.from('trial_requests')
      .select('id, name, email, phone')
      .order('created_at', { ascending: false });
    if (res.error) {
      console.warn('loadTenants error:', res.error);
      return;
    }
    var rows = res.data || [];
    var cache = {};
    rows.forEach(function(r) {
      cache[r.id] = { name: r.name || '', email: r.email || '', phone: r.phone || '' };
    });
    tenantsCache = cache;
  } catch (e) {
    console.warn('loadTenants exception:', e);
  }
}

/* ===== Event type chips =====
 * Multi-select. Empty selection = "all types" (no filter).
 * Rendered alphabetically WITHIN category groups for stability. */
function renderChips() {
  var wrap = document.getElementById('chipsWrap');
  var html = '';
  var codes = Object.keys(EVENT_TYPES);
  codes.forEach(function(code) {
    var t = EVENT_TYPES[code];
    var active = selectedTypes.has(code) ? ' active' : '';
    html += '<span class="chip' + active + '" data-code="' + escapeHtml(code) + '" ' +
            'onclick="toggleChip(\'' + code + '\')">' +
            t.emoji + ' ' + escapeHtml(t.label_ar) + '</span>';
  });
  wrap.innerHTML = html;
}

function toggleChip(code) {
  if (selectedTypes.has(code)) selectedTypes.delete(code);
  else                          selectedTypes.add(code);
  renderChips();
  applyFilters();
}

/* ===== Filters ===== */
function resetFilters() {
  var today = new Date();
  var thirtyAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
  document.getElementById('fDateFrom').value = toIsoDate(thirtyAgo);
  document.getElementById('fDateTo').value = toIsoDate(today);
  document.getElementById('fSearch').value = '';
  selectedTypes.clear();
  renderChips();
  loadEvents(true);
}

function applyFilters() {
  // Reset accumulator — new filter set means fresh page 1.
  loadEvents(true);
}

function onSearchInput() {
  // Debounce 300ms so typing doesn't hammer the DB
  if (searchDebounce) clearTimeout(searchDebounce);
  searchDebounce = setTimeout(function() {
    // Search is client-side over already-loaded rows (cheap), but
    // re-render — no need to re-query DB unless date/type changes.
    renderList();
  }, 300);
}

/* ===== Event loading =====
 * Date + type filters go to DB (cheap, indexed). Tenant search
 * is client-side over the loaded page (Postgres can't JOIN
 * subscription_events with trial_requests through PostgREST in
 * one shot without an RPC, and we want to keep migrations zero
 * for X4). Tradeoff: if search is the only filter, you may need
 * to "load more" to find matches. Acceptable for an audit log
 * sized in the thousands per year, not millions.
 */
async function loadEvents(reset) {
  // D6 (audit): mint a new token at entry. If a subsequent loadEvents
  // call bumps the token while our DB query is in flight, we discard
  // our result on return. This is the standard "latest-wins" pattern.
  var myToken = ++loadEventsToken;

  if (reset) {
    allEvents = [];
    document.getElementById('eventsList').innerHTML =
      '<div class="state-card"><span class="state-icon">⏳</span><div>جارٍ التحميل...</div></div>';
    document.getElementById('paginationWrap').style.display = 'none';
  }

  var dateFrom = document.getElementById('fDateFrom').value;
  var dateTo = document.getElementById('fDateTo').value;
  var typesArr = Array.from(selectedTypes);

  // Build query
  var q = window.sb.from('subscription_events').select('*').order('created_at', { ascending: false });

  if (dateFrom) {
    // Use LOCAL time boundaries: <input type="date"> stores local YYYY-MM-DD,
    // so we anchor the comparison to local midnight, not UTC midnight. The
    // Date constructor with 'YYYY-MM-DDTHH:mm:ss' (no Z suffix) treats the
    // string as local time, then toISOString() converts to a proper UTC ISO
    // for the query. Damascus is UTC+3, so without this fix a user picking
    // "2026-05-23" would miss events between 00:00–03:00 local on May 23.
    var fromLocal = new Date(dateFrom + 'T00:00:00');
    if (!isNaN(fromLocal.getTime())) {
      q = q.gte('created_at', fromLocal.toISOString());
    }
  }
  if (dateTo) {
    // Inclusive: end of selected day in LOCAL time (23:59:59.999)
    var toLocal = new Date(dateTo + 'T23:59:59.999');
    if (!isNaN(toLocal.getTime())) {
      q = q.lte('created_at', toLocal.toISOString());
    }
  }
  if (typesArr.length > 0) {
    q = q.in('event_type', typesArr);
  }
  // Server-side pagination: pageSize+1 to detect "has more"
  var offset = allEvents.length;
  q = q.range(offset, offset + pageSize);

  var res = await q;
  // D6 (audit): if a newer loadEvents() started while we were waiting,
  // discard our stale result. Otherwise concurrent filter changes can
  // interleave pages from different queries.
  if (myToken !== loadEventsToken) {
    return;
  }
  if (res.error) {
    document.getElementById('eventsList').innerHTML =
      '<div class="state-card"><span class="state-icon">⚠️</span><div>خطأ: ' +
      escapeHtml(res.error.message) + '</div></div>';
    return;
  }
  var rows = res.data || [];
  // The pageSize+1 trick: if we got pageSize+1 rows, there are more
  if (rows.length > pageSize) {
    hasMore = true;
    rows = rows.slice(0, pageSize);
  } else {
    hasMore = false;
  }
  allEvents = allEvents.concat(rows);
  renderList();
}

function loadMore() {
  var btn = document.getElementById('btnLoadMore');
  btn.disabled = true;
  btn.textContent = '⏳ جارٍ التحميل...';
  loadEvents(false).finally(function() {
    btn.disabled = false;
    btn.textContent = '⬇ تحميل المزيد (50)';
  });
}

/* ===== Rendering =====
 * Client-side filter for tenant search, then card list. Each card
 * is a single tappable row that opens the drill-down modal. */
function renderList() {
  var search = (document.getElementById('fSearch').value || '').trim().toLowerCase();
  var filtered;
  if (search) {
    filtered = allEvents.filter(function(ev) {
      var t = tenantsCache[ev.trial_request_id];
      if (!t) return false;
      var hay = (t.name + ' ' + t.email + ' ' + t.phone).toLowerCase();
      return hay.indexOf(search) >= 0;
    });
  } else {
    filtered = allEvents;
  }

  var listEl = document.getElementById('eventsList');
  if (filtered.length === 0) {
    listEl.innerHTML =
      '<div class="state-card"><span class="state-icon">🔍</span>' +
      '<div>لا توجد أحداث تطابق الفلاتر الحالية.</div>' +
      '<div style="font-size:11px;margin-top:6px;color:var(--text3);">' +
      'جرّب توسيع نطاق التاريخ أو إلغاء تحديد نوع الحدث.' +
      '</div></div>';
  } else {
    var html = '';
    filtered.forEach(function(ev, idx) {
      html += renderEventCard(ev, idx);
    });
    listEl.innerHTML = html;
  }

  // Counter
  var counterEl = document.getElementById('counterText');
  if (search) {
    counterEl.innerHTML = 'عرض <strong>' + filtered.length + '</strong> من <strong>' +
                         allEvents.length + '</strong> حدث محمّل (بعد فلتر البحث)';
  } else {
    counterEl.innerHTML = 'عرض <strong>' + filtered.length + '</strong> حدث';
  }
  var aggEl = document.getElementById('counterAggregate');
  aggEl.textContent = hasMore ? 'يوجد المزيد — اضغط تحميل المزيد' : 'وصلت لنهاية النتائج';

  // Pagination visibility — only show "load more" when there
  // ARE more, AND the user isn't currently filtering by search
  // (search filters the local cache, not the server query).
  document.getElementById('paginationWrap').style.display =
    (hasMore && !search) ? 'flex' : 'none';
}

function renderEventCard(ev, idx) {
  var t = tenantsCache[ev.trial_request_id] || { name: '—', email: '', phone: '' };
  var meta = EVENT_TYPES[ev.event_type] || { label_ar: ev.event_type, category: 'config', emoji: '•' };
  var when = formatTimestamp(ev.created_at);
  var summary = buildEventSummary(ev, meta);
  var byShort = shortPerformedBy(ev.performed_by);

  return '' +
    '<div class="event-card" onclick="openModal(\'' + escapeHtml(String(ev.id || '')) + '\')" role="button" tabindex="0" ' +
    'onkeydown="if(event.key===\'Enter\'||event.key===\' \')openModal(\'' + escapeHtml(String(ev.id || '')) + '\')">' +
      '<div>' +
        '<div class="event-meta">' +
          '<span class="evbadge ' + meta.category + '">' + meta.emoji + ' ' + escapeHtml(meta.label_ar) + '</span>' +
          '<span class="event-tenant">' + escapeHtml(t.name || '—') + '</span>' +
          (t.email ? '<span class="event-tenant-email">' + escapeHtml(t.email) + '</span>' : '') +
          '<span class="event-time">' + escapeHtml(when) + '</span>' +
        '</div>' +
        '<div class="event-summary" style="margin-top:6px;">' + summary + '</div>' +
        (byShort ? '<div class="event-by" style="margin-top:4px;">' + escapeHtml(byShort) + '</div>' : '') +
      '</div>' +
      '<div class="event-arrow">تفاصيل ›</div>' +
    '</div>';
}

function buildEventSummary(ev, meta) {
  // One-line human summary for the card. The drill-down modal
  // shows full JSON for deep inspection.
  var parts = [];
  if (ev.from_plan && ev.to_plan && ev.from_plan !== ev.to_plan) {
    parts.push(escapeHtml(ev.from_plan) + ' ← ' + escapeHtml(ev.to_plan));
  }
  if (ev.from_status && ev.to_status && ev.from_status !== ev.to_status) {
    parts.push(escapeHtml(ev.from_status) + ' ← ' + escapeHtml(ev.to_status));
  }
  if (ev.amount && Number(ev.amount) > 0) {
    parts.push('<strong>' + Number(ev.amount).toLocaleString('ar-SY') + '</strong> ' + escapeHtml(ev.currency || 'SYP'));
  }
  // plan_updated / template_updated put the code in from_plan slot (see logSubscriptionEvent calls)
  if (ev.event_type === 'plan_updated' || ev.event_type === 'template_updated') {
    if (ev.from_plan) {
      parts.unshift('<strong>' + escapeHtml(ev.from_plan) + '</strong>');
    }
  }
  if (ev.notes) {
    // Show first ~80 chars of notes (could be plain text or JSON)
    var n = String(ev.notes);
    var preview = n.length > 80 ? n.substring(0, 80) + '…' : n;
    parts.push('<span style="color:var(--text2);">' + escapeHtml(preview) + '</span>');
  }
  return parts.length > 0 ? parts.join(' · ') : '<span style="color:var(--text3);">—</span>';
}

function shortPerformedBy(pb) {
  if (!pb) return '';
  // performed_by format is usually 'admin:email@x.com' or 'admin'
  var s = String(pb);
  if (s.indexOf('admin:') === 0) {
    return 'بواسطة: ' + s.substring(6);
  }
  return 'بواسطة: ' + s;
}

function formatTimestamp(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    // ar-SY locale gives Hijri sometimes — use ar-EG for stable Gregorian
    return d.toLocaleString('ar-EG', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  } catch (e) {
    return iso;
  }
}

/* ===== Drill-down modal ===== */
function openModal(eventId) {
  // D8 (audit): resolve by event ID, not list index. Index resolution
  // is fragile when the user types in search (debounced 300ms) and
  // clicks during the debounce window — the rendered card's onclick
  // captures the OLD index but openModal would re-filter with the NEW
  // search value, opening the wrong row. event.id is the canonical
  // primary key in subscription_events and doesn't shift across renders.
  if (!eventId) return;
  var ev = null;
  for (var i = 0; i < allEvents.length; i++) {
    if (String(allEvents[i].id) === String(eventId)) { ev = allEvents[i]; break; }
  }
  if (!ev) return;

  var t = tenantsCache[ev.trial_request_id] || { name: '—', email: '', phone: '' };
  var meta = EVENT_TYPES[ev.event_type] || { label_ar: ev.event_type, category: 'config', emoji: '•' };

  var rows = '';
  rows += detailRow('🆔 ID', ev.id);
  rows += detailRow('📅 الوقت', formatTimestamp(ev.created_at) + ' (' + escapeHtml(ev.created_at || '') + ')');
  rows += detailRow('🏷 نوع الحدث',
    '<span class="evbadge ' + meta.category + '">' + meta.emoji + ' ' + escapeHtml(meta.label_ar) +
    '</span> <code style="color:var(--text3);font-size:11px;">(' + escapeHtml(ev.event_type) + ')</code>');
  rows += detailRow('👤 العميل', escapeHtml(t.name || '—') +
    (t.email ? '<br><span style="color:var(--text3);font-size:11px;">' + escapeHtml(t.email) + '</span>' : '') +
    (t.phone ? '<br><span style="color:var(--text3);font-size:11px;">' + escapeHtml(t.phone) + '</span>' : ''));
  if (ev.from_plan || ev.to_plan) {
    rows += detailRow('💎 الخطة',
      (ev.from_plan ? escapeHtml(ev.from_plan) : '—') + ' ← ' +
      (ev.to_plan ? escapeHtml(ev.to_plan) : '—'));
  }
  if (ev.from_status || ev.to_status) {
    rows += detailRow('🏁 الحالة',
      (ev.from_status ? escapeHtml(ev.from_status) : '—') + ' ← ' +
      (ev.to_status ? escapeHtml(ev.to_status) : '—'));
  }
  if (ev.from_trial_end || ev.to_trial_end) {
    rows += detailRow('⏰ نهاية التجربة',
      (ev.from_trial_end ? escapeHtml(ev.from_trial_end) : '—') + ' ← ' +
      (ev.to_trial_end ? escapeHtml(ev.to_trial_end) : '—'));
  }
  if (ev.amount && Number(ev.amount) > 0) {
    rows += detailRow('💰 المبلغ',
      '<strong>' + Number(ev.amount).toLocaleString('ar-SY') + '</strong> ' +
      escapeHtml(ev.currency || 'SYP'));
  }
  if (ev.performed_by) {
    rows += detailRow('👨‍💼 بواسطة', escapeHtml(ev.performed_by));
  }

  // Notes: try parse as JSON for diff display, else show raw
  if (ev.notes) {
    var notesHtml = renderNotes(ev.notes);
    rows += detailRow('📝 ملاحظات', notesHtml);
  }

  // Full JSON dump (developer-friendly, collapsed by default not
  // implemented — always shown since most modals are small)
  rows += detailRow('🧾 JSON الكامل',
    '<div class="json-block">' + escapeHtml(JSON.stringify(ev, null, 2)) + '</div>');

  document.getElementById('modalBody').innerHTML = rows;
  document.getElementById('modalOverlay').classList.add('open');
}

function detailRow(label, valueHtml) {
  return '<div class="detail-row"><div class="detail-label">' + label +
         '</div><div class="detail-value">' + valueHtml + '</div></div>';
}

function renderNotes(notes) {
  // Plan editor and template editor both write JSON to notes with
  // a diff structure: { plan_code|template_code, diff: { field: { from, to } } }
  // For everything else, just show the raw string.
  try {
    var parsed = JSON.parse(notes);
    if (parsed && typeof parsed === 'object' && parsed.diff && typeof parsed.diff === 'object') {
      var diffHtml = '';
      var keys = Object.keys(parsed.diff);
      keys.forEach(function(k) {
        var d = parsed.diff[k];
        if (!d || typeof d !== 'object') return;
        var fromVal, toVal;
        // body diff in template_updated uses {from_len, to_len, from_preview, to_preview}
        if (d.from_preview !== undefined || d.to_preview !== undefined) {
          fromVal = (d.from_preview != null ? d.from_preview : '');
          toVal   = (d.to_preview   != null ? d.to_preview   : '');
        } else {
          fromVal = (d.from != null ? String(d.from) : '');
          toVal   = (d.to   != null ? String(d.to)   : '');
        }
        diffHtml += '<div class="diff-row">' +
                    '<div class="diff-label">' + escapeHtml(k) + '</div>' +
                    '<div class="diff-from">' + escapeHtml(fromVal) + '</div>' +
                    '<div class="diff-to">' + escapeHtml(toVal) + '</div>' +
                    '</div>';
      });
      var header = '';
      if (parsed.plan_code) header = '<div style="margin-bottom:8px;color:var(--text2);font-size:11px;">خطة: <strong>' + escapeHtml(parsed.plan_code) + '</strong></div>';
      else if (parsed.template_code) header = '<div style="margin-bottom:8px;color:var(--text2);font-size:11px;">قالب: <strong>' + escapeHtml(parsed.template_code) + '</strong></div>';
      return header + diffHtml + '<div class="json-block">' + escapeHtml(notes) + '</div>';
    }
  } catch (e) { /* not JSON — fall through */ }
  return '<div style="white-space:pre-wrap;">' + escapeHtml(String(notes)) + '</div>';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalIfBackdrop(ev) {
  // Only close if the click was on the overlay itself, not the card inside
  if (ev.target.id === 'modalOverlay') closeModal();
}

// Esc key closes modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

/* ===== CSV export =====
 * Exports ALL currently-loaded events (after applying tenant search
 * filter, if any). Date+type filters were already applied at the
 * DB query layer, so allEvents already represents the slice.
 *
 * BOM + CRLF + double-quote-everything = Excel-friendly Arabic CSV.
 * (Same pattern as admin.html exportCSV.) */
function exportCsv() {
  var search = (document.getElementById('fSearch').value || '').trim().toLowerCase();
  var rows = search
    ? allEvents.filter(function(ev) {
        var t = tenantsCache[ev.trial_request_id];
        if (!t) return false;
        return (t.name + ' ' + t.email + ' ' + t.phone).toLowerCase().indexOf(search) >= 0;
      })
    : allEvents.slice();

  if (rows.length === 0) {
    alert('لا توجد أحداث للتصدير. حاول توسيع الفلاتر أولاً.');
    return;
  }

  var headers = [
    'الوقت','نوع الحدث','العميل','الإيميل','الهاتف',
    'من خطة','إلى خطة','من حالة','إلى حالة',
    'من نهاية تجربة','إلى نهاية تجربة',
    'المبلغ','العملة','بواسطة','ملاحظات','ID'
  ];
  var lines = [headers.map(csvCell).join(',')];

  rows.forEach(function(ev) {
    var t = tenantsCache[ev.trial_request_id] || { name: '', email: '', phone: '' };
    var meta = EVENT_TYPES[ev.event_type] || { label_ar: ev.event_type };
    var row = [
      formatTimestamp(ev.created_at),
      meta.label_ar + ' (' + ev.event_type + ')',
      t.name, t.email, t.phone,
      ev.from_plan || '', ev.to_plan || '',
      ev.from_status || '', ev.to_status || '',
      ev.from_trial_end || '', ev.to_trial_end || '',
      ev.amount == null ? '' : String(ev.amount),
      ev.currency || '',
      ev.performed_by || '',
      ev.notes || '',
      ev.id || ''
    ];
    lines.push(row.map(csvCell).join(','));
  });

  // Excel-friendly UTF-8 BOM + CRLF
  var blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
  a.download = 'subscription-events-' + ts + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function csvCell(v) {
  // RFC 4180: double-quote + escape internal double-quotes
  if (v == null) return '""';
  var s = String(v).replace(/"/g, '""');
  return '"' + s + '"';
}

/* ===== Navigation ===== */
function goBack() {
  window.location.href = 'admin.html';
}

async function doLogout() {
  try { await window.sb.auth.signOut(); } catch (e) { /* best-effort */ }
  window.location.replace('auth.html');
}
