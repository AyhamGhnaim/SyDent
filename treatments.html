<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta name="apple-mobile-web-app-capable" content="yes">

<title>قائمة العلاجات — SyDent</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg2:#0f2038;--bg3:#132840;
  --border:rgba(46,232,158,0.15);
  --green:#2ee89e;--red:#ef5350;--yellow:#f5c842;
  --blue:#63b3ed;--purple:#a78bfa;
  --text:#e1f4ee;--text2:#8a9ab5;--radius:12px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;gap:12px;
}
.tb-title{font-size:18px;font-weight:800;color:var(--green);}
.tb-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:9px;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;border:none;transition:all .2s;
}
.btn-primary{background:var(--green);color:var(--bg);}
.btn-primary:hover{background:#26d48e;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--green);color:var(--green);}
.btn-sm{padding:7px 14px;font-size:12px;}

.page{padding:24px 28px;max-width:1200px;margin:0 auto;}

/* ── Info box ── */
.info-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 20px;
  margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
  font-size:13px;color:var(--text2);
}
.info-box .info-icon{font-size:24px;}

/* ── Treatments grid ── */
.treat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:16px;
  margin-bottom:20px;
}
.treat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:all .2s;
  position:relative;
}
.treat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);border-color:var(--green);}
.treat-color-bar{height:5px;width:100%;}
.treat-body{padding:16px 18px;}
.treat-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.treat-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;flex-shrink:0;
}
.treat-name{font-size:15px;font-weight:800;color:var(--text);line-height:1.3;}
.treat-key{font-size:11px;color:var(--text2);margin-top:2px;}
.treat-price{
  display:flex;align-items:baseline;gap:5px;
  font-size:20px;font-weight:800;color:var(--green);
  margin-top:10px;
}
.treat-price .currency{font-size:12px;color:var(--text2);font-weight:600;}
.treat-actions{
  display:flex;gap:6px;margin-top:14px;padding-top:12px;
  border-top:1px solid rgba(46,232,158,0.06);
}
.treat-actions button{flex:1;padding:7px;font-size:12px;font-weight:700;border-radius:7px;cursor:pointer;font-family:'Cairo',sans-serif;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s;}
.treat-actions .ed-btn:hover{border-color:var(--blue);color:var(--blue);}
.treat-actions .del-btn:hover{border-color:var(--red);color:var(--red);}
.treat-builtin-tag{
  position:absolute;top:8px;left:8px;
  background:rgba(99,179,237,0.15);color:var(--blue);
  border:1px solid rgba(99,179,237,0.3);
  border-radius:6px;padding:2px 8px;
  font-size:10px;font-weight:700;
}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.modal-head h3{font-size:16px;font-weight:700;}
.modal-close{background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;}
.modal-body{padding:20px;max-height:75vh;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;}
.modal-body::-webkit-scrollbar{display:none;}
.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:10px 13px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;direction:rtl;
}
.form-group input:focus,.form-group select:focus{border-color:var(--green);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-foot{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border);justify-content:flex-end;}
.btn-cancel-m{padding:9px 22px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:9px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-save-m{padding:9px 26px;background:var(--green);border:none;color:var(--bg);border-radius:9px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

/* color picker */
.color-picker{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.color-opt{
  width:36px;height:36px;border-radius:9px;cursor:pointer;
  border:3px solid transparent;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#0a1628;
}
.color-opt:hover{transform:scale(1.1);}
.color-opt.selected{border-color:var(--text);box-shadow:0 0 0 2px var(--bg);}

/* target-part picker */
.target-opt{
  padding:12px 10px;
  background:var(--bg3);
  border:2px solid var(--border);
  border-radius:9px;
  cursor:pointer;
  text-align:center;
  transition:all .15s;
}
.target-opt .target-title{font-size:12px;font-weight:700;color:var(--text);}
.target-opt .target-sub{font-size:10px;color:var(--text2);margin-top:2px;}
.target-opt:hover{background:rgba(46,232,158,0.06);}
.target-opt.selected{
  border-color:var(--green);
  background:rgba(46,232,158,0.1);
  box-shadow:0 0 0 1px var(--green);
}

/* preview */
.tooth-preview{
  display:flex;align-items:center;gap:12px;
  padding:14px;background:var(--bg3);border-radius:10px;
  margin-bottom:10px;
}
.preview-tooth{
  width:36px;height:46px;border-radius:6px 6px 10px 10px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;
  border:2px solid;
  box-shadow:inset 0 -3px 6px rgba(0,0,0,.1);
}
.preview-text{font-size:12px;color:var(--text2);}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:11px 24px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Lab toggle switch */
.lab-toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg);border:1px solid var(--border);border-radius:24px;transition:.25s;}
.lab-toggle-slider:before{position:absolute;content:"";height:18px;width:18px;right:2px;top:2px;background:var(--text2);border-radius:50%;transition:.25s;}
.lab-toggle-switch input:checked + .lab-toggle-slider{background:rgba(46,232,158,.18);border-color:var(--green);}
.lab-toggle-switch input:checked + .lab-toggle-slider:before{transform:translateX(-22px);background:var(--green);}

/* Lab tag on treatment card */
.treat-lab-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(99,179,237,.15);color:#63b3ed;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-right:5px;vertical-align:middle;}

@media(max-width:900px){
  .page{padding:16px;}
  .topbar{padding:12px 16px;}
  .treat-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>

<script>
// ── Supabase-backed treatments ──
var treatments = []; // populated from Supabase
var currentDoctor = null;

async function loadTreatments() {
  const user = await sbRequireAuth();
  if (!user) return;
  currentDoctor = user;
  const { data, error } = await window.sb
    .from('treatments')
    .select('*')
    .order('sort_order', { ascending: true });
  if (error) {
    console.error('Load error:', error);
    showToast('⚠️ ' + error.message);
    return;
  }
  treatments = (data || []).map(function(t){
    // Derive label from name if it's empty (legacy data may have empty labels)
    var lbl = t.label;
    if (!lbl || !lbl.trim()) {
      lbl = (t.name || '').replace(/\s+/g, '').charAt(0) || '·';
    }
    return {
      id: t.id,                        // DB UUID — used for edit/delete
      treatment_key: t.treatment_key,  // human-readable key
      name: t.name,
      label: lbl,
      fill: t.fill,
      stroke: t.stroke,
      price: t.price,
      builtin: t.builtin,
      needs_lab: !!t.needs_lab,
      target_part: t.target_part || 'crown',
      sort_order: t.sort_order
    };
  });
  render();
}

function saveAll() { /* no-op (Supabase writes happen per operation) */ }

function fmt(n) { return Number(n||0).toLocaleString('ar-SY'); }

// ── Render grid ──
function render() {
  var grid = document.getElementById('treatGrid');
  if (!treatments.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text2);"><div style="font-size:48px;margin-bottom:12px;">🦷</div><div>لا توجد علاجات. أضف أول علاج للبدء.</div></div>';
    return;
  }
  var html = '';
  for (var i=0; i<treatments.length; i++) {
    var t = treatments[i];
    var bg = t.fill, fg = t.stroke;
    var iconBg = 'background:' + bg + ';';
    var bar = 'background:' + bg + ';';
    var textColor = isLightColor(bg) ? '#0a1628' : '#fff';
    var builtinTag = '';
    var labTag = t.needs_lab ? '<span class="treat-lab-tag">🧪 مخبر</span>' : '';
    var targetMap = {
      'crown':      { text:'سطح تاج',     color:'#f5c842' },
      'root':       { text:'جذر السن',    color:'#a78bfa' },
      'whole':      { text:'سن كامل',     color:'#06b6d4' },
      'crown_full': { text:'التاج كامل',  color:'#fb923c' },
      'bridge':     { text:'جسر',         color:'#dc2626' },
      'both':       { text:'تاج وجذر',    color:'#fb923c' }
    };
    var tp = targetMap[t.target_part] || targetMap.crown;
    var targetTag = '<span class="treat-target-tag" style="display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:' + tp.color + '22;color:' + tp.color + ';border:1px solid ' + tp.color + '55;margin-right:4px;">🦷 ' + tp.text + '</span>';
    html += '<div class="treat-card">'
      + '<div class="treat-color-bar" style="' + bar + '"></div>'
      + builtinTag
      + '<div class="treat-body">'
        + '<div class="treat-head">'
          + '<div>'
            + '<div class="treat-name">' + escapeHtml(t.name) + ' ' + labTag + ' ' + targetTag + '</div>'
            + '<div class="treat-key">المعرّف: ' + (t.treatment_key || t.id) + '</div>'
          + '</div>'
          + '<div class="treat-icon" style="' + iconBg + 'color:' + textColor + ';border:2px solid ' + fg + ';">' + (t.label || '') + '</div>'
        + '</div>'
        + '<div class="treat-price">' + fmt(t.price) + ' <span class="currency">ل.س</span></div>'
        + '<div class="treat-actions">'
          + '<button class="ed-btn" onclick="editTreatment(\'' + t.id + '\')">✏️ تعديل</button>'
          + (t.builtin
              ? '<button class="del-btn" onclick="alert(\'لا يمكن حذف العلاج الافتراضي\')" style="opacity:.5;cursor:not-allowed;">🗑 محمي</button>'
              : '<button class="del-btn" onclick="deleteTreatment(\'' + t.id + '\')">🗑 حذف</button>')
        + '</div>'
      + '</div>'
    + '</div>';
  }
  grid.innerHTML = html;
}

function isLightColor(hex) {
  var c = hex.replace('#','');
  var r = parseInt(c.substr(0,2),16);
  var g = parseInt(c.substr(2,2),16);
  var b = parseInt(c.substr(4,2),16);
  // perceived brightness
  return (r*299 + g*587 + b*114)/1000 > 155;
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// ── Modal logic ──
var editingId = null;
var pickedFill = '#2ee89e', pickedStroke = '#1fba7e';
var pickedTarget = 'crown';

function openAddModal() {
  editingId = null;
  // Reset implant name lock
  var nameInputAdd = document.getElementById('tName');
  nameInputAdd.readOnly = false;
  nameInputAdd.style.opacity = '';
  nameInputAdd.style.cursor = '';
  nameInputAdd.title = '';
  document.getElementById('modalTitle').textContent = '＋ إضافة علاج جديد';
  document.getElementById('tName').value  = '';
  document.getElementById('tPrice').value = '';
  document.getElementById('tLabel').value = '';
  document.getElementById('tNeedsLab').checked = false;
  pickColor('#2ee89e','#1fba7e');
  pickTarget('crown');
  updatePreview();
  openModal();
}

function editTreatment(id) {
  var t = null;
  for (var i=0; i<treatments.length; i++) if (treatments[i].id === id) { t = treatments[i]; break; }
  if (!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ تعديل: ' + t.name;
  document.getElementById('tName').value  = t.name;
  document.getElementById('tPrice').value = t.price;
  document.getElementById('tLabel').value = t.label;
  document.getElementById('tNeedsLab').checked = !!t.needs_lab;
  // Implant/extracted names are fixed and cannot be edited (built-in special treatments)
  var nameInput = document.getElementById('tName');
  var lockedKeys = ['implant', 'extracted', 'bridge'];
  if (lockedKeys.indexOf(t.treatment_key) >= 0) {
    nameInput.readOnly = true;
    nameInput.style.opacity = '0.6';
    nameInput.style.cursor = 'not-allowed';
    var lockedNames = { implant: 'الزراعة', extracted: 'القلع', bridge: 'الجسر' };
    nameInput.title = 'اسم علاج ' + (lockedNames[t.treatment_key] || '') + ' لا يمكن تغييره';
  } else {
    nameInput.readOnly = false;
    nameInput.style.opacity = '';
    nameInput.style.cursor = '';
    nameInput.title = '';
  }
  pickColor(t.fill, t.stroke);
  pickTarget(t.target_part || 'crown');
  updatePreview();
  openModal();
}

function pickTarget(target) {
  pickedTarget = target;
  var opts = document.querySelectorAll('.target-opt');
  for (var i=0; i<opts.length; i++) {
    var o = opts[i];
    if (o.getAttribute('data-target') === target) o.classList.add('selected');
    else o.classList.remove('selected');
  }
}

async function deleteTreatment(id) {
  if (!confirm('حذف هذا العلاج؟ الجلسات السابقة لن تتأثر.')) return;
  const { error } = await window.sb.from('treatments').delete().eq('id', id);
  if (error) { showToast('⚠️ ' + error.message); return; }
  await loadTreatments();
  showToast('🗑️ تم الحذف');
}

async function resetToDefaults() {
  if (!confirm('استعادة العلاجات الافتراضية؟ سيتم حذف العلاجات المخصصة التي أضفتها.')) return;
  const DEFAULTS = [
    { treatment_key:'treated',    name:'حشوة',        label:'ح', fill:'#2ee89e', stroke:'#1fba7e', price:50000,  builtin:true,  needs_lab:false, target_part:'crown', sort_order:1 },
    { treatment_key:'extracted',  name:'قلع',         label:'✕', fill:'#ef5350', stroke:'#c62828', price:30000,  builtin:true,  needs_lab:false, target_part:'whole', sort_order:2 },
    { treatment_key:'crown',      name:'تلبيس (تاج)', label:'ت', fill:'#f5c842', stroke:'#c9962a', price:200000, builtin:true,  needs_lab:true,  target_part:'whole', sort_order:3 },
    { treatment_key:'root-canal', name:'قناة جذر',    label:'ق', fill:'#a78bfa', stroke:'#7c5cbf', price:150000, builtin:true,  needs_lab:false, target_part:'root',  sort_order:4 },
    { treatment_key:'implant',    name:'زراعة',       label:'ز', fill:'#63b3ed', stroke:'#2b7ab5', price:800000, builtin:true,  needs_lab:true,  target_part:'whole', sort_order:5 },
    { treatment_key:'bridge',     name:'جسر',         label:'ج', fill:'#dc2626', stroke:'#991b1b', price:600000, builtin:true,  needs_lab:true,  target_part:'bridge', sort_order:6 },
    { treatment_key:'cleaning',   name:'تنظيف',       label:'ن', fill:'#06b6d4', stroke:'#0a809a', price:25000,  builtin:false, needs_lab:false, target_part:'crown', sort_order:6 },
    { treatment_key:'whitening',  name:'تبييض',       label:'ب', fill:'#84cc16', stroke:'#5a9410', price:80000,  builtin:false, needs_lab:false, target_part:'crown', sort_order:7 },
    { treatment_key:'xray',       name:'أشعة',        label:'أ', fill:'#a3a3a3', stroke:'#6b6b6b', price:15000,  builtin:false, needs_lab:false, target_part:'whole', sort_order:8 },
    { treatment_key:'consult',    name:'استشارة',     label:'س', fill:'#fb923c', stroke:'#c2691f', price:10000,  builtin:false, needs_lab:false, target_part:'whole', sort_order:9 }
  ];
  // delete all current
  await window.sb.from('treatments').delete().eq('doctor_id', currentDoctor.id);
  // insert defaults
  const rows = DEFAULTS.map(d => Object.assign({ doctor_id: currentDoctor.id }, d));
  const { error } = await window.sb.from('treatments').insert(rows);
  if (error) { showToast('⚠️ ' + error.message); return; }
  await loadTreatments();
  showToast('↺ تم استعادة الافتراضي');
}

async function saveTreatment() {
  var name  = document.getElementById('tName').value.trim();
  var price = parseFloat(document.getElementById('tPrice').value);
  // Preserve existing label if editing; otherwise generate from name
  var existingLabel = document.getElementById('tLabel').value;
  var label = existingLabel || name.replace(/\s+/g, '').charAt(0) || '·';
  var needsLab = document.getElementById('tNeedsLab').checked;
  if (!name)                 { showToast('⚠️ الاسم مطلوب'); return; }
  if (isNaN(price)||price<0) { showToast('⚠️ السعر غير صحيح'); return; }

  if (editingId) {
    // UPDATE existing
    const { error } = await window.sb
      .from('treatments')
      .update({ name: name, price: price, label: label, fill: pickedFill, stroke: pickedStroke, needs_lab: needsLab, target_part: pickedTarget, updated_at: new Date().toISOString() })
      .eq('id', editingId);
    if (error) { showToast('⚠️ ' + error.message); return; }
  } else {
    // INSERT new
    const key = 'custom_' + Date.now();
    const maxOrder = treatments.length > 0 ? Math.max.apply(null, treatments.map(t=>t.sort_order||0)) : 0;
    const { error } = await window.sb
      .from('treatments')
      .insert({
        doctor_id: currentDoctor.id,
        treatment_key: key,
        name: name, price: price, label: label,
        fill: pickedFill, stroke: pickedStroke,
        needs_lab: needsLab,
        target_part: pickedTarget,
        builtin: false,
        sort_order: maxOrder + 1
      });
    if (error) { showToast('⚠️ ' + error.message); return; }
  }
  closeModal();
  await loadTreatments();
  showToast(editingId ? '✅ تم التعديل' : '✅ تم إضافة العلاج');
}

function pickColor(fill, stroke) {
  pickedFill = fill;
  pickedStroke = stroke;
  var opts = document.querySelectorAll('.color-opt');
  for (var i=0; i<opts.length; i++) {
    var o = opts[i];
    if (o.getAttribute('data-fill') === fill) o.classList.add('selected');
    else o.classList.remove('selected');
  }
}

function updatePreview() {
  var name = (document.getElementById('tName').value || '').trim();
  var label = name.replace(/\s+/g, '').charAt(0) || 'ح';
  var p = document.getElementById('previewTooth');
  p.style.background    = pickedFill;
  p.style.borderColor   = pickedStroke;
  p.style.color         = isLightColor(pickedFill) ? '#0a1628' : '#fff';
  p.textContent         = label;
}

// wire up color picker
document.querySelectorAll('.color-opt').forEach(function(o){
  o.addEventListener('click', function(){
    pickColor(o.getAttribute('data-fill'), o.getAttribute('data-stroke'));
    updatePreview();
  });
});

// wire up target-part picker
document.querySelectorAll('.target-opt').forEach(function(o){
  o.addEventListener('click', function(){
    pickTarget(o.getAttribute('data-target'));
  });
});

document.getElementById('tName').addEventListener('input', updatePreview);

// Replace direct render() at bottom with auth-aware loader
window.addEventListener('load', function(){
  loadTreatments();
});

function openModal()  { document.getElementById('treatModal').classList.add('open'); }
function closeModal() {
  var el = document.getElementById('treatModal');
  el.classList.remove('open');
  el.style.display = 'none';
  setTimeout(function(){ el.style.display = ''; }, 50);
}
document.getElementById('treatModal').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

var toastT;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ t.classList.remove('show'); }, 2800);
}
</script>

initSidebar('treatments');

  var btn = document.createElement('button');
  btn.className = 'sb-hamburger';
  btn.innerHTML = '<span></span><span></span><span></span>';
  btn.onclick = function() { window.sbToggle(); };
  var topbar = document.querySelector('.topbar');

<script>
(function(){
  if(!('ontouchstart' in window)) return;
  var s=document.createElement('style');
  s.textContent='.ptr-bar{width:100%;overflow:hidden;height:0;display:flex;align-items:center;justify-content:center;gap:8px;background:#0a1628;font-size:13px;font-weight:700;color:#2ee89e;font-family:"Cairo",sans-serif;transition:height .25s ease;border-bottom:1px solid transparent;position:fixed;top:0;left:0;right:0;z-index:9999;}.ptr-bar.show{height:44px;border-bottom-color:rgba(46,232,158,0.2);}.ptr-ring{width:15px;height:15px;border:2px solid rgba(46,232,158,0.25);border-top-color:#2ee89e;border-radius:50%;flex-shrink:0;}.ptr-bar.spin .ptr-ring{animation:ptrSpin .65s linear infinite;}@keyframes ptrSpin{to{transform:rotate(360deg);}}';
  document.head.appendChild(s);
  var bar=document.createElement('div');
  bar.id='ptrBar';bar.className='ptr-bar';
  bar.innerHTML='<div class="ptr-ring" id="ptrRing"></div><span id="ptrLabel">↓ اسحب للتحديث</span>';
  document.body.insertBefore(bar,document.body.firstChild);
  var THRESHOLD=65,MAX=95,sy=0,cy=0,active=false;
  function b(){return document.getElementById('ptrBar');}
  function r(){return document.getElementById('ptrRing');}
  function l(){return document.getElementById('ptrLabel');}
  function setState(st,pull){
    var bv=b(),rv=r(),lv=l();if(!bv)return;
    if(st==='hide'){bv.className='ptr-bar';}
    else if(st==='pull'){bv.className='ptr-bar show';rv.style.animation='none';rv.style.transform='rotate('+Math.round((pull/THRESHOLD)*270)+'deg)';lv.textContent=pull>=THRESHOLD?'↑ أفلت للتحديث':'↓ اسحب للتحديث';}
    else if(st==='spin'){bv.className='ptr-bar show spin';rv.style.transform='';rv.style.animation='';lv.textContent='جارٍ التحديث…';}
  }
  document.addEventListener('touchstart',function(e){if(window.scrollY>0)return;sy=cy=e.touches[0].clientY;active=true;},{passive:true});
  document.addEventListener('touchmove',function(e){if(!active)return;if(window.scrollY>0){active=false;setState('hide');return;}cy=e.touches[0].clientY;var pull=Math.min(Math.max(0,cy-sy)*0.55,MAX);if(pull>4)setState('pull',pull);else setState('hide');},{passive:true});
  document.addEventListener('touchend',function(){if(!active)return;active=false;var pull=Math.min(Math.max(0,cy-sy)*0.55,MAX);if(pull>=THRESHOLD){setState('spin');setTimeout(function(){window.location.reload();},800);}else{setState('hide');}cy=0;});
})();
</script>
