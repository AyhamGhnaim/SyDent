<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SyDent">
<meta name="theme-color" content="#0a1628">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<title>SyDent — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg2:#0f2038;--bg3:#132840;--bg4:#0d1e33;
  --border:rgba(46,232,158,0.15);--border2:rgba(46,232,158,0.28);
  --green:#2ee89e;--green2:#26d48e;--green-dim:rgba(46,232,158,0.1);
  --red:#ef5350;--red-dim:rgba(239,83,80,0.1);
  --yellow:#ffa726;--yellow-dim:rgba(255,167,38,0.1);
  --text:#e1f4ee;--text2:#8a9ab5;--text3:#4a6080;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ===== LOGIN SCREEN ===== */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
  background:radial-gradient(ellipse 600px 400px at 50% 40%, rgba(46,232,158,0.06) 0%, transparent 70%);
}
.login-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:20px;padding:40px 32px;
  width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo svg{width:48px;height:48px;margin-bottom:10px;}
.login-logo .name{font-size:22px;font-weight:800;color:var(--green);}
.login-logo .sub{font-size:12px;color:var(--text2);}
.login-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;text-align:center;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;}
.field input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s;
}
.field input:focus{border-color:var(--green);}
.field input::placeholder{color:var(--text3);}
.btn-login{
  width:100%;padding:13px;background:var(--green);border:none;
  border-radius:10px;color:var(--bg);
  font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;transition:all .2s;margin-top:4px;
}
.btn-login:hover{background:var(--green2);}
.login-err{
  display:none;margin-bottom:12px;padding:10px 14px;
  background:var(--red-dim);border:1px solid rgba(239,83,80,0.3);
  border-radius:8px;font-size:12px;color:#ef9a9a;text-align:center;
}
.login-err.show{display:block;}

/* ===== MAIN ADMIN ===== */
#adminScreen{display:none;}
header{
  position:sticky;top:0;z-index:50;
  background:rgba(10,22,40,0.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
}
.header-logo{display:flex;align-items:center;gap:8px;}
.header-logo svg{width:28px;height:28px;}
.header-logo .name{font-size:16px;font-weight:800;color:var(--green);}
.header-logo .badge{
  font-size:10px;padding:2px 8px;
  background:var(--green-dim);border:1px solid var(--border2);
  border-radius:4px;color:var(--green);font-weight:700;
}
.btn-logout{
  padding:7px 14px;background:transparent;
  border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-family:'Cairo',sans-serif;
  font-size:12px;cursor:pointer;transition:all .2s;
}
.btn-logout:hover{border-color:var(--red);color:var(--red);}

.main{padding:20px;}

/* Stats */
.stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;margin-bottom:24px;
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:16px;text-align:center;
}
.stat-num{font-size:28px;font-weight:900;line-height:1;}
.stat-num.green{color:var(--green);}
.stat-num.yellow{color:var(--yellow);}
.stat-num.red{color:var(--red);}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;}

/* Filter tabs */
.filter-tabs{
  display:flex;gap:8px;margin-bottom:16px;
  overflow-x:auto;padding-bottom:2px;
}
.filter-tabs::-webkit-scrollbar{display:none;}
.tab{
  padding:7px 16px;border-radius:8px;
  background:transparent;border:1px solid var(--border);
  color:var(--text2);font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.tab.active{background:var(--green-dim);border-color:var(--border2);color:var(--green);}

/* Requests list */
.requests-list{display:flex;flex-direction:column;gap:12px;}
.req-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;padding:16px;
  transition:border-color .2s;
}
.req-card.new{border-color:rgba(46,232,158,0.25);}
.req-card.accepted{border-color:rgba(46,232,158,0.15);opacity:.7;}
.req-card.rejected{border-color:rgba(239,83,80,0.15);opacity:.6;}
.req-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.req-name{font-size:15px;font-weight:700;color:var(--text);}
.req-status{
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;
}
.req-status.new{background:var(--yellow-dim);color:var(--yellow);}
.req-status.accepted{background:var(--green-dim);color:var(--green);}
.req-status.rejected{background:var(--red-dim);color:var(--red);}
.req-info{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.req-info-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.req-info-row span{color:var(--text);}
.req-actions{display:flex;gap:8px;}
.btn-accept{
  flex:1;padding:9px;background:var(--green-dim);
  border:1px solid var(--border2);border-radius:8px;
  color:var(--green);font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
}
.btn-accept:hover{background:rgba(46,232,158,0.2);}
.btn-reject{
  flex:1;padding:9px;background:var(--red-dim);
  border:1px solid rgba(239,83,80,0.25);border-radius:8px;
  color:var(--red);font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
}
.btn-reject:hover{background:rgba(239,83,80,0.18);}
.btn-whatsapp{
  padding:9px 14px;
  background:rgba(37,211,102,0.12);
  border:1px solid rgba(37,211,102,0.3);border-radius:8px;
  color:#25d366;font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
  text-decoration:none;display:flex;align-items:center;gap:4px;
}
.btn-whatsapp:hover{background:rgba(37,211,102,0.2);}

.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--text2);font-size:14px;
}
.empty-state div{font-size:40px;margin-bottom:12px;}

/* ===== SEARCH BAR ===== */
.search-wrap{
  position:relative;margin-bottom:16px;
}
.search-input{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:11px 38px 11px 38px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:13px;outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--green);}
.search-input::placeholder{color:var(--text3);}
.search-icon{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--text3);pointer-events:none;
}
.search-clear{
  display:none;position:absolute;left:8px;top:50%;
  transform:translateY(-50%);
  width:24px;height:24px;border-radius:50%;
  background:var(--bg3);border:none;
  color:var(--text2);font-size:14px;cursor:pointer;
  align-items:center;justify-content:center;
  font-family:'Cairo',sans-serif;line-height:1;padding:0;
}
.search-clear:hover{background:var(--bg4);color:var(--text);}

/* ===== EDIT BUTTON ===== */
.btn-edit{
  padding:9px 14px;
  background:rgba(99,179,237,0.1);
  border:1px solid rgba(99,179,237,0.25);border-radius:8px;
  color:#63b3ed;font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
}
.btn-edit:hover{background:rgba(99,179,237,0.18);}

/* ===== Phase 7.6C-Step2: EXPORT CSV BUTTON ===== */
/* Cyan/teal — distinct from edit-blue, conveys 'data' affordance.
   Lives in its own row above the search bar; on mobile it stays the
   full visible width so the icon + label never wrap. */
.export-row{
  display:flex;justify-content:flex-end;
  margin-bottom:12px;
}
.btn-export-csv{
  padding:9px 14px;
  background:rgba(77,208,225,0.10);
  border:1px solid rgba(77,208,225,0.30);
  border-radius:8px;
  color:#4dd0e1;
  font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;
  white-space:nowrap;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-export-csv:hover{background:rgba(77,208,225,0.20);}
.btn-export-csv:disabled{opacity:.5;cursor:not-allowed;}

/* ===== Phase 7.6B: ACTIVITY + EXTEND BUTTONS ===== */
.btn-activity{
  padding:9px 14px;
  background:rgba(159,122,234,0.1);
  border:1px solid rgba(159,122,234,0.25);border-radius:8px;
  color:#b794f4;font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
}
.btn-activity:hover{background:rgba(159,122,234,0.18);}

/* ===== Phase 7.6B v2: EXTENSION WIDGET (counter + presets + apply) ===== */
.extension-widget{
  margin-top:12px;padding:12px 14px;
  background:rgba(46,232,158,0.05);
  border:1px solid rgba(46,232,158,0.18);
  border-radius:10px;
  display:flex;flex-direction:column;gap:10px;
}
.ext-row{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.ext-label{
  font-size:12px;color:var(--text2);font-weight:700;
  margin-left:4px;
}
.ext-input{
  width:70px;
  background:var(--bg3);border:1px solid rgba(46,232,158,0.3);
  border-radius:8px;padding:8px 10px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;
  text-align:center;outline:none;
  transition:border-color .15s;
}
.ext-input:focus{border-color:var(--green);}
/* Hide spinner arrows on Webkit/Mozilla */
.ext-input::-webkit-outer-spin-button,
.ext-input::-webkit-inner-spin-button{
  -webkit-appearance:none;margin:0;
}
.ext-input[type="number"]{-moz-appearance:textfield;}
.ext-unit{font-size:12px;color:var(--text2);font-weight:700;}
.ext-preset{
  padding:7px 12px;
  background:rgba(46,232,158,0.08);
  border:1px solid rgba(46,232,158,0.25);
  border-radius:7px;
  color:var(--green);font-family:'Cairo',sans-serif;
  font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;
}
.ext-preset:hover{background:rgba(46,232,158,0.18);}
.ext-apply{
  padding:8px 16px;
  background:var(--green);border:none;border-radius:8px;
  color:var(--bg);font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:800;cursor:pointer;
  transition:all .15s;
  margin-right:auto; /* push to far end of row */
}
.ext-apply:hover{background:var(--green2);}
.ext-apply:disabled{opacity:.5;cursor:not-allowed;}
/* Shorten variant: orange/yellow apply button — visual cue that the
   operation REMOVES time rather than adding it. Hover darkens slightly. */
.ext-apply.shorten{background:#ffa726;}
.ext-apply.shorten:hover{background:#f59515;}

/* ===== Phase 7.6C-S1.1: MODE SWITCHER (extend / shorten) ===== */
.ext-mode-row{
  display:flex;gap:6px;align-items:center;
  padding-bottom:8px;
  border-bottom:1px dashed rgba(46,232,158,0.12);
}
.ext-mode-btn{
  padding:6px 12px;font-size:11px;font-weight:700;
  background:transparent;
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text2);
  font-family:'Cairo',sans-serif;
  cursor:pointer;
  transition:all .15s;
}
.ext-mode-btn:hover{border-color:var(--text2);color:var(--text);}
.ext-mode-btn.active{cursor:default;}
.ext-mode-btn.active.extend{
  background:rgba(46,232,158,0.15);
  border-color:rgba(46,232,158,0.5);
  color:var(--green);
}
.ext-mode-btn.active.shorten{
  background:rgba(255,167,38,0.15);
  border-color:rgba(255,167,38,0.5);
  color:#ffa726;
}
/* Shorten-variant preset buttons inherit ext-preset but tinted yellow. */
.ext-preset.shorten{
  background:rgba(255,167,38,0.08);
  border-color:rgba(255,167,38,0.25);
  color:#ffa726;
}
.ext-preset.shorten:hover{background:rgba(255,167,38,0.18);}

/* ===== ACTIVITY PANEL (expanded inside accepted card) ===== */
.activity-panel{
  margin-top:12px;padding:12px 14px;
  background:rgba(159,122,234,0.05);
  border:1px solid rgba(159,122,234,0.18);
  border-radius:10px;
  display:flex;flex-direction:column;gap:7px;
  animation:activityFadeIn .18s ease-out;
}
@keyframes activityFadeIn{
  from{opacity:0;transform:translateY(-4px);}
  to{opacity:1;transform:translateY(0);}
}
.activity-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--text2);
  padding:4px 0;
  border-bottom:1px dashed rgba(159,122,234,0.12);
}
.activity-row:last-child{border-bottom:none;}
.activity-row b{
  color:var(--text);font-weight:800;
  font-family:'Cairo',sans-serif;font-size:13px;
}
.activity-loading{
  text-align:center;color:var(--text2);font-size:12px;
  padding:14px 0;font-weight:600;
}

/* ===== EDIT MODAL ===== */
.modal-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
  z-index:100;align-items:center;justify-content:center;
  padding:20px;
}
.modal-backdrop.show{display:flex;}
.modal-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:24px;
  width:100%;max-width:440px;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:18px;
}
.modal-title{font-size:16px;font-weight:800;color:var(--text);}
.modal-close{
  background:transparent;border:none;color:var(--text2);
  font-size:20px;cursor:pointer;padding:4px 8px;
  line-height:1;border-radius:6px;transition:all .2s;
}
.modal-close:hover{background:var(--bg3);color:var(--text);}
.modal-field{margin-bottom:12px;}
.modal-field label{
  display:block;font-size:12px;color:var(--text2);
  font-weight:600;margin-bottom:5px;
}
.modal-field input, .modal-field textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:13px;outline:none;
  transition:border-color .2s;resize:vertical;
}
.modal-field input:focus, .modal-field textarea:focus{border-color:var(--green);}
.modal-field textarea{min-height:60px;}
.modal-hint{
  font-size:10px;color:var(--text3);margin-top:4px;
  line-height:1.5;
}
.modal-actions{
  display:flex;gap:8px;margin-top:18px;
}
.btn-cancel{
  flex:1;padding:11px;background:transparent;
  border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;
}
.btn-cancel:hover{border-color:var(--text2);color:var(--text);}
.btn-save{
  flex:1;padding:11px;background:var(--green);
  border:none;border-radius:8px;
  color:var(--bg);font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;
}
.btn-save:hover{background:var(--green2);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}

/* ===== Phase 7.6C: ALERTS BANNER (expiring trials) ===== */
.alerts-banner{
  display:none; /* shown only when there's at least 1 expiring tenant */
  margin-bottom:16px;
  padding:12px 14px;
  background:rgba(255,167,38,0.10);
  border:1px solid rgba(255,167,38,0.30);
  border-radius:10px;
  align-items:center;justify-content:space-between;gap:10px;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  transition:background .2s, border-color .2s;
}
/* Animation only attaches when the banner actually appears — avoids
   wasting one fade-in cycle on page-load while the banner is hidden,
   which would leave subsequent shows with no visible fade. */
.alerts-banner.show{display:flex; animation:bannerFadeIn .2s ease-out;}
.alerts-banner:hover{background:rgba(255,167,38,0.18);}
.alerts-banner.critical{
  background:rgba(239,83,80,0.10);
  border-color:rgba(239,83,80,0.30);
}
.alerts-banner.critical:hover{background:rgba(239,83,80,0.18);}
.alerts-banner.active{
  background:rgba(46,232,158,0.10);
  border-color:rgba(46,232,158,0.35);
}
.alerts-banner.active:hover{background:rgba(46,232,158,0.18);}
.banner-text{
  flex:1;font-size:13px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.alerts-banner .banner-text{color:#ffa726;}
.alerts-banner.critical .banner-text{color:#ef5350;}
.alerts-banner.active .banner-text{color:#2ee89e;}
.banner-cta{
  font-size:12px;font-weight:800;
  padding:4px 10px;border-radius:6px;
  background:rgba(0,0,0,0.15);
  white-space:nowrap;
}
.banner-close{
  background:transparent;border:none;
  color:inherit;font-size:16px;font-weight:800;
  cursor:pointer;padding:2px 8px;
  line-height:1;border-radius:6px;
  transition:background .15s;
}
.banner-close:hover{background:rgba(0,0,0,0.20);}
@keyframes bannerFadeIn{
  from{opacity:0;transform:translateY(-4px);}
  to{opacity:1;transform:translateY(0);}
}

/* ===== RESPONSIVE ===== */
@media(min-width:768px){
  .main{padding:28px;max-width:800px;margin:0 auto;}
  .stats-row{grid-template-columns:repeat(3,1fr);}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js?v=20260522a09"></script>
</head>
<body>

<!-- ADMIN -->
<div id="adminScreen">
  <header>
    <div class="header-logo">
      <svg viewBox="0 0 64 72" fill="none" stroke="#2ee89e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 8 C14 8 8 10 8 20 C8 30 12 34 14 40 C16 46 16 58 18 64 C19 67 22 68 24 64 C26 60 27 54 32 54 C37 54 38 60 40 64 C42 68 45 67 46 64 C48 58 48 46 50 40 C52 34 56 30 56 20 C56 10 50 8 50 8 C46 6 42 5 32 5 C22 5 18 6 14 8 Z"/>
      </svg>
      <div style="display:flex;flex-direction:column;line-height:1.15;">
        <span class="name">SyDent</span>
        <span style="font-size:9px;color:var(--text2);font-weight:600;letter-spacing:0.3px;">لوحة إدارة المنصّة</span>
      </div>
      <span class="badge">Admin</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-logout" onclick="doLogout()">خروج</button>
    </div>
  </header>

  <div class="main">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num yellow" id="countNew">0</div>
        <div class="stat-label">جديد</div>
      </div>
      <div class="stat-card">
        <div class="stat-num green" id="countAccepted">0</div>
        <div class="stat-label">مقبول</div>
      </div>
      <div class="stat-card">
        <div class="stat-num red" id="countRejected">0</div>
        <div class="stat-label">مرفوض</div>
      </div>
    </div>

    <!-- Phase 7.6C: Alerts Banner (expiring trials in next 7 days) -->

<script>
var SUPABASE_URL = 'https://rycqzpdhxabpqrdgtdzg.supabase.co';
var SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5Y3F6cGRoeGFicHFyZGd0ZHpnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Njk2NzU3NywiZXhwIjoyMDkyNTQzNTc3fQ.z2u0QSMRBCrcTjUGgjOsNMxVEnyPy4iEvTBVFhSU3bw';
var currentFilter = 'all';
var allRequests = [];

// ===== Phase 7.6A: Search + Edit state =====
var searchTerm = '';
var _searchTimer = null;
var editingId = null;

// ===== Phase 7.6C: Alerts Banner state =====
// When true, the list is filtered to show only accepted tenants whose
// trial_end is within the next 7 days (and not yet expired). Activated by
// clicking the alerts banner; cleared by clicking the banner's ✕, by
// pressing a filter tab, or by typing in the search box (search is layered
// on top, not exclusive).
var expiringFilterActive = false;

// ===== Phase 7.6B: Activity Metrics + Trial Extension =====
// Session cache for per-tenant activity metrics. Keyed by user_id.
// Cleared on page reload (so newly-signed-in tenants get fresh numbers).
// Shape per entry: { loading: bool, loaded: bool, error: string|null,
//                    patients: number|null, appointments: number|null,
//                    employees: number|null, lastSignIn: string|null }
var activityCache = {};
// Track which tenant cards have their activity panel expanded (by request id).
var activityExpanded = {};

// Relative time helper — Arabic short form, no future-time handling (we
// never expect future timestamps from auth.users.last_sign_in_at).
function timeSince(iso) {
  if (!iso) return 'لم يدخل بعد';
  var then = new Date(iso);
  if (isNaN(then.getTime())) return '—';
  var sec = (new Date() - then) / 1000;
  if (sec < 60)         return 'الآن';
  var min = sec / 60;
  if (min < 60)         return 'قبل ' + Math.floor(min) + ' دقيقة';
  var hr  = min / 60;
  if (hr < 24)          return 'قبل ' + Math.floor(hr)  + ' ساعة';
  var day = hr / 24;
  if (day < 30)         return 'قبل ' + Math.floor(day) + ' يوم';
  if (day < 365)        return 'قبل ' + Math.floor(day/30)  + ' شهر';
  return                       'قبل ' + Math.floor(day/365) + ' سنة';
}

// Format a metric value: number, '—' for error, 'جارٍ التحميل...' while loading
function fmtMetric(v) {
  if (v === null || v === undefined) return '—';
  return String(v);
}

// Lazy-fetch metrics for a tenant. Caches on success AND on partial error
// (graceful degradation: per-metric fetch failures become null → '—').
async function fetchActivityFor(userId, reqId) {
  if (!userId) {
    activityCache[reqId] = { loading: false, loaded: true, error: 'no_user_id',
                              patients: null, appointments: null, employees: null,
                              lastSignIn: null };
    return;
  }
  activityCache[reqId] = { loading: true, loaded: false, error: null,
                            patients: null, appointments: null, employees: null,
                            lastSignIn: null };
  renderList(); // show loader immediately

  // Helper for a single count query — returns the count or null on error.
  // PERF: GET with limit=0 + Prefer:count=exact returns an empty array but
  // Content-Range header carries the total count (no row payload).
  // RLS: uses SERVICE_KEY directly to bypass per-tenant RLS policies — the
  // admin is NOT the owner of these rows, so window.sb (which uses the
  // publishable anon key) would be filtered out by RLS.
  //
  // IMPORTANT: column names differ between tables in the SyDent schema!
  //   patients.doctor_id     = owner's auth.users.id  (NOT owner_id)
  //   appointments.doctor_id = owner's auth.users.id  (NOT owner_id)
  //   clinic_employees.owner_id = owner's auth.users.id
  // The owner's doctors.id is intentionally identical to auth.users.id
  // (Phase 1 canonical design) so userId works as both.
  async function safeCount(table, filterCol) {
    try {
      var url = SUPABASE_URL + '/rest/v1/' + table +
                '?select=id&' + filterCol + '=eq.' + encodeURIComponent(userId) +
                '&limit=0';
      var resp = await fetch(url, {
        method: 'GET',
        headers: {
          'apikey': SERVICE_KEY,
          'Authorization': 'Bearer ' + SERVICE_KEY,
          'Prefer': 'count=exact'
        }
      });
      if (!resp.ok && resp.status !== 206) {
        console.warn(table + ' count HTTP', resp.status);
        return null;
      }
      // Content-Range looks like "0-0/42" — the part after "/" is the total
      var cr = resp.headers.get('content-range') || resp.headers.get('Content-Range') || '';
      var slash = cr.lastIndexOf('/');
      if (slash < 0) {
        console.warn(table + ' count: no Content-Range header (cr=', cr, ')');
        return null;
      }
      var totalStr = cr.slice(slash + 1).trim();
      if (totalStr === '*') return null;
      var n = parseInt(totalStr, 10);
      return isNaN(n) ? null : n;
    } catch(e) {
      console.warn(table + ' count exception:', e && e.message);
      return null;
    }
  }

  // employees: also filter is_active=true to match Phase 5 model.
  async function safeActiveEmployees() {
    try {
      var url = SUPABASE_URL + '/rest/v1/clinic_employees' +
                '?select=id&owner_id=eq.' + encodeURIComponent(userId) +
                '&is_active=eq.true&limit=0';
      var resp = await fetch(url, {
        method: 'GET',
        headers: {
          'apikey': SERVICE_KEY,
          'Authorization': 'Bearer ' + SERVICE_KEY,
          'Prefer': 'count=exact'
        }
      });
      if (!resp.ok && resp.status !== 206) {
        console.warn('employees count HTTP', resp.status);
        return null;
      }
      var cr = resp.headers.get('content-range') || resp.headers.get('Content-Range') || '';
      var slash = cr.lastIndexOf('/');
      if (slash < 0) return null;
      var totalStr = cr.slice(slash + 1).trim();
      if (totalStr === '*') return null;
      var n = parseInt(totalStr, 10);
      return isNaN(n) ? null : n;
    } catch(e) {
      console.warn('employees count exception:', e && e.message);
      return null;
    }
  }

  // last_sign_in: admin API user lookup. Returns ISO string or null.
  async function safeLastSignIn() {
    try {
      var resp = await fetch(
        SUPABASE_URL + '/auth/v1/admin/users/' + encodeURIComponent(userId),
        { headers: { 'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY } }
      );
      if (!resp.ok) {
        console.warn('last_sign_in lookup HTTP', resp.status);
        return null;
      }
      var data = await resp.json();
      return (data && data.last_sign_in_at) || null;
    } catch(e) {
      console.warn('last_sign_in exception:', e && e.message);
      return null;
    }
  }

  // Run all four in parallel for speed.
  var results = await Promise.all([
    safeCount('patients', 'doctor_id'),       // patients.doctor_id
    safeCount('appointments', 'doctor_id'),   // appointments.doctor_id
    safeActiveEmployees(),                    // clinic_employees.owner_id (specialized)
    safeLastSignIn()
  ]);

  activityCache[reqId] = {
    loading: false, loaded: true, error: null,
    patients:     results[0],
    appointments: results[1],
    employees:    results[2],
    lastSignIn:   results[3]
  };
  renderList();
}

function toggleActivity(reqId) {
  var r = allRequests.find(function(x){ return x.id === reqId; });
  if (!r) return;
  if (activityExpanded[reqId]) {
    // Collapse — keep cache for next expansion
    activityExpanded[reqId] = false;
    renderList();
    return;
  }
  activityExpanded[reqId] = true;
  if (!activityCache[reqId] || (!activityCache[reqId].loaded && !activityCache[reqId].loading)) {
    // No cache yet → fetch (handles the post-error retry too)
    fetchActivityFor(r.user_id, reqId);
  } else {
    renderList();
  }
}

// Render the activity panel HTML for a given request. Returns '' if collapsed.
function renderActivityPanel(reqId) {
  if (!activityExpanded[reqId]) return '';
  var c = activityCache[reqId];
  if (!c || c.loading) {
    return '<div class="activity-panel"><div class="activity-loading">⏳ جارٍ التحميل...</div></div>';
  }
  if (c.error === 'no_user_id') {
    return '<div class="activity-panel"><div class="activity-loading" style="color:#ef5350;">⚠️ لا يوجد user_id مرتبط بهذا الحساب</div></div>';
  }
  // If ALL counts failed AND last_sign_in also failed → likely auth/network issue
  // Show a retry button instead of four dashes.
  var allFailed = (c.patients === null && c.appointments === null &&
                   c.employees === null && c.lastSignIn === null);
  if (allFailed) {
    return '<div class="activity-panel">' +
             '<div class="activity-loading" style="color:#ef5350;">' +
               '⚠️ فشل جلب البيانات' +
             '</div>' +
             '<button class="btn-activity" style="margin-top:8px;" ' +
               'onclick="retryActivity(\'' + reqId + '\')">🔄 إعادة المحاولة</button>' +
           '</div>';
  }
  return (
    '<div class="activity-panel">' +
      '<div class="activity-row"><span>👥 المرضى:</span>     <b>' + fmtMetric(c.patients)     + '</b></div>' +
      '<div class="activity-row"><span>📅 المواعيد:</span>   <b>' + fmtMetric(c.appointments) + '</b></div>' +
      '<div class="activity-row"><span>👨‍⚕️ الموظفين النشطين:</span> <b>' + fmtMetric(c.employees) + '</b></div>' +
      '<div class="activity-row"><span>🕐 آخر دخول:</span>   <b>' + escapeHtml(timeSince(c.lastSignIn)) + '</b></div>' +
    '</div>'
  );
}

// Retry button — clears the cache entry and re-fetches.
// Guard against double-click: if already loading, do nothing.
function retryActivity(reqId) {
  var r = allRequests.find(function(x){ return x.id === reqId; });
  if (!r) return;
  var existing = activityCache[reqId];
  if (existing && existing.loading) return; // already retrying — ignore
  delete activityCache[reqId];
  fetchActivityFor(r.user_id, reqId);
}

// Clean up activityCache + activityExpanded + extendDaysByReq entries for
// requests that no longer exist in allRequests (e.g. after delete). Called
// from renderAll.
function pruneActivityCaches() {
  var liveIds = {};
  for (var i = 0; i < allRequests.length; i++) liveIds[allRequests[i].id] = true;
  for (var k in activityCache)    { if (!liveIds[k]) delete activityCache[k]; }
  for (var k2 in activityExpanded) { if (!liveIds[k2]) delete activityExpanded[k2]; }
  for (var k3 in extendDaysByReq) { if (!liveIds[k3]) delete extendDaysByReq[k3]; }
  for (var k4 in extendModeByReq) { if (!liveIds[k4]) delete extendModeByReq[k4]; }
}

// ===== Trial extension (custom-days counter + 30/60/90 presets) =====
// Per-tenant state for the in-card extension widget. Defaults to 30 days
// the first time the card is rendered. Persists in memory only — reload
// resets to 30.
var extendDaysByReq = {};

// ===== Phase 7.6C-S1.1: Trial Adjust (extend / shorten mode) =====
// Per-tenant mode state for the trial-adjust widget. 'extend' is the
// default (matches Phase 7.6B behavior so existing workflows are
// unchanged). 'shorten' is the new direction. Persists in memory only;
// reload resets to 'extend'. The mode and the day counter are kept in
// SEPARATE maps so switching mode preserves whatever number the user
// already typed — matching what most date-pickers do.
var extendModeByReq = {};

function getExtendMode(reqId) {
  if (!extendModeByReq[reqId]) extendModeByReq[reqId] = 'extend';
  return extendModeByReq[reqId];
}

// Switching mode only updates state + re-renders the widget. The day
// counter (extendDaysByReq) is intentionally preserved so an operator
// can type "5", then realize they meant to shorten, click "تقصير" and
// keep typing — they don't lose their input.
//
// IMPORTANT: same defensive sync as applyAdjust does. If the user typed
// a new number but didn't blur the input yet (so onExtendChange hasn't
// fired), the raw DOM value is the truth, not extendDaysByReq. We commit
// it to the state map FIRST, then re-render — otherwise the re-render
// would pull the stale state map value and the user's typed number
// would silently disappear.
function setExtendMode(reqId, mode) {
  if (mode !== 'extend' && mode !== 'shorten') return;
  if (extendModeByReq[reqId] === mode) return; // no-op for same mode
  var inp = document.getElementById('extDays-' + reqId);
  if (inp) {
    var raw = parseInt(inp.value, 10);
    if (!isNaN(raw)) extendDaysByReq[reqId] = raw;
  }
  extendModeByReq[reqId] = mode;
  renderList();
}

function getExtendDays(reqId) {
  if (extendDaysByReq[reqId] == null) extendDaysByReq[reqId] = 30;
  return extendDaysByReq[reqId];
}

// Called by the number input's oninput on every keystroke. Stores the
// pending value but does NOT reflect it back into the input — that would
// prevent the user from clearing the field to type a new number. We only
// commit the parsed value to state; clamping happens on blur (onchange).
function onExtendInput(reqId, raw) {
  if (raw === '' || raw == null) return; // user mid-edit, do nothing
  var v = parseInt(raw, 10);
  if (isNaN(v)) return;
  // Update internal state but don't write back into the DOM mid-keystroke
  extendDaysByReq[reqId] = v;
}

// Called by the number input's onchange (i.e. on blur / commit). This is
// where we clamp out-of-range values and reflect the clamped result back
// into the input so the user sees what will actually be applied.
function onExtendChange(reqId, raw) {
  var v = parseInt(raw, 10);
  if (isNaN(v))  v = 30;
  if (v < 1)     v = 1;
  if (v > 365)   v = 365;
  extendDaysByReq[reqId] = v;
  var inp = document.getElementById('extDays-' + reqId);
  if (inp && String(v) !== inp.value) inp.value = String(v);
}

// Preset buttons (+30 / +60 / +90) just fill the input — they DON'T apply.
// User still presses the apply button to commit. This mirrors Stripe's
// trial-extension flow.
function setExtendDays(reqId, days) {
  extendDaysByReq[reqId] = days;
  var inp = document.getElementById('extDays-' + reqId);
  if (inp) inp.value = String(days);
}

// Render the per-card adjust widget. Only called when r.trial_end is set.
// Phase 7.6C-S1.1: now supports both 'extend' (default) and 'shorten' modes.
// The mode switcher sits at the top; presets and apply-button label/color
// reflect the current direction. The counter input is shared between modes
// — switching mode preserves the typed number.
function renderExtensionWidget(reqId) {
  var days = getExtendDays(reqId);
  var mode = getExtendMode(reqId);
  var isShorten = (mode === 'shorten');

  // Mode-dependent labels and visual classes
  var widgetLabel = '⏰ تعديل التجربة:';
  var applyLabel  = isShorten ? '💾 تقصير' : '💾 تمديد';
  var applyClass  = 'ext-apply' + (isShorten ? ' shorten' : '');
  var presetClass = 'ext-preset' + (isShorten ? ' shorten' : '');
  var presets     = isShorten ? [1, 7, 30] : [30, 60, 90];
  var presetSign  = isShorten ? '-' : '+';

  var extendBtnClass  = 'ext-mode-btn' + (!isShorten ? ' active extend'  : '');
  var shortenBtnClass = 'ext-mode-btn' + (isShorten  ? ' active shorten' : '');

  return (
    '<div class="extension-widget">' +
      '<div class="ext-mode-row">' +
        '<button type="button" class="' + extendBtnClass  + '" onclick="setExtendMode(\'' + reqId + '\', \'extend\')">➕ تمديد</button>' +
        '<button type="button" class="' + shortenBtnClass + '" onclick="setExtendMode(\'' + reqId + '\', \'shorten\')">➖ تقصير</button>' +
      '</div>' +
      '<div class="ext-row">' +
        '<span class="ext-label">' + widgetLabel + '</span>' +
        '<input type="number" id="extDays-' + reqId + '" class="ext-input" ' +
          'min="1" max="365" value="' + days + '" ' +
          'oninput="onExtendInput(\'' + reqId + '\', this.value)" ' +
          'onchange="onExtendChange(\'' + reqId + '\', this.value)">' +
        '<span class="ext-unit">يوم</span>' +
      '</div>' +
      '<div class="ext-row">' +
        '<button type="button" class="' + presetClass + '" onclick="setExtendDays(\'' + reqId + '\', ' + presets[0] + ')">' + presetSign + presets[0] + '</button>' +
        '<button type="button" class="' + presetClass + '" onclick="setExtendDays(\'' + reqId + '\', ' + presets[1] + ')">' + presetSign + presets[1] + '</button>' +
        '<button type="button" class="' + presetClass + '" onclick="setExtendDays(\'' + reqId + '\', ' + presets[2] + ')">' + presetSign + presets[2] + '</button>' +
        '<button type="button" class="' + applyClass + '" onclick="applyAdjust(\'' + reqId + '\')">' + applyLabel + '</button>' +
      '</div>' +
    '</div>'
  );
}

// Phase 7.6C-S1.1: Unified apply for both extend AND shorten.
// Renamed from applyExtend; old call sites in renderExtensionWidget
// updated. Behavior:
//
//   extend mode  (decision 3 / option C):
//     base = max(currentTrialEnd, today)
//     newEnd = base + days
//     — same smart base as Phase 7.6B (an expired trial + extend lands
//       at today+N, not currentEnd+N).
//
//   shorten mode (decision 3 / option C):
//     base = currentTrialEnd
//     newEnd = base - days
//     — strictly relative to the recorded end. Shortening an already-
//       expired trial just pushes the expiry further into the past
//       (logically a no-op for access control, but operator may want to
//       record it for accounting).
//
// Safety guards (decision 2 + 4 / option D + C):
//   - Days input must be 1..365 in either direction (unchanged limits).
//   - Shorten with days > 30: hardened confirm warns about large window.
//   - Shorten resulting in newEnd <= today: hardened confirm warns the
//     account will be immediately suspended.
//   - Extending a permanent account (trial_end IS NULL) is still
//     blocked as before — permanent accounts have no trial to adjust.
async function applyAdjust(reqId) {
  var r = allRequests.find(function(x){ return x.id === reqId; });
  if (!r) return;
  if (!r.trial_end) {
    alert('هذا حساب دائم — لا يحتاج تعديل.');
    return;
  }

  // Defensive sync: read the input element directly at click time in case
  // the user clicked the apply button mid-typing without blurring the
  // field first (in which case onExtendChange hasn't fired yet and the
  // state map might be stale).
  var inp = document.getElementById('extDays-' + reqId);
  if (inp) {
    var raw = parseInt(inp.value, 10);
    if (!isNaN(raw)) extendDaysByReq[reqId] = raw;
  }

  var days = getExtendDays(reqId);
  var mode = getExtendMode(reqId);
  if (!Number.isFinite(days) || days < 1 || days > 365) {
    alert('عدد الأيام غير صالح. الرجاء إدخال رقم بين 1 و 365.');
    return;
  }

  var currentEnd = new Date(r.trial_end);
  if (isNaN(currentEnd.getTime())) {
    alert('تاريخ التجربة الحالي غير صالح. تواصل مع الدعم الفني.');
    return;
  }
  var today = new Date();
  var newEnd;
  if (mode === 'shorten') {
    // Decision 3-C: shorten from currentEnd (no smart base).
    newEnd = new Date(currentEnd);
    newEnd.setDate(newEnd.getDate() - days);
  } else {
    // Extend with smart base (Phase 7.6B behavior preserved).
    var base = currentEnd > today ? currentEnd : today;
    newEnd = new Date(base);
    newEnd.setDate(newEnd.getDate() + days);
  }

  // ar-EG locale: long Arabic month name with Western digits
  var dateStr;
  try {
    dateStr = newEnd.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch(e) {
    dateStr = newEnd.toISOString().slice(0, 10);
  }

  // Build the confirmation message. We always show: action verb, days,
  // tenant name, and resulting date. For shorten, we also stack any
  // safety warnings ABOVE the action so they're seen first.
  var name = r.name || '—';
  var msg;
  if (mode === 'shorten') {
    var warnings = [];
    if (days > 30) {
      warnings.push('⚠️ تنبيه: تقصير بـ ' + days + ' يوم (أكثر من شهر).');
    }
    // Use UTC-noon comparison to avoid off-by-one near midnight edge
    // cases. If newEnd is at or before today's start, the account loses
    // access immediately on save.
    if (newEnd <= today) {
      warnings.push('🚨 التجربة ستنتهي في الماضي (' + dateStr + ').\n' +
                    'الحساب سيُعطّل فوراً بعد الحفظ.');
    }
    var header = warnings.length
      ? warnings.join('\n\n') + '\n\n'
      : '';
    msg = header +
          'تقصير تجربة "' + name + '" بـ ' + days + ' يوم؟\n' +
          'التاريخ الجديد: ' + dateStr;
  } else {
    msg = 'تمديد تجربة "' + name + '" بـ ' + days + ' يوم؟\n' +
          'التاريخ الجديد: ' + dateStr;
  }
  if (!confirm(msg)) return;

  var res;
  try {
    res = await window.sb.from('trial_requests')
      .update({ trial_end: newEnd.toISOString() })
      .eq('id', reqId);
  } catch(e) {
    alert('فشل التعديل: ' + (e && e.message ? e.message : 'خطأ غير معروف'));
    return;
  }
  if (res && res.error) {
    alert('فشل التعديل: ' + res.error.message);
    return;
  }
  // Reset widget value AND mode to defaults so the operator starts fresh
  // next time. (Mode reset to 'extend' is the safe default since the
  // common operation is extension.)
  delete extendDaysByReq[reqId];
  delete extendModeByReq[reqId];
  loadAndRender();
}

// XSS-safe HTML escaping for user-controlled fields rendered into innerHTML.
// Closes pre-existing theoretical XSS in admin.html (Bug H2 family).
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Safe escaping for values that appear inside a JS string literal that lives
// inside an HTML attribute (e.g. onclick="foo('VALUE')"). We need BOTH:
//   1. JS-string escaping (backslash, single-quote)
//   2. HTML-attribute escaping (less-than, double-quote, ampersand)
// Order matters: JS-escape FIRST, then HTML-escape the result.
function jsAttr(s) {
  if (s == null) return '';
  return String(s)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function accept(id) {
  var r = allRequests.find(function(x){ return x.id === id; });
  if (!r) return;
  var phone = r.phone.trim();
  var emailNum = phone.replace(/\D/g,'');
  var email = emailNum + '@sydent.com';

  var btn = document.querySelector('[data-id="' + id + '"].btn-accept');
  if (btn) { btn.textContent = '⏳ جارٍ...'; btn.disabled = true; }

  try {
    var res = await fetch(SUPABASE_URL + '/auth/v1/admin/users', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SERVICE_KEY,
        'Authorization': 'Bearer ' + SERVICE_KEY
      },
      body: JSON.stringify({
        email: email,
        password: '0000',
        email_confirm: true,
        user_metadata: { full_name: r.name }
      })
    });
    var data = await res.json();
    var userId = data.id || null;

    if (!userId) {
      var errMsg = data.msg || data.message || JSON.stringify(data);
      var isAlreadyExists = errMsg.includes('already') || errMsg.includes('exists') || errMsg.includes('registered');
      if (!isAlreadyExists) {
        alert('خطأ: ' + errMsg);
        loadAndRender();
        return;
      }
      // Account already exists — recover the user_id so the trial_request
      // gets properly linked. Two recovery paths:
      //   1. Trust the existing trial_request.user_id (from auth.html signup flow)
      //   2. Look up the user by email via admin API (for landing.html flow
      //      where no user_id was saved, or to repair stale rows)
      // We try path 2 if path 1 is empty, because returning a broken accept
      // (status='accepted' but user_id=NULL) would silently lock the user out.
      userId = r.user_id;
      if (!userId) {
        try {
          var lookup = await fetch(
            SUPABASE_URL + '/auth/v1/admin/users?email=' + encodeURIComponent(email),
            { headers: { 'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY } }
          );
          var lookupData = await lookup.json();
          var users = (lookupData && lookupData.users) || [];
          if (users.length && users[0].id) userId = users[0].id;
        } catch(lookupErr) {
          console.warn('user_id recovery lookup failed:', lookupErr);
        }
      }
      if (!userId) {
        alert('⚠️ الحساب موجود لكن تعذّر ربطه بطلب التجربة. تواصل مع الدعم الفني.');
        loadAndRender();
        return;
      }
    }

    var updateData = { status: 'accepted', email: email };
    if (userId) updateData.user_id = userId;

    // إذا كان حساب موقوف لـ trial_end بالماضي، نعطيه 30 يوم جديد
    // إذا كان دائم (NULL) أو مستقبلي، ما نلمسه
    var hadFutureTrial = r.trial_end && new Date(r.trial_end) > new Date();
    var wasPermanent = r.trial_end === null && r.status === 'accepted';

    if (!hadFutureTrial && !wasPermanent) {
      var trialEnd = new Date();
      trialEnd.setDate(trialEnd.getDate() + 30);
      updateData.trial_end = trialEnd.toISOString();
    }

    await window.sb.from('trial_requests').update(updateData).eq('id', id);
    loadAndRender();
  } catch(e) {
    alert('خطأ في الاتصال: ' + e.message);
    loadAndRender();
  }
}

// ===== Phase 7.6C: Alerts Banner helpers =====
// Single source of truth for "days remaining" — used by the banner, the
// expiring-filter predicate, the CSV export, and Step 3's reminder gate.
// Returns:
//   null  for permanent accounts (trial_end is null) OR non-accepted rows
//   N>=0  for an active or just-expired trial (positive = days remaining)
//   N<0   for trials whose end_date is already in the past
function getDaysLeft(r) {
  if (!r || r.status !== 'accepted') return null;
  if (!r.trial_end) return null;
  var end = new Date(r.trial_end);
  if (isNaN(end.getTime())) return null;
  return Math.ceil((end - new Date()) / 86400000);
}

// Predicate for "expiring within 7 days": active trial whose remaining
// days is 1..7 (inclusive). Already-expired (<=0) accounts are NOT
// included — those need different (re-engagement) treatment, not a
// pre-expiry warning.
function isExpiringSoon(r) {
  var dl = getDaysLeft(r);
  return dl !== null && dl > 0 && dl <= 7;
}

// Renders the banner above the search bar. Three visual states:
//   1. hidden     — no expiring tenants (count === 0)
//   2. warning    — yellow, 1-3 tenants expiring
//   3. critical   — red, 4+ tenants expiring
//   4. active     — green, filter currently applied (regardless of count)
function renderAlertsBanner() {
  var banner = document.getElementById('alertsBanner');
  if (!banner) return;
  var textWrap = document.getElementById('alertsBannerText');
  var iconEl   = textWrap ? textWrap.querySelector('.banner-icon') : null;
  var msgEl    = textWrap ? textWrap.querySelector('.banner-msg')  : null;
  var cta      = document.getElementById('alertsBannerCta');
  var closeBtn = document.getElementById('alertsBannerClose');
  if (!iconEl || !msgEl || !cta || !closeBtn) return;

  var count = allRequests.filter(isExpiringSoon).length;

  // Reset classes each render — avoids stale 'critical'/'active' lingering.
  banner.className = 'alerts-banner';

  if (count === 0 && !expiringFilterActive) {
    // Nothing to show, and filter not stuck on.
    return;
  }

  banner.classList.add('show');

  if (expiringFilterActive) {
    // Active state: filter is currently applied. Show ✕ to clear.
    banner.classList.add('active');
    iconEl.textContent = '🔍';
    msgEl.textContent  = 'عرض الحسابات المنتهية قريباً (' + count + ')';
    cta.style.display = 'none';
    closeBtn.style.display = 'inline-block';
  } else {
    // Warning / critical state. Count > 0 guaranteed (we returned above).
    if (count > 3) banner.classList.add('critical');
    iconEl.textContent = '⚠️';
    msgEl.textContent  = count + ' ' + (count === 1 ? 'حساب ينتهي' : 'حسابات تنتهي') + ' خلال 7 أيام';
    cta.style.display = 'inline-block';
    closeBtn.style.display = 'none';
  }
}

// Banner body click → toggle filter ON (only when not already active).
// We delegate from the whole banner so clicks on text OR cta both work.
// The ✕ button has its own handler (closeExpiringFilter) and calls
// stopPropagation so we don't re-toggle here.
function onBannerClick(e) {
  if (e && e.target && e.target.id === 'alertsBannerClose') return;
  if (expiringFilterActive) return; // active state: only ✕ clears it
  expiringFilterActive = true;
  renderAlertsBanner();
  renderList();
}

// Keyboard activation for role="button" (Enter / Space). The browser
// gives focus + tabindex semantics but NOT keyboard click emulation —
// we wire that ourselves. Space is preventDefault'd because the default
// behavior on a focused tabindex element is to scroll the page.
function onBannerKeydown(e) {
  if (!e) return;
  if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    if (expiringFilterActive) return;
    expiringFilterActive = true;
    renderAlertsBanner();
    renderList();
  }
}

// ✕ button → clear the filter.
function closeExpiringFilter(e) {
  if (e) e.stopPropagation();
  if (!expiringFilterActive) return;
  expiringFilterActive = false;
  renderAlertsBanner();
  renderList();
}

// ===== Phase 7.6C-Step2: CSV Export =====
// Exports the CURRENTLY VISIBLE list (after tab filter + search filter +
// expiring filter are applied) to a UTF-8 CSV file the operator can open
// in Excel. Excel on Windows requires a UTF-8 BOM (U+FEFF) at the start
// of the file to detect the encoding; without it, Arabic renders as
// gibberish. We also use CRLF line endings (RFC 4180 + Excel-friendly).

// RFC 4180 cell escape: wrap in double quotes, double-up any internal
// double quotes. Newlines inside cells become literal CRLF; Excel
// preserves them as in-cell line breaks because the cell is quoted.
// TSV cell sanitizer. TSV (tab-separated values) does NOT use quotes
// for escaping — instead, any tab/CR/LF inside a value would break the
// row structure. We replace those whitespace chars with a single space
// to keep the file parseable everywhere. This is a deliberate, lossy
// transform — admin notes containing literal tabs/newlines lose them
// in the export, but the table layout stays intact in WPS / Excel /
// Google Sheets / LibreOffice with NO locale-specific hint required.
//
// Why TSV instead of CSV: WPS Office Free on non-US Windows locales
// ignores both commas and the 'sep=,' directive, collapsing all
// columns into A. CSVs comma-tab-newline ambiguity has too many
// failure modes; TSV is unambiguous and universally honored by every
// spreadsheet app's default CSV opener.
function tsvCell(v) {
  if (v == null) return '';
  return String(v).replace(/[\t\r\n]+/g, ' ');
}

// Compute the list of rows that the export should contain. Mirrors the
// EXACT filter chain in renderList — single source of filter logic
// would be cleaner, but extracting it would touch the hot path in
// renderList. Kept as a parallel implementation for now; if the filter
// logic ever drifts, this needs to be updated in lockstep.
function getFilteredRequestsForExport() {
  return allRequests.filter(function(r){
    var st = r.status || 'new';
    var passFilter = (currentFilter === 'all' || st === currentFilter);
    if (!passFilter || !matchesSearch(r)) return false;
    if (expiringFilterActive && !isExpiringSoon(r)) return false;
    return true;
  });
}

// Format trial_end for the spreadsheet:
//   - permanent account (trial_end IS NULL on an accepted row): "دائم"
//   - non-accepted / no trial_end: "" (empty cell)
//   - active or expired trial: ISO yyyy-mm-dd (Excel-sortable)
function fmtTrialEndForCsv(r) {
  if (r.status !== 'accepted') return '';
  if (!r.trial_end) return 'دائم';
  var d = new Date(r.trial_end);
  if (isNaN(d.getTime())) return '';
  return d.toISOString().slice(0, 10);
}

// Format created_at with date + time, local timezone, ISO-style for
// easy Excel parsing. Example: "2026-05-22 21:09"
function fmtCreatedAtForCsv(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  var y  = d.getFullYear();
  var mo = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  var hh = String(d.getHours()).padStart(2, '0');
  var mi = String(d.getMinutes()).padStart(2, '0');
  return y + '-' + mo + '-' + dd + ' ' + hh + ':' + mi;
}

// Status enum → Arabic label
function fmtStatusForCsv(st) {
  st = st || 'new';
  if (st === 'new')      return 'جديد';
  if (st === 'accepted') return 'مقبول';
  if (st === 'rejected') return 'مرفوض';
  return st; // fallback for any future unknown value
}

// Days remaining for the CSV: number for active trials (1..N), 0/negative
// for expired trials (so admins can sort by "most overdue"), empty for
// permanent or non-accepted rows.
function fmtDaysLeftForCsv(r) {
  var dl = getDaysLeft(r);
  return dl === null ? '' : String(dl);
}

// Today's date as yyyy-mm-dd in LOCAL timezone (not UTC — matches what
// the operator expects to see in the filename).
function todayYmdLocal() {
  var d = new Date();
  var y  = d.getFullYear();
  var mo = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + mo + '-' + dd;
}

async function exportCSV() {
  var btn = document.getElementById('exportCsvBtn');
  // Defensive: button is reusable, no need to gate on disabled state
  // when the user can already see the filter results.
  var rows = getFilteredRequestsForExport();
  if (rows.length === 0) {
    alert('لا توجد نتائج للتصدير. عدّل الفلتر أو البحث وحاول مرة أخرى.');
    return;
  }

  // Brief visual feedback while we build the file. Building is sync but
  // download triggers a microtask; for very large lists the user
  // appreciates seeing the state change even if it's <100ms.
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span><span>جارٍ التصدير...</span>';
  }

  // Hoisted to outer scope so finally can clean them up even on error
  // partway through the download flow (e.g. a.click() throwing).
  var url = null;
  var a = null;

  try {
    // Header row in Arabic — order MUST match the row builder below.
    var headers = [
      'الاسم',
      'الهاتف',
      'الإيميل',
      'المدينة',
      'الملاحظات',
      'الحالة',
      'تاريخ الطلب',
      'تاريخ انتهاء التجربة',
      'الأيام المتبقية'
    ];
    var lines = [];
    lines.push(headers.map(tsvCell).join('\t'));
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var line = [
        r.name,
        r.phone,
        r.email,
        r.city,
        r.notes,
        fmtStatusForCsv(r.status),
        fmtCreatedAtForCsv(r.created_at),
        fmtTrialEndForCsv(r),
        fmtDaysLeftForCsv(r)
      ].map(tsvCell).join('\t');
      lines.push(line);
    }
    // CRLF for Excel-friendliness (RFC 4180 also specifies CRLF).
    var csvText = lines.join('\r\n');
    // BOM ensures Excel on Windows treats the file as UTF-8 instead of
    // its OS-default codepage. Required for Arabic to render correctly.
    //
    // TSV (tab-separated) chosen over CSV after live-test in Hamburg
    // (German Windows + WPS Office Free) showed that locale's default
    // CSV behavior splits on ';', not ',', and the 'sep=,' directive
    // is silently ignored. Tabs have no locale ambiguity — every
    // spreadsheet app interprets them as column separators regardless
    // of OS settings. The file extension stays .csv because that's
    // what users associate with "open in spreadsheet"; the content-
    // type is tab-separated-values so apps that inspect the MIME
    // (rare on Windows) get the correct hint.
    var blob = new Blob(['\uFEFF' + csvText], { type: 'text/tab-separated-values;charset=utf-8;' });

    // Trigger download via a temporary anchor — this is the most
    // browser-portable approach and works in all evergreen browsers.
    url = URL.createObjectURL(blob);
    a = document.createElement('a');
    a.href = url;
    a.download = 'sydent-tenants-' + todayYmdLocal() + '.csv';
    // Some browsers require the anchor to be in the DOM for the click
    // to be honored; we attach, click, then remove immediately.
    document.body.appendChild(a);
    a.click();
  } catch (e) {
    alert('فشل التصدير: ' + (e && e.message ? e.message : 'خطأ غير معروف'));
  } finally {
    // Cleanup always runs, even if a.click() threw. Guards on each
    // step because partial failures could leave only some state set:
    //   - blob creation failed → url is null, a is null
    //   - URL.createObjectURL failed → url is null, a is null
    //   - createElement failed → url is set, a is null
    //   - appendChild/click failed → url + a are set
    if (a && a.parentNode) {
      try { a.parentNode.removeChild(a); } catch (_) {}
    }
    if (url) {
      // Defer revoke so the browser has time to start the download.
      // Immediate revoke can race the download in some browsers
      // (notably older Safari).
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    }
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<span>📥</span><span>تصدير CSV</span>';
    }
  }
}

function renderAll() {
  pruneActivityCaches();
  var nNew = allRequests.filter(function(r){ return !r.status || r.status === 'new'; }).length;
  var nAcc = allRequests.filter(function(r){ return r.status === 'accepted'; }).length;
  var nRej = allRequests.filter(function(r){ return r.status === 'rejected'; }).length;
  document.getElementById('countNew').textContent = nNew;
  document.getElementById('countAccepted').textContent = nAcc;
  document.getElementById('countRejected').textContent = nRej;

  // Phase 7.6C: if filter was active but the count just hit 0 (e.g. all
  // expiring trials got extended), auto-disengage to avoid showing an
  // empty list with the banner in active state.
  if (expiringFilterActive && allRequests.filter(isExpiringSoon).length === 0) {
    expiringFilterActive = false;
  }
  renderAlertsBanner();

  renderList();
}

function renderList() {
  var list = document.getElementById('reqList');
  var filtered = allRequests.filter(function(r){
    var st = r.status || 'new';
    var passFilter = (currentFilter === 'all' || st === currentFilter);
    if (!passFilter || !matchesSearch(r)) return false;
    // Phase 7.6C: expiring-soon filter is layered on top of the tab filter
    // and search. When active, only rows that satisfy isExpiringSoon
    // survive. This is intentional: the banner activates a STRICTER view,
    // it doesn't replace the user's other filters.
    if (expiringFilterActive && !isExpiringSoon(r)) return false;
    return true;
  });
  if (filtered.length === 0) {
    var emptyMsg, emptyIcon;
    if (expiringFilterActive) {
      // Banner is showing 'active' but the strict filter returned 0 (e.g.
      // user is on the 'rejected' tab + expiring filter on). Tell them.
      emptyMsg = 'لا توجد حسابات تنتهي قريباً ضمن الفلتر الحالي';
      emptyIcon = '⏰';
    } else if (searchTerm) {
      emptyMsg = 'لا توجد نتائج مطابقة للبحث';
      emptyIcon = '🔍';
    } else {
      emptyMsg = 'لا توجد طلبات';
      emptyIcon = '📭';
    }
    list.innerHTML = '<div class="empty-state"><div>' + emptyIcon + '</div>' + emptyMsg + '</div>';
    return;
  }
  list.innerHTML = filtered.map(function(r) {
    var st = r.status || 'new';
    var stLabel = st === 'new' ? 'جديد' : st === 'accepted' ? 'مقبول' : 'مرفوض';
    var id = r.id;
    // Always-available edit button (all status states)
    var editBtn = '<button class="btn-edit" onclick="openEditModal(\'' + id + '\')">✏️ تعديل</button>';
    var actions = '';
    if (st === 'new') {
      actions = '<button class="btn-accept" data-id="' + id + '" onclick="accept(\'' + id + '\')">✅ قبول وتفعيل التجربة</button>' +
                '<button class="btn-reject" onclick="reject(\'' + id + '\')">❌ رفض</button>' +
                editBtn;
    } else if (st === 'accepted') {
      var daysLeft = r.trial_end ? Math.ceil((new Date(r.trial_end) - new Date()) / (1000*60*60*24)) : null;
      var trialBadge = daysLeft === null ? '<div class="req-info-row" style="color:#2ee89e">♾️ <span>حساب دائم</span></div>' : ('<div class="req-info-row" style="color:' + (daysLeft<=5?'#ef5350':daysLeft<=10?'#ffa726':'#2ee89e') + '">⏰ <span>' + (daysLeft>0?'تنتهي خلال '+daysLeft+' يوم':'انتهت التجربة') + '</span></div>');
      // Phase 7.6B: Activity toggle (all accepted)
      var actBtnLabel = activityExpanded[id] ? '📊 إخفاء النشاط' : '📊 عرض النشاط';
      var activityBtn = '<button class="btn-activity" onclick="toggleActivity(\'' + id + '\')">' + actBtnLabel + '</button>';
      actions = '<button class="btn-accept" onclick="activatePermanent(\'' + id + '\')">✅ تفعيل دائم</button>' +
                '<button class="btn-reject" onclick="suspendAccount(\'' + id + '\', \'' + jsAttr(r.email||'') + '\')" style="background:rgba(255,167,38,0.1);border-color:rgba(255,167,38,0.3);color:#ffa726;">⏸ إيقاف</button>' +
                '<button class="btn-reject" onclick="deleteAccount(\'' + id + '\', \'' + jsAttr(r.email||'') + '\')">🗑 حذف</button>' +
                editBtn +
                activityBtn;
    } else if (st === 'rejected') {
      var trialBadge = '';
      actions = '<button class="btn-accept" data-id="' + id + '" onclick="accept(\'' + id + '\')">✅ قبول وإنشاء حساب</button>' +
                '<button class="btn-reject" onclick="deleteAccount(\'' + id + '\', \'' + jsAttr(r.email||'') + '\')">🗑 حذف</button>' +
                editBtn;
    }
    return '<div class="req-card ' + st + '">' +
      '<div class="req-top">' +
        '<div class="req-name">' + (escapeHtml(r.name) || '—') + '</div>' +
        '<span class="req-status ' + st + '">' + stLabel + '</span>' +
      '</div>' +
      '<div class="req-info">' +
        '<div class="req-info-row">📱 <span>' + (escapeHtml(r.phone) || '—') + '</span></div>' +
        (r.email ? '<div class="req-info-row">📧 <span>' + escapeHtml(r.email) + '</span></div>' : '') +
        (r.city ? '<div class="req-info-row">📍 <span>' + escapeHtml(r.city) + '</span></div>' : '') +
        (r.notes ? '<div class="req-info-row">📝 <span>' + escapeHtml(r.notes) + '</span></div>' : '') +
        '<div class="req-info-row">🕐 <span>' + formatDate(r.created_at) + '</span></div>' +
        (typeof trialBadge !== 'undefined' ? trialBadge : '') +
      '</div>' +
      '<div class="req-actions">' + actions + '</div>' +
      (st === 'accepted' && r.trial_end ? renderExtensionWidget(id) : '') +
      (st === 'accepted' ? renderActivityPanel(id) : '') +
    '</div>';
  }).join('');
}
</script>
<script>
(function(){
  if(!('ontouchstart' in window)) return;
  var s=document.createElement('style');
  s.textContent='.ptr-bar{width:100%;overflow:hidden;height:0;display:flex;align-items:center;justify-content:center;gap:8px;background:#0a1628;font-size:13px;font-weight:700;color:#2ee89e;font-family:"Cairo",sans-serif;transition:height .25s ease;border-bottom:1px solid transparent;position:fixed;top:0;left:0;right:0;z-index:9999;}.ptr-bar.show{height:44px;border-bottom-color:rgba(46,232,158,0.2);}.ptr-ring{width:15px;height:15px;border:2px solid rgba(46,232,158,0.25);border-top-color:#2ee89e;border-radius:50%;flex-shrink:0;}.ptr-bar.spin .ptr-ring{animation:ptrSpin .65s linear infinite;}@keyframes ptrSpin{to{transform:rotate(360deg);}}';
  document.head.appendChild(s);
  var bar=document.createElement('div');
  bar.id='ptrBar';bar.className='ptr-bar';
  bar.innerHTML='<div class="ptr-ring" id="ptrRing"></div><span id="ptrLabel">↓ اسحب للتحديث</span>';
  document.body.insertBefore(bar,document.body.firstChild);
  var THRESHOLD=65,MAX=95,sy=0,cy=0,active=false;
  function b(){return document.getElementById('ptrBar');}
  function r(){return document.getElementById('ptrRing');}
  function l(){return document.getElementById('ptrLabel');}
  function setState(st,pull){
    var bv=b(),rv=r(),lv=l();if(!bv)return;
    if(st==='hide'){bv.className='ptr-bar';}
    else if(st==='pull'){bv.className='ptr-bar show';rv.style.animation='none';rv.style.transform='rotate('+Math.round((pull/THRESHOLD)*270)+'deg)';lv.textContent=pull>=THRESHOLD?'↑ أفلت للتحديث':'↓ اسحب للتحديث';}
    else if(st==='spin'){bv.className='ptr-bar show spin';rv.style.transform='';rv.style.animation='';lv.textContent='جارٍ التحديث…';}
  }
  document.addEventListener('touchstart',function(e){if(window.scrollY>0)return;sy=cy=e.touches[0].clientY;active=true;},{passive:true});
  document.addEventListener('touchmove',function(e){if(!active)return;if(window.scrollY>0){active=false;setState('hide');return;}cy=e.touches[0].clientY;var pull=Math.min(Math.max(0,cy-sy)*0.55,MAX);if(pull>4)setState('pull',pull);else setState('hide');},{passive:true});
  document.addEventListener('touchend',function(){if(!active)return;active=false;var pull=Math.min(Math.max(0,cy-sy)*0.55,MAX);if(pull>=THRESHOLD){setState('spin');setTimeout(function(){window.location.reload();},800);}else{setState('hide');}cy=0;});
})();
</script>
