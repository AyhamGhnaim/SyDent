name: Supabase Backup

# ─────────────────────────────────────────────────────────────────────────────
# الهدف: نسخة احتياطية يومية تلقائية لقاعدة بيانات Supabase (الخطة المجانية بلا
#   backups تلقائية — هذا بديلها المجاني، مبني على التوصية الرسمية من Supabase
#   عبر Supabase CLI: supabase db dump).
#
# أين تُخزَّن النسخ؟ في ريبو خاص منفصل (AyhamGhnaim/SyDent-backups) — لا تُخزَّن
#   أبداً في الريبو العام (بيانات مرضى = حسّاسة). التوثيق الرسمي يحذّر صراحةً من
#   النسخ إلى ريبو عام.
#
# ⚠️ مقفول افتراضياً: الـ job لا يعمل إطلاقاً ما لم يكن متغيّر المستودع
#   BACKUP_ENABLED = 'true'. هذا يسمح برفع الملف بأمان قبل اكتمال الإعداد، بلا
#   أي تشغيل فاشل. لتفعيله بعد إتمام الخطوات: Settings → Secrets and variables
#   → Actions → Variables → New variable → BACKUP_ENABLED = true.
#
# الأسرار المطلوبة (Settings → Secrets and variables → Actions → Secrets):
#   • SUPABASE_DB_URL  — سلسلة اتصال الـ Session pooler (IPv4، لأن runners الـ
#       GitHub بلا IPv6؛ الاتصال المباشر db.<ref>.supabase.co صار IPv6-only).
#       الشكل: postgresql://postgres.<ref>:<PASSWORD>@aws-1-<region>.pooler.supabase.com:5432/postgres
#   • BACKUP_PAT       — fine-grained PAT صلاحيته على ريبو SyDent-backups فقط،
#       بصلاحية Contents: Read and write (للـ push).
#
#   ── أسرار نسخ ملفات الـ Storage (bucket: patient-files) إلى Cloudflare R2 ──
#   • SUPABASE_S3_ACCESS_KEY_ID / SUPABASE_S3_SECRET_ACCESS_KEY
#       مفتاحا S3 من: Supabase → Storage → Configuration → S3 → Access keys.
#       (المصدر الذي ننسخ منه ملفات المرضى الفعلية.)
#   • R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ACCOUNT_ID
#       من: Cloudflare → R2 → Manage API Tokens (Object Read & Write على bucket
#       sydent-backups فقط). R2_ACCOUNT_ID = الجزء قبل .r2.cloudflarestorage.com.
#       (الوجهة التي ننسخ إليها — bucket R2 اسمه: sydent-backups.)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:        # تشغيل يدوي من تبويب Actions (للاختبار الأول)
  schedule:
    - cron: '0 2 * * *'     # كل يوم 02:00 UTC

# لا نكتب على هذا الريبو إطلاقاً — الكتابة تذهب لريبو النسخ عبر BACKUP_PAT.
permissions:
  contents: read

# منع تراكب التشغيلات
concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    # ⚠️ البوّابة: لا شيء يحدث ما لم يُضبط BACKUP_ENABLED='true' يدوياً.
    if: ${{ vars.BACKUP_ENABLED == 'true' }}
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout private backup repo
        uses: actions/checkout@v5
        with:
          repository: AyhamGhnaim/SyDent-backups
          token: ${{ secrets.BACKUP_PAT }}
          path: backups-repo

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create dump (roles + schema + data)
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y-%m-%d_%H%M)"
          DIR="backups-repo/${STAMP}"
          mkdir -p "$DIR"
          supabase db dump --db-url "$SUPABASE_DB_URL" -f "$DIR/roles.sql"  --role-only
          supabase db dump --db-url "$SUPABASE_DB_URL" -f "$DIR/schema.sql"
          supabase db dump --db-url "$SUPABASE_DB_URL" -f "$DIR/data.sql"   --data-only --use-copy
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          echo "Backup written to $DIR"
          ls -la "$DIR"

      - name: Commit & push to backup repo
        run: |
          set -euo pipefail
          cd backups-repo
          git config user.name  "sydent-backup-bot"
          git config user.email "drayhamghnaim@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit (empty diff)."
          else
            git commit -m "Supabase backup ${STAMP}"
            git push
            echo "Pushed backup ${STAMP} to SyDent-backups."
          fi

      # ───────────────────────────────────────────────────────────────────────
      # نسخ ملفات الـ Storage (أشعة/صور/PDF المرضى) إلى Cloudflare R2.
      # هذه الملفات ليست داخل db dump (الـ dump يحوي صفوف الميتاداتا فقط، لا
      # بايتات الملفات)، فهذه الخطوة تسدّ تلك الفجوة. تأتي بعد رفع نسخة قاعدة
      # البيانات، فحتى لو فشلت هنا تكون نسخة DB قد حُفظت بالفعل.
      # ───────────────────────────────────────────────────────────────────────
      - name: Backup Storage files (patient-files) to Cloudflare R2
        env:
          # المصدر: Supabase Storage عبر نقطته المتوافقة مع S3
          RCLONE_CONFIG_SUPABASE_TYPE: s3
          RCLONE_CONFIG_SUPABASE_PROVIDER: Other
          RCLONE_CONFIG_SUPABASE_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_SUPABASE_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_SUPABASE_ENDPOINT: https://rycqzpdhxabpqrdgtdzg.storage.supabase.co/storage/v1/s3
          RCLONE_CONFIG_SUPABASE_REGION: eu-west-1
          RCLONE_CONFIG_SUPABASE_NO_CHECK_BUCKET: "true"
          # الوجهة: Cloudflare R2 (bucket: sydent-backups)
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
        run: |
          set -euo pipefail
          # rclone: الأداة الموصى بها رسمياً من Supabase لنسخ كائنات Storage بالجملة.
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

          SRC="supabase:patient-files"
          DST="r2:sydent-backups/patient-files"

          # copy (وليس sync): إضافي فقط — لا يحذف أبداً من R2 إن حُذف ملف من
          #   المصدر. حماية ضد الحذف العرضي/الكيدي لملفات المرضى.
          # --size-only: ملفات المرضى تُكتب مرة ولا تتغيّر، فمقارنة الحجم تكفي
          #   وتتجنّب مشاكل ETag/modtime مع Supabase S3.
          rclone copy "$SRC" "$DST" \
            --size-only --transfers 4 --checkers 8 --fast-list --stats-one-line -v

          # تحقّق: كل ملف بالمصدر موجود بالوجهة (one-way) — يفشل الـ job إن نقص شيء.
          echo "Verifying every source object exists in R2…"
          rclone check "$SRC" "$DST" --one-way --size-only --fast-list

          echo "Storage backup to R2 complete:"
          rclone size "$DST"
