<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SyDent">
<meta name="theme-color" content="#0a1628">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<title>SyDent — تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js?v=20260526a46"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg2:#0f2038;--bg3:#132840;
  --border:rgba(46,232,158,0.15);
  --green:#2ee89e;--red:#ef5350;
  --text:#e1f4ee;--text2:#8a9ab5;
}
body{
  font-family:'Cairo',sans-serif;
  background: linear-gradient(135deg, #0a1628 0%, #0f2038 50%, #0a1628 100%);
  color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:20px;
  width:100%;max-width:420px;
  padding:36px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{
  width:64px;height:64px;border-radius:16px;
  background:rgba(46,232,158,0.12);
  border:2px solid rgba(46,232,158,0.35);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:32px;margin-bottom:12px;
}
.logo-icon svg{width:36px;height:36px;}
.logo-title{font-size:24px;font-weight:800;color:var(--green);margin-bottom:4px;}
.logo-sub{font-size:12px;color:var(--text2);}
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:24px;}
.tab{
  flex:1;padding:9px;text-align:center;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  background:transparent;border:none;color:var(--text2);
  border-radius:7px;cursor:pointer;transition:all .2s;
}
.tab.active{background:var(--green);color:var(--bg);}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;}
.form-group input{
  width:100%;background:var(--bg3);
  border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;direction:rtl;
}
.form-group input:focus{border-color:var(--green);}
.form-group input[type=email]{direction:ltr;text-align:left;}
.btn-submit{
  width:100%;padding:13px;
  background:var(--green);border:none;color:var(--bg);
  border-radius:10px;
  font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;transition:all .2s;margin-top:10px;
}
.btn-submit:hover{background:#26d48e;}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.msg{padding:10px 12px;border-radius:9px;font-size:12px;margin-bottom:14px;display:none;}
.msg.show{display:block;}
.msg.error{background:rgba(239,83,80,0.12);border:1px solid rgba(239,83,80,0.3);color:var(--red);}
.msg.success{background:rgba(46,232,158,0.12);border:1px solid rgba(46,232,158,0.3);color:var(--green);}
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#0a1628;border-radius:50%;
  animation:spin .6s linear infinite;margin-left:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.hidden{display:none;}
/* Password visibility toggle (👁 / 🙈) — RTL-safe via inset-inline-end */
.pwd-wrap{position:relative;display:block;}
.pwd-wrap > input{padding-inline-end:44px !important;}
.pwd-toggle{
  position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;border-radius:8px;
  color:#8a9ab5;font-size:18px;line-height:1;cursor:pointer;padding:0;
  transition:background .15s ease,color .15s ease;
}
.pwd-toggle:hover{background:rgba(255,255,255,0.06);color:#e6ecf5;}
.pwd-toggle:focus-visible{outline:2px solid #2ee89e;outline-offset:2px;}
.pwd-toggle:active{transform:translateY(-50%) scale(0.92);}
.pwd-toggle svg{display:block;width:20px;height:20px;flex-shrink:0;}

/* Forgot password link + modal (Phase Email Part 3b) */
.forgot-link{
  background:none;border:none;padding:0;
  font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;
  color:var(--green);cursor:pointer;
  text-decoration:none;transition:opacity .2s;
}
.forgot-link:hover{opacity:.75;text-decoration:underline;}
.forgot-link:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px;}
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.65);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
  backdrop-filter:blur(4px);
  animation:fadeIn .2s ease;
}
.modal-overlay.show{display:flex;}
@keyframes fadeIn{from{opacity:0;}}
.modal-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;
  width:100%;max-width:400px;
  padding:28px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  animation:fadeUp .25s ease;
}
.modal-card h3{
  font-size:18px;font-weight:800;color:var(--text);
  margin-bottom:8px;text-align:center;
}
.modal-hint{
  font-size:13px;color:var(--text2);
  line-height:1.6;margin-bottom:18px;text-align:center;
}
.modal-actions{
  display:flex;gap:10px;margin-top:14px;
}
.modal-actions .btn-submit{margin-top:0;flex:1;}
.btn-secondary{
  flex:1;padding:13px;
  background:transparent;border:1px solid var(--border);
  color:var(--text);border-radius:10px;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.btn-secondary:hover{background:var(--bg3);}
.btn-secondary:disabled{opacity:.5;cursor:not-allowed;}
.support-hint{
  font-size:11px;color:var(--text2);
  display:block;margin-top:8px;line-height:1.5;
}
</style>
</head>
<body>

<div class="auth-card">
  <a href="landing.html" class="logo" style="text-decoration:none;display:block;">
    <div class="logo-icon"><svg viewBox="0 0 64 72" fill="none" stroke="#2ee89e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8 C14 8 8 10 8 20 C8 30 12 34 14 40 C16 46 16 58 18 64 C19 67 22 68 24 64 C26 60 27 54 32 54 C37 54 38 60 40 64 C42 68 45 67 46 64 C48 58 48 46 50 40 C52 34 56 30 56 20 C56 10 50 8 50 8 C46 6 42 5 32 5 C22 5 18 6 14 8 Z"/></svg></div>
    <div class="logo-title">SyDent</div>
    <div class="logo-sub">نظام إدارة العيادة</div>
  </a>
  <div style="text-align:center;margin-bottom:16px;">
    <a href="landing.html" style="font-size:12px;color:var(--text2);text-decoration:none;">← العودة للصفحة الرئيسية</a>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin"    onclick="switchTab('login')">تسجيل دخول</button>
    <button class="tab"        id="tabRegister" onclick="switchTab('register')">حساب جديد</button>
  </div>

  <div class="msg" id="msg"></div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>البريد الإلكتروني / رقم الموبايل</label>
      <input type="text" id="loginEmail" placeholder="doctor@example.com أو 09xxxxxxxx" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <div style="margin:-4px 0 14px;text-align:left;">
      <button type="button" class="forgot-link" onclick="openForgotModal()">نسيت كلمة المرور؟</button>
    </div>
    <button type="submit" class="btn-submit" id="loginBtn">دخول</button>
  </form>

  <form id="registerForm" class="hidden" onsubmit="doRegister(event)">
    <div class="form-group">
      <label>الاسم الكامل</label>
      <input type="text" id="regName" placeholder="د. أيهم غنيم" required>
    </div>
    <div class="form-group">
      <label>رقم الموبايل أو البريد الإلكتروني</label>
      <input type="text" id="regContact" placeholder="09xxxxxxxx أو doctor@example.com" required>
      <div style="font-size:11px;color:var(--text2);margin-top:5px;line-height:1.5;">يمكنك استخدام رقم موبايلك أو بريدك الإلكتروني — ستستخدم نفسه لتسجيل الدخول لاحقاً.</div>
    </div>
    <div class="form-group">
      <label>المدينة</label>
      <select id="regCity">
        <option value="">اختر مدينتك</option>
        <option>دمشق</option><option>حلب</option><option>حمص</option>
        <option>حماة</option><option>اللاذقية</option><option>طرطوس</option>
        <option>دير الزور</option><option>الرقة</option><option>إدلب</option>
        <option>درعا</option><option>أخرى</option>
      </select>
    </div>
    <div class="form-group">
      <label>ملاحظات (اختياري)</label>
      <textarea id="regNotes" placeholder="أي معلومات إضافية..." rows="2" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;resize:vertical;direction:rtl;"></textarea>
    </div>
    <div class="form-group">
      <label>كلمة المرور (6 أحرف على الأقل)</label>
      <input type="password" id="regPass" placeholder="••••••••" autocomplete="new-password" minlength="6" required>
    </div>
    <button type="submit" class="btn-submit" id="regBtn">إنشاء حساب التجربة</button>
  </form>
</div>

<!-- Phase Email Part 3b: Forgot Password Modal -->
<div id="forgotModalOverlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="forgotModalTitle">
  <div class="modal-card">
    <h3 id="forgotModalTitle">إعادة تعيين كلمة المرور</h3>
    <p class="modal-hint">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.</p>
    <div class="form-group">
      <label for="forgotEmail">البريد الإلكتروني</label>
      <input type="email" id="forgotEmail" placeholder="doctor@example.com" autocomplete="email">
    </div>
    <div id="forgotMsg" class="msg"></div>
    <div class="modal-actions">
      <button type="button" class="btn-secondary" id="forgotCancelBtn" onclick="closeForgotModal()">إلغاء</button>
      <button type="button" class="btn-submit" id="forgotBtn" onclick="sendResetEmail()">إرسال الرابط</button>
    </div>
  </div>
</div>

<script>
// إذا الدكتور مسجّل دخول مسبقاً، انقله للـ dashboard
// إلا إذا جاء من تسجيل خروج (logged_out=1)
(async function(){
  // Phase 7.6F: honor ?tab=register or #register in the URL (used by landing.html
  // CTAs that link directly to the registration form). Done synchronously before
  // any await so the tab swap is visible on first paint — no flash of "login" tab.
  try {
    var qs = new URLSearchParams(window.location.search);
    var hash = (window.location.hash || '').replace('#', '').toLowerCase();
    if (qs.get('tab') === 'register' || hash === 'register') {
      switchTab('register');
    }
    // Phase 7.6F: surface a denial reason when ensureAccountAccessible bounced
    // the user back here (e.g. ?denied=rejected or ?denied=suspended).
    var denied = qs.get('denied');
    if (denied === 'rejected') {
      showMsg('❌ تم رفض طلب التجربة. تواصل مع الدعم.', 'error');
    } else if (denied === 'suspended') {
      showMsg('⏸ حسابك موقوف حالياً. تواصل مع الدعم لإعادة التفعيل.', 'error');
    }
    // Phase Email Part 3b: surface success after password reset
    if (qs.get('reset') === 'success') {
      showMsg('✓ تم تحديث كلمة المرور بنجاح. سجّل دخولك بكلمة المرور الجديدة.', 'success');
    }
  } catch(e) { /* URLSearchParams missing or other — safe fallback to default login tab */ }

  await new Promise(r => setTimeout(r, 150));
  if (!window.sb) return;
  // إذا قادم من logout، تأكد من تنظيف الـsession
  if (window.location.search.indexOf('logged_out=1') !== -1) {
    try { await window.sb.auth.signOut({ scope: 'local' }); } catch(e){}
    return;
  }
  const user = await sbGetUser();
  if (user) {
    // Phase F: switched from doctors.role check to platform_admins helper.
    const adminCheck = await window.SyDentAuth.isPlatformAdmin(user.id);
    var dest = adminCheck.isAdmin ? 'admin.html' : 'index.html';
    window.location.replace(dest);
  }
})();

function switchTab(which) {
  document.getElementById('tabLogin').classList.toggle('active', which === 'login');
  document.getElementById('tabRegister').classList.toggle('active', which === 'register');
  document.getElementById('loginForm').classList.toggle('hidden', which !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', which !== 'register');
  hideMsg();
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg show ' + type;
}
function hideMsg() {
  document.getElementById('msg').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════════
// Phase Email Part 3b — Forgot Password Modal
// ═══════════════════════════════════════════════════════════════════
// Industry-standard email enumeration prevention (OWASP):
//   • Always shows same success message regardless of email validity
//   • Client-side blocks @sydent.com (phone-based accounts) with clear support hint
//   • Single in-flight guard prevents double-submit / rate-limit spam
//   • After 30s, surfaces "didn't arrive?" support hint (Stripe pattern)
function openForgotModal() {
  hideMsg();
  var loginEmail = document.getElementById('loginEmail').value.trim();
  // Pre-fill from login field if it looks like an email (skip phone numbers)
  if (loginEmail && loginEmail.indexOf('@') !== -1 && !/^[\d]+$/.test(loginEmail.replace(/\s/g,''))) {
    document.getElementById('forgotEmail').value = loginEmail;
  } else {
    document.getElementById('forgotEmail').value = '';
  }
  hideForgotMsg();
  // Reset button state in case modal was closed mid-flight
  var btn = document.getElementById('forgotBtn');
  btn.disabled = false;
  btn.textContent = 'إرسال الرابط';
  document.getElementById('forgotCancelBtn').disabled = false;
  document.getElementById('forgotModalOverlay').classList.add('show');
  setTimeout(function(){
    try { document.getElementById('forgotEmail').focus(); } catch(e){}
  }, 60);
}

function closeForgotModal() {
  document.getElementById('forgotModalOverlay').classList.remove('show');
  hideForgotMsg();
}

function showForgotMsg(text, type) {
  var m = document.getElementById('forgotMsg');
  m.textContent = text;
  m.className = 'msg show ' + type;
}

function hideForgotMsg() {
  var m = document.getElementById('forgotMsg');
  m.className = 'msg';
  m.textContent = '';
}

var _forgotInFlight = false;
var _forgotHintTimer = null;

async function sendResetEmail() {
  if (_forgotInFlight) return;

  var email = (document.getElementById('forgotEmail').value || '').trim().toLowerCase();

  // Basic email format validation
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showForgotMsg('يرجى إدخال بريد إلكتروني صحيح.', 'error');
    return;
  }

  // Block phone-based accounts client-side (Risk 4 mitigation)
  // @sydent.com is the internal phone→email transform (rule #62)
  if (email.endsWith('@sydent.com')) {
    showForgotMsg('هذا الحساب مسجَّل برقم هاتف. تواصل مع الدعم لاستعادة الحساب.', 'error');
    return;
  }

  _forgotInFlight = true;
  hideForgotMsg();
  var btn = document.getElementById('forgotBtn');
  var cancelBtn = document.getElementById('forgotCancelBtn');
  btn.disabled = true;
  cancelBtn.disabled = true;
  btn.innerHTML = 'جارٍ الإرسال<span class="spinner"></span>';

  // Fire the reset request — but ALWAYS show same message regardless of outcome.
  // This prevents email enumeration (OWASP). Errors are logged to console only.
  try {
    await window.sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });
  } catch (err) {
    // Log silently — do NOT surface to user (would reveal email existence)
    console.warn('[forgot-password] request error:', err);
  }

  // Anti-enumeration: same success message for every email (existent or not)
  showForgotMsg('✓ إذا كان البريد مسجَّلاً، فقد أرسلنا رابط إعادة التعيين. تحقّق من بريدك (وقد يكون في spam).', 'success');
  btn.textContent = 'إرسال الرابط';

  // Stripe pattern: after 30s, surface "didn't arrive?" hint + re-enable retry.
  // Clear any previous hint timer (rapid open/close).
  if (_forgotHintTimer) { clearTimeout(_forgotHintTimer); _forgotHintTimer = null; }
  _forgotHintTimer = setTimeout(function(){
    try {
      btn.disabled = false;
      cancelBtn.disabled = false;
      _forgotInFlight = false;
      var m = document.getElementById('forgotMsg');
      // Only add hint if message still showing (user hasn't closed modal)
      if (m && m.classList.contains('show')) {
        // Use safe innerHTML (no user-controlled content interpolated)
        m.innerHTML = '✓ إذا كان البريد مسجَّلاً، فقد أرسلنا رابط إعادة التعيين. تحقّق من بريدك (وقد يكون في spam).' +
          '<span class="support-hint">لم يصلك الرابط؟ تحقّق من spam أو تواصل مع الدعم.</span>';
      }
    } catch(e){}
  }, 30000);
}

// Close modal on Escape key (a11y)
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') {
    var ov = document.getElementById('forgotModalOverlay');
    if (ov && ov.classList.contains('show') && !_forgotInFlight) {
      closeForgotModal();
    }
  }
});

// Close modal on overlay click (click outside card)
document.addEventListener('click', function(e){
  var ov = document.getElementById('forgotModalOverlay');
  if (e.target === ov && !_forgotInFlight) {
    closeForgotModal();
  }
});

async function doLogin(e) {
  e.preventDefault();
  hideMsg();
  const btn = document.getElementById('loginBtn');
  var rawInput = document.getElementById('loginEmail').value.trim();
  // إذا كان رقم موبايل (أرقام فقط) نحوّله لإيميل
  var email = /^[\d]+$/.test(rawInput.replace(/\s/g,'')) ? rawInput.replace(/\D/g,'') + '@sydent.com' : rawInput.toLowerCase();
  const password = document.getElementById('loginPass').value;
  btn.disabled = true;
  btn.innerHTML = 'جارٍ التحقق<span class="spinner"></span>';
  try {
    const { data, error } = await window.sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    // Phase 7.6F: check admin role first (admins bypass the trial_request gate).
    // Phase F: switched from doctors.role check to platform_admins helper.
    const adminCheck = await window.SyDentAuth.isPlatformAdmin(data.user.id);
    var isAdmin = adminCheck.isAdmin;

    if (!isAdmin) {
      // Tenant path: check trial_request status before allowing in.
      const { data: trData } = await window.sb.from('trial_requests')
        .select('status').eq('user_id', data.user.id).maybeSingle();
      var status = trData ? trData.status : null;

      if (status === 'new') {
        showMsg('🕐 حسابك قيد المراجعة — سنفعّله خلال 24 ساعة.', 'error');
        try { await window.sb.auth.signOut({ scope: 'local' }); } catch(e){}
        btn.disabled = false;
        btn.textContent = 'دخول';
        return;
      }
      if (status === 'rejected') {
        showMsg('❌ تم رفض طلب التجربة. تواصل مع الدعم للتفاصيل.', 'error');
        try { await window.sb.auth.signOut({ scope: 'local' }); } catch(e){}
        btn.disabled = false;
        btn.textContent = 'دخول';
        return;
      }
      if (status === 'suspended') {
        showMsg('⏸ حسابك موقوف حالياً. تواصل مع الدعم لإعادة التفعيل.', 'error');
        try { await window.sb.auth.signOut({ scope: 'local' }); } catch(e){}
        btn.disabled = false;
        btn.textContent = 'دخول';
        return;
      }
      // status === 'accepted' or NULL (legacy) → proceed
    }

    showMsg('✅ تم تسجيل الدخول، جارٍ التحويل...', 'success');
    var dest = isAdmin ? 'admin.html' : 'index.html';
    setTimeout(() => { window.location.href = dest; }, 600);
  } catch (err) {
    let msg = err.message || 'فشل تسجيل الدخول';
    if (msg.toLowerCase().includes('invalid')) msg = 'البريد أو كلمة المرور غير صحيحة';
    showMsg('❌ ' + msg, 'error');
    btn.disabled = false;
    btn.textContent = 'دخول';
  }
}

async function doRegister(e) {
  e.preventDefault();
  hideMsg();
  const btn = document.getElementById('regBtn');
  const name = document.getElementById('regName').value.trim();
  const contact = document.getElementById('regContact').value.trim();
  const city = document.getElementById('regCity').value;
  const notes = document.getElementById('regNotes').value.trim();
  const password = document.getElementById('regPass').value;

  // Phase 7.6F: validation
  if (!name) { showMsg('❌ يرجى إدخال الاسم الكامل', 'error'); return; }
  if (!contact) { showMsg('❌ يرجى إدخال رقم الموبايل أو الإيميل', 'error'); return; }
  if (password.length < 6) { showMsg('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error'); return; }

  // Phase 7.6F: detect whether contact is an email or a phone number.
  // Email: contains '@'. Phone: digits only (with optional separators).
  // The trader uses the SAME value to log in later (auth.html doLogin already
  // applies the same digits-only → @sydent.com transform).
  var isEmail = contact.indexOf('@') !== -1;
  var email, phoneForRow;
  if (isEmail) {
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contact)) {
      showMsg('❌ تنسيق الإيميل غير صحيح', 'error'); return;
    }
    email = contact.toLowerCase();
    phoneForRow = null;
  } else {
    // Phone path: digits only allowed (with optional separators we strip)
    if (!/^[\d\s+\-()]+$/.test(contact)) {
      showMsg('❌ أدخل رقم موبايل أو إيميل صحيح', 'error'); return;
    }
    var digits = contact.replace(/\D/g, '');
    if (digits.length < 9) { showMsg('❌ رقم الموبايل قصير جداً', 'error'); return; }
    email = digits + '@sydent.com';
    phoneForRow = digits;
  }

  btn.disabled = true;
  btn.innerHTML = 'جارٍ الإنشاء<span class="spinner"></span>';

  try {
    // Step 1: create the auth.users row (self-signup with trader-chosen password)
    const { data, error } = await window.sb.auth.signUp({
      email: email,
      password: password,
      options: { data: { full_name: name, phone: phoneForRow || '' } }
    });
    if (error) throw error;
    if (!data || !data.user) throw new Error('تعذّر إنشاء الحساب');

    // Step 2: insert the trial_request row linked to the new user_id.
    // Status='new' means: pending admin review. The ensureAccountAccessible()
    // gate in supabase-init.js will block login until admin sets status='accepted'.
    const { error: trErr } = await window.sb.from('trial_requests').insert({
      name: name,
      phone: phoneForRow,
      city: city || null,
      notes: notes || null,
      status: 'new',
      email: email,
      user_id: data.user.id
    });
    if (trErr) {
      // The auth.users row was created but the trial_request insert failed.
      // We can't roll back the auth.users from this client (no SERVICE_KEY here),
      // but the trader can re-try and the existing auth.users will be re-found
      // by admin. Log and show a friendly error.
      console.error('trial_requests insert failed:', trErr);
      showMsg('⚠️ تم إنشاء الحساب لكن فشل تسجيل طلب التجربة. تواصل مع الدعم.', 'error');
      btn.disabled = false;
      btn.textContent = 'إنشاء حساب التجربة';
      return;
    }

    // Step 3: sign out the just-created session (the user is 'new', not yet approved).
    // This avoids the auto-redirect in the top-of-page IIFE running on pending.html
    // (it would redirect 'new' users to index.html, which ensureAccountAccessible
    // would then block — extra round-trip we avoid by signing out cleanly here).
    try { await window.sb.auth.signOut({ scope: 'local' }); } catch(e) {}

    // Step 4: redirect to the professional pending page with the contact for clarity.
    var contactParam = encodeURIComponent(phoneForRow ? phoneForRow : email);
    var contactType  = phoneForRow ? 'phone' : 'email';
    window.location.href = 'pending.html?contact=' + contactParam + '&type=' + contactType;
  } catch (err) {
    let msg = err.message || 'فشل إنشاء الحساب';
    if (msg.toLowerCase().includes('already') || msg.toLowerCase().includes('registered')) {
      msg = isEmail
        ? 'هذا الإيميل مسجّل مسبقاً. إذا كنت قد سجّلت من قبل، استخدم تبويب "تسجيل دخول".'
        : 'هذا الرقم مسجّل مسبقاً. إذا كنت قد سجّلت من قبل، استخدم تبويب "تسجيل دخول".';
    }
    if (msg.toLowerCase().includes('password')) msg = 'كلمة المرور ضعيفة جداً';
    showMsg('❌ ' + msg, 'error');
    btn.disabled = false;
    btn.textContent = 'إنشاء حساب التجربة';
  }
}
</script>
<script>
// Pull-to-refresh
(function(){
  if(!('ontouchstart' in window)) return;
  var s=document.createElement('style');
  s.textContent='.ptr-bar{width:100%;overflow:hidden;height:0;display:flex;align-items:center;justify-content:center;gap:8px;background:#0a1628;font-size:13px;font-weight:700;color:#2ee89e;font-family:"Cairo",sans-serif;transition:height .25s ease;border-bottom:1px solid transparent;position:fixed;top:0;left:0;right:0;z-index:999;}.ptr-bar.show{height:44px;border-bottom-color:rgba(46,232,158,0.2);}.ptr-ring{width:15px;height:15px;border:2px solid rgba(46,232,158,0.25);border-top-color:#2ee89e;border-radius:50%;flex-shrink:0;}.ptr-bar.spin .ptr-ring{animation:ptrSpin .65s linear infinite;}@keyframes ptrSpin{to{transform:rotate(360deg);}}';
  document.head.appendChild(s);
  var bar=document.createElement('div');
  bar.id='ptrBar';bar.className='ptr-bar';
  bar.innerHTML='<div class="ptr-ring" id="ptrRing"></div><span id="ptrLabel">↓ اسحب للتحديث</span>';
  document.body.insertBefore(bar,document.body.firstChild);
  var THRESHOLD=65,MAX=95,sy=0,cy=0,active=false;
  function b(){return document.getElementById('ptrBar');}
  function r(){return document.getElementById('ptrRing');}
  function l(){return document.getElementById('ptrLabel');}
  function setState(st,pull){
    var bv=b(),rv=r(),lv=l();if(!bv)return;
    if(st==='hide'){bv.className='ptr-bar';}
    else if(st==='pull'){bv.className='ptr-bar show';rv.style.animation='none';rv.style.transform='rotate('+Math.round((pull/THRESHOLD)*270)+'deg)';lv.textContent=pull>=THRESHOLD?'↑ أفلت للتحديث':'↓ اسحب للتحديث';}
    else if(st==='spin'){bv.className='ptr-bar show spin';rv.style.transform='';rv.style.animation='';lv.textContent='جارٍ التحديث…';}
    else if(st==='done'){bv.className='ptr-bar show';rv.style.animation='none';lv.textContent='✓ تم التحديث';}
  }
  document.addEventListener('touchstart',function(e){if(window.scrollY>0)return;sy=cy=e.touches[0].clientY;active=true;},{passive:true});
  document.addEventListener('touchmove',function(e){if(!active)return;if(window.scrollY>0){active=false;setState('hide');return;}cy=e.touches[0].clientY;var pull=Math.min(Math.max(0,cy-sy)*0.55,MAX);if(pull>4)setState('pull',pull);else setState('hide');},{passive:true});
  document.addEventListener('touchend',function(){if(!active)return;active=false;var pull=Math.min(Math.max(0,cy-sy)*0.55,MAX);if(pull>=THRESHOLD){setState('spin');setTimeout(function(){window.location.reload();},800);}else{setState('hide');}cy=0;});
})();
</script>
<script>
// Phase: Password Visibility Toggle (👁 / 🙈)
document.addEventListener('DOMContentLoaded', function(){
  if (window.SyDentPwd && window.SyDentPwd.attachAll) {
    window.SyDentPwd.attachAll(['loginPass', 'regPass']);
  }
});
</script>
