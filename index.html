<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SyDent">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<title>SyDent — نظام إدارة عيادات الأسنان</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a1628;
    --bg-secondary: #0f2038;
    --bg-card: #132840;
    --accent: #2ee89e;
    --accent2: #1ac5a8;
    --text-primary: #e4f1ee;
    --text-secondary: #8ab9a5;
    --text-muted: #607b8d;
    --red: #ef5350;
    --yellow: #f5c842;
    --blue: #425f5a;
    --border: rgba(46,232,158,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    direction: rtl;
  }





















  .main {
    margin-right: var(--sb-width, 240px);
    padding: 32px;
    min-height: 100vh;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .header-title { font-size: 24px; font-weight: 900; }
  .header-sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .header-actions { display: flex; gap: 12px; align-items: center; }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--bg-primary);
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 900; color: var(--text-primary); }
  .stat-change { font-size: 12px; margin-top: 6px; }
  .stat-change.up { color: var(--accent); }
  .stat-change.down { color: var(--red); }
  .stat-icon { font-size: 24px; float: left; opacity: 0.6; }

  .grid-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; margin-bottom: 24px; }
  .grid-2b { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-action {
    font-size: 12px; color: var(--accent); cursor: pointer;
    text-decoration: none;
  }
  .card-action:hover { text-decoration: underline; }

  .patient-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .patient-item:last-child { border-bottom: none; }
  .patient-item:hover { padding-right: 8px; }

  .patient-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
  }

  .patient-name { font-size: 14px; font-weight: 600; }
  .patient-info { font-size: 12px; color: var(--text-muted); }
  .patient-status {
    margin-right: auto;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .status-paid { background: rgba(46,232,158,0.15); color: var(--accent); }
  .status-due { background: rgba(239,83,80,0.15); color: var(--red); }

  .appt-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .appt-item:last-child { border-bottom: none; }

  .appt-time {
    min-width: 55px;
    font-size: 13px; font-weight: 700;
    color: var(--accent);
  }
  .appt-name { font-size: 13px; font-weight: 600; }
  .appt-type { font-size: 11px; color: var(--text-muted); }
  .appt-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: auto;
    flex-shrink: 0;
  }

  .finance-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .finance-row:last-child { border-bottom: none; }
  .finance-label { color: var(--text-muted); }
  .finance-value { font-weight: 700; }

  .progress-bar {
    height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; margin-top: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .lab-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .lab-item:last-child { border-bottom: none; }
  .lab-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .lab-name { font-weight: 600; flex: 1; }
  .lab-status {
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .lab-s1 { background: rgba(245,200,66,0.15); color: var(--yellow); }
  .lab-s2 { background: rgba(46,232,158,0.15); color: var(--accent); }
  .lab-s3 { background: rgba(100,150,255,0.15); color: #7cb3ff; }

  .search-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text-primary);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    width: 220px;
    outline: none;
    cursor: pointer;
  }
  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--text-muted); }

  .today-badge {
    background: rgba(46,232,158,0.1);
    border: 1px solid rgba(46,232,158,0.3);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }



  @media (max-width: 1100px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .grid-2, .grid-2b { grid-template-columns: 1fr; }
  }
  @media (max-width: 820px) {
    .main { margin-right: 0; padding: 16px 14px; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-actions { width: 100%; flex-direction: column; gap: 8px; align-items: stretch; }
    .search-bar { width: 100%; }
    .header-actions .btn { width: 100%; text-align: center; }
    .stats-grid { grid-template-columns: repeat(2,1fr); gap: 10px; }
    .stat-card { padding: 14px 12px; }
    .stat-value { font-size: 22px; }
    .stat-label { font-size: 12px; }
    .stat-icon { font-size: 22px; }
    .card { padding: 16px; }
    .card-title { font-size: 14px; }
  }
  @media (max-width: 480px) {
    .header-title { font-size: 20px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stat-value { font-size: 20px; }
    .patient-name { font-size: 13px; }
    .patient-info { font-size: 11px; }
    .appt-name { font-size: 13px; }
    .appt-type { font-size: 11px; }
  }
</style>

<body>
<script>
// SyDent auth guard
(async function(){
  await new Promise(r => setTimeout(r, 50));
  if (!window.sb) { console.warn('Supabase not loaded'); return; }
  const { data: { session } } = await window.sb.auth.getSession();
  if (!session || !session.user) {
    window.location.href = 'landing.html';
    return;
  }
  // تجاهل حساب الأدمن
  const { data: roleData } = await window.sb.from('doctors').select('role').eq('id', session.user.id).maybeSingle();
  if (roleData && roleData.role === 'admin') return;

  // فحص التجربة
  const userEmail = session.user.email;
  const { data: trialData } = await window.sb.from('trial_requests')
    .select('trial_end')
    .eq('email', userEmail)
    .eq('status', 'accepted')
    .maybeSingle();

  if (trialData && trialData.trial_end) {
    const daysLeft = Math.ceil((new Date(trialData.trial_end) - new Date()) / (1000*60*60*24));
    if (daysLeft <= 0) {
      // انتهت التجربة — احجب الداشبورد
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a1628;padding:24px;font-family:'Cairo',sans-serif;text-align:center;">
          <div style="font-size:60px;margin-bottom:16px;">⏰</div>
          <div style="font-size:22px;font-weight:800;color:#e1f4ee;margin-bottom:10px;">انتهت فترة التجربة</div>
          <div style="font-size:14px;color:#8a9ab5;margin-bottom:28px;max-width:320px;line-height:1.7;">لتجديد اشتراكك والاستمرار باستخدام SyDent، تواصل معنا عبر واتساب.</div>
          <a href="https://wa.me/963934012433?text=${encodeURIComponent('مرحباً، أريد تجديد اشتراكي في SyDent')}" target="_blank"
            style="padding:14px 28px;background:#25d366;border-radius:12px;color:#fff;font-size:15px;font-weight:800;text-decoration:none;margin-bottom:12px;">
            💬 تواصل معنا عبر واتساب
          </a>
          <button onclick="window.sb.auth.signOut().then(()=>window.location.href='landing.html')"
            style="padding:10px 20px;background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#8a9ab5;font-family:'Cairo',sans-serif;font-size:13px;cursor:pointer;margin-top:8px;">
            تسجيل الخروج
          </button>
        </div>`;
      return;
    }
    // أضف بانر الأيام المتبقية مباشرة
    var color = daysLeft <= 5 ? '#ef5350' : daysLeft <= 10 ? '#ffa726' : '#2ee89e';
    var banner = document.createElement('div');
    banner.id = 'trialBanner';
    banner.style.cssText = 'background:rgba(10,22,40,0.97);border-bottom:2px solid ' + color + ';padding:10px 16px;text-align:center;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;color:' + color + ';position:fixed;top:0;left:0;right:0;z-index:9999;';
    banner.innerHTML = '⏰ تنتهي تجربتك خلال ' + daysLeft + ' يوم — <a href="https://wa.me/963934012433" target="_blank" style="color:inherit;text-decoration:underline;">تواصل معنا للتجديد</a>';
    document.body.insertBefore(banner, document.body.firstChild);
    // أضف padding للصفحة عشان البانر ما يغطي المحتوى
    document.body.style.paddingTop = '40px';
  }
})();
</script>


<div class="main" id="sbMainContent">

  <div class="header">
    <div>
      <div class="header-title">لوحة التحكم</div>
      <div class="header-sub" id="dateDisplay">جارٍ التحميل...</div>
      <div class="header-sub" id="dateDisplayDoctor" style="margin-top:4px;color:var(--accent);font-weight:600"></div>
    </div>
    <div class="header-actions">
      <input class="search-bar" placeholder="🔍  بحث عن مريض..." onclick="window.location.href='patients.html'" readonly />
      <a href="patients.html" class="btn btn-primary">＋ مريض جديد</a>
    </div>
  </div>

  <div class="stats-grid">
    <a class="stat-card" href="patients.html">
      <span class="stat-icon">👥</span>
      <div class="stat-label">إجمالي المرضى</div>
      <div class="stat-value" id="statPatients">—</div>
      <div class="stat-change up" id="statPatientsNew"></div>
    </a>
    <a class="stat-card" href="appointments.html">
      <span class="stat-icon">📅</span>
      <div class="stat-label">مواعيد اليوم</div>
      <div class="stat-value" id="statApptToday">—</div>
      <div class="stat-change up" id="statApptUpcoming"></div>
    </a>
    <div class="stat-card">
      <span class="stat-icon">💵</span>
      <div class="stat-label">دخل هذا الشهر</div>
      <div class="stat-value" id="statIncome">—</div>
      <div class="stat-change up">ل.س</div>
    </div>
    <a class="stat-card" href="patients.html">
      <span class="stat-icon">⚠️</span>
      <div class="stat-label">مستحقات</div>
      <div class="stat-value" id="statPending">—</div>
      <div class="stat-change down" id="statPendingCount"></div>
    </a>
  </div>

  <div class="grid-2">

    <div class="card">
      <div class="card-header">
        <div class="card-title">آخر المرضى</div>
        <a class="card-action" href="patients.html">عرض الكل ←</a>
      </div>
      <div id="recentPatients"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">مواعيد اليوم</div>
        <span class="today-badge" id="dayName">—</span>
      </div>

      <div id="todayAppts"></div>
    </div>
  </div>

  <script>
// ─── التاريخ ───
const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const now = new Date();
document.getElementById('dateDisplay').textContent =
  days[now.getDay()] + '، ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
document.getElementById('dayName').textContent = days[now.getDay()];

const COLORS = ['#2ee89e','#63b3ed','#f5c842','#ef5350','#a78bfa','#fb923c'];
function avatarColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}
function initials(name) {
  if (!name) return '؟';
  const p = name.trim().split(' ');
  return p.length >= 2 ? p[0][0] + p[1][0] : p[0].slice(0,2);
}
function todayStr() {
  return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
}
function thisMonthRange() {
  const y = now.getFullYear(), m = now.getMonth();
  const start = y+'-'+String(m+1).padStart(2,'0')+'-01';
  const last  = new Date(y, m+1, 0).getDate();
  const end   = y+'-'+String(m+1).padStart(2,'0')+'-'+String(last).padStart(2,'0');
  return { start, end };
}

async function loadDashboard() {
  // wait for sb to be ready
  await new Promise(r => setTimeout(r, 80));
  if (!window.sb) return;
  const { data: u } = await window.sb.auth.getUser();
  if (!u || !u.user) return;
  const uid = u.user.id;

  // اسم الدكتور تحت التاريخ
  const meta = u.user.user_metadata || {};
  const docName = meta.full_name || meta.name || u.user.email || '';
  const elDoc = document.getElementById('dateDisplayDoctor');
  if (elDoc && docName) elDoc.textContent = docName;

  // ── المرضى ──
  const { data: patients } = await window.sb.from('patients').select('*').eq('doctor_id', uid);
  const list = patients || [];
  document.getElementById('statPatients').textContent = list.length || '—';
  const newCount = list.filter(p => {
    if (!p.created_at) return false;
    const d = new Date(p.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  document.getElementById('statPatientsNew').textContent = newCount ? '↑ ' + newCount + ' هذا الشهر' : '';
  const pendingCount = list.filter(p => p.payment === 'متبقي').length;
  document.getElementById('statPending').textContent = pendingCount || '0';
  document.getElementById('statPendingCount').textContent = pendingCount ? pendingCount + ' مرضى' : 'لا توجد مستحقات';

  // آخر 5 مرضى (الأحدث أولاً)
  const recent = list.slice().sort((a,b) => (b.created_at||'').localeCompare(a.created_at||'')).slice(0, 5);
  const container = document.getElementById('recentPatients');
  if (recent.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">لا توجد بيانات — <a href="patients.html" style="color:var(--accent)">أضف مريضاً</a></div>';
  } else {
    container.innerHTML = recent.map(p => `
      <a class="patient-item" href="patient-profile.html?id=${p.id}">
        <div class="patient-avatar" style="background:${avatarColor(p.name)}22;color:${avatarColor(p.name)}">${initials(p.name)}</div>
        <div>
          <div class="patient-name">${p.name}</div>
          <div class="patient-info">${p.status||'—'} — ${p.local_id||''}</div>
        </div>
        <span class="patient-status ${p.payment === 'مسدّد' ? 'status-paid' : 'status-due'}">${p.payment||'—'}</span>
      </a>
    `).join('');
  }

  // ── مواعيد اليوم ──
  const today = todayStr();
  const { data: appts } = await window.sb.from('appointments').select('*')
    .eq('doctor_id', uid).eq('date', today).order('time', { ascending: true });
  const apptsToday = appts || [];
  document.getElementById('statApptToday').textContent = apptsToday.length;
  const nowTime = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const upcoming = apptsToday.filter(a => (a.time||'') >= nowTime).length;
  document.getElementById('statApptUpcoming').textContent = upcoming ? upcoming + ' متبقية' : '';

  const apptsEl = document.getElementById('todayAppts');
  if (apptsToday.length === 0) {
    apptsEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">لا توجد مواعيد اليوم</div>';
  } else {
    apptsEl.innerHTML = apptsToday.map(a => `
      <div class="appt-item">
        <div class="appt-time">${(a.time||'').slice(0,5) || '—'}</div>
        <div style="flex:1;min-width:0">
          <div class="appt-name">${a.patient_name||'—'}</div>
          <div class="appt-type">${a.type||'—'}</div>
        </div>
        <div class="appt-dot" style="background:${a.color||'#2ee89e'}"></div>
      </div>
    `).join('');
  }

  // ── دخل الشهر ──
  const { start, end } = thisMonthRange();
  const { data: pays } = await window.sb.from('ledger_payments').select('amount,date')
    .eq('doctor_id', uid).gte('date', start).lte('date', end);
  const total = (pays||[]).reduce((s,p) => s + Number(p.amount||0), 0);
  let label;
  if (total >= 1000000) label = (total/1000000).toFixed(1) + 'M';
  else if (total >= 1000) label = (total/1000).toFixed(0) + 'K';
  else label = String(total);
  document.getElementById('statIncome').textContent = label;
}

loadDashboard();
</script>

<script>
// PTR refresh
window.onPTRRefresh = function() { location.reload(); };

document.addEventListener('DOMContentLoaded', function() {
  initSidebar('dashboard');
  // زر hamburger
  var btn = document.createElement('button');
  btn.className = 'sb-hamburger';
  btn.id = 'sbHamburgerBtn';
  btn.setAttribute('aria-label', 'القائمة');
  btn.innerHTML = '<span></span><span></span><span></span>';
  btn.onclick = function() { window.sbToggle(); };
  window._sbBtn = btn;
  var header = document.querySelector('.header');
  if (header) header.insertBefore(btn, header.firstChild);
});
</script>
</body>
