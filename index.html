<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root {
    --bg-primary: #0a1628;
    --bg-secondary: #0f2038;
    --bg-card: #132840;
    --accent: #2ee89e;
    --accent2: #1ac5a8;
    --text-primary: #e4f1ee;
    --text-secondary: #8ab9a5;
    --text-muted: #607b8d;
    --red: #ef5350;
    --yellow: #f5c842;
    --blue: #425f5a;
    --border: rgba(46,232,158,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    direction: rtl;
  }





















  .main {
    margin-right: var(--sb-width, 240px);
    padding: 32px;
    min-height: 100vh;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .header-title { font-size: 24px; font-weight: 900; }
  .header-sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .header-actions { display: flex; gap: 12px; align-items: center; }
  .header-title-row { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .header-title-row > div { min-width: 0; flex: 1; }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--bg-primary);
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 900; color: var(--text-primary); }
  .stat-change { font-size: 12px; margin-top: 6px; }
  .stat-change.up { color: var(--accent); }
  .stat-change.down { color: var(--red); }
  .stat-link { display: inline-block; text-decoration: none; cursor: pointer; }
  .stat-link:hover { text-decoration: underline; }
  .stat-icon { font-size: 24px; float: left; opacity: 0.6; }

  .grid-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; margin-bottom: 24px; }
  .grid-2b { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-action {
    font-size: 12px; color: var(--accent); cursor: pointer;
    text-decoration: none;
  }
  .card-action:hover { text-decoration: underline; }

  .patient-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .patient-item:last-child { border-bottom: none; }
  .patient-item:hover { padding-right: 8px; }

  .patient-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
  }

  .patient-name { font-size: 14px; font-weight: 600; }
  .patient-info { font-size: 12px; color: var(--text-muted); }
  .patient-status {
    margin-right: auto;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .status-paid { background: rgba(46,232,158,0.15); color: var(--accent); }
  .status-due { background: rgba(239,83,80,0.15); color: var(--red); }

  .appt-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .appt-item:last-child { border-bottom: none; }

  .appt-time {
    min-width: 55px;
    font-size: 13px; font-weight: 700;
    color: var(--accent);
  }
  .appt-name { font-size: 13px; font-weight: 600; }
  .appt-type { font-size: 11px; color: var(--text-muted); }
  .appt-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: auto;
    flex-shrink: 0;
  }

  /* ─── Gap 6: Inline next-action button in today's appointments ─── */
  .dash-time-btn {
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: filter 0.15s ease;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .dash-time-btn:hover { filter: brightness(1.15); }
  .dash-time-btn:disabled { opacity: 0.5; cursor: wait; }
  .dash-time-stamp {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 5px;
    background: rgba(255,255,255,0.04);
    margin-top: 2px;
    display: inline-block;
    margin-right: 4px;
  }

  .finance-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .finance-row:last-child { border-bottom: none; }
  .finance-label { color: var(--text-muted); }
  .finance-value { font-weight: 700; }

  .progress-bar {
    height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; margin-top: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .lab-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .lab-item:last-child { border-bottom: none; }
  .lab-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .lab-name { font-weight: 600; flex: 1; }
  .lab-status {
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .lab-s1 { background: rgba(245,200,66,0.15); color: var(--yellow); }
  .lab-s2 { background: rgba(46,232,158,0.15); color: var(--accent); }
  .lab-s3 { background: rgba(100,150,255,0.15); color: #7cb3ff; }

  .search-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text-primary);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    width: 220px;
    outline: none;
    cursor: pointer;
  }
  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--text-muted); }

  .today-badge {
    background: rgba(46,232,158,0.1);
    border: 1px solid rgba(46,232,158,0.3);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }



  @media (max-width: 1100px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .grid-2, .grid-2b { grid-template-columns: 1fr; }
  }
  @media (max-width: 820px) {
    .main { margin-right: 0; padding: 16px 14px; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-actions { width: 100%; flex-direction: column; gap: 8px; align-items: stretch; }
    .search-bar { width: 100%; }
    .header-actions .btn { width: 100%; text-align: center; }
    .stats-grid { grid-template-columns: repeat(2,1fr); gap: 10px; }
    .stat-card { padding: 14px 12px; }
    .stat-value { font-size: 22px; }
    .stat-label { font-size: 12px; }
    .stat-icon { font-size: 22px; }
    .card { padding: 16px; }
    .card-title { font-size: 14px; }
  }
  @media (max-width: 480px) {
    .header-title { font-size: 20px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stat-value { font-size: 20px; }
    .patient-name { font-size: 13px; }

    .appt-type { font-size: 11px; }

  .wa-badge-dash {
    display: inline-block;

    border: 1px solid transparent;

    user-select: none;
    transition: transform .15s, filter .15s;
    font-family: 'Cairo', sans-serif;
    white-space: nowrap;

  .wa-badge-dash:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .wa-badge-dash.sent {
    background: rgba(46,232,158,0.14); color: var(--accent); border-color: rgba(46,232,158,0.35);

    background: rgba(245,200,66,0.14); color: var(--yellow); border-color: rgba(245,200,66,0.35);
  }
  .wa-badge-dash.urgent {
    background: rgba(239,83,80,0.14); color: var(--red); border-color: rgba(239,83,80,0.45);
    animation: waPulseDash 2.2s ease-in-out infinite;
  }
  @keyframes waPulseDash {
    0%,100% { box-shadow: 0 0 0 0 rgba(239,83,80,0.4); }
    50%     { box-shadow: 0 0 0 4px rgba(239,83,80,0); }
  }
</style>

<script>
// SyDent auth guard
(async function(){
  await new Promise(r => setTimeout(r, 50));
  if (!window.sb) { console.warn('Supabase not loaded'); return; }
  const { data: { session } } = await window.sb.auth.getSession();
  if (!session || !session.user) {
    window.location.href = 'landing.html';
    return;
  }
  // تجاهل حساب الأدمن
  const { data: roleData } = await window.sb.from('doctors').select('role').eq('id', session.user.id).maybeSingle();
  if (roleData && roleData.role === 'admin') return;

  // فحص التجربة
  const userEmail = session.user.email;
  const { data: trialData } = await window.sb.from('trial_requests')
    .select('trial_end')
    .eq('email', userEmail)
    .eq('status', 'accepted')
    .maybeSingle();

  if (trialData && trialData.trial_end) {
    const daysLeft = Math.ceil((new Date(trialData.trial_end) - new Date()) / (1000*60*60*24));
    if (daysLeft <= 0) {
      // انتهت التجربة — احجب الداشبورد
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a1628;padding:24px;font-family:'Cairo',sans-serif;text-align:center;">
          <div style="font-size:60px;margin-bottom:16px;">⏰</div>
          <div style="font-size:22px;font-weight:800;color:#e1f4ee;margin-bottom:10px;">انتهت فترة التجربة</div>
          <div style="font-size:14px;color:#8a9ab5;margin-bottom:28px;max-width:320px;line-height:1.7;">لتجديد اشتراكك والاستمرار باستخدام SyDent، تواصل معنا عبر واتساب.</div>
          <a href="https://wa.me/963934012433?text=${encodeURIComponent('مرحباً، أريد تجديد اشتراكي في SyDent')}" target="_blank"
            style="padding:14px 28px;background:#25d366;border-radius:12px;color:#fff;font-size:15px;font-weight:800;text-decoration:none;margin-bottom:12px;">
            💬 تواصل معنا عبر واتساب
          </a>
          <button onclick="window.sb.auth.signOut().then(()=>window.location.href='landing.html')"
            style="padding:10px 20px;background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#8a9ab5;font-family:'Cairo',sans-serif;font-size:13px;cursor:pointer;margin-top:8px;">
            تسجيل الخروج
          </button>
        </div>`;
      return;
    }
    // أضف بانر الأيام المتبقية مباشرة
    var color = daysLeft <= 5 ? '#ef5350' : daysLeft <= 10 ? '#ffa726' : '#2ee89e';
    var banner = document.createElement('div');
    banner.id = 'trialBanner';
    banner.style.cssText = 'background:rgba(10,22,40,0.97);border-bottom:2px solid ' + color + ';padding:10px 16px;text-align:center;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;color:' + color + ';position:fixed;top:0;left:0;right:0;z-index:9999;';
    banner.innerHTML = '⏰ تنتهي تجربتك خلال ' + daysLeft + ' يوم — <a href="https://wa.me/963934012433" target="_blank" style="color:inherit;text-decoration:underline;">تواصل معنا للتجديد</a>';
    document.body.insertBefore(banner, document.body.firstChild);
    // أضف padding للصفحة عشان البانر ما يغطي المحتوى
    document.body.style.paddingTop = '40px';
  }
})();
</script>

  <script>
// ─── التاريخ ───
const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const now = new Date();
document.getElementById('dateDisplay').textContent =
  days[now.getDay()] + '، ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
document.getElementById('dayName').textContent = days[now.getDay()];

const COLORS = ['#2ee89e','#63b3ed','#f5c842','#ef5350','#a78bfa','#fb923c'];
function avatarColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[h];
}
function initials(name) {
  if (!name) return '؟';
  const p = name.trim().split(' ');
  return p.length >= 2 ? p[0][0] + p[1][0] : p[0].slice(0,2);
}
function todayStr() {
  return now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
}
function thisMonthRange() {
  const y = now.getFullYear(), m = now.getMonth();
  const start = y+'-'+String(m+1).padStart(2,'0')+'-01';
  const last  = new Date(y, m+1, 0).getDate();
  const end   = y+'-'+String(m+1).padStart(2,'0')+'-'+String(last).padStart(2,'0');
  return { start, end };
}

async function loadDashboard() {
  // wait for sb to be ready
  await new Promise(r => setTimeout(r, 80));
  if (!window.sb) return;
  const { data: u } = await window.sb.auth.getUser();
  if (!u || !u.user) return;
  const uid = u.user.id;

  // اسم الدكتور تحت التاريخ
  const meta = u.user.user_metadata || {};
  const docName = meta.full_name || meta.name || u.user.email || '';
  const elDoc = document.getElementById('dateDisplayDoctor');
  if (elDoc && docName) elDoc.textContent = docName;

  // ── المرضى ──
  const { data: patients } = await window.sb.from('patients').select('*').eq('doctor_id', uid);
  const list = patients || [];
  document.getElementById('statPatients').textContent = list.length || '—';
  const newCount = list.filter(p => {
    if (!p.created_at) return false;
    const d = new Date(p.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  document.getElementById('statPatientsNew').textContent = newCount ? '↑ ' + newCount + ' هذا الشهر' : '';
  const pendingCount = list.filter(p => p.payment === 'متبقي').length;

  // ── مجموع المستحقات ──
  // Compute total outstanding amount across pending patients:
  //   total_due = sum(sessions.cost) - sum(payments.amount), summed only for
  //   patients with payment='متبقي' (kept in sync by syncPaymentStatus in
  //   patient-profile.html). We use per-doctor scope; partial unallocated
  //   prepayments stay netted out (legacy behavior, matches OpenDental Aging).
  // If queries fail or return nothing, fall back to '—'.
  let totalDue = 0;
  try {
    const pendingIds = list.filter(p => p.payment === 'متبقي').map(p => p.id);
    if (pendingIds.length > 0) {
      const [sessRes, payRes] = await Promise.all([
        window.sb.from('ledger_sessions').select('patient_id,cost')
          .eq('doctor_id', uid).in('patient_id', pendingIds),
        window.sb.from('ledger_payments').select('patient_id,amount')
          .eq('doctor_id', uid).in('patient_id', pendingIds)
      ]);
      const sessSum = (sessRes.data || []).reduce((s,r) => s + Number(r.cost||0), 0);
      const paySum  = (payRes.data  || []).reduce((s,r) => s + Number(r.amount||0), 0);
      // Cap at 0 to avoid negative totals from over-paid edge cases mixing in.
      totalDue = Math.max(0, sessSum - paySum);
    }
  } catch (e) {
    console.warn('totalDue computation failed:', e);
    totalDue = 0;
  }

  // Format total: keep raw number if small, abbreviate to K/M for readability
  function fmtDueAmount(n) {
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 10000)   return Math.round(n/1000) + 'K';
    return String(Math.round(n));
  }
  if (pendingCount > 0) {
    document.getElementById('statPending').textContent = fmtDueAmount(totalDue) + ' ل.س';
  } else {
    document.getElementById('statPending').textContent = '0';
  }
  var pcEl = document.getElementById('statPendingCount');
  if (pendingCount) {
    pcEl.textContent = pendingCount + ' مريض ←';
    pcEl.style.pointerEvents = '';
    pcEl.style.opacity = '';
  } else {
    pcEl.textContent = 'لا توجد مستحقات';
    pcEl.style.pointerEvents = 'none';
    pcEl.style.opacity = '0.7';
  }

  // آخر 5 مرضى (الأحدث أولاً)
  const recent = list.slice().sort((a,b) => (b.created_at||'').localeCompare(a.created_at||'')).slice(0, 5);
  const container = document.getElementById('recentPatients');
  if (recent.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">لا توجد بيانات — <a href="patients.html" style="color:var(--accent)">أضف مريضاً</a></div>';
  } else {
    container.innerHTML = recent.map(p => `
      <a class="patient-item" href="patient-profile.html?id=${p.id}">
        <div class="patient-avatar" style="background:${avatarColor(p.name)}22;color:${avatarColor(p.name)}">${initials(p.name)}</div>
        <div>
          <div class="patient-name">${p.name}</div>
          <div class="patient-info">${p.status||'—'} — ${p.local_id||''}</div>
        </div>
        <span class="patient-status ${p.payment === 'مسدّد' ? 'status-paid' : 'status-due'}">${p.payment||'—'}</span>
      </a>
    `).join('');
  }

  // ── مواعيد اليوم ──
  const today = todayStr();
  const { data: appts } = await window.sb.from('appointments').select('*')
    .eq('doctor_id', uid).eq('date', today).order('time', { ascending: true });
  const apptsToday = appts || [];
  // Cache locally so Gap 6 button clicks can re-render this card without a
  // full dashboard reload. Mutated in-place by recordDashApptTime().
  _dashApptsToday = apptsToday;
  _dashUid = uid;
  document.getElementById('statApptToday').textContent = apptsToday.length;
  const nowTime = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const upcoming = apptsToday.filter(a => (a.time||'') >= nowTime).length;
  document.getElementById('statApptUpcoming').textContent = upcoming ? upcoming + ' متبقية' : '';

  // Phase 2A: load WhatsApp settings + reminder logs for today's appts before
  // rendering the card so badges appear on first paint (no flicker).
  await loadDashWaState(uid);
  renderTodayApptsCard();

  // ── دخل الشهر ──
  const { start, end } = thisMonthRange();
  const { data: pays } = await window.sb.from('ledger_payments').select('amount,date')
    .eq('doctor_id', uid).gte('date', start).lte('date', end);
  const total = (pays||[]).reduce((s,p) => s + Number(p.amount||0), 0);
  let label;
  if (total >= 1000000) label = (total/1000000).toFixed(1) + 'M';
  else if (total >= 1000) label = (total/1000).toFixed(0) + 'K';
  else label = String(total);
  document.getElementById('statIncome').textContent = label;

  // ── طلبات المخابر العاجلة ──
  await loadLabOrdersCard(uid, list);

  // ── 🚪 Gap 6: غرفة الانتظار (مرضى وصلوا ولم يجلسوا على الكرسي بعد) ──
  await loadWaitingRoom(uid);
  startWaitingRoomAutoRefresh(uid);
}

const LAB_DASH_STATUSES = {
  'sent':      { ar: 'تم التسليم للمخبر',    cls: 'lab-s3' },
  'received':  { ar: 'تم الاستلام من المخبر', cls: 'lab-s1' },
  'checked':   { ar: 'تم الفحص',              cls: 'lab-s2' }
};

async function loadLabOrdersCard(uid, patientsList) {
  const el = document.getElementById('dashLabsList');
  if (!el) return;

  let orders = [];
  try {
    const { data, error } = await window.sb.from('lab_orders')
      .select('*')
      .eq('doctor_id', uid)
      .in('status', ['sent','received','checked'])
      .order('date_due', { ascending: true, nullsFirst: false })
      .limit(5);
    if (!error) orders = data || [];
  } catch(e) { console.warn('lab_orders dashboard:', e); }

  // عدد المتأخرات (لا يقتصر على أول 5 — نحسبها بشكل منفصل)
  // NOTE: this counter uses the simple date_due-based definition of overdue
  // (DB-side filter, fast). labs.html applies a richer definition that also
  // flags 'sent' orders whose linked appointment has already arrived even
  // without an explicit date_due. The two views can therefore disagree by
  // a small amount; labs.html is the authoritative detailed view, this
  // counter is a fast home-page awareness signal kept intentionally simple.
  let overdueCount = 0;
  try {
    const todayIso = todayStr();
    const { data: ovd } = await window.sb.from('lab_orders')
      .select('id', { count: 'exact', head: false })
      .eq('doctor_id', uid)
      .in('status', ['sent','received'])
      .lt('date_due', todayIso);
    overdueCount = (ovd || []).length;
  } catch(e) {}

  const badge = document.getElementById('labsOverdueBadge');
  if (badge) {
    if (overdueCount > 0) {
      badge.textContent = overdueCount + ' متأخر';
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  }

  if (!orders.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">لا توجد طلبات مخابر نشطة — <a href="labs.html" style="color:var(--accent)">إضافة طلب</a></div>';
    return;
  }

  // Map patient_id → name
  const pMap = {};
  (patientsList || []).forEach(function(p){ pMap[p.id] = { name: p.name, local_id: p.local_id }; });

  const todayIso = todayStr();
  el.innerHTML = orders.map(function(lo){
    const st = LAB_DASH_STATUSES[lo.status] || LAB_DASH_STATUSES['sent'];
    const p = pMap[lo.patient_id] || { name: '—' };
    const overdue = lo.date_due && lo.date_due < todayIso && (lo.status === 'sent' || lo.status === 'received');
    const dueText = lo.date_due
      ? '<span style="font-size:11px;color:' + (overdue ? '#ef5350' : 'var(--text-muted)') + ';">' + (overdue ? '⚠️ ' : '') + 'استحقاق: ' + lo.date_due.slice(0,10) + '</span>'
      : '';
    return '<a class="lab-item" href="patient-profile.html?id=' + lo.patient_id + '" style="text-decoration:none;color:inherit;">'
      +   '<div class="lab-dot" style="background:' + (overdue ? '#ef5350' : '#63b3ed') + ';"></div>'
      +   '<div style="flex:1;min-width:0;">'
      +     '<div class="lab-name">' + (p.name || '—') + '</div>'
      +     '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">'
      +       (lo.work_type || '—')
      +       (lo.tooth_num ? ' — سن ' + lo.tooth_num : '')
      +       (lo.lab_name ? ' — ' + lo.lab_name : '')
      +     '</div>'
      +     (dueText ? '<div style="margin-top:3px;">' + dueText + '</div>' : '')
      +   '</div>'
      +   '<span class="lab-status ' + st.cls + '">' + st.ar + '</span>'
      + '</a>';
  }).join('');
}

// ─── Gap 6: Inline action buttons in "Today's Appointments" ─────────────────
// Lets the secretary advance the patient journey (🚪 وصل → 🪑 جلس → ✅ خرج)
// directly from the dashboard without navigating to appointments.html.
//
// We keep a module-level cache of today's appointments so a single click
// can re-render the card without a full dashboard reload. Mutations are
// applied locally first, then synced to Supabase.
//
// Design choice: 📞 تأكيد is NOT shown here. Gap 6 auto-fill ensures
// appointments saved as 'confirmed' already have confirmed_at, and if
// status='pending' the secretary uses the full edit modal in appointments.html.
// This keeps the dashboard a one-button-per-row "happy path" surface.

var _dashApptsToday = [];
var _dashUid = null;

// Stage definitions for the dashboard. Excludes 'confirmed_at' on purpose —
// see comment above. Mirrors the keys/labels/colors used in appointments.html
// so the visual language stays consistent across pages.
var DASH_TIME_STAGES = [
  { key: 'arrived_at',   label: '🚪 وصل', color: '#f5c842' },
  { key: 'seated_at',    label: '🪑 جلس', color: '#fb923c' },
  { key: 'dismissed_at', label: '✅ خرج', color: '#2ee89e' }
];

// Statuses that disable the action button — appointment is logically done.
function _dashIsFinished(s) {
  return s === 'completed' || s === 'cancelled' || s === 'broken' || s === 'no_show';
}

// Returns the next-step button stage for a dashboard row, or null.
// Skips 'confirmed_at' (handled at save time) so the first button visible
// here is always 🚪 وصل for a confirmed appointment.
function getDashNextAction(appt) {
  if (!appt) return null;
  if (_dashIsFinished(appt.status)) return null;
  // Confirmation is implicit on the dashboard. If the appointment isn't
  // confirmed yet, we don't expose buttons here (avoids confusing flows).
  if (!appt.confirmed_at && appt.status !== 'confirmed') return null;
  for (var i = 0; i < DASH_TIME_STAGES.length; i++) {
    if (!appt[DASH_TIME_STAGES[i].key]) return DASH_TIME_STAGES[i];
  }
  return null;
}

// Build the compact action button HTML, or '' if no action.
function renderDashActionBtn(appt) {
  var act = getDashNextAction(appt);
  if (!act) return '';
  return '<button class="dash-time-btn" '
       + 'style="background:' + act.color + '22;color:' + act.color
       + ';border:1px solid ' + act.color + '55" '
       + 'onclick="recordDashApptTime(\'' + appt.id + '\',\'' + act.key + '\',this)">'
       + act.label + '</button>';
}

// Builds the compact stamp strip (smaller than the appointments-page one —
// dashboard rows are tight). Only shows the journey stamps, not confirmation.
function renderDashStrip(appt) {
  if (!appt) return '';
  var parts = [];
  DASH_TIME_STAGES.forEach(function(st) {
    if (appt[st.key]) {
      var d = new Date(appt[st.key]);
      if (isNaN(d.getTime())) return;
      var t = d.toLocaleTimeString('en-GB', { hour12: false }).slice(0, 5);
      parts.push(
        '<span class="dash-time-stamp" style="color:' + st.color + '">'
        + st.label.split(' ')[0] + ' ' + t + '</span>'
      );
    }
  });
  return parts.join('');
}

// ═══════════════════════════════════════════════════════════════
// Phase 2A — WhatsApp Reminders (dashboard "today's appointments" card)
// We don't open the modal from the dashboard — clicking the badge sends
// the user to appointments.html to complete the send. Keeps the dashboard
// focused on overview, not deep interaction.
// ═══════════════════════════════════════════════════════════════
var _dashCfgWa = null;        // cached clinic_settings (whatsapp_reminders_enabled + hours_before)
var _dashReminderLogs = {};   // { appointment_id: latest_log } for today's appts

async function loadDashWaState(uid) {
  // Settings — silently fall through if table is missing (pre-Migration-5)
  try {
    var cs = await window.sb.from('clinic_settings')
      .select('whatsapp_reminders_enabled, whatsapp_reminder_hours_before')
      .eq('owner_id', uid).maybeSingle();
    if (!cs.error && cs.data) _dashCfgWa = cs.data;
  } catch(e) { /* ignore */ }

  // Reminder logs — only need entries for today's appts so we don't pull the
  // full history. Bail silently if reminder_logs table is missing.
  _dashReminderLogs = {};
  if (!Array.isArray(_dashApptsToday) || !_dashApptsToday.length) return;
  var ids = _dashApptsToday.map(function(a){ return a.id; }).filter(Boolean);
  if (!ids.length) return;
  try {
    var rl = await window.sb.from('reminder_logs')
      .select('appointment_id, sent_at')
      .eq('owner_id', uid)
      .in('appointment_id', ids)
      .order('sent_at', { ascending: false });
    if (!rl.error && Array.isArray(rl.data)) {
      rl.data.forEach(function(log){
        if (!_dashReminderLogs[log.appointment_id]) {
          _dashReminderLogs[log.appointment_id] = log;
        }
      });
    }
  } catch(e) { /* ignore */ }
}

// Mirrors isFinishedStatus from appointments.html — no badge for finished appts.
function _dashIsFinishedForWa(s) {
  return s === 'completed' || s === 'cancelled' || s === 'broken' || s === 'no_show';
}

// H2 fix: escape user-controlled fields before innerHTML injection.
// Patient names + appointment types are user-typed in patients.html /
// treatments.html and reach the dashboard via Supabase. Same XSS-against-self
// concern as appointments.html — defensive escape now prevents future
// multi-user regressions.
function _dashEscapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Returns badge HTML or '' — mirrors appointments.html classifyReminderForAppt
// semantics but trimmed for dashboard density (short labels, no titles needed).
function renderDashWaBadge(appt) {
  if (!_dashCfgWa || !_dashCfgWa.whatsapp_reminders_enabled) return '';
  if (!appt || !appt.id || _dashIsFinishedForWa(appt.status)) return '';

  // Priority 1: log wins. If a reminder was sent, show "تم التذكير" badge
  // regardless of whether the appointment time has already passed today.
  var log = _dashReminderLogs[appt.id];
  if (log) {
    return '<span class="wa-badge-dash sent" title="آخر تذكير: '
      + new Date(log.sent_at).toLocaleString('ar').replace(/"/g,'&quot;')
      + '" onclick="event.stopPropagation(); _dashGoToWaReminder(\'' + appt.id + '\')">✓ تم التذكير</span>';
  }

  // H4 fix: skip the "أرسل تذكير" prompt for appointments whose time has
  // already passed today — the slot is gone, nagging the user about a
  // missed reminder window helps no one. Mirrors the appointments.html
  // classifyReminderForAppt past-check. If `time` is missing/malformed we
  // assume noon (matches the classifier fallback).
  if (appt.date) {
    var ts = (appt.time && /^\d{2}:\d{2}/.test(appt.time)) ? appt.time.slice(0,5) : '12:00';
    var apptMoment = new Date(appt.date + 'T' + ts + ':00');
    if (!isNaN(apptMoment.getTime()) && apptMoment.getTime() < Date.now()) return '';
  }

  return '<span class="wa-badge-dash urgent" title="موعد اليوم بدون تذكير" '
    + 'onclick="event.stopPropagation(); _dashGoToWaReminder(\'' + appt.id + '\')">⚠️ أرسل تذكير</span>';
}

// Click handler: hand off to appointments.html with the appt selected.
// We use a query param the appointments page can read on init to pre-open
// the reminder modal. If the page doesn't support it (older deploy), the
// user just lands on appointments and can click the badge there.
function _dashGoToWaReminder(apptId) {
  if (!apptId) return;
  window.location.href = 'appointments.html?wa=' + encodeURIComponent(apptId);
}

// Renders the entire "today's appointments" card from _dashApptsToday.
// Called once on load, then again after every successful click.
function renderTodayApptsCard() {
  var el = document.getElementById('todayAppts');
  if (!el) return;
  if (!_dashApptsToday.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">لا توجد مواعيد اليوم</div>';
    return;
  }
  el.innerHTML = _dashApptsToday.map(function(a) {
    var stamps = renderDashStrip(a);
    var btn = renderDashActionBtn(a);
    var safeName = _dashEscapeHtml(a.patient_name || '—');
    var safeType = _dashEscapeHtml(a.type || '—');
    var safeTime = (a.time || '').slice(0, 5) || '—';
    var waBadge = renderDashWaBadge(a);
    return '<div class="appt-item">'
         +   '<div class="appt-time">' + safeTime + '</div>'
         +   '<div style="flex:1;min-width:0">'
         +     '<div class="appt-name">' + safeName + ' ' + waBadge + '</div>'
         +     '<div class="appt-type">' + safeType + '</div>'
         +     (stamps ? '<div style="margin-top:3px">' + stamps + '</div>' : '')
         +   '</div>'
         +   btn
         +   '<div class="appt-dot" style="background:' + (a.color || '#2ee89e') + ';margin-right:0"></div>'
         + '</div>';
  }).join('');
}

// Detects pre-migration rejections (column missing or constraint violated).
// Mirrors the same patterns used in appointments.html for consistency.
function _dashIsAutoFillRejection(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /42703|23514|confirmed_at|arrived_at|seated_at|dismissed_at|confirmation_valid/i.test(msg);
}

var _dashGap6WarnedOnce = false;
function _dashWarnGap6MigrationOnce() {
  if (_dashGap6WarnedOnce) return;
  _dashGap6WarnedOnce = true;
  console.warn('Gap 6 migration required for dashboard actions. See appointments.html for the migration SQL.');
}

// Records a timestamp for a today-card appointment, then re-renders both this
// card and the Waiting Room so the change is visible immediately.
async function recordDashApptTime(apptId, fieldKey, btnEl) {
  if (!apptId || !fieldKey) return;
  var allowed = ['arrived_at', 'seated_at', 'dismissed_at'];
  if (allowed.indexOf(fieldKey) === -1) {
    console.error('recordDashApptTime: invalid key', fieldKey);
    return;
  }
  if (btnEl) btnEl.disabled = true;

  var nowIso = new Date().toISOString();
  var patch = {}; patch[fieldKey] = nowIso;

  try {
    var res = await window.sb.from('appointments').update(patch).eq('id', apptId);
    if (res.error) {
      if (_dashIsAutoFillRejection(res.error)) _dashWarnGap6MigrationOnce();
      else console.error('recordDashApptTime failed:', res.error);
      if (btnEl) btnEl.disabled = false;
      return;
    }
    // Mutate the cached row so the next render reflects the new state.
    var row = _dashApptsToday.find(function(a){ return a.id === apptId; });
    if (row) row[fieldKey] = nowIso;
    renderTodayApptsCard();
    // Sync the Waiting Room widget so the patient appears/disappears live.
    if (_dashUid) loadWaitingRoom(_dashUid);
  } catch (e) {
    console.error('recordDashApptTime exception:', e);
    if (btnEl) btnEl.disabled = false;
  }
}

// ─── Gap 6: Waiting Room Widget ─────────────────────────────────────────────
// Shows today's patients who have arrived but not yet been seated.
// Mirrors OpenDental's "Waiting Room" pane: a list filtered by
//   arrived_at IS NOT NULL AND seated_at IS NULL
// Wait time uses local browser clock minus arrived_at, color-coded:
//   • <15 min → grey
//   • 15–24 min → yellow
//   • ≥25 min → red
// Auto-refreshes every 30s, but only when the tab is visible (battery-friendly).

// Detects pre-migration state (column doesn't exist yet). Returns true so
// callers can quietly hide the widget instead of showing an error.
function isWaitingRoomPreMigration(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /42703|column .* does not exist|arrived_at|seated_at/i.test(msg);
}

async function loadWaitingRoom(uid) {
  var listEl = document.getElementById('waitingRoomList');
  var countEl = document.getElementById('waitingRoomCount');
  var cardEl = document.getElementById('waitingRoomCard');
  if (!listEl || !countEl || !cardEl) return;

  var today = todayStr();
  var rows = [];
  try {
    var res = await window.sb.from('appointments')
      .select('id, patient_name, type, time, arrived_at, color')
      .eq('doctor_id', uid)
      .eq('date', today)
      .not('arrived_at', 'is', null)
      .is('seated_at', null)
      .order('arrived_at', { ascending: true });
    if (res.error) {
      // Pre-migration: hide widget entirely instead of showing an empty card.
      if (isWaitingRoomPreMigration(res.error)) {
        cardEl.style.display = 'none';
        return;
      }
      console.warn('waiting room load error:', res.error);
      return;
    }
    rows = res.data || [];
  } catch (e) {
    console.warn('waiting room exception:', e);
    return;
  }

  cardEl.style.display = ''; // ensure visible if previously hidden
  countEl.textContent = rows.length;

  if (rows.length === 0) {
    listEl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px">'
                     + '🟢 لا أحد ينتظر حالياً</div>';
    return;
  }

  var now = new Date();
  listEl.innerHTML = rows.map(function(a) {
    var arrived = new Date(a.arrived_at);
    if (isNaN(arrived.getTime())) arrived = now;
    var waitMin = Math.max(0, Math.floor((now - arrived) / 60000));
    var color, emoji;
    if (waitMin >= 25) { color = '#ef5350'; emoji = '🔴'; }
    else if (waitMin >= 15) { color = '#f5c842'; emoji = '🟡'; }
    else { color = '#8da0bd'; emoji = '⚪'; }
    var arrivedStr = arrived.toLocaleTimeString('en-GB', { hour12: false }).slice(0, 5);
    var safeName = _dashEscapeHtml(a.patient_name || '—');
    var safeType = _dashEscapeHtml(a.type || '—');
    return '<a class="appt-item" href="appointments.html" style="text-decoration:none;color:inherit">'
         +   '<div class="appt-time">' + arrivedStr + '</div>'
         +   '<div style="flex:1;min-width:0">'
         +     '<div class="appt-name">' + safeName + '</div>'
         +     '<div class="appt-type">' + safeType + '</div>'
         +   '</div>'
         +   '<div style="color:' + color + ';font-weight:700;font-size:13px;white-space:nowrap;padding-right:8px">'
         +     emoji + ' ' + waitMin + ' د'
         +   '</div>'
         + '</a>';
  }).join('');
}

// Auto-refresh: re-query the waiting room every 30 seconds, but ONLY when the
// tab is visible. This keeps wait-time numbers accurate without burning CPU
// in the background. We keep a module-level handle so we can clear it cleanly
// if the dashboard ever gets re-initialized.
var _waitingRoomTimer = null;
var _waitingRoomUid = null;
function startWaitingRoomAutoRefresh(uid) {
  _waitingRoomUid = uid;
  if (_waitingRoomTimer) clearInterval(_waitingRoomTimer);
  _waitingRoomTimer = setInterval(function() {
    if (!document.hidden && _waitingRoomUid) loadWaitingRoom(_waitingRoomUid);
  }, 30000);
  // Also refresh immediately when the tab becomes visible again (e.g. user
  // switched away for 5 min and comes back — wait times need a fresh paint).
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && _waitingRoomUid) loadWaitingRoom(_waitingRoomUid);
  });
}

loadDashboard();
</script>

<script>
// PTR refresh
window.onPTRRefresh = function() { location.reload(); };

document.addEventListener('DOMContentLoaded', function() {
  initSidebar('dashboard');
  // زر hamburger
  var btn = document.createElement('button');
  btn.className = 'sb-hamburger';
  btn.id = 'sbHamburgerBtn';
  btn.setAttribute('aria-label', 'القائمة');
  btn.innerHTML = '<span></span><span></span><span></span>';
  btn.onclick = function() { window.sbToggle(); };
  window._sbBtn = btn;
  // Put hamburger next to the title (first inner div), wrapping them in a row.
  // This keeps the layout tidy on mobile where .header stacks vertically.
  var header = document.querySelector('.header');
  if (header) {
    var titleBlock = header.firstElementChild;
    if (titleBlock) {
      var row = document.createElement('div');
      row.className = 'header-title-row';
      // Move titleBlock into row, prepend hamburger
      header.insertBefore(row, titleBlock);
      row.appendChild(btn);
      row.appendChild(titleBlock);
    } else {
      header.insertBefore(btn, header.firstChild);
    }
  }
});
</script>
</body>
</html>
