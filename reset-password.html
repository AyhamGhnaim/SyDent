<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SyDent">
<meta name="theme-color" content="#0a1628">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<title>SyDent — إعادة تعيين كلمة المرور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!--
  Phase Email Part 3b — Reset Password Page
  ─────────────────────────────────────────
  Security model (rule #75):
  • TRUST ONLY the onAuthStateChange event with event === 'PASSWORD_RECOVERY'
  • NEVER fall back to getSession() — that creates a CVE-grade stale-session
    hijack vector if another user was already logged in on this device
  • If PASSWORD_RECOVERY does not fire within 3 seconds, show "invalid link"
  • After updateUser succeeds, signOut({ scope:'local' }) to clear the
    recovery session — user must log in with the new password
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js?v=20260527a61"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg2:#0f2038;--bg3:#132840;
  --border:rgba(46,232,158,0.15);
  --green:#2ee89e;--red:#ef5350;
  --text:#e1f4ee;--text2:#8a9ab5;
}
body{
  font-family:'Cairo',sans-serif;
  background: linear-gradient(135deg, #0a1628 0%, #0f2038 50%, #0a1628 100%);
  color:var(--text);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:20px;
  width:100%;max-width:420px;
  padding:36px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{
  width:64px;height:64px;border-radius:16px;
  background:rgba(46,232,158,0.12);
  border:2px solid rgba(46,232,158,0.35);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;
}
.logo-icon svg{width:36px;height:36px;}
.logo-title{font-size:24px;font-weight:800;color:var(--green);margin-bottom:4px;}
.logo-sub{font-size:13px;color:var(--text2);}
.page-title{
  font-size:18px;font-weight:800;color:var(--text);
  text-align:center;margin-bottom:6px;
}
.page-hint{
  font-size:13px;color:var(--text2);
  line-height:1.6;text-align:center;margin-bottom:20px;
}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;}
.form-group input{
  width:100%;background:var(--bg3);
  border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);
  font-family:'Cairo',sans-serif;font-size:14px;
  outline:none;transition:border-color .2s;direction:rtl;
}
.form-group input:focus{border-color:var(--green);}
.btn-submit{
  width:100%;padding:13px;
  background:var(--green);border:none;color:var(--bg);
  border-radius:10px;
  font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;transition:all .2s;margin-top:10px;
}
.btn-submit:hover{background:#26d48e;}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.btn-secondary{
  width:100%;padding:13px;
  background:transparent;border:1px solid var(--border);
  color:var(--text);border-radius:10px;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;margin-top:10px;display:block;text-decoration:none;text-align:center;
}
.btn-secondary:hover{background:var(--bg3);}
.msg{padding:10px 12px;border-radius:9px;font-size:12px;margin-bottom:14px;display:none;}
.msg.show{display:block;}
.msg.error{background:rgba(239,83,80,0.12);border:1px solid rgba(239,83,80,0.3);color:var(--red);}
.msg.success{background:rgba(46,232,158,0.12);border:1px solid rgba(46,232,158,0.3);color:var(--green);}
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#0a1628;border-radius:50%;
  animation:spin .6s linear infinite;margin-left:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-state{
  text-align:center;padding:30px 0;
}
.loading-state .big-spinner{
  display:inline-block;width:36px;height:36px;
  border:3px solid rgba(46,232,158,0.18);
  border-top-color:var(--green);border-radius:50%;
  animation:spin .8s linear infinite;margin-bottom:14px;
}
.loading-state p{color:var(--text2);font-size:13px;}
.invalid-icon{
  width:56px;height:56px;border-radius:14px;
  background:rgba(239,83,80,0.12);
  border:2px solid rgba(239,83,80,0.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  color:var(--red);
}
.invalid-icon svg{width:32px;height:32px;}
.hidden{display:none;}
/* Password visibility toggle (inherits from supabase-init helpers) */
.pwd-wrap{position:relative;display:block;}
.pwd-wrap > input{padding-inline-end:44px !important;}
.pwd-toggle{
  position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;border-radius:8px;
  color:#8a9ab5;cursor:pointer;padding:0;
  transition:background .15s ease,color .15s ease;
}
.pwd-toggle:hover{background:rgba(255,255,255,0.06);color:#e6ecf5;}
.pwd-toggle:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.pwd-toggle:active{transform:translateY(-50%) scale(0.92);}
.pwd-toggle svg{display:block;width:20px;height:20px;flex-shrink:0;}
</style>
</head>
<body>

<div class="auth-card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 64 72" fill="none" stroke="#2ee89e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8 C14 8 8 10 8 20 C8 30 12 34 14 40 C16 46 16 58 18 64 C19 67 22 68 24 64 C26 60 27 54 32 54 C37 54 38 60 40 64 C42 68 45 67 46 64 C48 58 48 46 50 40 C52 34 56 30 56 20 C56 10 50 8 50 8 C46 6 42 5 32 5 C22 5 18 6 14 8 Z"/></svg></div>
    <div class="logo-title">SyDent</div>
    <div class="logo-sub">إعادة تعيين كلمة المرور</div>
  </div>

  <!-- State 1: Loading (default) — waiting for PASSWORD_RECOVERY event -->
  <div id="stateLoading" class="loading-state">
    <div class="big-spinner"></div>
    <p>جارٍ التحقّق من رابط إعادة التعيين…</p>
  </div>

  <!-- State 2: Ready — show password form -->
  <div id="stateReady" class="hidden">
    <div class="page-title">كلمة مرور جديدة</div>
    <p class="page-hint">أدخل كلمة المرور الجديدة (6 أحرف على الأقل).</p>
    <div id="msg" class="msg"></div>
    <form id="resetForm" onsubmit="doReset(event)">
      <div class="form-group">
        <label for="newPass">كلمة المرور الجديدة</label>
        <input type="password" id="newPass" placeholder="••••••••" autocomplete="new-password" minlength="6" required>
      </div>
      <div class="form-group">
        <label for="confirmPass">تأكيد كلمة المرور</label>
        <input type="password" id="confirmPass" placeholder="••••••••" autocomplete="new-password" minlength="6" required>
      </div>
      <button type="submit" class="btn-submit" id="resetBtn">تحديث كلمة المرور</button>
    </form>
  </div>

  <!-- State 3: Invalid — link expired/missing/already used -->
  <div id="stateInvalid" class="hidden">
    <div class="invalid-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div class="page-title">الرابط غير صالح أو منتهي</div>
    <p class="page-hint">قد يكون رابط إعادة التعيين منتهي الصلاحية أو تم استخدامه مسبقاً. يرجى طلب رابط جديد.</p>
    <a href="auth.html" class="btn-secondary">العودة لتسجيل الدخول</a>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// Phase Email Part 3b — Reset Password Flow (Event-based ONLY)
// ═══════════════════════════════════════════════════════════════════
// Rule #75 strict compliance:
//   1. Listen ONLY for onAuthStateChange with event === 'PASSWORD_RECOVERY'
//   2. NEVER call getSession() to enable the form
//   3. 3-second timeout → show "invalid link" if no event fires
//   4. After update: signOut({ scope:'local' }) then redirect with ?reset=success
//
// Why event-based: the recovery URL fragment carries access_token+refresh_token.
// supabase-js auto-parses these on page load, but if another user was already
// logged in (stale session in localStorage), getSession() would return THEIR
// session and let the wrong user reset another account's password (CVE-grade).
// PASSWORD_RECOVERY event fires only when the recovery flow is genuinely active.

(function(){
  var state = 'loading'; // 'loading' | 'ready' | 'invalid'
  var recoveryReady = false;
  var timeoutId = null;
  var authSub = null;

  function setState(next) {
    state = next;
    var L = document.getElementById('stateLoading');
    var R = document.getElementById('stateReady');
    var I = document.getElementById('stateInvalid');
    L.classList.toggle('hidden', next !== 'loading');
    R.classList.toggle('hidden', next !== 'ready');
    I.classList.toggle('hidden', next !== 'invalid');
    if (next === 'ready') {
      // Focus the password field for keyboard users
      setTimeout(function(){
        try { document.getElementById('newPass').focus(); } catch(e){}
      }, 60);
    }
  }

  function cleanup() {
    if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
    try { if (authSub && authSub.data && authSub.data.subscription) authSub.data.subscription.unsubscribe(); } catch(e){}
    authSub = null;
  }

  function showMsg(text, type) {
    var m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg show ' + type;
  }
  function hideMsg() {
    var m = document.getElementById('msg');
    m.className = 'msg';
    m.textContent = '';
  }

  // ── Wait for supabase client to be available ──────────────────────
  function whenReady(cb) {
    if (window.sb && window.sb.auth) { cb(); return; }
    var tries = 0;
    var iv = setInterval(function(){
      tries++;
      if (window.sb && window.sb.auth) {
        clearInterval(iv);
        cb();
      } else if (tries > 30) {
        // ~3 seconds — give up, declare invalid
        clearInterval(iv);
        setState('invalid');
      }
    }, 100);
  }

  whenReady(function(){
    // Register listener BEFORE any other auth interaction.
    // PASSWORD_RECOVERY fires when supabase-js parses the URL fragment
    // (access_token + refresh_token + type=recovery).
    try {
      authSub = window.sb.auth.onAuthStateChange(function(event, session){
        // Rule #75: trust ONLY this exact event. Ignore SIGNED_IN, TOKEN_REFRESHED, etc.
        if (event === 'PASSWORD_RECOVERY' && session) {
          recoveryReady = true;
          if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
          setState('ready');
        }
      });
    } catch(err) {
      console.warn('[reset-password] onAuthStateChange registration failed:', err);
      setState('invalid');
      return;
    }

    // Fallback timer: if PASSWORD_RECOVERY does not fire within 3 seconds,
    // the link is invalid/expired/refreshed/missing. Show error state.
    // Critical: this is the ONLY path that activates UI without the event.
    // It activates the INVALID state, never the FORM state.
    timeoutId = setTimeout(function(){
      if (!recoveryReady) {
        setState('invalid');
        // Clean up listener — no further state changes expected
        try { if (authSub && authSub.data && authSub.data.subscription) authSub.data.subscription.unsubscribe(); } catch(e){}
        authSub = null;
      }
    }, 3000);
  });

  // ── Submit handler ──────────────────────────────────────────────────
  var _resetInFlight = false;

  window.doReset = async function(e) {
    e.preventDefault();
    if (_resetInFlight) return;
    if (!recoveryReady) {
      // Defense in depth: refuse to submit if recovery event never fired
      setState('invalid');
      return;
    }
    hideMsg();

    var newPass = document.getElementById('newPass').value;
    var confirmPass = document.getElementById('confirmPass').value;

    if (newPass.length < 6) {
      showMsg('كلمة المرور يجب أن تكون 6 أحرف على الأقل.', 'error');
      return;
    }
    if (newPass !== confirmPass) {
      showMsg('كلمتا المرور غير متطابقتين.', 'error');
      return;
    }

    _resetInFlight = true;
    var btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.innerHTML = 'جارٍ التحديث<span class="spinner"></span>';

    try {
      var upd = await window.sb.auth.updateUser({ password: newPass });
      if (upd.error) throw upd.error;

      // Success — clear recovery session locally (rule #75 step 3).
      // scope:'local' clears only this tab's session; user must log in fresh.
      try { await window.sb.auth.signOut({ scope: 'local' }); } catch(e){}

      // Clear listener + timeout before navigating
      cleanup();

      // Redirect to login with success flag
      window.location.replace('auth.html?reset=success');
    } catch (err) {
      console.warn('[reset-password] updateUser failed:', err);
      var msg = (err && err.message) ? err.message : '';
      // Common Supabase error: AAL2 (MFA required) — show clear message
      if (msg.indexOf('AAL2') !== -1 || msg.indexOf('MFA') !== -1) {
        showMsg('هذا الحساب مفعّل عليه التحقّق الثنائي. تواصل مع الدعم لإعادة تعيين كلمة المرور.', 'error');
      } else if (msg.toLowerCase().indexOf('weak') !== -1 || msg.toLowerCase().indexOf('password') !== -1) {
        showMsg('كلمة المرور ضعيفة جداً. جرّب كلمة أطول وأقوى.', 'error');
      } else {
        showMsg('تعذّر تحديث كلمة المرور. حاول مرة أخرى أو اطلب رابطاً جديداً.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'تحديث كلمة المرور';
      _resetInFlight = false;
    }
  };

  // Clean up on page hide (best-effort)
  window.addEventListener('beforeunload', cleanup);
})();
</script>

<!-- Password visibility toggle for both new/confirm password fields -->
<script>
document.addEventListener('DOMContentLoaded', function(){
  if (window.SyDentPwd && window.SyDentPwd.attachAll) {
    window.SyDentPwd.attachAll(['newPass', 'confirmPass']);
  }
});
</script>
</body>
</html>
