<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SyDent">
<meta name="theme-color" content="#f4f7fa">

<link rel="manifest" href="manifest.json">
<title>تقارير الأطباء — SyDent</title>

<script src="theme.js?v=20260617b"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg2:#0f2038;--bg3:#132840;
  --border:rgba(var(--green-rgb),0.15);
  --green:var(--green);--red:#ef5350;--yellow:#f5c842;
  --blue:#63b3ed;--purple:#a78bfa;--orange:#fb923c;
  --text:#e1f4ee;--text2:#8a9ab5;--radius:12px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;gap:12px;
}
.tb-title{font-size:18px;font-weight:800;color:var(--green);}
.tb-sub{font-size:12px;color:var(--text2);margin-top:2px;}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:9px;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;border:none;transition:all .2s;
}
.btn-primary{background:var(--green);color:var(--bg);}
.btn-primary:hover{background:var(--green2);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--green);color:var(--green);}
.btn-sm{padding:7px 14px;font-size:12px;}

.page{padding:24px 28px;max-width:1300px;margin:0 auto;}

/* Filters bar */
.filters-bar{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 18px;
  margin-bottom:20px;
  display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:12px;align-items:end;
}
.filter-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;}
.filter-group input,.filter-group select{
  width:100%;padding:9px 11px;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:13px;
}
.filter-group input:focus,.filter-group select:focus{outline:none;border-color:var(--green);}

/* Quick presets */
.preset-row{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;
}
.preset-btn{
  background:var(--bg2);border:1px solid var(--border);color:var(--text2);
  padding:6px 12px;border-radius:18px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:'Cairo',sans-serif;transition:all .15s;
}
.preset-btn:hover{border-color:var(--green);color:var(--green);}
.preset-btn.active{background:var(--green-dim,rgba(var(--green-rgb),0.12));border-color:var(--green);color:var(--green);}

/* Calc-basis toggle */
.basis-toggle{
  display:flex;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:3px;gap:3px;
  margin-bottom:20px;
}
.basis-btn{
  flex:1;padding:10px 12px;background:transparent;border:none;
  color:var(--text2);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;
  border-radius:7px;cursor:pointer;transition:all .15s;
}
.basis-btn:hover{color:var(--text);}
.basis-btn.active{background:var(--green);color:var(--bg);}
.basis-help{font-size:11px;color:var(--text2);margin-top:8px;font-style:italic;}

/* Summary stats */
.summary-row{
  display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:12px;margin-bottom:24px;
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
}
.stat-card .lbl{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:6px;letter-spacing:.3px;}
.stat-card .val{font-size:22px;font-weight:800;color:var(--text);font-family:'Cairo',sans-serif;}
.stat-card .sub{font-size:11px;color:var(--text2);margin-top:3px;}
.stat-card.green{border-color:rgba(var(--green-rgb),0.35);}
.stat-card.green .val{color:var(--green);}
.stat-card.blue{border-color:rgba(99,179,237,0.35);}
.stat-card.blue .val{color:var(--blue);}
.stat-card.orange{border-color:rgba(251,146,60,0.35);}
.stat-card.orange .val{color:var(--orange);}

/* Provider cards */
.providers-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(380px, 1fr));
  gap:16px;
}
.prov-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.prov-card .color-bar{height:5px;width:100%;}
.prov-body{padding:18px 20px;}
.prov-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.prov-avatar{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;flex-shrink:0;
}
.prov-name{font-size:15px;font-weight:800;color:var(--text);line-height:1.2;}
.prov-role{font-size:11px;color:var(--text2);margin-top:3px;}

.prov-rows{
  background:var(--bg);border-radius:8px;padding:12px 14px;
  border:1px solid rgba(var(--green-rgb),0.06);
  margin-bottom:12px;
}
.prov-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;padding:5px 0;
}
.prov-row .k{color:var(--text2);font-weight:600;}
.prov-row .v{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;}
.prov-row.divider{border-top:1px dashed rgba(var(--green-rgb),0.15);margin-top:4px;padding-top:8px;}

.payout-box{
  background:rgba(var(--green-rgb),0.08);border:1px solid rgba(var(--green-rgb),0.3);
  border-radius:8px;padding:11px 14px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;
}
.payout-box .lbl{font-size:11px;color:var(--text2);font-weight:600;}
.payout-box .amt{font-size:18px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;}

.prov-actions{
  display:flex;gap:6px;flex-wrap:wrap;
}
.prov-actions button{
  flex:1;min-width:calc(50% - 3px);padding:7px;font-size:11px;font-weight:700;
  border-radius:7px;cursor:pointer;font-family:'Cairo',sans-serif;
  border:1px solid var(--border);background:transparent;color:var(--text2);
  transition:all .15s;
}
.prov-actions .btn-details:hover{color:var(--blue);border-color:var(--blue);}
.prov-actions .btn-print:hover{color:var(--green);border-color:var(--green);}
.prov-actions .btn-pay:hover{color:var(--yellow);border-color:var(--yellow);}

/* Details modal & sessions table */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:100;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);width:100%;max-width:1000px;
  max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
}
.modal-box.small{max-width:480px;}
.modal-head{
  padding:16px 20px;background:var(--bg3);
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.modal-head h3{font-size:16px;font-weight:800;color:var(--green);}
.modal-close{
  background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;
  width:32px;height:32px;border-radius:50%;
}
.modal-close:hover{background:var(--bg3);color:var(--red);}
.modal-body{padding:20px;overflow-y:auto;}
.modal-foot{
  padding:14px 20px;background:var(--bg3);
  border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end;
}

.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table thead th{
  background:var(--bg3);color:var(--text2);font-weight:700;
  padding:9px 10px;text-align:right;border-bottom:1px solid var(--border);
  font-size:11px;letter-spacing:.3px;
}
.data-table tbody td{
  padding:9px 10px;border-bottom:1px solid rgba(var(--green-rgb),0.05);
  color:var(--text);
}
.data-table tbody tr:hover{background:rgba(var(--green-rgb),0.03);}
.data-table .num{font-variant-numeric:tabular-nums;text-align:left;}

.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{
  width:100%;padding:10px 12px;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:14px;
}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--green);}

/* Payout history */
.payout-history-item{
  background:var(--bg);border:1px solid rgba(var(--green-rgb),0.08);
  border-radius:8px;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:6px;
  font-size:12px;
}
.payout-history-item .meta{color:var(--text2);}
.payout-history-item .amt{color:var(--green);font-weight:800;font-variant-numeric:tabular-nums;}
.payout-history-item .del-btn{
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:14px;margin-right:8px;opacity:.6;
}
.payout-history-item .del-btn:hover{color:var(--red);opacity:1;}

/* Empty state */
.empty-state{
  background:var(--bg2);border:2px dashed var(--border);
  border-radius:var(--radius);padding:60px 20px;
  text-align:center;color:var(--text2);
}
.empty-state .ic{font-size:48px;margin-bottom:12px;opacity:.6;}
.empty-state .ttl{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--green);
  border-radius:8px;padding:12px 20px;font-size:13px;font-weight:600;
  color:var(--text);z-index:200;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  opacity:0;transition:opacity .25s;pointer-events:none;
}
.toast.show{opacity:1;}

/* Print-only styling for payout slip */
@media print {
  body * { visibility: hidden; }
  #printArea, #printArea * { visibility: visible; }
  #printArea { position: absolute; inset: 0; padding: 30px; }
}

@media (max-width:768px){
  .topbar{padding:12px 16px;flex-wrap:wrap;gap:10px;}
  .page{padding:16px;}
  .providers-grid{grid-template-columns:1fr;}
}
</style>
<!-- Theme system: loads AFTER inline <style> so light-mode :root overrides the dark defaults above. -->

<body>
<div class="main" id="sbMainContent">

<div class="topbar">
  <div>
    <div class="tb-title">📊 تقارير إنتاج الأطباء</div>
    <div class="tb-sub">إنتاج وتحصيلات ومستحقات كل طبيب في العيادة</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-outline btn-sm" onclick="refresh()">🔄 تحديث</button>
  </div>
</div>

<div class="page">

  <!-- Date presets -->
  <div class="preset-row">
    <button class="preset-btn" onclick="setPreset('this_month', event)">هذا الشهر</button>
    <button class="preset-btn" onclick="setPreset('last_month', event)">الشهر الماضي</button>
    <button class="preset-btn" onclick="setPreset('this_week', event)">هذا الأسبوع</button>
    <button class="preset-btn" onclick="setPreset('last_30', event)">آخر 30 يوم</button>
    <button class="preset-btn" onclick="setPreset('this_year', event)">هذه السنة</button>
    <button class="preset-btn" onclick="setPreset('all', event)">كل الفترات</button>
  </div>

  <!-- Filters -->
  <div class="filters-bar">
    <div class="filter-group">
      <label>من تاريخ</label>
      <input type="date" id="fromDate" onchange="clearPresetHighlight(); onFilterChange();">
    </div>
    <div class="filter-group">
      <label>إلى تاريخ</label>
      <input type="date" id="toDate" onchange="clearPresetHighlight(); onFilterChange();">
    </div>
    <div class="filter-group">
      <label>الطبيب</label>
      <select id="providerFilter" onchange="onFilterChange()">
        <option value="all">كل الأطباء النشطين</option>
      </select>
    </div>
    <!-- Phase 6 R (Migration 13): provider_type filter. Lets the owner
         narrow the reports to just doctors, just hygienists, or just
         chair-side assistants. Default 'شامل' preserves current behavior.
         When the migration hasn't run, all rows will still show as
         provider_type='doctor' (from the SELECT fallback in loadAll), so
         filtering to anything other than شامل/أطباء فقط will yield empty
         results — which is the correct outcome on pre-migration installs. -->
    <div class="filter-group">
      <label>نوع المزوّد</label>
      <select id="providerTypeFilter" onchange="onFilterChange()">
        <option value="all">📊 شامل</option>
        <option value="doctor">🦷 أطباء فقط</option>
        <option value="hygienist">🩺 متدربين/مساعدين فقط</option>
        <option value="assistant">🤝 مساعدات كرسي فقط</option>
        <option value="secretary">👩‍💼 سكرتيرات فقط</option>
        <option value="other">👥 موظفون آخرون فقط</option>
      </select>
    </div>
    <div class="filter-group">
      <label>حالة الجلسات</label>
      <select id="statusFilter" onchange="onFilterChange()">
        <option value="completed">المنجزة فقط</option>
        <option value="completed_planned">المنجزة + المخططة</option>
      </select>
    </div>
    <div class="filter-group">
      <label>الأطباء المعطلون</label>
      <select id="inactiveFilter" onchange="onFilterChange()">
        <option value="hide">إخفاء</option>
        <option value="show">إظهار (مع تاريخهم)</option>
      </select>
    </div>
  </div>

  <!-- Calculation basis toggle -->
  <div class="basis-toggle">
    <button class="basis-btn active" data-basis="production" onclick="setBasis('production')">💰 الإنتاج</button>
    <button class="basis-btn" data-basis="net" onclick="setBasis('net')">📉 الصافي (بعد المخبر)</button>
    <button class="basis-btn" data-basis="collection" onclick="setBasis('collection')">💵 التحصيل</button>
  </div>
  <div class="basis-help" id="basisHelp">الإنتاج: نسبة الطبيب تُحسب من إجمالي ما سُجّل، بغض النظر عن المخبر أو التحصيل.</div>

  <!-- Overall summary -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- Provider cards -->
  <div id="provList"></div>

</div>
</div>

<!-- Provider Details Modal -->
<div class="modal-overlay" id="detailsModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="detailsTitle">تفاصيل الجلسات</h3>
      <button class="modal-close" onclick="closeModal('detailsModal')">×</button>
    </div>
    <div class="modal-body" id="detailsBody"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal('detailsModal')">إغلاق</button>
    </div>
  </div>
</div>

<!-- Payout Modal -->
<div class="modal-overlay" id="payoutModal">
  <div class="modal-box small">
    <div class="modal-head">
      <h3 id="payoutTitle">💵 تسجيل دفعة للطبيب</h3>
      <button class="modal-close" onclick="closeModal('payoutModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="payoutProviderId">
      <div class="form-group">
        <label>الطبيب</label>
        <input type="text" id="payoutProviderName" readonly>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="form-group">
          <label>من فترة</label>
          <input type="date" id="payoutFrom">
        </div>
        <div class="form-group">
          <label>إلى فترة</label>
          <input type="date" id="payoutTo">
        </div>
      </div>
      <div class="form-group">
        <label>المبلغ (ل.س) *</label>
        <input type="number" id="payoutAmount" placeholder="مثال: 250000" min="0" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>ملاحظات (اختياري)</label>
        <textarea id="payoutNotes" rows="2" placeholder="مثل: دفعة شهر أيار..."></textarea>
      </div>

      <div style="margin-top:18px;">
        <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;">📜 سجل الدفعات السابقة</div>
        <div id="payoutHistoryList"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="goToFullPayoutsPage()" style="margin-left:auto;">📋 الصفحة الكاملة</button>
      <button class="btn btn-outline" onclick="closeModal('payoutModal')">إلغاء</button>
      <button class="btn btn-primary" onclick="savePayout()">💾 حفظ الدفعة</button>
    </div>
  </div>
</div>

<!-- Print Area (hidden, used for print only) -->
<div id="printArea" style="display:none;"></div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ─── State ───
var currentUser = null;
var doctors = [];           // clinic_doctors
var sessions = [];          // ledger_sessions in date range
var payments = [];          // ledger_payments in date range
var paymentSplits = [];     // payment_splits in date range (Migration 3) — empty on legacy DBs
var splitSessionStatus = {}; // id→status for each session referenced by a split (canonical earned-split rule)
var labOrders = [];         // lab_orders for cost matching
var payouts = [];           // provider_payouts for history
var basis = 'production';   // 'production' | 'net' | 'collection'

// ─── Helpers ───
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Phase 6 X: Provider type prefix helper. Returns the emoji prefix (with
// trailing space) for non-default provider types. Empty string for doctors
// (the default, no prefix needed) and any unknown value (defensive).
function providerTypePrefix(pt) {
  if (pt === 'hygienist') return '🩺 ';
  if (pt === 'assistant') return '🤝 ';
  if (pt === 'secretary') return '👩‍💼 ';
  if (pt === 'other') return '👥 ';
  return '';  // doctor or unknown → no prefix
}

// Phase 3 Feature G: format the "tooth" column for both tooth-based and regional sessions.
// Tooth-based: show the FDI number. Regional: show a compact Arabic label.
var __QLBL_PR = {'UR':'علوي يمين','UL':'علوي يسار','LL':'سفلي يسار','LR':'سفلي يمين'};
var __ALBL_PR = {'U':'الفك العلوي','L':'الفك السفلي'};
function formatSessionToothCell(s) {
  if (s.tooth_num) return escapeHtml(String(s.tooth_num));
  if (s.quadrant && __QLBL_PR[s.quadrant]) return '<span style="font-size:11px;color:var(--text-muted,#8da0bd);">ربع ' + __QLBL_PR[s.quadrant] + '</span>';
  if (s.arch && __ALBL_PR[s.arch]) return '<span style="font-size:11px;color:var(--text-muted,#8da0bd);">' + __ALBL_PR[s.arch] + '</span>';
  return '—';
}

function fmt(n) {
  n = Number(n) || 0;
  return n.toLocaleString('en-US');
}

function fmtSY(n) {
  return fmt(Math.round(Number(n) || 0)) + ' ل.س';
}

function initials(name) {
  if (!name) return '?';
  var parts = String(name).trim().split(/\s+/);
  if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
  return (parts[0].charAt(0) + parts[parts.length-1].charAt(0)).toUpperCase();
}

function toDay(d) {
  d = d || new Date();
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ─── Date presets ───
function setPreset(p, evt) {
  var now = new Date();
  var from, to;
  if (p === 'this_month') {
    from = new Date(now.getFullYear(), now.getMonth(), 1);
    to   = now;
  } else if (p === 'last_month') {
    from = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    to   = new Date(now.getFullYear(), now.getMonth(), 0);
  } else if (p === 'this_week') {
    var dow = now.getDay(); // 0 = Sunday
    from = new Date(now); from.setDate(now.getDate() - dow);
    to = now;
  } else if (p === 'last_30') {
    from = new Date(now); from.setDate(now.getDate() - 30);
    to = now;
  } else if (p === 'this_year') {
    from = new Date(now.getFullYear(), 0, 1);
    to = now;
  } else { // all
    from = new Date(2020, 0, 1);
    to = now;
  }
  document.getElementById('fromDate').value = toDay(from);
  document.getElementById('toDate').value   = toDay(to);

  // visually mark active
  document.querySelectorAll('.preset-btn').forEach(function(b){ b.classList.remove('active'); });
  var e = evt || (typeof event !== 'undefined' ? event : null);
  if (e && e.target) e.target.classList.add('active');

  onFilterChange();
}

// ─── Calc basis ───

  } else if (b === 'net') {

  } else {
    help.textContent = 'التحصيل: نسبة الطبيب تُحسب من المبلغ المُحصَّل فعلاً (بناءً على نصيبه النسبي من إنتاج كل مريض).';

  render();
}

// ─── Load data ───

    return '<option value="' + d.id + '">' + escapeHtml(lbl) + '</option>';

  if (current === 'all' || doctorsForDropdown.find(function(d){ return d.id === current; })) {

  }

  // Phase 4: apply Doctor mode lock BEFORE loadFilteredData to prevent
  // a brief flicker where the doctor would see all providers' data.

  if (window.SyDentLock && window.SyDentLock.isDoctor() && typeof applyDoctorModeFilter === 'function') {

async function loadFilteredData() {
  var from = document.getElementById('fromDate').value;
  var to   = document.getElementById('toDate').value;
  if (!from || !to) return;

  var statusFilter = document.getElementById('statusFilter').value;
  var statusList = statusFilter === 'completed_planned' ? ['completed','planned'] : ['completed'];

  // Load sessions in range
  var sRes = await window.sb.from('ledger_sessions')
    .select('*')
    .eq('doctor_id', currentUser.id)
    .gte('date', from)
    .lte('date', to)
    .in('status', statusList);
  if (sRes.error) {
    console.error('sessions load:', sRes.error);
    // Fallback if status column missing
    var sRes2 = await window.sb.from('ledger_sessions')
      .select('*')
      .eq('doctor_id', currentUser.id)
      .gte('date', from)
      .lte('date', to);
    sessions = sRes2.data || [];
  } else {
    sessions = sRes.data || [];
  }

  // Load payments in range
  var pRes = await window.sb.from('ledger_payments')
    .select('*')
    .eq('doctor_id', currentUser.id)
    .gte('date', from)
    .lte('date', to);
  payments = (pRes.data) || [];

  // Load payment_splits for these payments (Migration 3).
  // Filter by payment_id (the in-range payments we just loaded) — this is more
  // robust than filtering by payment_date because splits could theoretically
  // have a NULL payment_date if a legacy payment was missing one, and we'd
  // rather count it under its parent payment's date than drop it silently.
  // Graceful fallback to empty array on pre-Migration-3 DBs; computeProviderStats
  // automatically falls back to proportional in that case.
  paymentSplits = [];
  if (payments.length) {
    try {
      var paymentIds = payments.map(function(p){ return p.id; });
      var psRes = await window.sb.from('payment_splits')
        .select('payment_id,session_id,provider_id,amount,is_unearned')
        .eq('doctor_id', currentUser.id)
        .in('payment_id', paymentIds);
      if (psRes.error) {
        var msg = (psRes.error.message || '').toLowerCase();
        var missing = psRes.error.code === '42P01' || psRes.error.code === 'PGRST205'
          || msg.indexOf('payment_splits') !== -1;
        if (!missing) console.warn('payment_splits load:', psRes.error);
        // Either missing table or other error — empty array triggers fallback.
      } else {
        paymentSplits = psRes.data || [];
      }
    } catch(e) { console.warn('payment_splits load threw:', e); }
  }
  // Status of every session referenced by a split (for the canonical earned-split rule
  // below — excludes allocations sitting on planned/not-yet-done sessions).
  await loadSplitSessionStatuses();

  // Load all lab_orders (we filter per session by patient+tooth)
  // Use status filter: include only sent/received/checked/delivered (not rejected)
  try {
    var loRes = await window.sb.from('lab_orders')
      .select('id,patient_id,tooth_num,cost,status,date_sent')
      .eq('doctor_id', currentUser.id);
    labOrders = (loRes.data) || [];
  } catch(e) {
    labOrders = [];
  }

  // Load payouts (all-time for history; we filter per provider later)
  try {
    var poRes = await window.sb.from('provider_payouts')
      .select('*')
      .eq('owner_id', currentUser.id)
      .order('paid_at', { ascending: false });
    payouts = (poRes.data) || [];
  } catch(e) {
    payouts = [];
  }

  render();
}

// ─── Lab matching helper (single source of truth) ───
// Match lab_orders to a session by patient + tooth + date proximity (±90 days).
// matchedSet is shared across calls to avoid double-counting one lab_order across
// multiple sessions on the same tooth.
function findMatchingLabOrders(session, matchedSet) {
  if (!session.tooth_num) return [];
  var sessionDate = session.date ? new Date(session.date) : null;
  var windowDays = 90;
  return labOrders.filter(function(lo){
    if (lo.patient_id !== session.patient_id) return false;
    if (lo.tooth_num === null || lo.tooth_num === undefined) return false;
    if (String(lo.tooth_num) !== String(session.tooth_num)) return false;
    if (lo.status === 'rejected') return false;
    if (matchedSet && matchedSet[lo.id]) return false;
    if (sessionDate && lo.date_sent) {
      var loDate = new Date(lo.date_sent);
      // Guard against invalid dates (NaN > 90 is false, which would incorrectly pass)
      if (isNaN(sessionDate.getTime()) || isNaN(loDate.getTime())) return true;
      var diffDays = Math.abs((sessionDate - loDate) / 86400000);
      if (diffDays > windowDays) return false;
    }
    return true;
  });
}

function sumSessionLabCost(session, matchedSet) {
  var matches = findMatchingLabOrders(session, matchedSet);
  var cost = 0;
  matches.forEach(function(lo){
    cost += Number(lo.cost) || 0;
    if (matchedSet) matchedSet[lo.id] = true;
  });
  return cost;
}

// Populate splitSessionStatus for every distinct session_id referenced by the loaded
// splits. Fetched independently of the range-filtered `sessions` array because a split's
// session may be completed-but-out-of-range (must still count as earned) or planned (must
// count as unearned) — neither is reliably present in `sessions`. Chunked to keep the
// PostgREST .in() URL within length limits. Parity with accounting.html.
async function loadSplitSessionStatuses() {
  splitSessionStatus = {};
  var idSet = {};
  for (var i = 0; i < paymentSplits.length; i++) {
    var sid = paymentSplits[i].session_id;
    if (sid) idSet[sid] = true;
  }
  var ids = Object.keys(idSet);
  if (!ids.length) return;
  var CHUNK = 150;
  for (var c = 0; c < ids.length; c += CHUNK) {
    var slice = ids.slice(c, c + CHUNK);
    try {
      var res = await window.sb.from('ledger_sessions')
        .select('id, status')
        .eq('doctor_id', currentUser.id)
        .in('id', slice);
      if (res.error) {
        // On error, leave these ids unmapped → splitIsEarned treats them as NOT-completed
        // (conservative: avoids inflating collection). A pre-Migration-3 DB has no splits anyway.
        var msg = (res.error.message || '').toLowerCase();
        var missing = res.error.code === '42P01' || res.error.code === 'PGRST205' ||
                      msg.indexOf('ledger_sessions') !== -1;
        if (!missing) console.warn('loadSplitSessionStatuses:', res.error);
        continue;
      }
      (res.data || []).forEach(function(row){
        // Legacy sessions with empty/null status fold to 'completed' (system-wide convention).
        splitSessionStatus[row.id] = row.status || 'completed';
      });
    } catch(e) { console.warn('loadSplitSessionStatuses threw:', e); }
  }
}

// Canonical earned-split test (parity with accounting.html / patient-profile.html
// computeFinancials): a split is EARNED collection only when it is not unearned AND it
// sits on a COMPLETED session. Non-unearned splits on planned sessions (or with no
// session_id) are mobile credit — money received for work not yet done — not collected
// revenue. Without this, legacy un-healed prepayments-on-planned-sessions would overstate
// a provider's collection figure relative to the clinic accounting page.
function splitIsEarned(sp) {
  if (!sp || sp.is_unearned) return false;
  return !!sp.session_id && splitSessionStatus[sp.session_id] === 'completed';
}

// ─── Compute provider stats ───
// For a given provider, compute production/lab/net from sessions and
// allocated collection from payments based on provider's share of patient production.
// Optional sharedMatchedSet ensures one lab_order can only be attributed to one
// provider (the first one that matches). When called from render(), pass a shared
// set; when called standalone, pass nothing (uses per-call set).
function computeProviderStats(provId, sharedMatchedSet) {
  // 1. Sessions belonging to this provider
  var provSessions = sessions.filter(function(s){
    if (provId === '_unassigned') return !s.provider_id;
    return s.provider_id === provId;
  });
  var sessionCount = provSessions.length;
  var production = provSessions.reduce(function(sum, s){ return sum + (Number(s.cost) || 0); }, 0);

  // 2. Lab cost: per-procedure matching via helper.
  // If sharedMatchedSet is provided, labs are deduped across providers (each lab
  // can only be attributed once). If not, this provider gets its own set (used
  // by details/print modals where we're focused on a single provider).
  var labCost = 0;
  var matchedLabIds = sharedMatchedSet || {};
  provSessions.forEach(function(s){
    labCost += sumSessionLabCost(s, matchedLabIds);
  });

  var net = production - labCost;

  // 3. Collection allocation.
  // Preferred (Migration 3+): sum payment_splits.amount where provider_id matches.
  // This is exact — each split records the actual amount that flowed to a
  // specific session under a specific provider, computed FIFO when the payment
  // was made. Matches OpenDental's "Daily Payments Report — Show splits by
  // provider separately" semantics.
  // Fallback (legacy / pre-Migration-3 / payments without splits): proportional
  // ratio of patient production. Kept so old payments don't disappear from
  // reports.
  var collection = 0;
  // Build a set of payment_ids that have at least one split, so we know which
  // payments to allocate via splits vs proportional fallback.
  var paymentIdsWithSplits = {};
  for (var k = 0; k < paymentSplits.length; k++) {
    paymentIdsWithSplits[paymentSplits[k].payment_id] = true;
  }
  // Part A — splits-based attribution (exact).
  // Canonical earned-split rule: count a split only if it is earned (not unearned AND on a
  // completed session). Unearned credit and allocations on planned sessions are excluded —
  // matching accounting.html so per-provider collection can't exceed clinic revenue.
  for (var i = 0; i < paymentSplits.length; i++) {
    var sp = paymentSplits[i];
    if (!splitIsEarned(sp)) continue;
    var matchesProv = (provId === '_unassigned')
      ? !sp.provider_id
      : sp.provider_id === provId;
    if (matchesProv) collection += Number(sp.amount) || 0;
  }
  // Part B — proportional fallback for payments without splits (legacy data).
  // Filter payments to only those NOT covered by splits, then apply the old
  // ratio formula on this subset.
  var legacyPayments = payments.filter(function(p){
    return !paymentIdsWithSplits[p.id];
  });
  if (legacyPayments.length) {
    var byPatient = {};
    sessions.forEach(function(s){
      if (!byPatient[s.patient_id]) byPatient[s.patient_id] = { total: 0, provTotal: 0 };
      byPatient[s.patient_id].total += Number(s.cost) || 0;
      if ((provId === '_unassigned' && !s.provider_id) || s.provider_id === provId) {
        byPatient[s.patient_id].provTotal += Number(s.cost) || 0;
      }
    });
    var legacyPaymentsByPatient = {};
    legacyPayments.forEach(function(p){
      legacyPaymentsByPatient[p.patient_id] =
        (legacyPaymentsByPatient[p.patient_id] || 0) + (Number(p.amount) || 0);
    });
    Object.keys(byPatient).forEach(function(pid){
      var rec = byPatient[pid];
      if (rec.total <= 0 || rec.provTotal <= 0) return;
      var ratio = rec.provTotal / rec.total;
      collection += (legacyPaymentsByPatient[pid] || 0) * ratio;
    });
  }

  return {
    sessionCount: sessionCount,
    production: production,
    labCost: labCost,
    net: net,
    collection: collection,
    sessions: provSessions
  };
}

function getShareBase(stats) {
  if (basis === 'net') return stats.net;
  if (basis === 'collection') return stats.collection;
  return stats.production;
}

function computePayout(provider, stats) {
  var sharePct = resolveSharePercent(provider);
  var base = getShareBase(stats);
  return Math.max(0, base * sharePct / 100);
}

// Resolve effective share% for a provider, handling null/empty/invalid values.
// Owner with no share set → 100% (so owner-as-only-doctor still works).
// Non-owner with no share set → 0%.
function resolveSharePercent(provider) {
  var raw = provider.share_percent;
  if (raw === null || raw === undefined || raw === '') {
    return provider.is_owner ? 100 : 0;
  }
  var n = Number(raw);
  if (!isFinite(n)) return provider.is_owner ? 100 : 0;
  return n;
}

// Format share% for display (handles "not set" case)
function formatSharePctDisplay(provider) {
  var raw = provider.share_percent;
  if (raw === null || raw === undefined || raw === '' || !isFinite(Number(raw))) {
    return provider.is_owner ? '100% (افتراضي)' : '— لم تُحدد —';
  }
  return Number(raw) + '%';
}

// ─── Render ───
function render() {
  var providerFilter = document.getElementById('providerFilter').value;
  // Phase 4 + 5: Defense-in-depth — in Doctor mode, force the filter to
  // the logged doctor's id regardless of what the dropdown says. Prevents
  // any race / edge case from leaking other providers' data. Uses the
  // Phase 5 effective doctor id resolver (falls back to employee.doctor_id
  // if LS_DOCTOR_ID is empty — common in Phase 5 employee-locked devices).
  if (window.SyDentLock && window.SyDentLock.isDoctor()) {
    var lockedDid = (typeof window.SyDentLock.getEffectiveDoctorId === 'function')
      ? window.SyDentLock.getEffectiveDoctorId()
      : window.SyDentLock.getDoctorId();
    if (lockedDid) providerFilter = lockedDid;
  }
  var inactiveMode = document.getElementById('inactiveFilter').value; // 'hide' | 'show'
  // Phase 6 R: provider_type filter. 'all' = no filter (current behavior).
  // Otherwise restrict the displayed doctors to the picked type. On
  // pre-migration installs, doctors won't have a provider_type field at all,
  // so we treat undefined as 'doctor' (the legacy default) to keep the
  // 'أطباء فقط' filter useful even before Migration 13 runs.
  var providerTypeFilterEl = document.getElementById('providerTypeFilter');
  var providerTypeFilter = providerTypeFilterEl ? providerTypeFilterEl.value : 'all';
  var visibleDoctors = doctors.filter(function(d){
    // Hide inactive unless explicitly showing them OR they're specifically picked
    if (inactiveMode === 'hide' && d.is_active === false && providerFilter !== d.id) return false;
    if (providerFilter !== 'all' && d.id !== providerFilter) return false;
    if (providerTypeFilter !== 'all') {
      var dType = d.provider_type || 'doctor'; // pre-migration → doctor
      if (dType !== providerTypeFilter) return false;
    }
    return true;
  });

  // Detect unassigned sessions (no provider_id)
  var hasUnassigned = sessions.some(function(s){ return !s.provider_id; });

  if (!visibleDoctors.length && !hasUnassigned) {
    document.getElementById('summaryRow').innerHTML = '';
    document.getElementById('provList').innerHTML =
      '<div class="empty-state"><div class="ic">👨‍⚕️</div>' +
      '<div class="ttl">لا يوجد أطباء بعد</div>' +
      '<div style="margin-top:6px;">أضف أطباء العيادة من صفحة "أطباء العيادة" أولاً.</div></div>';
    return;
  }

  // ─── Summary stats ───
  var totalSessions = sessions.length;
  var totalProduction = sessions.reduce(function(sum, s){ return sum + (Number(s.cost) || 0); }, 0);
  var totalCollection = payments.reduce(function(sum, p){ return sum + (Number(p.amount) || 0); }, 0);

  // Total lab cost across all matched (single global matchedSet)
  var totalLab = 0;
  var globalMatchedSet = {};
  sessions.forEach(function(s){
    totalLab += sumSessionLabCost(s, globalMatchedSet);
  });

  // Total payouts across all visible doctors
  // Use a shared matchedSet so labs are attributed to only one provider total
  var payoutsMatchedSet = {};
  var totalPayouts = 0;
  // Cache provider stats to avoid duplicate work in cards loop below
  var providerStatsCache = {};
  visibleDoctors.forEach(function(d){
    var stats = computeProviderStats(d.id, payoutsMatchedSet);
    providerStatsCache[d.id] = stats;
    totalPayouts += computePayout(d, stats);
  });

  // Doctor mode: show ONLY this doctor's own report (the provider card below).
  // Hide the clinic-wide aggregate summary (sessions/production/lab/collection/
  // payouts) — a doctor-employee must never see other providers' or whole-clinic
  // totals. Data is fetched tenant-wide and scoped client-side, so the summary
  // row would otherwise leak clinic totals. Matches Dentrix/OpenDental provider
  // self-service scoping. Provider card below already shows all of this doctor's
  // own numbers, so no information is lost.
  var summaryEl = document.getElementById('summaryRow');
  if (window.SyDentLock && window.SyDentLock.isDoctor()) {
    summaryEl.innerHTML = '';
    summaryEl.style.display = 'none';
  } else {
    summaryEl.style.display = '';
    summaryEl.innerHTML =
    '<div class="stat-card blue">'
      + '<div class="lbl">عدد الجلسات</div>'
      + '<div class="val">' + fmt(totalSessions) + '</div>'
      + '<div class="sub">في الفترة المحددة</div>'
    + '</div>'
    + '<div class="stat-card green">'
      + '<div class="lbl">إجمالي الإنتاج</div>'
      + '<div class="val">' + fmtSY(totalProduction) + '</div>'
      + '<div class="sub">قيمة كل ما سُجّل</div>'
    + '</div>'
    + '<div class="stat-card orange">'
      + '<div class="lbl">إجمالي المخبر</div>'
      + '<div class="val">' + fmtSY(totalLab) + '</div>'
      + '<div class="sub">من طلبات lab_orders</div>'
    + '</div>'
    + '<div class="stat-card blue">'
      + '<div class="lbl">إجمالي التحصيل</div>'
      + '<div class="val">' + fmtSY(totalCollection) + '</div>'
      + '<div class="sub">المدفوعات في الفترة</div>'
    + '</div>'
    + '<div class="stat-card green">'
      + '<div class="lbl">مستحق الأطباء</div>'
      + '<div class="val">' + fmtSY(totalPayouts) + '</div>'
      + '<div class="sub">حسب الأساس المُختار</div>'
    + '</div>';
  }

  // ─── Provider cards ───
  var html = '<div class="providers-grid">';

  visibleDoctors.forEach(function(d){
    var stats = providerStatsCache[d.id];  // Use cached version with deduped labs
    var payout = computePayout(d, stats);
    var sharePctDisplay = formatSharePctDisplay(d);

    var color = d.color || '#0d8577';
    var basisLabel = basis === 'production' ? 'الإنتاج' : (basis === 'net' ? 'الصافي' : 'التحصيل');
    var baseValue = getShareBase(stats);

    // Payouts paid so far in date range to this provider
    var from = document.getElementById('fromDate').value;
    var to   = document.getElementById('toDate').value;
    var paidInRange = payouts
      .filter(function(po){
        return po.provider_id === d.id
          && po.period_start <= to && po.period_end >= from;
      })
      .reduce(function(sum, po){ return sum + (Number(po.amount) || 0); }, 0);

    var remainingHtml = '';
    if (paidInRange > 0) {
      var remaining = payout - paidInRange;
      remainingHtml = '<div class="prov-row" style="color:' + (remaining > 0 ? 'var(--yellow)' : 'var(--green)') + ';">'
        + '<span class="k">المتبقي بعد المدفوع</span>'
        + '<span class="v">' + fmtSY(remaining) + '</span>'
      + '</div>';
    }

    var avgSessionValue = stats.sessionCount > 0 ? stats.production / stats.sessionCount : 0;
    var collectionRate = stats.production > 0 ? (stats.collection / stats.production * 100) : 0;
    var inactiveBadge = d.is_active === false
      ? ' <span style="display:inline-block;padding:1px 6px;background:rgba(239,83,80,.15);color:var(--red);border-radius:8px;font-size:9px;font-weight:700;">معطل</span>'
      : '';

    html += '<div class="prov-card">'
      + '<div class="color-bar" style="background:' + color + ';"></div>'
      + '<div class="prov-body">'
        + '<div class="prov-head">'
          + '<div class="prov-avatar" style="background:' + color + ';">' + initials(d.name) + '</div>'
          + '<div style="flex:1;">'
            + '<div class="prov-name">'
              + providerTypePrefix(d.provider_type)
              + escapeHtml(d.name) + (d.is_owner ? ' ⭐' : '') + inactiveBadge
            + '</div>'

// ─── Details modal ───
function showDetails(provId) {
  var d = doctors.find(function(x){ return x.id === provId; });
  if (!d) return;
  var stats = computeProviderStats(provId);

  document.getElementById('detailsTitle').textContent = '📋 جلسات د. ' + d.name;

  if (!stats.sessions.length) {
    document.getElementById('detailsBody').innerHTML =
      '<div class="empty-state" style="padding:30px 20px;"><div class="ic">📋</div>' +
      '<div class="ttl">لا توجد جلسات في هذه الفترة</div></div>';
    openModal('detailsModal');
    return;
  }

  // Resolve effective share% via helper (handles null/empty/owner fallback correctly)
  var sharePct = resolveSharePercent(d);

  // Use a shared matchedSet so that across all rows of this provider,
  // each lab_order is only counted once (matches stats display).
  var detailsMatchedSet = {};
  var rows = stats.sessions.slice().sort(function(a,b){
    return (a.date < b.date ? 1 : a.date > b.date ? -1 : 0);
  }).map(function(s){
    // Find matching lab_orders (per-procedure, with date window via helper)
    var sLabCost = sumSessionLabCost(s, detailsMatchedSet);
    var net = (Number(s.cost) || 0) - sLabCost;
    var sessionShare;
    if (basis === 'production') sessionShare = (Number(s.cost) || 0) * sharePct / 100;
    else if (basis === 'net')   sessionShare = net * sharePct / 100;
    else                        sessionShare = '—'; // collection per-session is not meaningful (it's pooled)

    var statusBadge = s.status === 'planned'
      ? '<span style="display:inline-block;padding:1px 6px;background:rgba(245,200,66,0.15);color:var(--yellow);border-radius:8px;font-size:10px;">مخططة</span>'
      : '';

    return '<tr>'
      + '<td>' + escapeHtml(s.date || '—') + '</td>'
      + '<td>' + escapeHtml(s.type || '—') + ' ' + statusBadge + '</td>'
      + '<td>' + formatSessionToothCell(s) + '</td>'
      + '<td class="num">' + fmtSY(s.cost) + '</td>'
      + '<td class="num" style="color:var(--orange);">' + (sLabCost > 0 ? fmtSY(sLabCost) : '—') + '</td>'
      + '<td class="num">' + (basis === 'collection' ? '—' : fmtSY(sessionShare)) + '</td>'
    + '</tr>';
  }).join('');

  var collectionNote = basis === 'collection'
    ? '<div style="background:rgba(99,179,237,0.08);border:1px solid rgba(99,179,237,0.3);padding:10px;border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--blue);">💡 على أساس "التحصيل": لا يمكن تقسيم المدفوعات على جلسات فردية لأنها تُسجّل على مستوى المريض. النصيب من التحصيل يُحسب فقط على مستوى الإجمالي.</div>'
    : '';

  document.getElementById('detailsBody').innerHTML = collectionNote
    + '<table class="data-table">'
      + '<thead><tr>'
        + '<th>التاريخ</th><th>العلاج</th><th>السن</th>'
        + '<th class="num">السعر</th><th class="num">المخبر</th><th class="num">نصيب الطبيب</th>'
      + '</tr></thead>'
      + '<tbody>' + rows + '</tbody>'
    + '</table>';
  openModal('detailsModal');
}

      + '</div>'
      + '<div style="border:1px solid #ccc;padding:10px;border-radius:6px;">'
        + '<div style="font-size:11px;color:#666;">المخبر</div>'

// ─── Payout modal ───
// Payout recording (paying a doctor their share/salary) is an owner-only
// financial action. Non-owners (doctor/secretary device modes) must never
// record, edit, or delete a payout. fail-open: if the lock system isn't
// present at all, treat as owner (single-owner install).
function poIsOwner() {
  return !window.SyDentLock || window.SyDentLock.isOwner();
}

function openPayoutModal(provId) {
  if (!poIsOwner()) { showToast('هذا الإجراء متاح للمالك فقط'); return; }
  var d = doctors.find(function(x){ return x.id === provId; });
  if (!d) return;

  // Calculate current stats and suggested amount (remaining unpaid)
  var stats = computeProviderStats(provId);
  var payout = computePayout(d, stats);
  var from = document.getElementById('fromDate').value;
  var to   = document.getElementById('toDate').value;
  var alreadyPaid = payouts
    .filter(function(po){
      return po.provider_id === d.id
        && po.period_start <= to && po.period_end >= from;
    })
    .reduce(function(sum, po){ return sum + (Number(po.amount) || 0); }, 0);
  var suggested = Math.max(0, payout - alreadyPaid);

  document.getElementById('payoutProviderId').value = d.id;
  document.getElementById('payoutProviderName').value = d.name + (d.is_active === false ? ' (معطل)' : '');
  document.getElementById('payoutFrom').value = from;
  document.getElementById('payoutTo').value = to;
  // Pre-fill with suggested amount (user can edit/clear)
  document.getElementById('payoutAmount').value = suggested > 0 ? Math.round(suggested) : '';
  document.getElementById('payoutAmount').placeholder = 'المقترح: ' + fmtSY(suggested);
  document.getElementById('payoutNotes').value = '';

  renderPayoutHistory(provId);
  openModal('payoutModal');
}

function renderPayoutHistory(provId) {
  var list = payouts.filter(function(po){ return po.provider_id === provId; });
  var el = document.getElementById('payoutHistoryList');
  if (!list.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text2);font-style:italic;text-align:center;padding:12px;">لا توجد دفعات سابقة</div>';
    return;
  }
  el.innerHTML = list.map(function(po){
    return '<div class="payout-history-item">'
      + '<div>'
        + '<div class="amt">' + fmtSY(po.amount) + '</div>'
        + '<div class="meta">' + escapeHtml(po.period_start) + ' ← ' + escapeHtml(po.period_end) + (po.notes ? ' • ' + escapeHtml(po.notes) : '') + '</div>'
      + '</div>'
      + '<button class="del-btn" onclick="deletePayout(\'' + po.id + '\')" title="حذف">🗑️</button>'
    + '</div>';
  }).join('');
}

async function savePayout() {
  if (!poIsOwner()) { showToast('هذا الإجراء متاح للمالك فقط'); return; }
  var provId = document.getElementById('payoutProviderId').value;
  var from   = document.getElementById('payoutFrom').value;
  var to     = document.getElementById('payoutTo').value;
  var amount = parseFloat(document.getElementById('payoutAmount').value);
  var notes  = document.getElementById('payoutNotes').value.trim();

  if (!from || !to) { showToast('⚠️ اختر الفترة'); return; }
  if (!amount || amount <= 0) { showToast('⚠️ أدخل مبلغاً صحيحاً'); return; }

  var payload = {
    owner_id: currentUser.id,
    provider_id: provId,
    period_start: from,
    period_end: to,
    amount: Math.round(amount),
    notes: notes || null
  };

  var res = await window.sb.from('provider_payouts').insert(payload).select().single();
  if (res.error) {
    if (res.error.code === '42P01' || (res.error.message && res.error.message.indexOf('provider_payouts') >= 0)) {
      showToast('⚙️ يجب تشغيل SQL أولاً (جدول provider_payouts)');
    } else {
      showToast('⚠️ فشل الحفظ: ' + res.error.message);
    }
    return;
  }
  if (res.data) payouts.unshift(res.data);
  renderPayoutHistory(provId);
  document.getElementById('payoutAmount').value = '';
  document.getElementById('payoutNotes').value = '';
  showToast('✅ تم تسجيل الدفعة');

  // Phase 7.2: audit log fires from both provider-reports (quick path)
  // and payouts.html (full path). Same action_type, same registry.
  try {
    if (window.logAudit) {
      var doc = doctors.find(function(x){ return x.id === provId; });
      var docName = doc ? doc.name : '—';
      window.logAudit('payout.create', {
        entity_type: 'payout',
        entity_id: res.data ? res.data.id : null,
        description: 'دفعة لـ ' + docName + ' (' + fmtSY(payload.amount) + ')',
        new_value: {
          provider_id: provId,
          provider_name: docName,
          period_start: payload.period_start,
          period_end: payload.period_end,
          amount: payload.amount
        }
      });
    }
  } catch (e) { console.warn('audit log failed:', e); }

  render();  // Refresh provider cards to show paid amount
}

async function deletePayout(id) {
  if (!poIsOwner()) { showToast('هذا الإجراء متاح للمالك فقط'); return; }
  if (!confirm('حذف هذه الدفعة؟')) return;
  // Snapshot for audit BEFORE delete
  var snapshot = payouts.find(function(po){ return po.id === id; });
  var snapDoc  = snapshot ? doctors.find(function(x){ return x.id === snapshot.provider_id; }) : null;
  var snapName = snapDoc ? snapDoc.name : '—';
  var snapAmt  = snapshot ? Number(snapshot.amount) || 0 : 0;

  var res = await window.sb.from('provider_payouts').delete().eq('id', id);
  if (res.error) { showToast('⚠️ فشل الحذف: ' + res.error.message); return; }
  payouts = payouts.filter(function(po){ return po.id !== id; });
  // Find which provider we're showing
  var provId = document.getElementById('payoutProviderId').value;
  renderPayoutHistory(provId);
  showToast('🗑️ تم الحذف');

  // Audit log (fire-and-forget; snapshot from BEFORE the delete)
  try {
    if (window.logAudit) {
      window.logAudit('payout.delete', {
        entity_type: 'payout',
        entity_id: id,
        description: 'حذف دفعة لـ ' + snapName + ' (' + fmtSY(snapAmt) + ')',
        old_value: snapshot || null
      });
    }
  } catch (e) { console.warn('audit log failed:', e); }

  render();
}

// Phase 7.2: redirect to the dedicated payouts page for full breakdown,
// payment-method tracking, and richer filters. provider-reports keeps the
// quick-add modal for in-context speed; the dedicated page is the single
// source of truth for history + audit display.
function goToFullPayoutsPage() {
  var provId = document.getElementById('payoutProviderId').value;
  var from = document.getElementById('payoutFrom').value;
  var to   = document.getElementById('payoutTo').value;
  var qs = [];
  if (provId) qs.push('provider=' + encodeURIComponent(provId));
  if (from)   qs.push('from=' + encodeURIComponent(from));
  if (to)     qs.push('to=' + encodeURIComponent(to));
  window.location.href = 'payouts.html' + (qs.length ? '?' + qs.join('&') : '');
}

// ─── Filter changes ───
async function onFilterChange() {
  // Clear preset highlight when filter changes (any source - manual or preset)
  // This is called *after* setPreset has already applied its highlight, so only clear
  // if no preset button is active or if this came from a non-preset change.
  // We rely on setPreset to re-apply its highlight after this returns.
  // Rebuild the provider dropdown in case inactive filter changed
  rebuildProviderDropdown();
  await loadFilteredData();
}

// Clear preset highlights when user manually edits date inputs
function clearPresetHighlight() {
  document.querySelectorAll('.preset-btn').forEach(function(b){ b.classList.remove('active'); });
}

function rebuildProviderDropdown() {
  var sel = document.getElementById('providerFilter');
  if (!sel) return;
  var current = sel.value || 'all';
  var inactiveMode = document.getElementById('inactiveFilter').value;
  var doctorsForDropdown = doctors.filter(function(d){
    return inactiveMode === 'show' || d.is_active !== false;
  });
  var allLabel = inactiveMode === 'show' ? 'كل الأطباء' : 'كل الأطباء النشطين';
  sel.innerHTML = '<option value="all">' + allLabel + '</option>' + doctorsForDropdown.map(function(d){
    var typePrefix = providerTypePrefix(d.provider_type);
    var lbl = typePrefix + d.name + (d.is_owner ? ' ⭐' : '') + (d.is_active === false ? ' (معطل)' : '');
    return '<option value="' + d.id + '">' + escapeHtml(lbl) + '</option>';
  }).join('');
  if (current === 'all' || doctorsForDropdown.find(function(d){ return d.id === current; })) {
    sel.value = current;
  } else {
    sel.value = 'all';
  }
}

(async function init() {
  initSidebar('provider-reports');

  var user = await window.sbRequireAuth();
  if (!user) return;
  currentUser = user;

  // Phase 4: Lock guard — Owner + Doctor only (Secretary blocked)
  if (window.SyDentLock && !window.SyDentLock.guardPage(['owner', 'doctor'])) return;

  // Default: this month
  var now = new Date();
  var from = new Date(now.getFullYear(), now.getMonth(), 1);
  document.getElementById('fromDate').value = toDay(from);
  document.getElementById('toDate').value   = toDay(now);
  // Mark "this month" preset as active
  document.querySelectorAll('.preset-btn')[0].classList.add('active');

  // Ensure SyDentLock's employee+doctor caches are loaded BEFORE the
  // inactive check — otherwise the check returns false on null cache and
  // the guard silently passes. autoInit preloads these in parallel — await
  // them explicitly here so timing is deterministic.
  if (window.SyDentLock) {
    if (typeof window.SyDentLock.loadEmployees === 'function') {
      try { await window.SyDentLock.loadEmployees(); } catch(e) {}
    }
    if (typeof window.SyDentLock.loadDoctors === 'function') {
      try { await window.SyDentLock.loadDoctors(); } catch(e) {}
    }
  }

  // HARD GUARD: if the locked doctor's employee account is inactive,
  // replace the main content with an empty state BEFORE loadAll runs.
  // The autoInit banner+pill handle the rest of the device-wide UX.
  if (window.SyDentLock && window.SyDentLock.isDoctor()
      && typeof window.SyDentLock.isDoctorAccountInactive === 'function'
      && window.SyDentLock.isDoctorAccountInactive()) {
    var mainEl = document.getElementById('sbMainContent') || document.querySelector('.main');
    if (mainEl) {
      mainEl.innerHTML =
        '<div style="min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;font-family:\'Cairo\',sans-serif;">' +
          '<div style="font-size:72px;line-height:1;margin-bottom:20px;">🔒</div>' +
          '<div style="font-size:20px;font-weight:800;color:#e1f4ee;margin-bottom:12px;">' +
            'تقارير الأطباء غير متاحة' +
          '</div>' +
          '<div style="font-size:13px;color:#8a9ab5;line-height:1.8;max-width:420px;">' +
            'حسابك معطّل من قِبَل صاحب العيادة. ' +
            'الرجاء التواصل معه لإعادة التفعيل.' +
          '</div>' +
          '<a href="index.html" style="margin-top:28px;padding:12px 28px;background:var(--green);border-radius:10px;color:#0a1628;font-size:14px;font-weight:800;text-decoration:none;">' +
            '↩ العودة للصفحة الرئيسية' +
          '</a>' +
        '</div>';
    }
    return;
  }

  await loadAll();

  // Phase 4: Doctor mode auto-filter (lock the provider dropdown to the doctor's own id)
  applyDoctorModeFilter();
})();

// Phase 4: When in Doctor mode, force the provider filter to the doctor's id
// and disable the dropdown. Visible-but-locked pattern (transparency for the
// doctor: "I see why I can't change this — I'm in Doctor mode").
function applyDoctorModeFilter() {
  if (!window.SyDentLock || !window.SyDentLock.isDoctor()) return;
  var sel = document.getElementById('providerFilter');
  if (!sel) return;
  // Phase 5: resolve effective doctor id (LS_DOCTOR_ID or employee.doctor_id)
  var did = (typeof window.SyDentLock.getEffectiveDoctorId === 'function')
    ? window.SyDentLock.getEffectiveDoctorId()
    : window.SyDentLock.getDoctorId();
  if (!did) return;

  // Also lock the inactive filter — in Doctor mode, viewing only your own
  // data means the inactive-doctors toggle is irrelevant + could trigger
  // rebuilds that drop your locked id from the options.
  var inactiveSel = document.getElementById('inactiveFilter');
  if (inactiveSel && !inactiveSel.disabled) {
    inactiveSel.value = 'show'; // always include the doctor's own id in dropdown
    inactiveSel.disabled = true;
    inactiveSel.style.opacity = '0.7';
    inactiveSel.style.cursor = 'not-allowed';
    inactiveSel.title = 'مقفول في وضع الطبيب';
  }

  // Ensure the option exists (in case the filter dropdown was repopulated)
  var hasOpt = false;
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === did) { hasOpt = true; break; }
  }
  if (hasOpt) {
    sel.value = did;
    sel.disabled = true;
    sel.style.opacity = '0.7';
    sel.style.cursor = 'not-allowed';
    sel.title = 'الفلتر مقفول على إنتاجك في وضع الطبيب';
    onFilterChange();
  } else {
    // Doctor id not found in clinic_doctors list (deactivated or deleted).
    // CRITICAL: don't let the doctor see other providers' data. Inject a
    // hidden invalid option so render() finds nothing.
    // The global "حسابك معطّل" banner is shown by supabase-init.js
    // (Phase 4.1 applyInactiveDoctorUI). No need to duplicate it here.
    console.warn('[SyDentLock] Doctor mode: doctor id not in clinic_doctors list — forcing empty state');
    var opt = document.createElement('option');
    opt.value = did;
    opt.textContent = 'حسابك معطّل — لا تظهر بيانات';
    sel.appendChild(opt);
    sel.value = did;
    sel.disabled = true;
    sel.style.opacity = '0.7';
    sel.style.cursor = 'not-allowed';
    sel.title = 'حسابك غير نشط — تواصل مع المالك';
    onFilterChange();
  }
}

async function doLogout() {
  await window.sb.auth.signOut();
  window.location.href = 'auth.html?logged_out=1';
}
window.doLogout = doLogout;

// زر hamburger للـ topbar
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.createElement('button');
  btn.className = 'sb-hamburger';
  btn.id = 'sbHamburgerBtn';
  btn.setAttribute('aria-label', 'القائمة');
  btn.innerHTML = '<span></span><span></span><span></span>';
  btn.onclick = function() { window.sbToggle(); };
  window._sbBtn = btn;
  var topbar = document.querySelector('.topbar');
  if (topbar) topbar.insertBefore(btn, topbar.firstChild);
});
</script>
