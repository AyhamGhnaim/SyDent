      var toothPart = s.tooth_num ? ' • السن ' + s.tooth_num + (s.surface && s.surface !== 'WHOLE' ? '/' + s.surface : '') : '';
      // Phase 3 Feature G: show regional area inline (matches the description field)
      if (!s.tooth_num) {
        var QLBL = {'UR':'الربع العلوي الأيمن','UL':'الربع العلوي الأيسر','LL':'الربع السفلي الأيسر','LR':'الربع السفلي الأيمن'};
        var ALBL = {'U':'الفك العلوي','L':'الفك السفلي'};
        if (s.quadrant && QLBL[s.quadrant]) toothPart = ' • ' + QLBL[s.quadrant];
        else if (s.arch && ALBL[s.arch]) toothPart = ' • ' + ALBL[s.arch];
      }
      html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;">'
        + '<div style="flex:1;min-width:140px;font-size:13px;color:var(--text);">' + escapeHtml(s.type || s.description || 'علاج') + toothPart + '</div>'
        + '<div style="font-size:12px;color:var(--text2);">' + fmtCost(s.cost) + ' ل.س</div>'
        + statusBadge
        + '<button type="button" onclick="unlinkSessionFromAppt(\'' + s.id + '\')" style="background:transparent;border:1px solid rgba(239,83,80,0.4);color:#ef5350;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:11px;" title="فصل عن الموعد">✕</button>'
        + '</div>';
    });
    listEl.innerHTML = html;
    var totalC = attached.reduce(function(s,x){ return s + (parseFloat(x.cost)||0); }, 0);
    var plannedC = attached.filter(function(x){ return x.status === 'planned'; }).length;
    var completedC = attached.filter(function(x){ return x.status === 'completed'; }).length;
    statsEl.textContent = attached.length + ' علاج • ' + fmtCost(totalC) + ' ل.س • مخطّط ' + plannedC + ' / منجز ' + completedC;
    completeBtn.style.display = plannedC > 0 ? 'block' : 'none';
  } else {
    listEl.innerHTML = '<div style="padding:8px;color:var(--text2);font-size:12px;text-align:center;">لا توجد علاجات مرتبطة بهذا الموعد بعد</div>';
    statsEl.textContent = '';
    completeBtn.style.display = 'none';
  }

  // Planned sessions dropdown (unattached, same patient)
  // Phase 6 L bugfix: legacy appointments saved before patient_id became
  // standard have patient_id=null but a valid patient_name. Backfill from
  // the in-memory cache so the planned-procedure picker works on them too.
  // No DB write here — just the in-memory resolution. The next save of this
  // appointment will persist patient_id (the main save flow already resolves
  // by name when patient_id is null).
  var pid = appt.patient_id;
  if (!pid && appt.patient_name) {
    var cached = patientsCache['__name__' + appt.patient_name];
    if (cached && cached.id) pid = cached.id;
  }
  var planned = pid ? (plannedSessionsByPatient[pid] || []) : [];
  selEl.innerHTML = '';
  if (!pid) {
    var opt = document.createElement('option');
    opt.value = '';
    opt.textContent = '— لم يتم العثور على مريض مرتبط بهذا الموعد —';
    selEl.appendChild(opt);
    addBtn.disabled = true;
    addBtn.style.opacity = '0.4';
    return;
  }
  if (!planned.length) {
    var opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = '— لا توجد علاجات مخطّطة غير مرتبطة لهذا المريض —';
    selEl.appendChild(opt0);
    addBtn.disabled = true;
    addBtn.style.opacity = '0.4';
    return;
  }
  var placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '— اختر علاجاً مخطّطاً —';
  selEl.appendChild(placeholder);
  planned.forEach(function(s){
    // Phase 3 Feature G: dropdown for attaching planned procedures to an appointment
    // — show region info instead of tooth number for regional sessions
    var toothPart;
    if (s.tooth_num) {
      toothPart = ' (سن ' + s.tooth_num + ')';
    } else if (s.quadrant) {
      var QLBL2 = {'UR':'الربع العلوي الأيمن','UL':'الربع العلوي الأيسر','LL':'الربع السفلي الأيسر','LR':'الربع السفلي الأيمن'};
      toothPart = ' (' + (QLBL2[s.quadrant] || s.quadrant) + ')';
    } else if (s.arch) {
      var ALBL2 = {'U':'الفك العلوي','L':'الفك السفلي'};
      toothPart = ' (' + (ALBL2[s.arch] || s.arch) + ')';
    } else {
      toothPart = '';
    }
    var opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = (s.type || s.description || 'علاج') + toothPart + ' — ' + fmtCost(s.cost) + ' ل.س';
    selEl.appendChild(opt);
  });
  addBtn.disabled = false;
  addBtn.style.opacity = '1';
}

/* Render lab orders linked to the currently-edited appointment (read-only). */
function renderApptLabOrders(appt) {
  var section = document.getElementById('apptLabSection');
  var listEl  = document.getElementById('apptLabList');
  if (!section || !listEl) return;
  var orders = (appt && appt.id) ? (labOrdersByAppt[appt.id] || []) : [];
  if (!orders.length) {
    section.style.display = 'none';
    listEl.innerHTML = '';
    return;
  }
  section.style.display = 'block';
  var apptDate = appt.date ? String(appt.date).slice(0,10) : '';
  var html = '';
  orders.forEach(function(o){
    var statusAr  = '—';
    var statusBg  = 'rgba(255,255,255,0.06)';
    var statusCol = 'var(--text2)';
    if (o.status === 'sent')     { statusAr = 'تم التسليم للمخبر';    statusBg = 'rgba(99,179,237,0.15)';  statusCol = '#63b3ed'; }
    else if (o.status === 'received')  { statusAr = 'تم الاستلام من المخبر'; statusBg = 'rgba(245,200,66,0.15)';  statusCol = '#f5c842'; }
    else if (o.status === 'checked')   { statusAr = 'تم الفحص';              statusBg = 'rgba(46,232,158,0.15)';  statusCol = '#2ee89e'; }

    // Late tag only applies when work hasn't physically arrived yet (status='sent').
    // Once received/checked, the lab work is at the clinic — no point warning "late".
    // Direct-linked orders without an explicit date_due become late once the
    // appointment day has arrived (the user tied this work to that visit).
    // Use local-time dateStr so the "today" boundary matches the user's clock.
    var atRisk = (o.status === 'sent');
    var todayStr = dateStr(new Date());
    var late;
    if (!atRisk) {
      late = false;
    } else if (o.date_due) {
      late = (apptDate && o.date_due.slice(0,10) <= apptDate);
    } else {
      // Direct-linked (this list is always direct) without explicit due → late once appt day arrives.
      late = (apptDate && apptDate <= todayStr);
    }
    var lateTag = late ? '<span style="background:rgba(239,83,80,0.15);color:#ef5350;border:1px solid rgba(239,83,80,0.4);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">⚠️ متأخر</span>' : '';

    var toothPart = o.tooth_num ? ' • السن ' + o.tooth_num : '';
    var dueDate   = o.date_due ? new Date(o.date_due).toLocaleDateString('ar-SY', { year:'numeric', month:'short', day:'numeric' }) : '—';
    var labLabel  = o.lab_name || '—';

    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;">'
      + '<div style="flex:1;min-width:160px;font-size:13px;color:var(--text);">' + escapeHtml(o.work_type || 'طلب مخبر') + toothPart + '</div>'
      + '<div style="font-size:11px;color:var(--text2);">المخبر: ' + escapeHtml(labLabel) + '</div>'
      + '<div style="font-size:11px;color:var(--text2);">استحقاق: ' + dueDate + '</div>'
      + lateTag
      + '<span style="background:' + statusBg + ';color:' + statusCol + ';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">' + statusAr + '</span>'
      + '</div>';
  });
  listEl.innerHTML = html;
}

/* Attach a planned session to the currently-open appointment. */
async function attachPlannedToAppt() {
  if (!editingId) { showToast('⚠️ احفظ الموعد أولاً'); return; }
  var sel = document.getElementById('addPlannedSelect');
  var sessId = sel ? sel.value : '';
  if (!sessId) { showToast('⚠️ اختر علاجاً'); return; }
  const { error } = await window.sb.from('ledger_sessions')
    .update({ appointment_id: editingId })
    .eq('id', sessId).eq('doctor_id', currentUser.id);
  if (error) { showToast('❌ خطأ في الربط: ' + error.message); return; }
  showToast('✅ تم ربط العلاج بالموعد');
  await loadAppointments();
  var appt = appointments.find(function(a){ return a.id === editingId; });
  if (appt) renderApptProcedures(appt);
}

/* Unlink a session from an appointment (sets appointment_id = NULL). */
async function unlinkSessionFromAppt(sessId) {
  if (!confirm('فصل هذا العلاج عن الموعد؟ (لن يُحذف العلاج نفسه)')) return;
  const { error } = await window.sb.from('ledger_sessions')
    .update({ appointment_id: null })
    .eq('id', sessId).eq('doctor_id', currentUser.id);
  if (error) { showToast('❌ خطأ في الفصل: ' + error.message); return; }
  showToast('✅ تم فصل العلاج عن الموعد');
  await loadAppointments();
  var appt = appointments.find(function(a){ return a.id === editingId; });
  if (appt) renderApptProcedures(appt);
}

/* Set Complete: convert all planned attached procedures (+ their teeth_status rows)
   to completed and set the appointment status to 'completed' (Gap 1).
   Gap 2: warn before completing if any attached procedure has a provider that
   doesn't match the appointment's provider, with three choices:
     - Proceed as-is  (keep each procedure's own provider)
     - Unify          (rewrite all attached procedures to the appointment's provider)
     - Cancel         (do nothing)
   Mirrors OpenDental: "If the appointment provider does not match the provider on
   at least one attached procedure, there is a prompt." */
async function completeApptWithProcedures() {
  if (!editingId) return;
  // Phase 4.1: defense-in-depth — block production-creating ops if locked doctor is inactive
  if (window.SyDentLock && window.SyDentLock.isDoctorAccountInactive && window.SyDentLock.isDoctorAccountInactive()) {
    showToast('🔒 حسابك غير نشط — لا يمكن إكمال المواعيد');
    return;
  }
  // Gap 7: Set Complete is meaningless on a planned appointment — it has no
  // date, no time, no chair-side reality. Force the user to schedule it first.
  var _curAppt = appointments.find(function(a){ return a.id === editingId; });
  if (_curAppt && isPlannedAppt(_curAppt)) {
    showToast('⚠️ يجب جدولة الموعد أولاً قبل إكماله');
    return;
  }
  var attached = sessionsByAppt[editingId] || [];
  var plannedOnes = attached.filter(function(s){ return s.status === 'planned'; });
  if (!plannedOnes.length) { showToast('⚠️ لا توجد علاجات مخطّطة'); return; }

  // Guard: refuse to silently flip a no_show / cancelled / (legacy) broken
  // appointment to 'completed'. If the doctor reached this button on such
  // an appointment, it's almost certainly a misclick — confirm explicitly
  // before overriding. The fee button (💸) is the intended workflow for
  // no_show; Set Complete is for visits that actually happened.
  // 'broken' is kept in the check for backward compatibility with any
  // legacy appointments still marked that way (UI no longer offers it).
  if (_curAppt && (_curAppt.status === 'no_show' || _curAppt.status === 'broken' || _curAppt.status === 'cancelled')) {
    var statusLabelMap = { no_show: 'عدم حضور', broken: 'عدم حضور (قديم)', cancelled: 'ملغى' };
    var lbl = statusLabelMap[_curAppt.status] || _curAppt.status;
    var overrideMsg = '⚠️ هذا الموعد محدّد حالياً كـ "' + lbl + '".\n\n'
                    + 'هل تريد فعلاً تحويله إلى "مكتمل" وإكمال العلاجات المخطّطة؟\n\n'
                    + '• موافق → تحويل الحالة + إكمال العلاجات\n'
                    + '• إلغاء → إبقاء الموعد كما هو';
    if (!confirm(overrideMsg)) return;
  }

  // ── Gap 2: provider-mismatch check ────────────────────────────────────────
  // The appointment's provider is the source of truth. Only flag mismatches
  // when the procedure has an explicit provider that differs (NULL means
  // "use the appointment's provider" → not a mismatch).
  var apptObj = appointments.find(function(a){ return a.id === editingId; });
  var apptProviderId = apptObj ? (apptObj.provider_id || null) : null;
  var mismatched = plannedOnes.filter(function(s){
    return s.provider_id && apptProviderId && s.provider_id !== apptProviderId;
  });
  var unifyProviders = false;  // becomes true if user picks "Unify"

  if (mismatched.length > 0) {
    var apptProvName = '—';
    if (apptProviderId) {
      var ap = CLINIC_DOCTORS.find(function(d){ return d.id === apptProviderId; });
      if (ap) apptProvName = ap.name;
    } else {
      apptProvName = '(لا يوجد طبيب على الموعد)';
    }
    // OK = unify everything to the appointment provider (the safe default).
    // Cancel = open the manual choice prompt: proceed as-is or abort.
    var msg = '⚠️ تنبيه: ' + mismatched.length + ' من العلاجات المرفقة مسجّلة لطبيب مختلف عن طبيب الموعد.\n\n'
            + 'طبيب الموعد: ' + apptProvName + '\n\n'
            + 'هل تريد توحيد كل العلاجات لطبيب الموعد؟\n\n'
            + '• موافق  → توحيد لطبيب الموعد\n'
            + '• إلغاء → خيارات أخرى (متابعة كما هو / إلغاء العملية)';
    if (confirm(msg)) {
      unifyProviders = true;
    } else {
      // Second prompt — OK = proceed as-is, Cancel = abort entirely.
      var msg2 = 'متابعة الإكمال مع احتفاظ كل علاج بطبيبه الحالي؟\n\n'
               + '• موافق  → متابعة كما هو\n'
               + '• إلغاء → إلغاء العملية';
      if (!confirm(msg2)) {
        return;  // user aborted
      }
      // else: proceed as-is
    }
  }

  // Build confirmation message that also mentions lab orders that will be auto-completed.
  var linkedLabsForPrompt = (labOrdersByAppt[editingId] || []).filter(function(o){
    return o.status === 'sent' || o.status === 'received' || o.status === 'checked';
  });
  var promptMsg = 'إكمال ' + plannedOnes.length + ' علاج مخطّط دفعة واحدة؟';
  if (unifyProviders) {
    promptMsg += '\n\nسيتم أيضاً توحيد طبيب جميع العلاجات لطبيب الموعد.';
  }
  if (linkedLabsForPrompt.length) {
    promptMsg += '\n\nسيتم أيضاً تسجيل ' + linkedLabsForPrompt.length + ' طلب مخبر كـ "تم التركيب".';
  }
  if (!confirm(promptMsg)) return;

  var btn = document.getElementById('completeApptBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'جارٍ الإكمال…'; }

  var failed = 0;
  for (var i=0; i<plannedOnes.length; i++) {
    var s = plannedOnes[i];
    // 1) update session — also rewrite provider_id when unifying.
    var sessPatch = { status: 'completed' };
    if (unifyProviders && apptProviderId) sessPatch.provider_id = apptProviderId;
    var u1 = await window.sb.from('ledger_sessions')
      .update(sessPatch)
      .eq('id', s.id).eq('doctor_id', currentUser.id);
    if (u1.error) { failed++; console.error('session complete err:', u1.error); continue; }
    // 2) update matching teeth_status row(s) — only if session has tooth_num
    if (s.tooth_num) {
      var teethPatch = { status: 'completed' };
      if (unifyProviders && apptProviderId) teethPatch.provider_id = apptProviderId;
      var q = window.sb.from('teeth_status').update(teethPatch)
        .eq('doctor_id', currentUser.id)
        .eq('patient_id', s.patient_id)
        .eq('tooth_num', String(s.tooth_num))
        .eq('status', 'planned');
      if (s.surface) q = q.eq('surface', s.surface);
      var u2 = await q;
      if (u2.error) console.warn('teeth_status complete warn:', u2.error);
    }
  }

  // 3) Mark appointment as 'completed' (Gap 1).
  //    If the DB constraint hasn't been migrated yet, the UPDATE will fail —
  //    fall back to 'confirmed' so the rest of the workflow keeps working.
  var u3 = await window.sb.from('appointments')
    .update({ status: 'completed' })
    .eq('id', editingId).eq('doctor_id', currentUser.id);
  var migrationMissing = false;
  if (u3.error) {
    // 23514 = check_violation (PostgreSQL); also handle the generic message.
    var errMsg = (u3.error.message || '') + ' ' + (u3.error.code || '');
    if (/check constraint|23514|appointments_status_check/i.test(errMsg)) {
      migrationMissing = true;
      console.warn("appointments.status='completed' rejected — falling back to 'confirmed'. Run Migration: ALTER TABLE appointments DROP CONSTRAINT appointments_status_check; ALTER TABLE appointments ADD CONSTRAINT appointments_status_check CHECK (status IN ('scheduled','confirmed','pending','completed','cancelled','broken','no_show'));");
      var u3b = await window.sb.from('appointments')
        .update({ status: 'confirmed' })
        .eq('id', editingId).eq('doctor_id', currentUser.id);
      if (u3b.error) console.warn('appt update fallback warn:', u3b.error);
    } else {
      console.warn('appt update warn:', u3.error);
    }
  }

  // 4) OpenDental-style: when an appointment is set complete, the lab cases attached
  //    to it are also marked complete (delivered). If any of them are still in
  //    'sent' or 'received' or 'checked' status, advance them to 'delivered' since
  //    the patient is leaving the chair with the work done.
  //    We use the same column names labs.html already writes (date_delivered) and
  //    guard against missing column / missing migration silently.
  var linkedLabs = labOrdersByAppt[editingId] || [];
  var labFailed = 0;
  var labUpdated = 0;
  for (var k=0; k<linkedLabs.length; k++) {
    var lo = linkedLabs[k];
    if (lo.status === 'sent' || lo.status === 'received' || lo.status === 'checked') {
      try {
        var labRes = await window.sb.from('lab_orders')
          .update({ status: 'delivered', date_delivered: new Date().toISOString() })
          .eq('id', lo.id).eq('doctor_id', currentUser.id);
        if (labRes.error) { labFailed++; console.warn('auto-complete lab order err:', labRes.error); }
        else labUpdated++;
      } catch(e) { labFailed++; console.warn('auto-complete linked lab order:', e); }
    }
  }

  // Build a complete summary that covers both sessions and labs, success and failure.
  var parts = [];
  if (failed === 0) {
    parts.push('تم إكمال ' + plannedOnes.length + ' علاج');
  } else {
    parts.push('اكتمل ' + (plannedOnes.length - failed) + ' من ' + plannedOnes.length + ' علاج');
  }
  if (labUpdated > 0) parts.push(labUpdated + ' طلب مخبر');
  if (labFailed > 0)  parts.push('تعذّر تحديث ' + labFailed + ' طلب مخبر');
  if (migrationMissing) parts.push('حالة الموعد محفوظة كـ "مؤكد" (يلزم ترقية قاعدة البيانات)');
  var icon = (failed === 0 && labFailed === 0 && !migrationMissing) ? '✅' : '⚠️';
  showToast(icon + ' ' + parts.join(' • '));

  // Phase 5: audit log (bulk completion is a major workflow event — converts N planned
  // sessions to completed in one click, plus appointment status + linked labs. We use
  // appointment.bulk_complete to distinguish from a single appointment.status_change.)
  if (window.logAudit) {
    var pname = '';
    var apptObjForAudit = appointments.find(function(a){ return a.id === editingId; });
    var pid = apptObjForAudit ? apptObjForAudit.patient_id : null;
    try {
      if (pid && patientsCache && patientsCache[pid]) pname = patientsCache[pid].name || '';
    } catch (e) {}
    window.logAudit('appointment.bulk_complete', {
      entityId: editingId,
      patientId: pid,
      patientName: pname,
      description: 'إكمال موعد جماعي: ' + (plannedOnes.length - failed) + '/' + plannedOnes.length + ' علاج'
                   + (labUpdated ? ' + ' + labUpdated + ' طلب مخبر' : '')
                   + (unifyProviders ? ' (مع توحيد الأطباء)' : ''),
      oldValue: { sessions_planned: plannedOnes.length, appointment_status: apptObjForAudit ? apptObjForAudit.status : null },
      newValue: { sessions_completed: plannedOnes.length - failed, sessions_failed: failed, labs_completed: labUpdated, labs_failed: labFailed, unified_providers: unifyProviders, new_status: migrationMissing ? 'confirmed' : 'completed' }
    });
  }

  await loadAppointments();
  var appt = appointments.find(function(a){ return a.id === editingId; });
  if (appt) {
    renderApptProcedures(appt);
    renderApptLabOrders(appt);
    document.getElementById('fStatus').value = appt.status;
  }
  if (btn) { btn.disabled = false; btn.textContent = '✅ إكمال الموعد + كل العلاجات المخطّطة'; }
}

// ─── Gap 5: explicit "Apply No-Show Fee" button handler ──────────────────────
// Surfaces the no-show fee prompt as a dedicated button so the doctor can
// trigger it any time the appointment is already saved as no_show — not only
// during the status-change transition inside saveAppt.
// Same flow as the auto-prompt in saveAppt:
//   step 1: confirm to apply (or skip)
//   step 2: optional reason text
// On success the fee is inserted and the button hides itself.
async function applyNoShowFeeFromModal() {
  if (!editingId) return;
  var appt = appointments.find(function(a){ return a.id === editingId; });
  if (!appt) { showToast('⚠️ تعذّر العثور على الموعد'); return; }

  // Guard: must be no_show (or legacy 'broken' which we treat as equivalent).
  // The button only renders in this case but a stale DOM could theoretically
  // still fire — keep the check.
  if (appt.status !== 'no_show' && appt.status !== 'broken') {
    showToast('⚠️ هذا الإجراء متاح فقط لمواعيد "عدم حضور"');
    return;
  }
  if (!appt.patient_id) {
    showToast('⚠️ لا يمكن تطبيق الرسم — الموعد بلا مريض مسجّل');
    return;
  }

  // Re-check everything against DB (settings + already-applied) since the
  // user might have changed things in another tab since the modal opened.
  var feeCfg = await getNoShowFeeConfig();
  if (!feeCfg.enabled || feeCfg.amount <= 0) {
    showToast('⚠️ رسم "عدم الحضور" غير مفعّل في الإعدادات');
    return;
  }
  var alreadyApplied = await noShowFeeAlreadyApplied(editingId);
  if (alreadyApplied) {
    showToast('ℹ️ الرسم مُطبَّق على هذا الموعد مسبقاً');
    var bn = document.getElementById('noShowFeeBtn');
    if (bn) bn.style.display = 'none';
    return;
  }

  var msg = '🚫 تطبيق رسم عدم الحضور؟\n\n'
          + 'المريض: ' + (appt.patient_name || '—') + '\n'
          + 'المبلغ: ' + feeCfg.amount.toLocaleString('en-US') + ' ل.س\n\n'
          + '• موافق → تطبيق الرسم\n'
          + '• إلغاء → عدم التطبيق';
  if (!confirm(msg)) return;
  var reason = prompt('سبب عدم الحضور (اختياري):', '') || '';

  // Guard: the user may have closed this modal during the confirm/prompt
  // dialogs (esc, click outside, or opened another appointment). If so,
  // bail out — we don't want to silently apply a fee to a different appt.
  if (editingId !== appt.id) {
    console.info('No-show fee canceled — modal switched during prompt.');
    return;
  }

  var btn = document.getElementById('noShowFeeBtn');
  var originalText = '';
  if (btn) {
    originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'جارٍ تطبيق الرسم…';
  }

  var ok = await applyNoShowFee({
    patientId:  appt.patient_id,
    providerId: appt.provider_id || null,
    amount:     feeCfg.amount,
    reason:     reason,
    apptId:     editingId,
    apptDate:   appt.date
  });

  if (btn) { btn.disabled = false; btn.textContent = originalText; }
  if (ok) {
    showToast('✅ تم تطبيق رسم عدم الحضور');
    if (btn) btn.style.display = 'none';  // hide so the doctor can't double-apply
  }
  // On failure applyNoShowFee already showed an error toast; leave the
  // button visible so the user can retry.
}

// Show/hide the no-show fee button based on the currently-loaded appointment.
// Called from editAppt() right after the modal fields are populated.
// Conditions (all must be true to show):
//   1. appt.status === 'no_show'
//   2. appt has a patient_id
//   3. clinic settings: no-show fee enabled with amount > 0
//   4. no existing no-show fee session linked to this appointment
// Show/hide the no-show fee button based on the currently-loaded appointment.
// Called from editAppt() right after the modal fields are populated.
// Conditions (all must be true to show):
//   1. appt.status === 'no_show'
//   2. appt has a patient_id
//   3. clinic settings: no-show fee enabled with amount > 0
//   4. no existing no-show fee session linked to this appointment
// Stale-update guard: by the time the async checks finish, the user might
// have closed this modal and opened another appointment. We compare appt.id
// to editingId before touching the DOM so a slow DB call can't leak the
// button into a different appointment's modal.
async function updateNoShowFeeBtnVisibility(appt) {
  var btn = document.getElementById('noShowFeeBtn');
  if (!btn) return;
  btn.style.display = 'none';  // safe default
  // Treat legacy 'broken' as 'no_show' (Phase 2C reverted — both map to the
  // same "عدم حضور" concept in the UI now).
  var st = appt && appt.status;
  var isAbsence = (st === 'no_show' || st === 'broken');
  if (!appt || !isAbsence || !appt.patient_id) return;
  try {
    var feeCfg = await getNoShowFeeConfig();
    // Guard: editingId may have changed while we awaited the DB.
    if (editingId !== appt.id) return;
    if (!feeCfg.enabled || feeCfg.amount <= 0) return;
    var alreadyApplied = await noShowFeeAlreadyApplied(appt.id);
    if (editingId !== appt.id) return;  // re-check after second await
    if (alreadyApplied) return;
    // Update label with the amount so the doctor sees the cost up-front
    btn.textContent = '💸 تطبيق رسم عدم الحضور (' + feeCfg.amount.toLocaleString('en-US') + ' ل.س)';
    btn.style.display = 'block';
  } catch (e) {
    console.warn('updateNoShowFeeBtnVisibility:', e);
  }
}

// حذف الموعد من داخل المودال
async function deleteApptFromModal() {
  if (!editingId) return;
  // Phase 4.1: defense-in-depth — block destructive ops if locked doctor is inactive
  if (window.SyDentLock && window.SyDentLock.isDoctorAccountInactive && window.SyDentLock.isDoctorAccountInactive()) {
    showToast('🔒 حسابك غير نشط — لا يمكن حذف المواعيد');
    return;
  }
  if (!confirm('هل أنت متأكد من حذف هذا الموعد؟')) return;
  const { error } = await window.sb.from('appointments').delete()
    .eq('id', editingId).eq('doctor_id', currentUser.id);
  if (error) { showToast('❌ خطأ في الحذف'); return; }
  closeModal();
  showToast('🗑️ تم حذف الموعد');
  await loadAppointments();
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {

});

function selectColor(c, el) {

function updateColorPreview() {

}

async function submitAppt(e) {
  e.preventDefault();
  // Phase 4.1: defense-in-depth — block if locked doctor is inactive
  if (window.SyDentLock && window.SyDentLock.isDoctorAccountInactive && window.SyDentLock.isDoctorAccountInactive()) {
    showToast('🔒 حسابك غير نشط — لا يمكن حفظ المواعيد');
    return;
  }
  var typeVal   = document.getElementById('fType').value;
  var _t        = getTreatment(typeVal);
  var typeName  = _t ? _t.name : (typeVal === '_other' ? 'أخرى' : typeVal);
  const apptColor  = _t ? _t.fill   : '#2ee89e';
  const apptStroke = _t ? _t.stroke : '#1fba7e';

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'جارٍ الحفظ…';

  // Gap 7: read planned flag once (used throughout this function)
  var plannedChk = document.getElementById('fIsPlanned');
  var isPlannedNow = !!(plannedChk && plannedChk.checked);

  var providerSel = document.getElementById('fProvider');
  var providerId = (providerSel && providerSel.value) ? providerSel.value : getDefaultProviderId(CLINIC_DOCTORS);
  // Phase 6 K (Migration 12): capture optional operatory selection. Empty
  // string → null (the picker has a "— بدون تخصيص —" option). When the
  // operatories table/column is missing on legacy installations, we still
  // include the field — the graceful retry block below will strip it on
  // 42703 errors so the appointment still saves.
  var operatorySel = document.getElementById('fOperatory');
  var operatoryId = (operatorySel && operatorySel.value) ? operatorySel.value : null;

  var patientName = document.getElementById('fPatient').value.trim();

  // Lookup patient_id from name (so newer features that rely on it work).
  // If not found, leave patient_id null — older flow still works.
  var patientId = null;
  if (patientName) {
    try {
      const { data: prow } = await window.sb.from('patients')
        .select('id').eq('doctor_id', currentUser.id).eq('name', patientName).maybeSingle();
      if (prow && prow.id) patientId = prow.id;
    } catch(_) { /* ignore */ }
  }

  // H3 fix: if the resolved patient is missing from patientsCache (e.g. user
  // added the patient in another tab between page-load and now), flag a refresh
  // after save so WhatsApp reminders and other features that read from the
  // cache can resolve the phone number for this appointment. We use a flag
  // (set here, executed after save below) so we make at most one extra DB
  // round-trip per save, only when actually needed.
  var _needsPatientCacheRefresh = false;
  if (patientId && !patientsCache[patientId]) {
    _needsPatientCacheRefresh = true;
  } else if (patientName && !patientsCache['__name__' + patientName] && !patientId) {
    // Edge case: user typed a free-text name that doesn't match any patient
    // record. The phone-resolver later will return null (correct), but if the
    // patient WAS just added with that name and our cache pre-dates it, we'd
    // miss the cache lookup. Refresh defensively so the next reminder works.
    _needsPatientCacheRefresh = true;
  }

  // Gap 7: compute date/time/notes based on planned vs scheduled mode.
  //   - planned : date/time MUST be null; reason goes into notes
  //   - scheduled: original behavior (date+time required by HTML5)
  var dateVal, timeVal, notesVal;
  if (isPlannedNow) {
    dateVal  = null;
    timeVal  = null;
    var reasonVal = (document.getElementById('fReason').value || '').trim();
    notesVal = reasonVal;
  } else {
    dateVal  = document.getElementById('fDate').value || null;
    timeVal  = document.getElementById('fTime').value || null;
    notesVal = document.getElementById('fNotes').value.trim();
    // Safety guard: if user somehow submitted with empty date/time but planned
    // toggle is off, refuse — would violate the DB CHECK constraint anyway.
    if (!dateVal || !timeVal) {
      showToast('⚠️ التاريخ والوقت مطلوبان للموعد المجدول');
      btn.disabled = false; btn.textContent = editingId ? 'حفظ التعديلات' : 'حفظ الموعد';
      return;
    }
  }

  const apptData = {
    doctor_id:    currentUser.id,
    patient_id:   patientId,
    patient_name: patientName,
    date:         dateVal,
    time:         timeVal,
    duration:     parseInt(document.getElementById('fDuration').value),
    type:         typeName,
    status:       document.getElementById('fStatus').value,
    notes:        notesVal,
    color:        apptColor,
    stroke:       apptStroke,
    provider_id:  providerId,
    operatory_id: operatoryId,
    is_planned:   isPlannedNow
  };

  // Gap 8: capture the template id that was used (new appointments only).
  // The picker is hidden in edit mode so we never overwrite an existing
  // appointment's appointment_type_id by accident.
  if (!editingId) {
    var atPicker = document.getElementById('fApptTypePicker');
    var pickedId = atPicker ? (atPicker.value || null) : null;
    if (pickedId) apptData.appointment_type_id = pickedId;
  }

  // ── Gap 6: Auto-fill timestamps based on status ─────────────────────────
  // Keep status semantics in sync with the time-tracking journey:
  //   • status='confirmed' (live appt, not planned) and confirmed_at is empty
  //     → stamp confirmed_at = now() and set confirmation_status='confirmed'.
  //     Fixes the surprise UX where a brand-new appointment defaulted to
  //     'confirmed' but the 📞 button kept showing.
  //   • status='completed' (live appt) → stamp dismissed_at if empty AND
  //     backfill confirmed_at if empty (a completed visit must have been
  //     confirmed at some point). We deliberately do NOT auto-stamp
  //     arrived_at/seated_at: leaving them blank is honest about the fact
  //     that the secretary skipped those steps. They can fill them by
  //     double-clicking the badge if they care.
  // Planned appointments (is_planned=true) have no real date/time → skip.
  // Pre-Gap-6 rows (no _at columns yet) → graceful fallback below strips
  // these fields on retry if the DB rejects them.
  if (!isPlannedNow) {
    var _g6NowIso = new Date().toISOString();
    var _g6Existing = editingId
      ? appointments.find(function(a){ return a.id === editingId; })
      : null;
    var _g6PrevConfirmedAt = _g6Existing ? _g6Existing.confirmed_at : null;
    var _g6PrevDismissedAt = _g6Existing ? _g6Existing.dismissed_at : null;

    if (apptData.status === 'confirmed' && !_g6PrevConfirmedAt) {
      apptData.confirmed_at = _g6NowIso;
      apptData.confirmation_status = 'confirmed';
    }
    if (apptData.status === 'completed') {
      if (!_g6PrevDismissedAt) apptData.dismissed_at = _g6NowIso;
      if (!_g6PrevConfirmedAt) {
        apptData.confirmed_at = _g6NowIso;
        apptData.confirmation_status = 'confirmed';
      }
    }
  }

  // Detects "column does not exist" or "confirmation_valid violated" errors,
  // both of which signal the Gap 6 migration is missing. Used by the
  // INSERT/UPDATE retry path below to silently strip auto-fill fields and
  // try again so the save still succeeds.
  function _g6IsAutoFillRejection(err) {
    if (!err) return false;
    var msg = (err.message || '') + ' ' + (err.code || '');
    return /42703|23514|confirmation_valid|confirmed_at|dismissed_at|confirmation_status/i.test(msg);
  }
  function _g6StripAutoFillFields(obj) {
    var clone = Object.assign({}, obj);
    delete clone.confirmed_at;
    delete clone.dismissed_at;
    delete clone.confirmation_status;
    return clone;
  }
  var _g6HasAutoFill = ('confirmed_at' in apptData) || ('dismissed_at' in apptData) || ('confirmation_status' in apptData);

  // ── Gap 5: No-show fee workflow ─────────────────────────────────────────
  // Trigger conditions (all must be true):
  //   1. new status is 'no_show'
  //   2. previous status was NOT 'no_show' (i.e. we're transitioning into it)
  //   3. patient is identified (no point charging an unknown name)
  //   4. clinic has enabled the fee with a positive amount
  //   5. no existing fee row is linked to this appointment (no double-charge)
  //   6. Gap 7: not a planned appointment (planned has no date → can't no-show)
  // If all met, show a confirm prompt + optional reason field.
  // Fee is OPTIONAL: the user can choose "without fee" and still mark no-show.
  var pendingNoShowFee = null;  // {amount, reason} if user opted in, else null
  if (apptData.status === 'no_show' && !isPlannedNow) {
    var previousStatus = null;
    if (editingId) {
      var prevAppt = appointments.find(function(a){ return a.id === editingId; });
      if (prevAppt) previousStatus = prevAppt.status;
    }
    var isTransition = (previousStatus !== 'no_show');
    if (isTransition && patientId) {
      var feeCfg = await getNoShowFeeConfig();
      if (feeCfg.enabled && feeCfg.amount > 0) {
        var alreadyApplied = editingId ? await noShowFeeAlreadyApplied(editingId) : false;
        if (!alreadyApplied) {
          // Two-step prompt — simpler than building a custom modal for MVP:
          //   step 1: ask whether to apply the fee at all (yes/no/cancel)
          //   step 2: only if yes, ask for optional reason
          var msg = '🚫 تم تسجيل عدم الحضور\n\n'
                  + 'هل تريد تطبيق رسم عدم الحضور على ' + patientName + '؟\n\n'
                  + 'المبلغ: ' + feeCfg.amount.toLocaleString('en-US') + ' ل.س\n\n'
                  + '• موافق  → تطبيق الرسم\n'
                  + '• إلغاء → حفظ الموعد بدون رسم';
          if (confirm(msg)) {
            var reason = prompt('سبب عدم الحضور (اختياري):', '') || '';
            pendingNoShowFee = { amount: feeCfg.amount, reason: reason };
          }
          // If user cancelled the first prompt, pendingNoShowFee stays null
          // and we proceed to save the appointment as no_show WITHOUT a fee.
          // This is the "fee is optional" behavior the user asked for.
        }
      }
    } else if (isTransition && !patientId) {
      // Edge: appt has no patient linked → can't charge. Save status anyway,
      // but notify so the user knows why no fee was applied.
      console.info('No-show fee skipped: appointment has no linked patient.');
    }
  }

  // Helper: detect "status not in check constraint" errors so we can fall back
  // to 'confirmed' when the appointments_status_check migration isn't applied
  // yet. Same logic used in completeApptWithProcedures — keeps the two write
  // paths consistent so a not-yet-migrated DB never blocks the user.
  function isStatusConstraintError(err) {
    if (!err) return false;
    var msg = (err.message || '') + ' ' + (err.code || '');
    return /check constraint|23514|appointments_status_check/i.test(msg);
  }
  // Gap 7: detect "is_planned column / planned constraint not migrated yet".
  //   - 42703  : column does not exist
  //   - PGRST204: schema cache miss for the column
  //   - 23514  : check constraint violation (e.g. scheduled_has_date for legacy rows)
  // When this fires we strip is_planned/null-date/null-time and retry.
  // Phase 6 M (Obs E): delegates to the shared SyDentAppt namespace
  // (supabase-init.js). Local fallback kept for robustness — same logic.
  function isPlannedMigrationMissing(err) {
    if (window.SyDentAppt && window.SyDentAppt.isPlannedMigrationMissing) {
      return window.SyDentAppt.isPlannedMigrationMissing(err);
    }
    if (!err) return false;
    var msg = (err.message || '').toLowerCase() + ' ' + (err.code || '');
    var isPlannedCol = msg.indexOf('is_planned') !== -1;
    var notNullDate  = /violates not-null constraint.*"date"|"time"/i.test(err.message || '');
    var schedHasDate = msg.indexOf('scheduled_has_date') !== -1;
    if (isPlannedCol && (err.code === '42703' || err.code === 'PGRST204' || msg.indexOf('does not exist') !== -1 || msg.indexOf('schema cache') !== -1)) return true;
    if (notNullDate) return true;     // pre-migration DB has NOT NULL on date/time
    if (schedHasDate) return true;    // very unlikely but covers stale-constraint case
    return false;
  }
  var newStatuses = ['completed','scheduled','broken','no_show'];
  var migrationMissing = false;
  var plannedMigrationMissing = false;

  if (editingId) {
    // .select() forces PostgREST to return the rows actually updated.
    // If RLS blocks the row, or the WHERE filter matches nothing, data
    // comes back as an empty array — letting us surface silent no-ops
    // instead of treating them as success.
    var upd = await window.sb.from('appointments').update(apptData)
      .eq('id', editingId).eq('doctor_id', currentUser.id)
      .select();
    // Silent no-op: status code 200 but 0 rows changed.
    if (!upd.error && (!upd.data || upd.data.length === 0)) {
      console.error('saveAppt: UPDATE succeeded but 0 rows changed (RLS mismatch or stale editingId)');
      showToast('⚠️ التحديث فشل — أعد تحميل الصفحة وحاول مرة أخرى');
      btn.disabled = false; btn.textContent = editingId ? 'حفظ التعديلات' : 'حفظ الموعد';
      return;
    }
    // Gap 7 retry: planned migration not applied → strip is_planned and force
    // date/time to today's defaults so the legacy NOT NULL columns are happy.
    if (upd.error && isPlannedMigrationMissing(upd.error)) {
      plannedMigrationMissing = true;
      console.warn('Gap 7: appointments.is_planned / nullable date/time not migrated yet. Falling back to legacy behavior. Run the migration: ALTER TABLE appointments ADD COLUMN is_planned BOOLEAN NOT NULL DEFAULT FALSE; ALTER TABLE appointments ALTER COLUMN date DROP NOT NULL; ALTER TABLE appointments ALTER COLUMN time DROP NOT NULL; ALTER TABLE appointments ADD CONSTRAINT scheduled_has_date CHECK (is_planned = TRUE OR (date IS NOT NULL AND time IS NOT NULL));');
      var legacy = Object.assign({}, apptData);
      delete legacy.is_planned;
      if (legacy.date === null) legacy.date = dateStr(new Date());
      if (legacy.time === null) legacy.time = '12:00';
      upd = await window.sb.from('appointments').update(legacy)
        .eq('id', editingId).eq('doctor_id', currentUser.id).select();
    }
    // Retry with 'confirmed' if the DB rejects a new lifecycle status.
    if (upd.error && isStatusConstraintError(upd.error) && newStatuses.indexOf(apptData.status) !== -1) {
      migrationMissing = true;
      console.warn("appointments.status='" + apptData.status + "' rejected on UPDATE — falling back to 'confirmed'. Run: ALTER TABLE appointments DROP CONSTRAINT appointments_status_check; ALTER TABLE appointments ADD CONSTRAINT appointments_status_check CHECK (status IN ('scheduled','confirmed','pending','completed','cancelled','broken','no_show'));");
      var fallback = Object.assign({}, apptData, { status: 'confirmed' });
      // Also strip planned fields if we're falling back to legacy
      if (plannedMigrationMissing) {
        delete fallback.is_planned;
        if (fallback.date === null) fallback.date = dateStr(new Date());
        if (fallback.time === null) fallback.time = '12:00';
      }
      upd = await window.sb.from('appointments').update(fallback)
        .eq('id', editingId).eq('doctor_id', currentUser.id);
    }
    // Gap 6 retry: if auto-fill timestamps/confirmation_status caused the
    // rejection (pre-migration row or unexpected schema), strip them and
    // retry. The user still gets their appointment saved with the chosen
    // status; only the silent journey-tracking metadata is lost.
    if (upd.error && _g6HasAutoFill && _g6IsAutoFillRejection(upd.error)) {
      console.warn('Gap 6: auto-fill fields rejected on UPDATE — retrying without them. Run the Gap 6 migration to enable auto-stamping.');
      var stripped = _g6StripAutoFillFields(apptData);
      if (plannedMigrationMissing) {
        delete stripped.is_planned;
        if (stripped.date === null) stripped.date = dateStr(new Date());
        if (stripped.time === null) stripped.time = '12:00';
      }
      if (migrationMissing) stripped.status = 'confirmed';
      upd = await window.sb.from('appointments').update(stripped)
        .eq('id', editingId).eq('doctor_id', currentUser.id);
    }
    // Phase 6 K retry: if appointments.operatory_id is missing (Migration 12
    // not applied), strip it and try again. Mirrors the Gap 8 retry pattern.
    if (upd.error && apptData.operatory_id !== undefined &&
        /42703|operatory_id/i.test((upd.error.message || '') + ' ' + (upd.error.code || ''))) {
      console.warn('Phase 6 K: operatory_id rejected on UPDATE — retrying without it. Run Migration 12.');
      var strippedOp = Object.assign({}, apptData);
      delete strippedOp.operatory_id;
      if (plannedMigrationMissing) {
        delete strippedOp.is_planned;
        if (strippedOp.date === null) strippedOp.date = dateStr(new Date());
        if (strippedOp.time === null) strippedOp.time = '12:00';
      }
      if (migrationMissing) strippedOp.status = 'confirmed';
      if (_g6HasAutoFill) {
        delete strippedOp.confirmed_at;
        delete strippedOp.dismissed_at;
        delete strippedOp.confirmation_status;
      }
      upd = await window.sb.from('appointments').update(strippedOp)
        .eq('id', editingId).eq('doctor_id', currentUser.id);
    }
    if (upd.error) {
      showToast('❌ خطأ في التعديل: ' + upd.error.message);
    } else {
      // ── Apply the no-show fee AFTER the appt save succeeded, never before.
      // If the fee insert fails, the appt itself is already saved correctly —
      // applyNoShowFee shows its own error toast and we don't roll back.
      if (pendingNoShowFee) {
        await applyNoShowFee({
          patientId:  patientId,
          providerId: providerId,
          amount:     pendingNoShowFee.amount,
          reason:     pendingNoShowFee.reason,
          apptId:     editingId,
          apptDate:   apptData.date
        });
      }
      // Gap 7: was-planned → now-scheduled means the user used "Schedule now".
      // Tailor the toast accordingly.
      var prevWasPlanned = false;
      if (editingId) {
        var _prev = appointments.find(function(a){ return a.id === editingId; });
        if (_prev) prevWasPlanned = isPlannedAppt(_prev);
      }
      if (plannedMigrationMissing) {
        showToast('⚠️ تم الحفظ كموعد عادي — يلزم ترقية قاعدة البيانات لميزة "مخطّط"');
      } else if (migrationMissing) {
        showToast('⚠️ تم الحفظ كـ "مؤكد" — يلزم ترقية قاعدة البيانات');
      } else if (pendingNoShowFee) {
        showToast('✅ تم الحفظ + تطبيق رسم عدم الحضور');
      } else if (prevWasPlanned && !isPlannedNow) {
        showToast('✅ تم جدولة الموعد المخطّط');
      } else if (isPlannedNow) {
        showToast('✅ تم حفظ الموعد المخطّط');
      } else {
        showToast('✅ تم تعديل الموعد');
      }
      // Gap 7: only navigate the calendar to apptData.date if it's a real date
      // (planned appointments don't have one — stay on whatever the user was viewing).
      if (apptData.date) {
        selectedDate = new Date(apptData.date + 'T12:00:00');
        currentDate  = new Date(apptData.date + 'T12:00:00');
      }
      closeModal();
      // Gap 7: if user just scheduled a planned appt, jump them to schedule tab
      if (prevWasPlanned && !isPlannedNow && apptData.date) {
        setMainTab('schedule');
      } else if (isPlannedNow) {
        setMainTab('planned');
      }
      await loadAppointments();
      // H3 fix: refresh phone cache if the appointment was for a patient added
      // in another tab (so WhatsApp reminder for this appt can find the phone).
      if (_needsPatientCacheRefresh) await loadPatientPhones();
      // Phase 5: audit log (after save success, after reload)
      if (window.logAudit) {
        var _prevAppt = appointments.find(function(a){ return a.id === editingId; });
        var _pname = getPatientName(patientId) || '';
        var _isStatusChange = _prevAppt && _prevAppt.status !== apptData.status;
        var _actionType = _isStatusChange ? 'appointment.status_change' : 'appointment.edit';
        var _desc = _isStatusChange
          ? 'تغيير حالة موعد ' + _pname + ' من "' + (_prevAppt.status || '') + '" إلى "' + apptData.status + '"'
          : 'تعديل موعد المريض: ' + _pname;
        window.logAudit(_actionType, {
          entityId: editingId,
          patientId: patientId,
          patientName: _pname,
          description: _desc,
          oldValue: _prevAppt ? { date: _prevAppt.date, time: _prevAppt.time, status: _prevAppt.status } : null,
          newValue: { date: apptData.date, time: apptData.time, status: apptData.status }
        });
      }
    }
  } else {
    var ins = await window.sb.from('appointments').insert(apptData).select().single();
    // Gap 7 retry: same fallback as UPDATE path
    if (ins.error && isPlannedMigrationMissing(ins.error)) {
      plannedMigrationMissing = true;
      console.warn('Gap 7: planned-appointments migration not applied yet (INSERT). See UPDATE-path warning for the migration SQL.');
      var legacyIns = Object.assign({}, apptData);
      delete legacyIns.is_planned;
      if (legacyIns.date === null) legacyIns.date = dateStr(new Date());
      if (legacyIns.time === null) legacyIns.time = '12:00';
      ins = await window.sb.from('appointments').insert(legacyIns).select().single();
    }
    if (ins.error && isStatusConstraintError(ins.error) && newStatuses.indexOf(apptData.status) !== -1) {
      migrationMissing = true;
      console.warn("appointments.status='" + apptData.status + "' rejected on INSERT — falling back to 'confirmed'.");
      var fallbackIns = Object.assign({}, apptData, { status: 'confirmed' });
      if (plannedMigrationMissing) {
        delete fallbackIns.is_planned;
        if (fallbackIns.date === null) fallbackIns.date = dateStr(new Date());
        if (fallbackIns.time === null) fallbackIns.time = '12:00';
      }
      ins = await window.sb.from('appointments').insert(fallbackIns).select().single();
    }
    // Gap 6 retry on INSERT: mirror the UPDATE path. Strip the auto-fill
    // fields and try again so the appointment is still created.
    if (ins.error && _g6HasAutoFill && _g6IsAutoFillRejection(ins.error)) {
      console.warn('Gap 6: auto-fill fields rejected on INSERT — retrying without them. Run the Gap 6 migration to enable auto-stamping.');
      var strippedIns = _g6StripAutoFillFields(apptData);
      if (plannedMigrationMissing) {
        delete strippedIns.is_planned;
        if (strippedIns.date === null) strippedIns.date = dateStr(new Date());
        if (strippedIns.time === null) strippedIns.time = '12:00';
      }
      if (migrationMissing) strippedIns.status = 'confirmed';
      ins = await window.sb.from('appointments').insert(strippedIns).select().single();
    }
    // Gap 8 retry: if the appointments.appointment_type_id column is missing
    // (Gap 8 migration not yet applied — unlikely but possible if the user
    // updated the table mid-flow), strip that field and retry. The
    // appointment still saves; we just lose the template-traceability link.
    if (ins.error && apptData.appointment_type_id &&
        /42703|appointment_type_id/i.test((ins.error.message || '') + ' ' + (ins.error.code || ''))) {
      console.warn('Gap 8: appointment_type_id rejected on INSERT — retrying without it. Run the Gap 8 migration to enable template traceability.');
      var strippedAt = Object.assign({}, apptData);
      delete strippedAt.appointment_type_id;
      // Preserve all earlier fallbacks (Gap 1, 6, 7) so we don't regress.
      if (plannedMigrationMissing) {
        delete strippedAt.is_planned;
        if (strippedAt.date === null) strippedAt.date = dateStr(new Date());
        if (strippedAt.time === null) strippedAt.time = '12:00';
      }
      if (migrationMissing) strippedAt.status = 'confirmed';
      if (_g6HasAutoFill) {
        delete strippedAt.confirmed_at;
        delete strippedAt.dismissed_at;
        delete strippedAt.confirmation_status;
      }
      ins = await window.sb.from('appointments').insert(strippedAt).select().single();
    }
    // Phase 6 K retry: if appointments.operatory_id column is missing
    // (Migration 12 not applied), strip and retry. Mirrors all prior retry
    // patterns — preserves every earlier fallback so we don't regress.
    if (ins.error && apptData.operatory_id !== undefined &&
        /42703|operatory_id/i.test((ins.error.message || '') + ' ' + (ins.error.code || ''))) {
      console.warn('Phase 6 K: operatory_id rejected on INSERT — retrying without it. Run Migration 12.');
      var strippedOpIns = Object.assign({}, apptData);
      delete strippedOpIns.operatory_id;
      if (plannedMigrationMissing) {
        delete strippedOpIns.is_planned;
        if (strippedOpIns.date === null) strippedOpIns.date = dateStr(new Date());
        if (strippedOpIns.time === null) strippedOpIns.time = '12:00';
      }
      if (migrationMissing) strippedOpIns.status = 'confirmed';
      if (_g6HasAutoFill) {
        delete strippedOpIns.confirmed_at;
        delete strippedOpIns.dismissed_at;
        delete strippedOpIns.confirmation_status;
      }
      // Note: appointment_type_id is intentionally kept here. If Gap 8 isn't
      // applied either, the INSERT will fail and the Gap 8 retry path
      // (which runs BEFORE Phase 6 K's path) would have already stripped it.
      // The unusual case of Phase 6 K-only failure means appointment_type_id
      // is valid, so we don't strip it.
      ins = await window.sb.from('appointments').insert(strippedOpIns).select().single();
    }
    if (ins.error) {
      showToast('❌ خطأ في الإضافة: ' + ins.error.message);
    } else {
      // New appointment created as no_show with a pending fee — rare flow,
      // but supported. We need the freshly-inserted id to link the fee row.
      if (pendingNoShowFee && ins.data && ins.data.id) {
        await applyNoShowFee({
          patientId:  patientId,
          providerId: providerId,
          amount:     pendingNoShowFee.amount,
          reason:     pendingNoShowFee.reason,
          apptId:     ins.data.id,
          apptDate:   apptData.date
        });
      }
      if (plannedMigrationMissing) {
        showToast('⚠️ تمت الإضافة كموعد عادي — يلزم ترقية قاعدة البيانات لميزة "مخطّط"');
      } else if (migrationMissing) {
        showToast('⚠️ تمت الإضافة كـ "مؤكد" — يلزم ترقية قاعدة البيانات');
      } else if (pendingNoShowFee) {
        showToast('✅ تمت الإضافة + تطبيق رسم عدم الحضور');
      } else if (isPlannedNow) {
        showToast('✅ تمت إضافة موعد مخطّط');
      } else {
        showToast('✅ تمت إضافة الموعد');
      }
      if (apptData.date) {
        selectedDate = new Date(apptData.date + 'T12:00:00');
        currentDate  = new Date(apptData.date + 'T12:00:00');
      }
      closeModal();
      // Gap 7: after adding a planned appt, jump straight to planned tab
      if (isPlannedNow) setMainTab('planned');
      await loadAppointments();
      // H3 fix: refresh phone cache if patient was newly added in another tab
      if (_needsPatientCacheRefresh) await loadPatientPhones();
      // Phase 5: audit log (after insert success, after reload)
      if (window.logAudit && ins.data) {
        var _pname2 = getPatientName(patientId) || '';
        window.logAudit('appointment.create', {
          entityId: ins.data.id,
          patientId: patientId,
          patientName: _pname2,
          description: 'إضافة موعد جديد للمريض: ' + _pname2
                       + (apptData.date ? ' (' + apptData.date + ' ' + (apptData.time || '') + ')' : ' (مخطّط)'),
          newValue: { date: apptData.date, time: apptData.time, status: apptData.status, is_planned: !!apptData.is_planned }
        });
      }
    }
  }

  btn.disabled = false; btn.textContent = editingId ? 'حفظ التعديلات' : 'حفظ الموعد';
}

async function deleteAppt(id) {
  // Phase 4.1: defense-in-depth — block destructive ops if locked doctor is inactive
  if (window.SyDentLock && window.SyDentLock.isDoctorAccountInactive && window.SyDentLock.isDoctorAccountInactive()) {
    showToast('🔒 حسابك غير نشط — لا يمكن حذف المواعيد');
    return;
  }
  var origAppt = appointments.find(function(a){ return a.id === id; });
  if (!confirm('حذف هذا الموعد؟')) return;
  const { error } = await window.sb.from('appointments').delete()
    .eq('id', id).eq('doctor_id', currentUser.id);
  if (error) { showToast('❌ خطأ في الحذف'); return; }
  // Phase 5: audit log
  if (window.logAudit && origAppt) {
    var _pname = getPatientName(origAppt.patient_id) || '';
    window.logAudit('appointment.delete', {
      entityId: id,
      patientId: origAppt.patient_id,
      patientName: _pname,
      description: 'حذف موعد المريض: ' + _pname + ' (' + (origAppt.date || 'مخطّط') + ' ' + (origAppt.time || '') + ')',
      oldValue: { date: origAppt.date, time: origAppt.time, status: origAppt.status }
    });
  }
  showToast('🗑️ تم حذف الموعد');
  await loadAppointments();
}

// ─── Toast ───────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ─── Init ────────────────────────────────────────────
(async function init() {
  await new Promise(r => setTimeout(r, 80));
  const { data } = await window.sb.auth.getUser();
  if (!data || !data.user) { window.location.href = 'auth.html'; return; }
  currentUser = data.user;
  await loadClinicDoctors();
  await loadOperatoriesCache();   // Phase 6 K (Migration 12)
  await loadAppointmentTypes();  // Gap 8: cache templates for the modal picker
  await loadLabsForHint();       // Phase 6 L: cache labs for the template hint banner
  // Phase 2A — WhatsApp Reminders state
  await loadClinicSettingsWa();
  await loadPatientPhones();
  await loadReminderLogs();
  await loadAppointments();

  // Phase 2A — Deep-link handler: dashboard's ⚠️ "أرسل تذكير" badge sends the
  // user here with ?wa=<appointment_id>. Open the modal automatically so the
  // user doesn't have to hunt for the appointment in the list/day view.
  //
  // Phase 2B-B extension — labs.html "📅 اذهب للموعد" badge sends the user
  // here with ?editAppt=<appointment_id>. Same pattern: switch to list view
  // + open the appointment edit modal, then clean the URL. Only one of the
  // two params is honored per visit (?wa wins if both are present, since
  // it's the more time-sensitive workflow).
  try {
    var qp = new URLSearchParams(window.location.search);
    var waId = qp.get('wa');
    var editApptId = qp.get('editAppt');
    // Phase 6 L extras: dashboard quick-template chip sends user here with
    // ?newWithTemplate=<id>. Open a brand-new appt modal + apply the template
    // automatically. Lowest priority — if 'wa' or 'editAppt' are also set,
    // they win (they refer to existing appointments and are more urgent).
    var newWithTemplateId = qp.get('newWithTemplate');
    if (waId) {
      var matched = appointments.find(function(a){ return a.id === waId; });
      if (matched) {
        // Switch to list view so the appointment is visible behind the modal
        if (typeof setView === 'function') setView('list');
        setTimeout(function(){ openWaReminderModal(waId); }, 200);
      }
      // Clean the URL so a refresh doesn't re-open the modal
      var url = new URL(window.location.href);
      url.searchParams.delete('wa');
      // Also drop editAppt + newWithTemplate if present — wa took priority
      url.searchParams.delete('editAppt');
      url.searchParams.delete('newWithTemplate');
      window.history.replaceState({}, '', url.toString());
    } else if (editApptId) {
      var matchedEdit = appointments.find(function(a){ return a.id === editApptId; });
      if (matchedEdit) {
        if (typeof setView === 'function') setView('list');
        setTimeout(function(){ editAppt(editApptId); }, 200);
      } else {
        // loadAppointments() above pulls ALL appointments for this doctor
        // (no date filter), so a missing id means the appointment has been
        // deleted (or never existed). The DB FK SET NULL would normally
        // null the lab order's appointment_id, but the user may have
        // clicked an old labs.html tab whose cache predates the deletion.
        showToast('⚠️ الموعد المرتبط لم يعد موجوداً — قد يكون محذوفاً');
      }
      var url2 = new URL(window.location.href);
      url2.searchParams.delete('editAppt');
      url2.searchParams.delete('newWithTemplate');
      window.history.replaceState({}, '', url2.toString());
    } else if (newWithTemplateId) {
      // Phase 6 L extras: quick-template flow from dashboard chips.
      // Verify the template still exists in the local cache (loadAppointmentTypes
      // ran in init above). If it's been deleted since the dashboard rendered,
      // we still open a blank new-appt modal so the user isn't blocked.
      var tplExists = _appointmentTypes.some(function(t){ return t.id === newWithTemplateId; });
      if (!tplExists) {
        showToast('⚠️ القالب المختار لم يعد موجوداً');
      }
      if (typeof setView === 'function') setView('list');
      // Delay a tick so the page has finished its initial paint before the
      // modal pops up — matches the wa/editAppt patterns above.
      // CRITICAL: openModal() is async (it awaits populateApptTypes,
      // populateApptProviderPicker, loadPatientNames). If we call it without
      // awaiting, the inner setTimeout fires BEFORE the pickers are populated
      // → t.default_treatment_id finds no match in TREATMENTS (still loading),
      // and t.default_provider_id finds no <option> in fProvider (still
      // empty). The lab-hint banner renders because it only needs the
      // template object, but treatment/duration/provider silently no-op.
      // The fix is `await openModal()` so the full template-apply pipeline
      // sees a fully populated form.
      setTimeout(async function(){
        try {
          await openModal();
          // openModal has finished — all selects are populated. Now we can
          // safely apply the template. .value = ... does NOT fire onchange
          // (qaeda #22), so we explicitly call onApptTypePicked() to run the
          // full template-apply pipeline (duration, treatment, provider,
          // operatory, notes, lab hint banner).
          if (tplExists) {
            var sel = document.getElementById('fApptTypePicker');
            if (sel) {
              sel.value = newWithTemplateId;
              if (typeof onApptTypePicked === 'function') onApptTypePicked();
              // Also reflect the active chip styling if chips mode is active,
              // so the picked template looks selected.
              var chipsEl = document.getElementById('fApptTypeChips');
              if (chipsEl && chipsEl.style.display !== 'none') {
                var chip = chipsEl.querySelector('[data-tid="' + newWithTemplateId + '"]');
                if (chip && typeof onApptTypeChipClick === 'function') {
                  onApptTypeChipClick(chip, newWithTemplateId);
                }
              }
            }
            // Focus the patient-name field so the user can start typing
            // immediately — that's the only thing the template can't fill.
            var pf = document.getElementById('fPatient');
            if (pf) pf.focus();
          }
        } catch (e) {
          // The outer try/catch can't catch exceptions from this async
          // callback (different microtask). Catch locally and warn so any
          // unexpected failure is debuggable without breaking the page.
          console.warn('deep-link newWithTemplate:', e);
        }
      }, 200);
      var url3 = new URL(window.location.href);
      url3.searchParams.delete('newWithTemplate');
      window.history.replaceState({}, '', url3.toString());
    }
  } catch(e) { console.warn('deep-link:', e); }
})();

initSidebar('appointments');

window.onPTRRefresh = async function() {
  // Phase 2A: reload WA state alongside appointments so badges reflect any
  // reminders sent or settings changed from another tab/device, and any
  // newly-added patient phones become resolvable.
  try { await loadClinicSettingsWa(); } catch(e) {}
  try { await loadPatientPhones(); }    catch(e) {}
  try { await loadReminderLogs(); }     catch(e) {}
  await loadAppointments();
};

document.addEventListener('DOMContentLoaded', function() {
  var btn = document.createElement('button');
  btn.className = 'sb-hamburger';
  btn.innerHTML = '<span></span><span></span><span></span>';
  btn.onclick   = function() { window.sbToggle(); };
  window._sbBtn = btn;
  var topbar = document.querySelector('.topbar');
  if (topbar) topbar.insertBefore(btn, topbar.firstChild);
});
