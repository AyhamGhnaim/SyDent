// ─── Helpers ─────────────────────────────────────────
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS_AR   = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function dateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// Gap 7: exclude planned appointments — they have no date so they'd otherwise
// "leak" into the schedule once they accidentally got assigned today's string.
function apptsByDate(ds) {
  return appointments.filter(function(a){
    if (isPlannedAppt(a)) return false;
    return a.date === ds;
  });
}

function avatarColor(name) {
  const CLRS = ['#2ee89e','#63b3ed','#f5c842','#ef5350','#a78bfa','#fb923c'];
  let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%CLRS.length;
  return CLRS[h];
}
function initials(name) {
  const p=name.trim().split(' ');
  return p.length>=2?p[0][0]+p[1][0]:p[0].slice(0,2);
}
// Gap 1: full lifecycle status labels (OpenDental parity).
// Migration required: appointments.status check constraint must include
//   'scheduled','confirmed','pending','completed','cancelled','broken','no_show'.
function statusLabel(s) {
  if (s === 'confirmed') return 'مؤكد';
  if (s === 'pending')   return 'معلّق';
  if (s === 'cancelled') return 'ملغى';
  if (s === 'completed') return 'مكتمل';
  if (s === 'scheduled') return 'مجدول';
  if (s === 'broken')    return 'عدم حضور';   // legacy data — UI no longer offers 'broken' (Phase 2C reverted)
  if (s === 'no_show')   return 'عدم حضور';
  return s || '—';
}
function statusClass(s) {
  if (s === 'confirmed') return 'status-confirmed';
  if (s === 'pending')   return 'status-pending';
  if (s === 'cancelled') return 'status-cancelled';
  if (s === 'completed') return 'status-completed';
  if (s === 'scheduled') return 'status-scheduled';
  if (s === 'broken')    return 'status-broken';
  if (s === 'no_show')   return 'status-noshow';
  return 'status-pending';
}
// Statuses considered "finished" — used to hide from upcoming-list view.
function isFinishedStatus(s) {
  return s === 'completed' || s === 'cancelled' || s === 'broken' || s === 'no_show';
}

// ─── Gap 5: No-Show fee helpers ──────────────────────────────────────────────
// Settings live as columns on the single clinic_settings row per owner
// (Migration 5b extended the wide-table schema used by WhatsApp Reminders,
// so Gap 5 now shares that row instead of using a separate key/value pattern).
// Both reads are fault-tolerant: if the table doesn't exist yet (pre-migration),
// we treat the feature as disabled instead of breaking the user's workflow.

// Detect the "table missing" error so the rest of the app keeps working
// when Migration 5 (clinic_settings) hasn't been applied yet. PostgreSQL
// returns 42P01 for "relation does not exist"; PostgREST may map this to
// PGRST205 with a textual hint. We accept either form.
function isClinicSettingsTableMissing(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /42P01|PGRST205|clinic_settings.*does not exist/i.test(msg);
}

// Returns the current no-show fee config:
//   { enabled: boolean, amount: integer }
// On any failure, returns { enabled: false, amount: 0 } so the prompt simply
// doesn't fire — the user can still mark appointments as no-show normally.
async function getNoShowFeeConfig() {
  try {
    var res = await window.sb.from('clinic_settings')
      .select('no_show_fee_enabled, no_show_fee_amount')
      .eq('owner_id', currentUser.id)
      .maybeSingle();
    if (res.error) {
      if (!isClinicSettingsTableMissing(res.error)) {
        console.warn('clinic_settings read warn:', res.error);
      }
      return { enabled: false, amount: 0 };
    }
    var row = res.data || {};
    var enabled = !!row.no_show_fee_enabled;
    var amount  = parseInt(row.no_show_fee_amount || 0, 10) || 0;
    return { enabled: enabled, amount: amount };
  } catch (e) {
    console.warn('getNoShowFeeConfig fallback:', e);
    return { enabled: false, amount: 0 };
  }
}

// Canonical label for the auto-inserted fee session. Searched by exact match
// in noShowFeeAlreadyApplied(), so don't change without a data migration.
var NO_SHOW_FEE_TYPE_LABEL = 'رسم موعد لم يحضر';

// Returns true if a no-show fee session has already been recorded for this
// appointment, so we don't double-charge if the user flips the status back
// and forth. We look for any session linked to the appointment whose type
// matches our canonical fee label.
async function noShowFeeAlreadyApplied(apptId) {
  if (!apptId) return false;
  try {
    var res = await window.sb.from('ledger_sessions')
      .select('id, type')
      .eq('doctor_id', currentUser.id)
      .eq('appointment_id', apptId)
      .eq('type', NO_SHOW_FEE_TYPE_LABEL)
      .limit(1);
    if (res.error) return false; // fail open — better to warn user than block
    return Array.isArray(res.data) && res.data.length > 0;
  } catch (e) {
    return false;
  }
}

// Apply the no-show fee: INSERT a ledger_sessions row for the patient at the
// appointment's provider. Returns true on success.
// Note: this only inserts the fee — the patient's unearned-credit reallocation
// (FIFO) runs in patient-profile.html on demand. If the patient has unearned
// credit, it will auto-flow to this new fee the next time their profile is
// opened (saveSession path triggers reallocatePatientFunds there).
async function applyNoShowFee(opts) {
  // Phase 4.1: defense-in-depth — block production-creating ops if locked doctor is inactive
  if (window.SyDentLock && window.SyDentLock.isDoctorAccountInactive && window.SyDentLock.isDoctorAccountInactive()) {
    showToast('🔒 حسابك غير نشط — لا يمكن تسجيل رسوم جديدة');
    return;
  }
  // opts: { patientId, providerId, amount, reason, apptId, apptDate }
  try {
    var feeDate = opts.apptDate || dateStr(new Date());
    var noteParts = ['موعد ' + feeDate + ' — عدم حضور المريض'];
    if (opts.reason && opts.reason.trim()) noteParts.push('السبب: ' + opts.reason.trim());
    var baseRow = {
      doctor_id: currentUser.id,
      patient_id: opts.patientId,
      type: NO_SHOW_FEE_TYPE_LABEL,
      description: 'رسم عدم الحضور',
      cost: opts.amount,
      date: feeDate,
      status: 'completed',
      provider_id: opts.providerId || null,
      notes: noteParts.join('\n')
    };
    // First attempt with appointment_id (Migration 2). If that column is
    // missing in some legacy DB, retry without it so the fee is still saved.
    var row = Object.assign({ appointment_id: opts.apptId || null }, baseRow);
    var sessRes = await window.sb.from('ledger_sessions').insert(row);
    if (sessRes.error) {
      var errMsg = (sessRes.error.message || '') + ' ' + (sessRes.error.code || '');
      var apptIdMissing = /column .*appointment_id.* does not exist|42703/i.test(errMsg);
      if (apptIdMissing) {
        console.warn('appointment_id column missing — saving fee without link.');
        sessRes = await window.sb.from('ledger_sessions').insert(baseRow);
      }
    }
    if (sessRes.error) {
      console.warn('no-show fee insert error:', sessRes.error);
      showToast('⚠️ تعذّر تسجيل الرسم: ' + (sessRes.error.message || 'سبب غير معروف'));
      return false;
    }
    // Phase 5: audit log (no-show fee — chargeable session for a missed appointment).
    // Note: applyNoShowFee runs across two code paths — auto-prompt inside saveAppt
    // (when status flips to no_show) and the dedicated 💸 button (applyNoShowFeeFromModal).
    // Both flow through here, so a single audit call covers them.
    if (window.logAudit) {
      // Resolve patient name from the cache populated by loadPatients() (best effort).
      var pname = '';
      try {
        if (opts.patientId && patientsCache && patientsCache[opts.patientId]) {
          pname = patientsCache[opts.patientId].name || '';
        }
      } catch (e) {}
      window.logAudit('session.create', {
        entityId: null, // sessRes.data is null because we didn't .select() — that's fine
        patientId: opts.patientId,
        patientName: pname,
        description: 'رسم عدم حضور: ' + opts.amount + ' ل.س (موعد ' + feeDate + ')',
        newValue: { type: NO_SHOW_FEE_TYPE_LABEL, cost: opts.amount, date: feeDate, status: 'completed', provider_id: opts.providerId || null, no_show_fee: true, appointment_id: opts.apptId || null }
      });
    }
    return true;
  } catch (e) {
    console.warn('applyNoShowFee fallback:', e);
    return false;
  }
}

// ─── Gap 6: Time Tracking helpers ────────────────────────────────────────────
// Tracks the patient journey:
//   confirmed_at  (📞 تم التأكيد)
//   arrived_at    (🚪 وصل العيادة)        ← appears in Waiting Room widget
//   seated_at     (🪑 جلس على الكرسي)     ← removed from Waiting Room widget
//   dismissed_at  (✅ خرج من العيادة)
//
// Workflow mirrors OpenDental: ONE button visible at a time (the next step).
// Once a timestamp is set, a colored badge appears under the patient name and
// the next button takes its place.

// Stage definitions — single source of truth for labels, colors, order.
var TIME_STAGES = [
  { key: 'confirmed_at', label: '📞 تأكيد', icon: '📞', color: '#63b3ed' },
  { key: 'arrived_at',   label: '🚪 وصل',   icon: '🚪', color: '#f5c842' },
  { key: 'seated_at',    label: '🪑 جلس',   icon: '🪑', color: '#fb923c' },
  { key: 'dismissed_at', label: '✅ خرج',   icon: '✅', color: '#2ee89e' }
];

// Returns the next action button for an appointment, or null if no action is
// applicable (e.g. appointment is cancelled/broken or already dismissed).
function getNextTimeAction(appt) {
  if (!appt) return null;
  if (isFinishedStatus(appt.status) && appt.status !== 'completed') return null;
  for (var i = 0; i < TIME_STAGES.length; i++) {
    var st = TIME_STAGES[i];
    if (!appt[st.key]) return st;
  }
  return null; // all 4 stamps recorded
}

// Formats an ISO timestamp as HH:MM in 24h, browser-local time. Returns '' on
// nullish input so callers can use it directly inside template strings.
function fmtApptTime(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleTimeString('en-GB', { hour12: false }).slice(0, 5);
  } catch (e) { return ''; }
}

// Builds the inline "stamp strip" shown under the patient name listing each
// recorded stage in chronological order. Renders nothing if no stamps exist.
function renderTimeStrip(appt) {
  if (!appt) return '';
  var parts = [];
  TIME_STAGES.forEach(function(st) {
    if (appt[st.key]) {
      var t = fmtApptTime(appt[st.key]);
      parts.push(
        '<span class="time-track-stamp" style="color:' + st.color +
        '" title="انقر مرتين لتعديل وقت ' + st.label.replace(/^[^\s]+\s/, '') + '" ' +
        'ondblclick="event.stopPropagation();overrideApptTime(\'' + appt.id + '\',\'' + st.key + '\')">' +
        st.icon + ' ' + t + '</span>'
      );
    }
  });
  if (!parts.length) return '';
  return '<div class="time-track-strip">' + parts.join('') + '</div>';
}

// Builds the inline action button HTML for a given appointment. Returns '' if
// no next action is available (so callers can splice into template strings).
function renderTimeActionBtn(appt) {
  var act = getNextTimeAction(appt);
  if (!act) return '';
  var bg = act.color + '22';
  var bd = act.color + '55';
  return '<button class="time-track-btn" ' +
         'style="background:' + bg + ';color:' + act.color + ';border:1px solid ' + bd + '" ' +
         'onclick="event.stopPropagation();recordApptTime(\'' + appt.id + '\',\'' + act.key + '\',this)">' +
         act.label + '</button>';
}

// Detects PostgreSQL CHECK-constraint violations for confirmation_status —
// fires when Gap 6 migration has not been applied yet. We then retry the
// update without the status field so the timestamp still gets saved.
function isConfirmationConstraintError(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /check constraint|23514|confirmation_valid/i.test(msg);
}

// One-shot user warning for missing Gap 6 migration. Logged details give the
// admin everything needed to fix it without spamming the UI on every click.
var _gap6WarnedOnce = false;
function warnTimeTrackingMigrationOnce() {
  if (_gap6WarnedOnce) return;
  _gap6WarnedOnce = true;
  console.warn(
    'Gap 6 migration needed. Run in Supabase SQL editor:\n' +
    'ALTER TABLE appointments\n' +
    "  ADD COLUMN IF NOT EXISTS confirmation_status TEXT DEFAULT 'pending',\n" +
    '  ADD COLUMN IF NOT EXISTS confirmed_at  TIMESTAMPTZ,\n' +
    '  ADD COLUMN IF NOT EXISTS arrived_at    TIMESTAMPTZ,\n' +
    '  ADD COLUMN IF NOT EXISTS seated_at     TIMESTAMPTZ,\n' +
    '  ADD COLUMN IF NOT EXISTS dismissed_at  TIMESTAMPTZ;'
  );
  try {
    if (typeof showToast === 'function') {
      showToast('يلزم ترقية قاعدة البيانات لميزة تتبع الوقت — راجع console', 'warning');
    } else {
      alert('يلزم ترقية قاعدة البيانات لتفعيل تتبع الوقت بالكامل (راجع console للتفاصيل).');
    }
  } catch (e) {}
}

// Detects "column does not exist" (42703) — fires when none of the timestamp
// columns are present at all. In that case we can't proceed; just warn.
function isMissingTimeColumnError(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /42703|column .* does not exist|confirmed_at|arrived_at|seated_at|dismissed_at/i.test(msg);
}

// Records a single timestamp on an appointment. Auto-sets confirmation_status
// when stamping confirmed_at. Falls back gracefully if the migration is
// missing. Returns true on success, false otherwise.
async function recordApptTime(apptId, fieldKey, btnEl) {
  if (!apptId || !fieldKey) return false;
  // Validate fieldKey against whitelist to prevent injection via crafted DOM
  var allowedKeys = ['confirmed_at','arrived_at','seated_at','dismissed_at'];
  if (allowedKeys.indexOf(fieldKey) === -1) {
    console.error('recordApptTime: invalid field key', fieldKey);
    return false;
  }
  // Disable the button while the update is in flight to prevent double-clicks.
  if (btnEl) { btnEl.disabled = true; }

  var patch = {};
  patch[fieldKey] = new Date().toISOString();
  if (fieldKey === 'confirmed_at') patch.confirmation_status = 'confirmed';

  try {
    var res = await window.sb.from('appointments').update(patch).eq('id', apptId);
    if (res.error) {
      // Pre-migration: confirmation_valid constraint may not exist OR the
      // column itself may be absent. Retry without confirmation_status.
      if (isConfirmationConstraintError(res.error) && fieldKey === 'confirmed_at') {
        var retryPatch = {}; retryPatch[fieldKey] = patch[fieldKey];
        var retry = await window.sb.from('appointments').update(retryPatch).eq('id', apptId);
        if (retry.error) {
          if (isMissingTimeColumnError(retry.error)) warnTimeTrackingMigrationOnce();
          else console.error('recordApptTime retry failed:', retry.error);
          if (btnEl) btnEl.disabled = false;
          return false;
        }
        warnTimeTrackingMigrationOnce();
      } else if (isMissingTimeColumnError(res.error)) {
        warnTimeTrackingMigrationOnce();
        if (btnEl) btnEl.disabled = false;
        return false;
      } else {
        console.error('recordApptTime failed:', res.error);
        if (btnEl) btnEl.disabled = false;
        return false;
      }
    }
    // Reflect locally so we don't wait a full network round-trip to re-render.
    var local = appointments.find(function(a){ return a.id === apptId; });
    if (local) {
      local[fieldKey] = patch[fieldKey];
      if (fieldKey === 'confirmed_at') local.confirmation_status = 'confirmed';
    }
    render();
    return true;
  } catch (e) {
    console.error('recordApptTime exception:', e);
    if (btnEl) btnEl.disabled = false;
    return false;
  }
}

// Manual override of a timestamp via double-click on its stamp. Accepts
// HH:MM input (24h). Empty input clears the timestamp (allows undo).
// Date portion is preserved from the existing value or defaults to appt.date.
async function overrideApptTime(apptId, fieldKey) {
  var allowedKeys = ['confirmed_at','arrived_at','seated_at','dismissed_at'];
  if (allowedKeys.indexOf(fieldKey) === -1) return;
  var appt = appointments.find(function(a){ return a.id === apptId; });
  if (!appt) return;

  var stage = TIME_STAGES.find(function(s){ return s.key === fieldKey; });
  var stageName = stage ? stage.label.replace(/^[^\s]+\s/, '') : 'الوقت';
  var currentDisplay = fmtApptTime(appt[fieldKey]);
  var input = prompt('وقت "' + stageName + '" (HH:MM، 24 ساعة)\nاتركها فارغة للحذف:', currentDisplay);
  if (input === null) return; // user cancelled

  var newIso = null;
  if (input.trim() !== '') {
    var m = /^(\d{1,2}):(\d{2})$/.exec(input.trim());
    if (!m) { alert('صيغة غير صحيحة. استخدم HH:MM'); return; }
    var hh = parseInt(m[1], 10), mm = parseInt(m[2], 10);
    if (hh < 0 || hh > 23 || mm < 0 || mm > 59) {
      alert('الساعة خارج النطاق المسموح'); return;
    }
    // Anchor to existing date portion if any, else the appointment's own date.
    var baseDate = appt[fieldKey]
      ? new Date(appt[fieldKey])
      : (appt.date ? new Date(appt.date + 'T00:00:00') : new Date());
    if (isNaN(baseDate.getTime())) baseDate = new Date();
    baseDate.setHours(hh, mm, 0, 0);
    newIso = baseDate.toISOString();
  }

  var patch = {}; patch[fieldKey] = newIso;
  var res = await window.sb.from('appointments').update(patch).eq('id', apptId);
  if (res.error) {
    if (isMissingTimeColumnError(res.error)) warnTimeTrackingMigrationOnce();
    else console.error('overrideApptTime failed:', res.error);
    return;
  }
  appt[fieldKey] = newIso;
  render();
}

// ─── Gap 8: Appointment Type templates (loader + picker handler) ─────────────
// Loaded once at page init, cached per page session. The picker is shown only
// when creating a new appointment (hidden in edit mode — see openModal /
// editAppt). Selecting a template pre-fills duration + treatment type;
// color stays derived from the treatment (single source of truth).
//
// Fault-tolerant: if the appointment_types table is missing (pre-migration),
// the picker simply stays empty and hidden — no crash, no toast spam.

var _appointmentTypes = [];   // cached templates for this session
var _gap8TableMissing = false;
// Phase 6 L (Obs B): cached labs for resolving default_lab_id → human name
// in the lab-hint banner. Fault-tolerant: empty array means we just show a
// generic "مخبر مرتبط" without the specific name (still informative).
var _labsCache = [];

function _gap8IsTableMissing(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /42P01|PGRST205|relation .* does not exist|appointment_types/i.test(msg);
}

// Phase 6 L (Obs B): one-shot loader for the labs cache, called alongside
// loadAppointmentTypes(). Only active labs — matches the picker UX in
// settings.html. Never throws.
async function loadLabsForHint() {
  if (!currentUser) return;
  try {
    var res = await window.sb.from('labs')
      .select('id, name')
      .eq('is_active', true);
    if (res.error) {
      console.warn('Phase 6 L: labs cache load failed (continuing):', res.error);
      _labsCache = [];
      return;
    }
    _labsCache = res.data || [];
  } catch (e) {
    console.warn('Phase 6 L: labs cache load exception:', e);
    _labsCache = [];
  }
}

async function loadAppointmentTypes() {
  if (!currentUser) return;
  try {
    // Gap 8.2 / Migration 11: select default_provider_id + default_lab_id +
    // default_notes alongside the original fields. If any of those columns
    // don't exist yet (42703), retry with the legacy projection so the picker
    // still works on older installations.
    var fullCols = 'id, name, default_duration_min, default_treatment_id, default_provider_id, default_lab_id, default_notes, is_active, sort_order';
    var legacyCols = 'id, name, default_duration_min, default_treatment_id, is_active, sort_order';
    var res = await window.sb.from('appointment_types')
      .select(fullCols)
      .eq('doctor_id', currentUser.id)
      .eq('is_active', true)
      .order('sort_order', { ascending: true })
      .order('created_at', { ascending: true });
    if (res.error) {
      if (_gap8IsTableMissing(res.error)) {
        _gap8TableMissing = true;
        console.warn('Gap 8: appointment_types table missing — template picker disabled.');
        return;
      }
      // Gap 8.2 / Migration 11 fallback: retry with legacy projection
      var msg = (res.error.message || '') + ' ' + (res.error.code || '');
      if (/42703|default_provider_id|default_lab_id|default_notes/i.test(msg)) {
        console.warn('Gap 8.2 / Migration 11: optional columns missing on SELECT — falling back to legacy columns.');
        res = await window.sb.from('appointment_types')
          .select(legacyCols)
          .eq('doctor_id', currentUser.id)
          .eq('is_active', true)
          .order('sort_order', { ascending: true })
          .order('created_at', { ascending: true });
        if (res.error) { console.warn('Gap 8 retry failed:', res.error); return; }
      } else {
        console.warn('Gap 8 load error:', res.error);
        return;
      }
    }
    _appointmentTypes = res.data || [];
  } catch (e) {
    console.warn('Gap 8 load exception:', e);
  }
}

// Populates the <select> inside the modal. Idempotent — safe to call every
// Populates the picker. Phase 6 L: when the practice has ≤ 6 templates, we
// render colorful chips for one-tap selection (much friendlier on mobile +
// secretaries). For > 6 templates we fall back to the standard <select> to
// avoid an unbounded horizontal scroll. Idempotent — safe to call on every
// modal open.
function populateApptTypePicker() {
  var sel = document.getElementById('fApptTypePicker');
  if (!sel) return;
  // Always keep the <select> populated as the canonical source of truth —
  // chips dispatch into it via the existing onchange to reuse onApptTypePicked.
  var html = '<option value="">— بدون قالب —</option>';
  for (var i = 0; i < _appointmentTypes.length; i++) {
    var t = _appointmentTypes[i];
    html += '<option value="' + escapeHtml(t.id) + '">' + escapeHtml(t.name || '') + '</option>';
  }
  sel.innerHTML = html;
  sel.value = '';

  // Phase 6 L: chips mode for small template sets (≤ 6).
  var chipsEl = document.getElementById('fApptTypeChips');
  if (!chipsEl) return;
  var CHIPS_THRESHOLD = 6;
  if (_appointmentTypes.length === 0 || _appointmentTypes.length > CHIPS_THRESHOLD) {
    chipsEl.style.display = 'none';
    chipsEl.innerHTML = '';
    sel.style.display = '';
    return;
  }
  // Build chips. Each chip carries the template id; click sets the <select>
  // value (which fires onchange → onApptTypePicked) AND visually toggles the
  // active state. Color comes from the linked treatment if present.
  var chipsHtml = '';
  // "No template" reset chip — neutral styling.
  chipsHtml += '<button type="button" class="appt-type-chip" data-tid="" '
    + 'onclick="onApptTypeChipClick(this, \'\')" '
    + 'style="padding:7px 14px;border-radius:18px;border:1.5px solid var(--border);'
    + 'background:transparent;color:var(--text2);cursor:pointer;font-size:13px;'
    + 'font-family:inherit;transition:all 0.15s;">— بدون قالب —</button>';
  for (var j = 0; j < _appointmentTypes.length; j++) {
    var ct = _appointmentTypes[j];
    // Color: prefer the template-linked treatment's color, fall back to neutral.
    var chipColor = '#63b3ed';
    if (ct.default_treatment_id && typeof TREATMENTS !== 'undefined') {
      for (var k = 0; k < TREATMENTS.length; k++) {
        if (TREATMENTS[k].dbId === ct.default_treatment_id) {
          chipColor = TREATMENTS[k].fill || TREATMENTS[k].color || chipColor;
          break;
        }
      }
    }
    var safeId = escapeHtml(ct.id);
    var safeName = escapeHtml(ct.name || '');
    var safeColor = escapeHtml(chipColor);
    chipsHtml += '<button type="button" class="appt-type-chip" data-tid="' + safeId + '" '
      + 'data-color="' + safeColor + '" '
      + 'onclick="onApptTypeChipClick(this, \'' + safeId + '\')" '
      + 'style="padding:7px 14px;border-radius:18px;border:1.5px solid ' + safeColor + ';'
      + 'background:transparent;color:var(--text);cursor:pointer;font-size:13px;'
      + 'font-family:inherit;transition:all 0.15s;">' + safeName + '</button>';
  }
  chipsEl.innerHTML = chipsHtml;
  chipsEl.style.display = 'flex';
  // Hide the underlying <select> when chips are shown — chips are the UX,
  // <select> stays as the model. The user can still see the picked label
  // via the chip's active state.
  sel.style.display = 'none';
}

// Phase 6 L: chip click → set <select>.value programmatically + dispatch
// onchange so the existing onApptTypePicked pipeline runs unchanged. Also
// updates active styling so the user sees what they picked.
function onApptTypeChipClick(btn, tid) {
  var sel = document.getElementById('fApptTypePicker');
  if (!sel) return;
  sel.value = tid || '';
  // Reset all chips to inactive styling.
  var chipsEl = document.getElementById('fApptTypeChips');
  if (chipsEl) {
    var all = chipsEl.querySelectorAll('.appt-type-chip');
    for (var i = 0; i < all.length; i++) {
      all[i].style.background = 'transparent';
      all[i].style.fontWeight = 'normal';
    }
  }
  // Activate the clicked chip. We compute the active fill from the chip's
  // own data-color (HEX, set when rendering). Browsers may normalize the
  // inline border-color to rgb(...) on read, so we cache the raw HEX on the
  // element instead — safer and color-stable.
  if (btn) {
    var raw = btn.getAttribute('data-color');
    if (raw && raw.charAt(0) === '#' && raw.length === 7) {
      btn.style.background = raw + '2e';  // ~18% alpha
    } else if (!btn.dataset.tid) {
      btn.style.background = 'rgba(141,160,189,0.18)';  // neutral for "no template"
    } else {
      btn.style.background = 'rgba(99,179,237,0.18)';  // safe fallback
    }
    btn.style.fontWeight = '600';
  }
  // Fire the existing pipeline.
  onApptTypePicked();
}

// Called from the picker's onchange. Pre-fills duration + treatment.
// We do NOT touch the color directly — it's driven by the treatment, and
// updateColorPreview() (called below) recomputes it from the selected
// treatment's own color. Single source of truth preserved.
function onApptTypePicked() {
  var sel = document.getElementById('fApptTypePicker');
  if (!sel) return;
  var id = sel.value;
  if (!id) {
    // Phase 6 L (Obs B): user picked "— بدون قالب —" → clear any visible
    // lab hint banner from a previous template. We don't touch the form
    // fields (duration/treatment/notes) — those keep user edits per the
    // "don't clobber" philosophy elsewhere in this function.
    _renderApptTypeLabHint(null);
    return;
  }
  var t = _appointmentTypes.find(function(x){ return x.id === id; });
  if (!t) return;

  // Duration: only pre-fill if it matches one of the existing <option> values
  // in #fDuration. If the template specifies e.g. 45 and the select has
  // 30/45/60/90/120, pick 45. Otherwise leave the current value alone.
  if (t.default_duration_min) {
    var durSel = document.getElementById('fDuration');
    if (durSel) {
      var target = String(t.default_duration_min);
      var found = false;
      for (var i = 0; i < durSel.options.length; i++) {
        if (durSel.options[i].value === target) { found = true; break; }
      }
      if (found) {
        durSel.value = target;
      } else {
        // Add a one-off option so the template's exact duration is honored.
        var opt = document.createElement('option');
        opt.value = target;
        opt.textContent = target + ' دقيقة';
        durSel.appendChild(opt);
        durSel.value = target;
      }
    }
  }

  // Treatment: the template stores treatments.id (UUID), but TREATMENTS[].id
  // in this page is treatment_key for backward-compat. Match via dbId (the
  // UUID is exposed as 'dbId' in loadTreatmentsFromSupabase). If the linked
  // treatment was deleted after the template was created, the FK has been
  // NULLed, so we silently skip — duration alone still pre-fills.
  if (t.default_treatment_id) {
    var typeSel = document.getElementById('fType');
    if (typeSel) {
      var match = null;
      for (var j = 0; j < TREATMENTS.length; j++) {
        if (TREATMENTS[j].dbId === t.default_treatment_id) { match = TREATMENTS[j]; break; }
      }
      if (match) {
        typeSel.value = match.id;
        // Trigger the existing color preview update so color tracks the treatment.
        if (typeof updateColorPreview === 'function') updateColorPreview();
      }
    }
  }

  // Gap 8.2: Pre-fill the provider picker from the template's default_provider_id.
  // The picker is the existing #fProvider, populated by populateApptProviderPicker
  // (which uses the OpenDental 3-tier default). We set its value to the template's
  // provider — if that doctor was deleted, the picker silently keeps its current
  // default (no crash). The doctor can always change it after.
  // Phase 6 K: Track whether the template explicitly set a provider — if it
  // didn't, we let the operatory's default_provider_id fill in as a fallback
  // (priority decision: TEMPLATE provider > OPERATORY provider > 3-tier default).
  var templateSetProvider = false;
  if (t.default_provider_id) {
    var provPicker = document.getElementById('fProvider');
    if (provPicker) {
      // Verify the option exists before setting (deleted doctor → no option)
      var optExists = false;
      for (var k = 0; k < provPicker.options.length; k++) {
        if (provPicker.options[k].value === t.default_provider_id) { optExists = true; break; }
      }
      if (optExists) {
        provPicker.value = t.default_provider_id;
        templateSetProvider = true;
      }
    }
  }

  // Phase 6 K (Migration 12): Pre-fill the operatory picker from the
  // template's default_operatory_id. Same robustness pattern as provider:
  // verify the option exists; if it's there (active or ghost-restored
  // because we're in edit mode), set it.
  if (t.default_operatory_id) {
    var opPicker = document.getElementById('fOperatory');
    var opGroup = document.getElementById('fOperatoryGroup');
    if (opPicker && opGroup) {
      // The operatory picker might be hidden in Soft mode (no active
      // operatories) — but if the template explicitly links one, we should
      // surface it. Force the wrapper visible and ghost-restore if needed.
      var opExists = false;
      for (var kk = 0; kk < opPicker.options.length; kk++) {
        if (opPicker.options[kk].value === t.default_operatory_id) { opExists = true; break; }
      }
      // Always resolve the full record (active OR inactive) so the provider
      // fallback below works regardless of whether the option was already
      // in the picker. Critical bug fix: previously 'found' was only set
      // inside the !opExists branch, so active operatories silently skipped
      // the provider fallback.
      var found = null;
      for (var ll = 0; ll < OPERATORIES_ALL.length; ll++) {
        if (OPERATORIES_ALL[ll].id === t.default_operatory_id) { found = OPERATORIES_ALL[ll]; break; }
      }
      if (!opExists) {
        // Inject a ghost option so the value sticks and the user sees the name.
        // If missing entirely (deleted operatory), still inject a placeholder
        // so saving doesn't silently null out the FK.
        var ghost = document.createElement('option');
        ghost.value = t.default_operatory_id;
        ghost.textContent = found
          ? ((found.name || '[غرفة]') + (found.is_active ? '' : ' (غير نشطة)'))
          : '[غرفة محذوفة]';
        opPicker.appendChild(ghost);
      }
      opPicker.value = t.default_operatory_id;
      opGroup.style.display = 'block';

      // Provider fallback: if the template didn't set a provider, try the
      // operatory's default_provider_id (option A — template > operatory).
      if (!templateSetProvider && found && found.default_provider_id) {
        var prov2 = document.getElementById('fProvider');
        if (prov2) {
          var hasOpt = false;
          for (var mm = 0; mm < prov2.options.length; mm++) {
            if (prov2.options[mm].value === found.default_provider_id) { hasOpt = true; break; }
          }
          if (hasOpt) prov2.value = found.default_provider_id;
        }
      }
    }
  }

  // Gap 8.2: default_lab_id is intentionally NOT applied to the appointment
  // form here — appointments don't directly carry a lab id. Phase 6 L (Obs B)
  // surfaces it as a non-intrusive banner instead, so the user knows this
  // template's lab association and can create the matching lab order from
  // the Labs tab (or the per-appointment lab section) afterwards.
  _renderApptTypeLabHint(t);

  // Migration 11 (Phase 6 L): pre-fill the appointment notes field from the
  // template's default_notes, BUT only if the user hasn't typed anything yet.
  // This honors the user's edits while still providing a smart default — the
  // same philosophy as duration/treatment above (don't clobber user input).
  // If default_notes is null/empty, we leave the existing value alone.
  if (t.default_notes) {
    var notesEl = document.getElementById('fNotes');
    if (notesEl && !notesEl.value.trim()) {
      notesEl.value = t.default_notes;
    }
  }
}

// Phase 6 L (Obs B): Renders/clears the lab hint banner under the template
// picker. Non-intrusive — just informs the user about the template's lab so
// they can create the lab order afterwards. No automatic mutation.
function _renderApptTypeLabHint(t) {
  var wrap = document.getElementById('apptTypeLabHint');
  if (!wrap) return;
  if (!t || !t.default_lab_id) {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  // Resolve the lab name from the cache. If the lab was deleted/deactivated,
  // we fall back to a generic notice rather than showing a broken UUID.
  var labName = null;
  for (var i = 0; i < _labsCache.length; i++) {
    if (_labsCache[i].id === t.default_lab_id) { labName = _labsCache[i].name; break; }
  }
  var labText = labName ? escapeHtml(labName) : 'مخبر مرتبط بهذا القالب';
  wrap.innerHTML = '<div style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:rgba(99,179,237,0.08);border:1px solid rgba(99,179,237,0.25);border-radius:8px;font-size:13px;color:var(--text2);line-height:1.6;">'
    + '<span style="font-size:16px;line-height:1;">💡</span>'
    + '<span>هذا القالب مرتبط بـ <strong style="color:var(--text);">' + labText + '</strong> — أنشئ طلب مخبر من تبويب المخابر أو من الموعد بعد الحفظ.</span>'
    + '</div>';
  wrap.style.display = '';
}

// ─── Render ──────────────────────────────────────────
function render() {
  if (view==='month') renderMonth();
  else if (view==='day') {
    renderDay();
    // Phase 6 K3: refresh toggle visibility (operatories may have changed)
    // and apply the persisted view mode. _applyK3ViewMode handles both
    // showing the right element and triggering renderDayByChair when needed.
    _refreshK3ToggleVisibility();
    _applyK3ViewMode(getDayViewMode());
  }
  else renderList();
}

function renderMonth() {
  const y=currentDate.getFullYear(), mo=currentDate.getMonth();
  document.getElementById('calMonth').textContent = MONTHS_AR[mo]+' '+y;

  const first = new Date(y,mo,1).getDay();
  const days  = new Date(y,mo+1,0).getDate();
  const today = dateStr(new Date());
  const body  = document.getElementById('calBody');
  let html = '';

  for (let i=0; i<first; i++) {
    const d = new Date(y,mo,1-first+i);
    const ds= dateStr(d);
    const ev= apptsByDate(ds);
    html += cellHTML(d.getDate(), ds, true, today, ev);
  }
  for (let d=1; d<=days; d++) {
    const ds= dateStr(new Date(y,mo,d));
    const ev= apptsByDate(ds);
    html += cellHTML(d, ds, false, today, ev);
  }
  const remain = 42 - first - days;
  for (let i=1; i<=remain; i++) {
    const d = new Date(y,mo+1,i);
    const ds= dateStr(d);
    const ev= apptsByDate(ds);
    html += cellHTML(i, ds, true, today, ev);
  }
  body.innerHTML = html;
}

function cellHTML(day, ds, other, today, evts) {
  const isToday    = ds===today;
  const isSelected = ds===dateStr(selectedDate);
  let cls = '';
  if (other)      cls += ' other-month';
  if (isToday)    cls += ' today';
  if (isSelected) cls += ' selected';

  const MAX_SHOW = window.innerWidth < 820 ? 0 : 2;
  let evHTML = '';
  evts.slice(0, MAX_SHOW).forEach(e => {
    var _ec = getApptColor(e);
    var lb = getApptLabBadge(e);
    var lbHtml = lb ? `<span style="margin-left:3px;" title="${lb.title}">${lb.icon}</span>` : '';
    evHTML += `<div class="cal-event" style="background:${_ec.fill}22;color:${_ec.fill};border-right:3px solid ${_ec.fill};" onclick="event.stopPropagation();editAppt('${e.id}')">${lbHtml}${(e.time||'').slice(0,5)} ${escapeHtml((e.patient_name||'').split(' ')[0])}</div>`;
  });
  // Mobile dots
  let dotHTML = '<div class="cal-dot-row">';
  evts.slice(0,4).forEach(e => {
    dotHTML += `<span class="cal-dot" style="background:${getApptColor(e).fill}"></span>`;
  });
  dotHTML += '</div>';
  if (evts.length > MAX_SHOW && window.innerWidth >= 820) {
    evHTML += `<div class="cal-more">+${evts.length-MAX_SHOW} أكثر</div>`;
  }

  return `<div class="cal-cell${cls}" onclick="selectDay('${ds}')">
    <div class="cal-date">${day}</div>
    ${evHTML}
    ${dotHTML}
  </div>`;
}

function selectDay(ds) {
  selectedDate = new Date(ds);
  currentDate  = new Date(ds);
  setView('day');
}

function renderDay() {
  const ds = dateStr(selectedDate);
  document.getElementById('calMonth').textContent = DAYS_AR[selectedDate.getDay()]+' '+selectedDate.getDate()+' '+MONTHS_AR[selectedDate.getMonth()]+' '+selectedDate.getFullYear();
  document.getElementById('dayTitle').textContent = DAYS_AR[selectedDate.getDay()]+' '+selectedDate.getDate()+' '+MONTHS_AR[selectedDate.getMonth()];
  const dayEvts = apptsByDate(ds);
  document.getElementById('daySubtitle').textContent = dayEvts.length ? dayEvts.length+' موعد' : 'لا توجد مواعيد';

  // Sort appts by time
  var sorted = dayEvts.slice().sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });
  let html = '';
  if (sorted.length === 0) {
    html = '<div style="text-align:center;padding:60px 20px;color:var(--text2);"><div style="font-size:48px;margin-bottom:12px;">📅</div><div>لا توجد مواعيد لهذا اليوم</div></div>';
  } else {
    sorted.forEach(function(e){
      var _bc = getApptColor(e);
      var lb = getApptLabBadge(e);
      var lbHtml = lb
        ? `<span style="display:inline-block;background:${lb.color}22;color:${lb.color};border:1px solid ${lb.color}55;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px;" title="${lb.title}">${lb.icon} ${lb.title.split(':')[0] || 'مخبر'}</span>`
        : '';
      var ps = getApptProceduresSummary(e.id);
      var psHtml = ps
        ? `<span style="display:inline-block;background:#2ee89e22;color:#2ee89e;border:1px solid #2ee89e55;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px;" title="${ps.count} علاج — ${fmtCost(ps.totalCost)} ل.س">🦷 ${ps.count} • ${fmtCost(ps.totalCost)}</span>`
        : '';
      var waHtml = getReminderBadgeHtml(e);
      var opHtml = getApptOperatoryBadge(e);
      html += `
        <div class="time-slot">
          <div class="slot-time">${(e.time||'').slice(0,5)}</div>
          <div class="slot-content">
            <div class="appt-block" style="background:${hexA(_bc.fill,0.12)};border-right:3px solid ${_bc.fill};" onclick="editAppt('${e.id}')">
              <div class="appt-name">${escapeHtml(e.patient_name)||'—'} ${lbHtml}${psHtml}${waHtml}${opHtml}</div>
              <div class="appt-type">${escapeHtml(e.type)||'—'} (${e.duration} د)</div>
              ${renderTimeStrip(e)}
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
                <span class="appt-status ${statusClass(e.status)}">${statusLabel(e.status)}</span>
                <span onclick="event.stopPropagation()">${renderTimeActionBtn(e)}</span>
              </div>
            </div>
          </div>
        </div>`;
    });
  }
  document.getElementById('timeline').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════
// Phase 6 K3: Day view by Chair (Operatory columns)
// ───────────────────────────────────────────────────────────────────────────
// The chair view is an alternate Day rendering: time on Y, operatories on X.
// Users toggle between '📋 قائمة' (the original list-style timeline) and
// '🪑 حسب الكرسي' (this chair grid) via the buttons in the day header.
//
// The mode persists in localStorage (per device) — common UX for view-mode
// preferences. Defaults to 'list' on first use. The toggle hides itself when
// the chair view wouldn't add value (no operatories, only one operatory,
// mobile viewport).
//
// Drag-and-drop: HTML5 drag API. Each appointment block is draggable; each
// 30-min slot cell is a drop target. On drop, we update operatory_id and/or
// time in the appointments table and reload.
// ═══════════════════════════════════════════════════════════════════════════

var K3_VIEW_MODE_KEY = 'sydent_day_view_mode';   // 'list' | 'chair'
var K3_ROW_MINUTES = 30;                          // each row = 30 min
var K3_ROW_HEIGHT_PX = 60;                        // matches --k3-row-height
var K3_DEFAULT_START_HOUR = 8;                    // 8 am
var K3_DEFAULT_END_HOUR = 20;                     // 8 pm

function getDayViewMode() {
  try {
    var m = localStorage.getItem(K3_VIEW_MODE_KEY);
    return (m === 'chair') ? 'chair' : 'list';
  } catch (e) { return 'list'; }
}

function setDayViewMode(mode) {
  var safe = (mode === 'chair') ? 'chair' : 'list';
  try { localStorage.setItem(K3_VIEW_MODE_KEY, safe); } catch (e) {}
  _applyK3ViewMode(safe);
}

// Wires the visible state of the timeline / chair grid + toggle buttons to
// match the requested mode. Called from setDayViewMode and from renderDay
// (whenever the day is re-rendered).
function _applyK3ViewMode(mode) {
  var listBtn  = document.getElementById('k3BtnList');
  var chairBtn = document.getElementById('k3BtnChair');
  var timelineEl = document.getElementById('timeline');
  var chairEl   = document.getElementById('k3ChairGrid');
  // Mobile guard: chair view is hidden by CSS @media under 700px. If we let
  // the timeline hide while the chair grid is also CSS-hidden, the user
  // sees a blank Day view. Force list mode on small viewports — the user's
  // saved preference is preserved in localStorage so it returns on desktop.
  if (window.innerWidth && window.innerWidth < 700) mode = 'list';
  if (listBtn)  listBtn.classList.toggle('active', mode === 'list');
  if (chairBtn) chairBtn.classList.toggle('active', mode === 'chair');
  if (mode === 'chair') {
    if (timelineEl) timelineEl.style.display = 'none';
    if (chairEl)    chairEl.style.display = '';
    renderDayByChair();
  } else {
    if (timelineEl) timelineEl.style.display = '';
    if (chairEl)    chairEl.style.display = 'none';
    // renderDay() has already painted #timeline; nothing else to do.
  }
}

// Decides whether the toggle button block should be visible. Rules:
//   • Hidden if operatories table is missing (pre-migration).
//   • Hidden if there are <2 active operatories (chair view = list view).
//   • Always hidden on mobile (CSS handles that via @media).
function _refreshK3ToggleVisibility() {
  var toggleEl = document.getElementById('k3ViewToggle');
  if (!toggleEl) return;
  var nOps = (OPERATORIES && OPERATORIES.length) ? OPERATORIES.length : 0;
  var show = !_operatoriesMissingFlag && nOps >= 2;
  toggleEl.style.display = show ? '' : 'none';
  if (!show) {
    // Force list mode if chair view is no longer available — prevents the
    // chair grid from rendering as an orphan on the next day switch.
    var mode = getDayViewMode();
    if (mode === 'chair') _applyK3ViewMode('list');
  }
}

// Parse "HH:MM" → minutes since midnight. Robust to undefined/null.
function _k3ParseTime(t) {
  if (!t || typeof t !== 'string') return NaN;
  var parts = t.split(':');
  if (parts.length < 2) return NaN;
  var h = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10);
  if (!Number.isFinite(h) || !Number.isFinite(m)) return NaN;
  return h * 60 + m;
}

// minutes → "HH:MM" zero-padded.
function _k3FormatTime(mins) {
  var h = Math.floor(mins / 60);
  var m = mins % 60;
  return (h < 10 ? '0' + h : '' + h) + ':' + (m < 10 ? '0' + m : '' + m);
}

// Compute the [startMin, endMin] range to show on screen. Expand the default
// 8 am-8 pm window if any appointment falls outside. Always snap to whole hours.
function _k3ComputeRange(dayEvts) {
  var startMin = K3_DEFAULT_START_HOUR * 60;
  var endMin   = K3_DEFAULT_END_HOUR * 60;
  dayEvts.forEach(function(e){
    var t = _k3ParseTime(e.time);
    if (!Number.isFinite(t)) return;
    var dur = parseInt(e.duration, 10);
    if (!Number.isFinite(dur) || dur <= 0) dur = 30;
    var apptEnd = t + dur;
    if (t < startMin) startMin = Math.floor(t / 60) * 60;
    if (apptEnd > endMin) endMin = Math.ceil(apptEnd / 60) * 60;
  });
  return { startMin: startMin, endMin: endMin };
}

// Main chair-view renderer. Called whenever the chair grid needs a repaint
// (day change, appointment edit/move, mode switch into chair).
function renderDayByChair() {
  var gridEl = document.getElementById('k3ChairGrid');
  if (!gridEl) return;
  var ds = dateStr(selectedDate);
  var dayEvts = apptsByDate(ds);

  // Empty-day state.
  if (!dayEvts.length) {
    gridEl.innerHTML = '<div class="k3-empty-state"><div style="font-size:48px;margin-bottom:12px;">📅</div><div>لا توجد مواعيد لهذا اليوم</div></div>';
    return;
  }

  // Build the list of columns: active operatories (sorted) + "بدون تخصيص"
  // (always shown, per Ayham's K3 decision). Defensive: if OPERATORIES is
  // unavailable, fall back to just the unassigned column so the day is still
  // visible — better than an empty grid.
  var cols = [];
  (OPERATORIES || []).forEach(function(op){
    cols.push({
      type: 'operatory',
      id: op.id,
      name: op.name || '[غرفة]',
      color: (op.color && /^#[0-9A-Fa-f]{6}$/.test(op.color)) ? op.color : '#8da0bd'
    });
  });
  cols.push({
    type: 'unassigned',
    id: null,
    name: 'بدون تخصيص',
    color: '#8da0bd'
  });

  // Compute visible time range.
  var range = _k3ComputeRange(dayEvts);
  var totalMins = range.endMin - range.startMin;
  var rowCount = Math.ceil(totalMins / K3_ROW_MINUTES);

  // ── Build HTML ─────────────────────────────────────────────────────────
  var html = '<div class="k3-chair-grid-inner">';

  // Time column (leading edge — uses position:sticky in RTL).
  html += '<div class="k3-time-col">';
  html += '<div class="k3-col-header" style="justify-content:center;color:var(--text2);">⏰</div>';
  for (var r = 0; r < rowCount; r++) {
    var slotMin = range.startMin + r * K3_ROW_MINUTES;
    html += '<div class="k3-time-cell">' + escapeHtml(_k3FormatTime(slotMin)) + '</div>';
  }
  html += '</div>';

  // Chair columns.
  cols.forEach(function(col, colIdx){
    var unassignedCls = (col.type === 'unassigned') ? ' k3-col-unassigned' : '';
    var headerLabel = escapeHtml(col.name);
    var swatchHtml = (col.type === 'operatory')
      ? '<span class="k3-col-header-swatch" style="background:' + escapeHtml(col.color) + ';"></span>'
      : '<span style="font-size:13px;">⚪</span>';
    html += '<div class="k3-chair-col" data-col-idx="' + colIdx + '"';
    if (col.type === 'operatory') html += ' data-operatory-id="' + escapeHtml(col.id) + '"';
    html += '>';
    html += '<div class="k3-col-header' + unassignedCls + '">' + swatchHtml + headerLabel + '</div>';
    // Empty slot cells (drop targets) — one per 30-min row.
    for (var r2 = 0; r2 < rowCount; r2++) {
      var slotMin2 = range.startMin + r2 * K3_ROW_MINUTES;
      html += '<div class="k3-slot-cell" data-slot-min="' + slotMin2 + '"'
            + ' ondragover="onK3SlotDragOver(event, this)"'
            + ' ondragleave="onK3SlotDragLeave(event, this)"'
            + ' ondrop="onK3SlotDrop(event, this)"></div>';
    }
    html += '</div>';
  });

  html += '</div>';
  gridEl.innerHTML = html;

  // ── Place appointments absolutely inside their columns ─────────────────
  // Per-column conflict detection: track all appointments in each column,
  // sorted by start time, then flag any pair that overlaps.
  var apptsByCol = {};  // colIdx → [{appt, startMin, endMin}]
  cols.forEach(function(_, idx){ apptsByCol[idx] = []; });

  dayEvts.forEach(function(e){
    var startMin = _k3ParseTime(e.time);
    if (!Number.isFinite(startMin)) {
      // Appointment with no time — skip (shouldn't reach here for a scheduled
      // appt, but defensive). Could go into unassigned column with a sentinel.
      return;
    }
    var dur = parseInt(e.duration, 10);
    if (!Number.isFinite(dur) || dur <= 0) dur = 30;
    var endMin = startMin + dur;

    // Pick column: operatory match by id, else "unassigned".
    var targetIdx = cols.length - 1;  // default = unassigned (last column)
    if (e.operatory_id) {
      for (var ci = 0; ci < cols.length; ci++) {
        if (cols[ci].type === 'operatory' && cols[ci].id === e.operatory_id) {
          targetIdx = ci;
          break;
        }
      }
      // If operatory_id was set but no match (deleted operatory), fall through
      // to unassigned. Visually identical to a no-operatory appt.
    }
    apptsByCol[targetIdx].push({ appt: e, startMin: startMin, endMin: endMin });
  });

  // Detect conflicts inside each column.
  var conflictIds = {};
  Object.keys(apptsByCol).forEach(function(idxKey){
    var arr = apptsByCol[idxKey].slice().sort(function(a,b){ return a.startMin - b.startMin; });
    for (var i = 0; i < arr.length; i++) {
      for (var j = i + 1; j < arr.length; j++) {
        if (arr[j].startMin < arr[i].endMin) {
          // overlap
          conflictIds[arr[i].appt.id] = true;
          conflictIds[arr[j].appt.id] = true;
        } else {
          break;  // sorted by start → no later one can overlap arr[i]
        }
      }
    }
  });

  // Append the appointment blocks. We do this in JS (not in the initial
  // innerHTML) because we set inline top/height per-appt and attach drag
  // listeners that need real DOM refs.
  Object.keys(apptsByCol).forEach(function(idxKey){
    var colIdx = parseInt(idxKey, 10);
    var colEl = gridEl.querySelector('.k3-chair-col[data-col-idx="' + colIdx + '"]');
    if (!colEl) return;
    apptsByCol[idxKey].forEach(function(item){
      var e = item.appt;
      var topPx = ((item.startMin - range.startMin) / K3_ROW_MINUTES) * K3_ROW_HEIGHT_PX
                + 44;  // 44 = header height
      var heightPx = Math.max(
        24,  // minimum readable
        ((item.endMin - item.startMin) / K3_ROW_MINUTES) * K3_ROW_HEIGHT_PX - 4
      );
      var bc = getApptColor(e);
      var bgA = (typeof hexA === 'function') ? hexA(bc.fill, 0.18) : (bc.fill + '2e');
      var block = document.createElement('div');
      block.className = 'k3-appt' + (conflictIds[e.id] ? ' k3-appt-conflict' : '');
      block.draggable = true;
      block.dataset.apptId = e.id;
      block.style.top = topPx + 'px';
      block.style.height = heightPx + 'px';
      block.style.background = bgA;
      block.style.borderRightColor = bc.fill;
      var conflictBadge = conflictIds[e.id]
        ? '<span class="k3-conflict-badge">⚠️ تعارض</span>'
        : '';
      var safeName = escapeHtml(e.patient_name || '—');
      var safeType = escapeHtml(e.type || '—');
      var timeStr = (e.time || '').slice(0, 5);
      var dur = parseInt(e.duration, 10) || 30;
      block.innerHTML = ''
        + '<div class="k3-appt-name">' + conflictBadge + safeName + '</div>'
        + '<div class="k3-appt-meta">' + escapeHtml(timeStr) + ' • ' + dur + 'د • ' + safeType + '</div>';
      // Click → open edit modal. Drag is separate (HTML5 drag never fires
      // a click after drag, so the two don't conflict).
      block.addEventListener('click', function(){ editAppt(e.id); });
      // Drag events.
      block.addEventListener('dragstart', onK3ApptDragStart);
      block.addEventListener('dragend',   onK3ApptDragEnd);
      colEl.appendChild(block);
    });
  });
}

// Drag state. We use a module-scope var instead of dataTransfer payload only,
// so we have synchronous access to the dragged appointment in dragover (which
// needs to decide whether to highlight the target — but more importantly, so
// we can read the duration when computing the drop's new end time).
var _k3DragApptId = null;

function onK3ApptDragStart(ev) {
  var el = ev.currentTarget || ev.target;
  if (!el || !el.dataset || !el.dataset.apptId) return;
  _k3DragApptId = el.dataset.apptId;
  el.classList.add('k3-dragging');
  // Setting dataTransfer is required for Firefox to actually fire the drop.
  try {
    ev.dataTransfer.effectAllowed = 'move';
    ev.dataTransfer.setData('text/plain', _k3DragApptId);
  } catch (e) { /* some browsers throw on setData — non-fatal */ }
}

function onK3ApptDragEnd(ev) {
  var el = ev.currentTarget || ev.target;
  if (el && el.classList) el.classList.remove('k3-dragging');
  // Clear any stuck drag-over highlights (some browsers skip dragleave on drop).
  var stuck = document.querySelectorAll('.k3-drag-over');
  for (var i = 0; i < stuck.length; i++) stuck[i].classList.remove('k3-drag-over');
  _k3DragApptId = null;
}

function onK3SlotDragOver(ev, cellEl) {
  if (!_k3DragApptId) return;  // not our drag
  ev.preventDefault();          // required to allow drop
  try { ev.dataTransfer.dropEffect = 'move'; } catch (e) {}
  if (cellEl && cellEl.classList) cellEl.classList.add('k3-drag-over');
}

function onK3SlotDragLeave(ev, cellEl) {
  if (cellEl && cellEl.classList) cellEl.classList.remove('k3-drag-over');
}

async function onK3SlotDrop(ev, cellEl) {
  ev.preventDefault();
  if (cellEl && cellEl.classList) cellEl.classList.remove('k3-drag-over');
  var apptId = _k3DragApptId;
  if (!apptId) return;

  // Read target operatory + target start time from the cell's parent column.
  var colEl = cellEl.closest('.k3-chair-col');
  if (!colEl) return;
  var newOperatoryId = colEl.dataset.operatoryId || null;  // null = unassigned column
  var newSlotMin = parseInt(cellEl.dataset.slotMin, 10);
  if (!Number.isFinite(newSlotMin)) return;
  var newTime = _k3FormatTime(newSlotMin);  // "HH:MM"

  // Defensive: refuse to move inactive-doctor's appointments per the global
  // pattern used elsewhere on this page.
  if (window.SyDentLock && window.SyDentLock.isDoctorAccountInactive && window.SyDentLock.isDoctorAccountInactive()) {
    showToast('🔒 حسابك غير نشط — لا يمكن نقل المواعيد');
    return;
  }

  // Find the dragged appointment in our local state.
  var appt = appointments.find(function(a){ return a.id === apptId; });
  if (!appt) {
    showToast('⚠️ الموعد غير موجود — أعد التحميل');
    return;
  }

  // Decide if anything actually changed. Both operatory_id and time can
  // change independently; if both are identical to current state, treat as
  // a no-op (user just dropped onto the same slot — common when releasing).
  var oldOp = appt.operatory_id || null;
  var oldTime = (appt.time || '').slice(0, 5);
  var sameOp = (oldOp === newOperatoryId);
  var sameTime = (oldTime === newTime);
  if (sameOp && sameTime) return;

  // Build the update payload — only what changed, to keep audit clean.
  var patch = {};
  if (!sameOp)   patch.operatory_id = newOperatoryId;
  if (!sameTime) patch.time = newTime + ':00';   // DB stores HH:MM:SS

  try {
    var res = await window.sb.from('appointments')
      .update(patch)
      .eq('id', apptId)
      .eq('doctor_id', currentUser.id);  // RLS belt-and-braces
    if (res.error) {
      console.warn('K3 drop update:', res.error);
      showToast('❌ فشل نقل الموعد: ' + (res.error.message || ''));
      return;
    }
  } catch (e) {
    console.warn('K3 drop exception:', e);
    showToast('❌ فشل نقل الموعد');
    return;
  }

  // Audit log — best-effort, never blocks the user.
  if (window.logAudit) {
    var oldOpName = '';
    var newOpName = '';
    (OPERATORIES_ALL || []).forEach(function(o){
      if (o.id === oldOp) oldOpName = o.name || '';
      if (o.id === newOperatoryId) newOpName = o.name || '';
    });
    window.logAudit('appointment.edit', {
      entityId: apptId,
      patientId: appt.patient_id || null,
      patientName: appt.patient_name || null,
      description: 'نقل عبر سحب وإفلات في عرض الكراسي',
      oldValue: {
        operatory_id: oldOp,
        operatory_name: oldOpName,
        time: appt.time || null
      },
      newValue: {
        operatory_id: newOperatoryId,
        operatory_name: newOpName,
        time: patch.time || appt.time || null
      }
    });
  }

  showToast('✅ تم نقل الموعد');
  // Reload + repaint. Cheaper than mutating local state because there's only
  // one DB row in flight; the full reload also catches any concurrent edits
  // from another tab.
  await loadAppointments();
  render();
}


function renderList() {
  document.getElementById('calMonth').textContent = MONTHS_AR[currentDate.getMonth()]+' '+currentDate.getFullYear();
  // group by date, next 30 days — Gap 1: exclude finished statuses
  // (completed/cancelled/broken/no_show) since they're not "upcoming" anymore.
  // Gap 7: also exclude planned appointments (they live in their own tab).
  const today = new Date(); today.setHours(0,0,0,0);
  const groups = {};
  appointments
    .filter(a => !isPlannedAppt(a) && a.date && new Date(a.date) >= today && !isFinishedStatus(a.status))
    .sort((a,b) => (a.date+(a.time||'')).localeCompare(b.date+(b.time||'')))
    .forEach(a => {
      if (!groups[a.date]) groups[a.date] = [];
      groups[a.date].push(a);
    });

  if (Object.keys(groups).length === 0) {
    document.getElementById('listContent').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--text2)">
        <div style="font-size:48px;margin-bottom:12px">📅</div>
        <div style="font-size:16px;color:var(--text)">لا توجد مواعيد قادمة</div>
      </div>`;
    return;
  }

  let html = '';
  Object.entries(groups).forEach(([ds, evts]) => {
    const d  = new Date(ds);
    const dn = DAYS_AR[d.getDay()]+' '+d.getDate()+' '+MONTHS_AR[d.getMonth()];
    const isToday = ds === dateStr(new Date());
    html += `<div class="list-group">
      <div class="list-date-header">
        ${dn}
        ${isToday ? '<span class="date-badge">اليوم</span>' : ''}
      </div>`;
    evts.forEach(e => {
      var lb = getApptLabBadge(e);
      var lbHtml = lb
        ? `<span style="display:inline-block;background:${lb.color}22;color:${lb.color};border:1px solid ${lb.color}55;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px;" title="${lb.title}">${lb.icon}</span>`
        : '';
      var ps = getApptProceduresSummary(e.id);
      var psHtml = ps
        ? `<span style="display:inline-block;background:#2ee89e22;color:#2ee89e;border:1px solid #2ee89e55;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px;" title="${ps.count} علاج — ${fmtCost(ps.totalCost)} ل.س">🦷 ${ps.count}</span>`
        : '';
      var waHtml = getReminderBadgeHtml(e);
      var opHtml = getApptOperatoryBadge(e);
      html += `
        <div class="list-item" style="border-right:3px solid ${getApptColor(e).fill};" onclick="editAppt('${e.id}')">
          <div class="list-time">${(e.time||'').slice(0,5)}</div>
          <div class="list-avatar" style="background:${avatarColor(e.patient_name||'؟')}22;color:${avatarColor(e.patient_name||'؟')}">${escapeHtml(initials(e.patient_name||'؟'))}</div>
          <div class="list-info">
            <div class="list-name">${escapeHtml(e.patient_name)||'—'} ${lbHtml}${psHtml}${waHtml}${opHtml}</div>
            <div class="list-type">${escapeHtml(e.type)||'—'} — ${e.duration} دقيقة</div>
            ${renderTimeStrip(e)}
          </div>
          <span class="list-badge ${statusClass(e.status)}">${statusLabel(e.status)}</span>
          <div class="list-actions" onclick="event.stopPropagation()">
            ${renderTimeActionBtn(e)}
            <button class="list-action-btn" onclick="editAppt('${e.id}')">✏️</button>
            <button class="list-action-btn danger" onclick="deleteAppt('${e.id}')">🗑️</button>
          </div>
        </div>`;
    });
    html += '</div>';
  });
  document.getElementById('listContent').innerHTML = html;
}

async function editAppt(id) {
  const a = appointments.find(x=>x.id===id);
  if (!a) return;
  editingId = id;
  selectedColor = a.color;
  // Gap 7: distinguish planned vs scheduled when editing
  var isPlanned = isPlannedAppt(a);
  document.getElementById('modalTitle').textContent = isPlanned ? 'تعديل موعد مخطّط' : 'تعديل الموعد';
  document.getElementById('saveBtn').textContent    = isPlanned ? 'حفظ التعديلات' : 'حفظ التعديلات';
  document.getElementById('fPatient').value  = a.patient_name || '';
  document.getElementById('fDate').value     = a.date || '';
  document.getElementById('fTime').value     = a.time || '';
  document.getElementById('fDuration').value = a.duration;
  // Gap 7: configure planned-related UI before showing modal
  var plannedWrap = document.getElementById('plannedToggleWrap');
  if (plannedWrap) plannedWrap.style.display = 'flex';
  var plannedChk = document.getElementById('fIsPlanned');
  if (plannedChk) plannedChk.checked = isPlanned;
  var reasonInp = document.getElementById('fReason');
  if (reasonInp) reasonInp.value = (isPlanned ? (a.notes || '') : '');
  onPlannedToggle();
  // Gap 8: template picker is for new appointments only — hide it in edit mode
  // so we don't accidentally overwrite the existing appointment's settings.
  var atPickerWrap = document.getElementById('apptTypePickerWrap');
  if (atPickerWrap) atPickerWrap.style.display = 'none';
  // أظهر المودال أولاً
  document.getElementById('deleteApptBtn').style.display = 'inline-block';
  // Gap 7: show "Schedule now" button only when editing a planned appt
  var schedNowBtn = document.getElementById('scheduleNowBtn');
  if (schedNowBtn) schedNowBtn.style.display = isPlanned ? 'inline-block' : 'none';
  document.getElementById('modalOverlay').classList.add('open');
  // ثم انتظر تحميل العلاجات قبل ضبط النوع
  await populateApptTypes();
  var _foundT = null;
  for (var _i=0; _i<TREATMENTS.length; _i++) if (TREATMENTS[_i].name === a.type) { _foundT = TREATMENTS[_i]; break; }
  document.getElementById('fType').value = _foundT ? _foundT.id : '_other';
  updateColorPreview();
  // Map legacy 'broken' status to 'no_show' since the dropdown no longer
  // offers 'broken' (Phase 2C reverted — broken and no_show were merged into
  // a single "عدم حضور" concept). Without this remap, setting .value='broken'
  // would silently fail and the getter would return "" on save, causing a
  // DB check constraint violation. The migration is graceful: the user sees
  // "عدم حضور" and the next save commits status='no_show' to the DB.
  var _statusForUi = (a.status === 'broken') ? 'no_show' : a.status;
  document.getElementById('fStatus').value = _statusForUi;
  // For planned: reason is the primary note; for scheduled: notes is the note.
  document.getElementById('fNotes').value  = isPlanned ? '' : (a.notes || '');
  // كذلك تعبئة قائمة المرضى للـ datalist
  const names = await loadPatientNames();
  document.getElementById('patientsList').innerHTML = names.map(n => `<option value="${escapeHtml(n)}">`).join('');

  // Provider picker — preselect this appt's provider if any
  await populateApptProviderPicker(a.provider_id || null);
  // Phase 6 K: operatory picker — preselect this appt's operatory if any
  populateOperatoryPicker(a.operatory_id || null);

  // Show procedures section + render attached procs + planned options
  // Gap 7: hide the procedures section for planned appointments — they have
  // no date yet, so attaching procedures + "Set Complete" don't make sense.
  // User must schedule first, then manage procedures.
  document.getElementById('apptProcSection').style.display = isPlanned ? 'none' : 'block';
  if (!isPlanned) renderApptProcedures(a);

  // Show lab orders section (if any orders are linked to this appointment)
  // Gap 7: also hide on planned — lab orders require a real appointment date.
  if (isPlanned) {
    var labSec = document.getElementById('apptLabSection');
    if (labSec) labSec.style.display = 'none';
  } else {
    renderApptLabOrders(a);
  }

  // Show/hide the no-show fee button based on current state (Gap 5).
  // Fire-and-forget — fetches settings + checks for existing fee in DB.
  // Gap 7: no-show fee doesn't apply to planned appointments (no chair time).
  if (isPlanned) {
    var nsb = document.getElementById('noShowFeeBtn');
    if (nsb) nsb.style.display = 'none';
  } else {
    updateNoShowFeeBtnVisibility(a);
  }
}

/* Build the provider <select>. Visible only if >= 1 clinic doctor exists. */
async function populateApptProviderPicker(preselectId) {
  await loadClinicDoctors();
  var group = document.getElementById('fProviderGroup');
  var sel = document.getElementById('fProvider');
  if (!sel || !group) return;
  if (!CLINIC_DOCTORS.length) {
    group.style.display = 'none';
    sel.innerHTML = '';
    return;
  }
  group.style.display = 'block';
  sel.innerHTML = '';
  // Active first, then inactive
  var active = CLINIC_DOCTORS.filter(function(d){ return d.is_active !== false; });
  var inactive = CLINIC_DOCTORS.filter(function(d){ return d.is_active === false; });
  var ordered = active.concat(inactive);
  ordered.forEach(function(d){
    var opt = document.createElement('option');
    opt.value = d.id;
    var prefix = '';
    if (d.user_id === (currentUser && currentUser.id)) prefix = '🔗 ';
    else if (d.is_owner) prefix = '⭐ ';
    opt.textContent = prefix + d.name + (d.is_active === false ? ' (غير نشط)' : '');
    sel.appendChild(opt);
  });
  // Preselect: explicit id if provided, else default
  var pick = preselectId || getDefaultProviderId(CLINIC_DOCTORS);
  if (pick) sel.value = pick;
}

/* Phase 6 K (Migration 12): Build the operatory <select>. Soft mode — the
   group is hidden entirely when no active operatories exist (Single-chair
   clinics). When editing an appointment already linked to an INACTIVE
   operatory, we inject a ghost option and force-show the group so the user
   can clear or change the stale link without silently dropping it. */
function populateOperatoryPicker(preselectId) {
  var group = document.getElementById('fOperatoryGroup');
  var sel = document.getElementById('fOperatory');
  if (!sel || !group) return;
  sel.innerHTML = '<option value="">— بدون تخصيص —</option>';

  // Build the active list first
  for (var i = 0; i < OPERATORIES.length; i++) {
    var op = OPERATORIES[i];
    var opt = document.createElement('option');
    opt.value = op.id;
    opt.textContent = op.name;
    sel.appendChild(opt);
  }

  // If preselectId points to an inactive operatory, inject a ghost option
  // so we can keep the link visible (and the user can clear it intentionally).
  var preselectInActive = false;
  if (preselectId) {
    for (var j = 0; j < sel.options.length; j++) {
      if (sel.options[j].value === preselectId) { preselectInActive = true; break; }
    }
    if (!preselectInActive) {
      // Look up the full record to display the name; fall back to a generic
      // placeholder if even OPERATORIES_ALL doesn't have it (deleted FK).
      var ghost = document.createElement('option');
      ghost.value = preselectId;
      var found = null;
      for (var k = 0; k < OPERATORIES_ALL.length; k++) {
        if (OPERATORIES_ALL[k].id === preselectId) { found = OPERATORIES_ALL[k]; break; }
      }
      ghost.textContent = found
        ? ((found.name || '[غرفة]') + (found.is_active ? '' : ' (غير نشطة)'))
        : '[غرفة محذوفة]';
      sel.appendChild(ghost);
    }
  }

  // Visibility: show the picker if there are active operatories OR a
  // preselect that we just had to ghost-restore. Otherwise hide entirely.
  var shouldShow = (OPERATORIES.length > 0) || !!preselectId;
  group.style.display = shouldShow ? 'block' : 'none';

  sel.value = preselectId || '';
}

// Phase 6 K bug-fix: when the user picks an operatory from the dropdown,
// auto-sync the provider picker to the operatory's default_provider_id.
// Behavior choice (Option B — always replace): the user picked the chair
// deliberately, so the chair's default doctor wins over whatever was in
// the provider picker before. This mirrors how applyTemplate handles the
// template > operatory provider chain.
//
// Safety guards:
//   • Empty operatory ("— بدون تخصيص —") → leave provider untouched
//     (user is clearing the chair, not declaring a doctor preference)
//   • Operatory has no default_provider_id → leave provider untouched
//   • Provider option not in dropdown (deactivated/missing) → no-op
//     (the picker shouldn't suddenly point to a doctor it can't render)
function onOperatoryChange() {
  var opSel = document.getElementById('fOperatory');
  var provSel = document.getElementById('fProvider');
  if (!opSel || !provSel) return;
  var opId = opSel.value;
  if (!opId) return;  // cleared — keep current provider
  // Look up the chosen operatory in the full list (active or ghost).
  var op = null;
  for (var i = 0; i < OPERATORIES_ALL.length; i++) {
    if (OPERATORIES_ALL[i].id === opId) { op = OPERATORIES_ALL[i]; break; }
  }
  if (!op || !op.default_provider_id) return;  // no default doctor
  // Verify the target provider exists as an <option> before assignment.
  var hasOpt = false;
  for (var j = 0; j < provSel.options.length; j++) {
    if (provSel.options[j].value === op.default_provider_id) { hasOpt = true; break; }
  }
  if (hasOpt) provSel.value = op.default_provider_id;
}

/* Render attached procedures + the dropdown of planned procedures available to attach. */
function renderApptProcedures(appt) {
