// ─── Helpers ─────────────────────────────────────────
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS_AR   = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function dateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
// Gap 7: exclude planned appointments — they have no date so they'd otherwise
// "leak" into the schedule once they accidentally got assigned today's string.
function apptsByDate(ds) {
  return appointments.filter(function(a){
    if (isPlannedAppt(a)) return false;
    return a.date === ds;
  });
}

function avatarColor(name) {
  const CLRS = ['#2ee89e','#63b3ed','#f5c842','#ef5350','#a78bfa','#fb923c'];
  let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%CLRS.length;
  return CLRS[h];
}
function initials(name) {
  const p=name.trim().split(' ');
  return p.length>=2?p[0][0]+p[1][0]:p[0].slice(0,2);
}
// Gap 1: full lifecycle status labels (OpenDental parity).
// Migration required: appointments.status check constraint must include
//   'scheduled','confirmed','pending','completed','cancelled','broken','no_show'.
function statusLabel(s) {
  if (s === 'confirmed') return 'مؤكد';
  if (s === 'pending')   return 'معلّق';
  if (s === 'cancelled') return 'ملغى';
  if (s === 'completed') return 'مكتمل';
  if (s === 'scheduled') return 'مجدول';
  if (s === 'broken')    return 'عدم حضور';   // legacy data — UI no longer offers 'broken' (Phase 2C reverted)
  if (s === 'no_show')   return 'عدم حضور';
  return s || '—';
}
function statusClass(s) {
  if (s === 'confirmed') return 'status-confirmed';
  if (s === 'pending')   return 'status-pending';
  if (s === 'cancelled') return 'status-cancelled';
  if (s === 'completed') return 'status-completed';
  if (s === 'scheduled') return 'status-scheduled';
  if (s === 'broken')    return 'status-broken';
  if (s === 'no_show')   return 'status-noshow';
  return 'status-pending';
}
// Statuses considered "finished" — used to hide from upcoming-list view.
function isFinishedStatus(s) {
  return s === 'completed' || s === 'cancelled' || s === 'broken' || s === 'no_show';
}

// ─── Gap 5: No-Show fee helpers ──────────────────────────────────────────────
// Settings live as columns on the single clinic_settings row per owner
// (Migration 5b extended the wide-table schema used by WhatsApp Reminders,
// so Gap 5 now shares that row instead of using a separate key/value pattern).
// Both reads are fault-tolerant: if the table doesn't exist yet (pre-migration),
// we treat the feature as disabled instead of breaking the user's workflow.

// Detect the "table missing" error so the rest of the app keeps working
// when Migration 5 (clinic_settings) hasn't been applied yet. PostgreSQL
// returns 42P01 for "relation does not exist"; PostgREST may map this to
// PGRST205 with a textual hint. We accept either form.
function isClinicSettingsTableMissing(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /42P01|PGRST205|clinic_settings.*does not exist/i.test(msg);
}

// Returns the current no-show fee config:
//   { enabled: boolean, amount: integer }
// On any failure, returns { enabled: false, amount: 0 } so the prompt simply
// doesn't fire — the user can still mark appointments as no-show normally.
async function getNoShowFeeConfig() {
  try {
    var res = await window.sb.from('clinic_settings')
      .select('no_show_fee_enabled, no_show_fee_amount')
      .eq('owner_id', currentUser.id)
      .maybeSingle();
    if (res.error) {
      if (!isClinicSettingsTableMissing(res.error)) {
        console.warn('clinic_settings read warn:', res.error);
      }
      return { enabled: false, amount: 0 };
    }
    var row = res.data || {};
    var enabled = !!row.no_show_fee_enabled;
    var amount  = parseInt(row.no_show_fee_amount || 0, 10) || 0;
    return { enabled: enabled, amount: amount };
  } catch (e) {
    console.warn('getNoShowFeeConfig fallback:', e);
    return { enabled: false, amount: 0 };
  }
}

// Canonical label for the auto-inserted fee session. Searched by exact match
// in noShowFeeAlreadyApplied(), so don't change without a data migration.
var NO_SHOW_FEE_TYPE_LABEL = 'رسم موعد لم يحضر';

// Returns true if a no-show fee session has already been recorded for this
// appointment, so we don't double-charge if the user flips the status back
// and forth. We look for any session linked to the appointment whose type
// matches our canonical fee label.
async function noShowFeeAlreadyApplied(apptId) {
  if (!apptId) return false;
  try {
    var res = await window.sb.from('ledger_sessions')
      .select('id, type')
      .eq('doctor_id', currentUser.id)
      .eq('appointment_id', apptId)
      .eq('type', NO_SHOW_FEE_TYPE_LABEL)
      .limit(1);
    if (res.error) return false; // fail open — better to warn user than block
    return Array.isArray(res.data) && res.data.length > 0;
  } catch (e) {
    return false;
  }
}

// Apply the no-show fee: INSERT a ledger_sessions row for the patient at the
// appointment's provider. Returns true on success.
// Note: this only inserts the fee — the patient's unearned-credit reallocation
// (FIFO) runs in patient-profile.html on demand. If the patient has unearned
// credit, it will auto-flow to this new fee the next time their profile is
// opened (saveSession path triggers reallocatePatientFunds there).
async function applyNoShowFee(opts) {
  // opts: { patientId, providerId, amount, reason, apptId, apptDate }
  try {
    var feeDate = opts.apptDate || dateStr(new Date());
    var noteParts = ['موعد ' + feeDate + ' — عدم حضور المريض'];
    if (opts.reason && opts.reason.trim()) noteParts.push('السبب: ' + opts.reason.trim());
    var baseRow = {
      doctor_id: currentUser.id,
      patient_id: opts.patientId,
      type: NO_SHOW_FEE_TYPE_LABEL,
      description: 'رسم عدم الحضور',
      cost: opts.amount,
      date: feeDate,
      status: 'completed',
      provider_id: opts.providerId || null,
      notes: noteParts.join('\n')
    };
    // First attempt with appointment_id (Migration 2). If that column is
    // missing in some legacy DB, retry without it so the fee is still saved.
    var row = Object.assign({ appointment_id: opts.apptId || null }, baseRow);
    var sessRes = await window.sb.from('ledger_sessions').insert(row);
    if (sessRes.error) {
      var errMsg = (sessRes.error.message || '') + ' ' + (sessRes.error.code || '');
      var apptIdMissing = /column .*appointment_id.* does not exist|42703/i.test(errMsg);
      if (apptIdMissing) {
        console.warn('appointment_id column missing — saving fee without link.');
        sessRes = await window.sb.from('ledger_sessions').insert(baseRow);
      }
    }
    if (sessRes.error) {
      console.warn('no-show fee insert error:', sessRes.error);
      showToast('⚠️ تعذّر تسجيل الرسم: ' + (sessRes.error.message || 'سبب غير معروف'));
      return false;
    }
    return true;
  } catch (e) {
    console.warn('applyNoShowFee fallback:', e);
    return false;
  }
}

// ─── Gap 6: Time Tracking helpers ────────────────────────────────────────────
// Tracks the patient journey:
//   confirmed_at  (📞 تم التأكيد)
//   arrived_at    (🚪 وصل العيادة)        ← appears in Waiting Room widget
//   seated_at     (🪑 جلس على الكرسي)     ← removed from Waiting Room widget
//   dismissed_at  (✅ خرج من العيادة)
//
// Workflow mirrors OpenDental: ONE button visible at a time (the next step).
// Once a timestamp is set, a colored badge appears under the patient name and
// the next button takes its place.

// Stage definitions — single source of truth for labels, colors, order.
var TIME_STAGES = [
  { key: 'confirmed_at', label: '📞 تأكيد', icon: '📞', color: '#63b3ed' },
  { key: 'arrived_at',   label: '🚪 وصل',   icon: '🚪', color: '#f5c842' },
  { key: 'seated_at',    label: '🪑 جلس',   icon: '🪑', color: '#fb923c' },
  { key: 'dismissed_at', label: '✅ خرج',   icon: '✅', color: '#2ee89e' }
];

// Returns the next action button for an appointment, or null if no action is
// applicable (e.g. appointment is cancelled/broken or already dismissed).
function getNextTimeAction(appt) {
  if (!appt) return null;
  if (isFinishedStatus(appt.status) && appt.status !== 'completed') return null;
  for (var i = 0; i < TIME_STAGES.length; i++) {
    var st = TIME_STAGES[i];
    if (!appt[st.key]) return st;
  }
  return null; // all 4 stamps recorded
}

// Formats an ISO timestamp as HH:MM in 24h, browser-local time. Returns '' on
// nullish input so callers can use it directly inside template strings.
function fmtApptTime(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleTimeString('en-GB', { hour12: false }).slice(0, 5);
  } catch (e) { return ''; }
}

// Builds the inline "stamp strip" shown under the patient name listing each
// recorded stage in chronological order. Renders nothing if no stamps exist.
function renderTimeStrip(appt) {
  if (!appt) return '';
  var parts = [];
  TIME_STAGES.forEach(function(st) {
    if (appt[st.key]) {
      var t = fmtApptTime(appt[st.key]);
      parts.push(
        '<span class="time-track-stamp" style="color:' + st.color +
        '" title="انقر مرتين لتعديل وقت ' + st.label.replace(/^[^\s]+\s/, '') + '" ' +
        'ondblclick="event.stopPropagation();overrideApptTime(\'' + appt.id + '\',\'' + st.key + '\')">' +
        st.icon + ' ' + t + '</span>'
      );
    }
  });
  if (!parts.length) return '';
  return '<div class="time-track-strip">' + parts.join('') + '</div>';
}

// Builds the inline action button HTML for a given appointment. Returns '' if
// no next action is available (so callers can splice into template strings).
function renderTimeActionBtn(appt) {
  var act = getNextTimeAction(appt);
  if (!act) return '';
  var bg = act.color + '22';
  var bd = act.color + '55';
  return '<button class="time-track-btn" ' +
         'style="background:' + bg + ';color:' + act.color + ';border:1px solid ' + bd + '" ' +
         'onclick="event.stopPropagation();recordApptTime(\'' + appt.id + '\',\'' + act.key + '\',this)">' +
         act.label + '</button>';
}

// Detects PostgreSQL CHECK-constraint violations for confirmation_status —
// fires when Gap 6 migration has not been applied yet. We then retry the
// update without the status field so the timestamp still gets saved.
function isConfirmationConstraintError(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /check constraint|23514|confirmation_valid/i.test(msg);
}

// One-shot user warning for missing Gap 6 migration. Logged details give the
// admin everything needed to fix it without spamming the UI on every click.
var _gap6WarnedOnce = false;
function warnTimeTrackingMigrationOnce() {
  if (_gap6WarnedOnce) return;
  _gap6WarnedOnce = true;
  console.warn(
    'Gap 6 migration needed. Run in Supabase SQL editor:\n' +
    'ALTER TABLE appointments\n' +
    "  ADD COLUMN IF NOT EXISTS confirmation_status TEXT DEFAULT 'pending',\n" +
    '  ADD COLUMN IF NOT EXISTS confirmed_at  TIMESTAMPTZ,\n' +
    '  ADD COLUMN IF NOT EXISTS arrived_at    TIMESTAMPTZ,\n' +
    '  ADD COLUMN IF NOT EXISTS seated_at     TIMESTAMPTZ,\n' +
    '  ADD COLUMN IF NOT EXISTS dismissed_at  TIMESTAMPTZ;'
  );
  try {
    if (typeof showToast === 'function') {
      showToast('يلزم ترقية قاعدة البيانات لميزة تتبع الوقت — راجع console', 'warning');
    } else {
      alert('يلزم ترقية قاعدة البيانات لتفعيل تتبع الوقت بالكامل (راجع console للتفاصيل).');
    }
  } catch (e) {}
}

// Detects "column does not exist" (42703) — fires when none of the timestamp
// columns are present at all. In that case we can't proceed; just warn.
function isMissingTimeColumnError(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /42703|column .* does not exist|confirmed_at|arrived_at|seated_at|dismissed_at/i.test(msg);
}

// Records a single timestamp on an appointment. Auto-sets confirmation_status
// when stamping confirmed_at. Falls back gracefully if the migration is
// missing. Returns true on success, false otherwise.
async function recordApptTime(apptId, fieldKey, btnEl) {
  if (!apptId || !fieldKey) return false;
  // Validate fieldKey against whitelist to prevent injection via crafted DOM
  var allowedKeys = ['confirmed_at','arrived_at','seated_at','dismissed_at'];
  if (allowedKeys.indexOf(fieldKey) === -1) {
    console.error('recordApptTime: invalid field key', fieldKey);
    return false;
  }
  // Disable the button while the update is in flight to prevent double-clicks.
  if (btnEl) { btnEl.disabled = true; }

  var patch = {};
  patch[fieldKey] = new Date().toISOString();
  if (fieldKey === 'confirmed_at') patch.confirmation_status = 'confirmed';

  try {
    var res = await window.sb.from('appointments').update(patch).eq('id', apptId);
    if (res.error) {
      // Pre-migration: confirmation_valid constraint may not exist OR the
      // column itself may be absent. Retry without confirmation_status.
      if (isConfirmationConstraintError(res.error) && fieldKey === 'confirmed_at') {
        var retryPatch = {}; retryPatch[fieldKey] = patch[fieldKey];
        var retry = await window.sb.from('appointments').update(retryPatch).eq('id', apptId);
        if (retry.error) {
          if (isMissingTimeColumnError(retry.error)) warnTimeTrackingMigrationOnce();
          else console.error('recordApptTime retry failed:', retry.error);
          if (btnEl) btnEl.disabled = false;
          return false;
        }
        warnTimeTrackingMigrationOnce();
      } else if (isMissingTimeColumnError(res.error)) {
        warnTimeTrackingMigrationOnce();
        if (btnEl) btnEl.disabled = false;
        return false;
      } else {
        console.error('recordApptTime failed:', res.error);
        if (btnEl) btnEl.disabled = false;
        return false;
      }
    }
    // Reflect locally so we don't wait a full network round-trip to re-render.
    var local = appointments.find(function(a){ return a.id === apptId; });
    if (local) {
      local[fieldKey] = patch[fieldKey];
      if (fieldKey === 'confirmed_at') local.confirmation_status = 'confirmed';
    }
    render();
    return true;
  } catch (e) {
    console.error('recordApptTime exception:', e);
    if (btnEl) btnEl.disabled = false;
    return false;
  }
}

// Manual override of a timestamp via double-click on its stamp. Accepts
// HH:MM input (24h). Empty input clears the timestamp (allows undo).
// Date portion is preserved from the existing value or defaults to appt.date.
async function overrideApptTime(apptId, fieldKey) {
  var allowedKeys = ['confirmed_at','arrived_at','seated_at','dismissed_at'];
  if (allowedKeys.indexOf(fieldKey) === -1) return;
  var appt = appointments.find(function(a){ return a.id === apptId; });
  if (!appt) return;

  var stage = TIME_STAGES.find(function(s){ return s.key === fieldKey; });
  var stageName = stage ? stage.label.replace(/^[^\s]+\s/, '') : 'الوقت';
  var currentDisplay = fmtApptTime(appt[fieldKey]);
  var input = prompt('وقت "' + stageName + '" (HH:MM، 24 ساعة)\nاتركها فارغة للحذف:', currentDisplay);
  if (input === null) return; // user cancelled

  var newIso = null;
  if (input.trim() !== '') {
    var m = /^(\d{1,2}):(\d{2})$/.exec(input.trim());
    if (!m) { alert('صيغة غير صحيحة. استخدم HH:MM'); return; }
    var hh = parseInt(m[1], 10), mm = parseInt(m[2], 10);
    if (hh < 0 || hh > 23 || mm < 0 || mm > 59) {
      alert('الساعة خارج النطاق المسموح'); return;
    }
    // Anchor to existing date portion if any, else the appointment's own date.
    var baseDate = appt[fieldKey]
      ? new Date(appt[fieldKey])
      : (appt.date ? new Date(appt.date + 'T00:00:00') : new Date());
    if (isNaN(baseDate.getTime())) baseDate = new Date();
    baseDate.setHours(hh, mm, 0, 0);
    newIso = baseDate.toISOString();
  }

  var patch = {}; patch[fieldKey] = newIso;
  var res = await window.sb.from('appointments').update(patch).eq('id', apptId);
  if (res.error) {
    if (isMissingTimeColumnError(res.error)) warnTimeTrackingMigrationOnce();
    else console.error('overrideApptTime failed:', res.error);
    return;
  }
  appt[fieldKey] = newIso;
  render();
}

// ─── Gap 8: Appointment Type templates (loader + picker handler) ─────────────
// Loaded once at page init, cached per page session. The picker is shown only
// when creating a new appointment (hidden in edit mode — see openModal /
// editAppt). Selecting a template pre-fills duration + treatment type;
// color stays derived from the treatment (single source of truth).
//
// Fault-tolerant: if the appointment_types table is missing (pre-migration),
// the picker simply stays empty and hidden — no crash, no toast spam.

var _appointmentTypes = [];   // cached templates for this session
var _gap8TableMissing = false;

function _gap8IsTableMissing(err) {
  if (!err) return false;
  var msg = (err.message || '') + ' ' + (err.code || '');
  return /42P01|PGRST205|relation .* does not exist|appointment_types/i.test(msg);
}

async function loadAppointmentTypes() {
  if (!currentUser) return;
  try {
    // Gap 8.2: select default_provider_id + default_lab_id alongside the
    // original fields. If the columns don't exist yet (42703), retry with
    // the old projection so the picker still works.
    var fullCols = 'id, name, default_duration_min, default_treatment_id, default_provider_id, default_lab_id, is_active, sort_order';
    var legacyCols = 'id, name, default_duration_min, default_treatment_id, is_active, sort_order';
    var res = await window.sb.from('appointment_types')
      .select(fullCols)
      .eq('doctor_id', currentUser.id)
      .eq('is_active', true)
      .order('sort_order', { ascending: true })
      .order('created_at', { ascending: true });
    if (res.error) {
      if (_gap8IsTableMissing(res.error)) {
        _gap8TableMissing = true;
        console.warn('Gap 8: appointment_types table missing — template picker disabled.');
        return;
      }
      // Gap 8.2 fallback: retry with legacy projection
      var msg = (res.error.message || '') + ' ' + (res.error.code || '');
      if (/42703|default_provider_id|default_lab_id/i.test(msg)) {
        console.warn('Gap 8.2: provider/lab columns missing on SELECT — falling back to legacy columns.');
        res = await window.sb.from('appointment_types')
          .select(legacyCols)
          .eq('doctor_id', currentUser.id)
          .eq('is_active', true)
          .order('sort_order', { ascending: true })
          .order('created_at', { ascending: true });
        if (res.error) { console.warn('Gap 8 retry failed:', res.error); return; }
      } else {
        console.warn('Gap 8 load error:', res.error);
        return;
      }
    }
    _appointmentTypes = res.data || [];
  } catch (e) {
    console.warn('Gap 8 load exception:', e);
  }
}

// Populates the <select> inside the modal. Idempotent — safe to call every
// time the modal opens (cheap with a small list, and keeps the dropdown
// fresh if the user added templates in another tab).
function populateApptTypePicker() {
  var sel = document.getElementById('fApptTypePicker');
  if (!sel) return;
  var html = '<option value="">— بدون قالب —</option>';
  for (var i = 0; i < _appointmentTypes.length; i++) {
    var t = _appointmentTypes[i];
    html += '<option value="' + escapeHtml(t.id) + '">' + escapeHtml(t.name || '') + '</option>';
  }
  sel.innerHTML = html;
  sel.value = '';
}

// Called from the picker's onchange. Pre-fills duration + treatment.
// We do NOT touch the color directly — it's driven by the treatment, and
// updateColorPreview() (called below) recomputes it from the selected
// treatment's own color. Single source of truth preserved.
function onApptTypePicked() {
  var sel = document.getElementById('fApptTypePicker');
  if (!sel) return;
  var id = sel.value;
  if (!id) return; // user picked "— بدون قالب —"
  var t = _appointmentTypes.find(function(x){ return x.id === id; });
  if (!t) return;

  // Duration: only pre-fill if it matches one of the existing <option> values
  // in #fDuration. If the template specifies e.g. 45 and the select has
  // 30/45/60/90/120, pick 45. Otherwise leave the current value alone.
  if (t.default_duration_min) {
    var durSel = document.getElementById('fDuration');
    if (durSel) {
      var target = String(t.default_duration_min);
      var found = false;
      for (var i = 0; i < durSel.options.length; i++) {
        if (durSel.options[i].value === target) { found = true; break; }
      }
      if (found) {
        durSel.value = target;
      } else {
        // Add a one-off option so the template's exact duration is honored.
        var opt = document.createElement('option');
        opt.value = target;
        opt.textContent = target + ' دقيقة';
        durSel.appendChild(opt);
        durSel.value = target;
      }
    }
  }

  // Treatment: the template stores treatments.id (UUID), but TREATMENTS[].id
  // in this page is treatment_key for backward-compat. Match via dbId (the
  // UUID is exposed as 'dbId' in loadTreatmentsFromSupabase). If the linked
  // treatment was deleted after the template was created, the FK has been
  // NULLed, so we silently skip — duration alone still pre-fills.
  if (t.default_treatment_id) {
    var typeSel = document.getElementById('fType');
    if (typeSel) {
      var match = null;
      for (var j = 0; j < TREATMENTS.length; j++) {
        if (TREATMENTS[j].dbId === t.default_treatment_id) { match = TREATMENTS[j]; break; }
      }
      if (match) {
        typeSel.value = match.id;
        // Trigger the existing color preview update so color tracks the treatment.
        if (typeof updateColorPreview === 'function') updateColorPreview();
      }
    }
  }

  // Gap 8.2: Pre-fill the provider picker from the template's default_provider_id.
  // The picker is the existing #fProvider, populated by populateApptProviderPicker
  // (which uses the OpenDental 3-tier default). We set its value to the template's
  // provider — if that doctor was deleted, the picker silently keeps its current
  // default (no crash). The doctor can always change it after.
  if (t.default_provider_id) {
    var provPicker = document.getElementById('fProvider');
    if (provPicker) {
      // Verify the option exists before setting (deleted doctor → no option)
      var optExists = false;
      for (var k = 0; k < provPicker.options.length; k++) {
        if (provPicker.options[k].value === t.default_provider_id) { optExists = true; break; }
      }
      if (optExists) provPicker.value = t.default_provider_id;
    }
  }

  // Gap 8.2: default_lab_id is intentionally NOT applied to the appointment
  // form here (per the user's design choice — option A). It stays cached on
  // the template and will be used later when creating a lab_order from this
  // appointment, where it can suggest the lab automatically.
}

// ─── Render ──────────────────────────────────────────
function render() {
  if (view==='month') renderMonth();
  else if (view==='day') renderDay();
  else renderList();
}

function renderMonth() {
  const y=currentDate.getFullYear(), mo=currentDate.getMonth();
  document.getElementById('calMonth').textContent = MONTHS_AR[mo]+' '+y;

  const first = new Date(y,mo,1).getDay();
  const days  = new Date(y,mo+1,0).getDate();
  const today = dateStr(new Date());
  const body  = document.getElementById('calBody');
  let html = '';

  for (let i=0; i<first; i++) {
    const d = new Date(y,mo,1-first+i);
    const ds= dateStr(d);
    const ev= apptsByDate(ds);
    html += cellHTML(d.getDate(), ds, true, today, ev);
  }
  for (let d=1; d<=days; d++) {
    const ds= dateStr(new Date(y,mo,d));
    const ev= apptsByDate(ds);
    html += cellHTML(d, ds, false, today, ev);
  }
  const remain = 42 - first - days;
  for (let i=1; i<=remain; i++) {
    const d = new Date(y,mo+1,i);
    const ds= dateStr(d);
    const ev= apptsByDate(ds);
    html += cellHTML(i, ds, true, today, ev);
  }
  body.innerHTML = html;
}

function cellHTML(day, ds, other, today, evts) {
  const isToday    = ds===today;
  const isSelected = ds===dateStr(selectedDate);
  let cls = '';
  if (other)      cls += ' other-month';
  if (isToday)    cls += ' today';
  if (isSelected) cls += ' selected';

  const MAX_SHOW = window.innerWidth < 820 ? 0 : 2;
  let evHTML = '';
  evts.slice(0, MAX_SHOW).forEach(e => {
    var _ec = getApptColor(e);
    var lb = getApptLabBadge(e);
    var lbHtml = lb ? `<span style="margin-left:3px;" title="${lb.title}">${lb.icon}</span>` : '';
    evHTML += `<div class="cal-event" style="background:${_ec.fill}22;color:${_ec.fill};border-right:3px solid ${_ec.fill};" onclick="event.stopPropagation();editAppt('${e.id}')">${lbHtml}${(e.time||'').slice(0,5)} ${escapeHtml((e.patient_name||'').split(' ')[0])}</div>`;
  });
  // Mobile dots
  let dotHTML = '<div class="cal-dot-row">';
  evts.slice(0,4).forEach(e => {
    dotHTML += `<span class="cal-dot" style="background:${getApptColor(e).fill}"></span>`;
  });
  dotHTML += '</div>';
  if (evts.length > MAX_SHOW && window.innerWidth >= 820) {
    evHTML += `<div class="cal-more">+${evts.length-MAX_SHOW} أكثر</div>`;
  }

  return `<div class="cal-cell${cls}" onclick="selectDay('${ds}')">
    <div class="cal-date">${day}</div>
    ${evHTML}
    ${dotHTML}
  </div>`;
}

function selectDay(ds) {
  selectedDate = new Date(ds);
  currentDate  = new Date(ds);
  setView('day');
}

function renderDay() {
  const ds = dateStr(selectedDate);
  document.getElementById('calMonth').textContent = DAYS_AR[selectedDate.getDay()]+' '+selectedDate.getDate()+' '+MONTHS_AR[selectedDate.getMonth()]+' '+selectedDate.getFullYear();
  document.getElementById('dayTitle').textContent = DAYS_AR[selectedDate.getDay()]+' '+selectedDate.getDate()+' '+MONTHS_AR[selectedDate.getMonth()];
  const dayEvts = apptsByDate(ds);
  document.getElementById('daySubtitle').textContent = dayEvts.length ? dayEvts.length+' موعد' : 'لا توجد مواعيد';

  // Sort appts by time
  var sorted = dayEvts.slice().sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });
  let html = '';
  if (sorted.length === 0) {
    html = '<div style="text-align:center;padding:60px 20px;color:var(--text2);"><div style="font-size:48px;margin-bottom:12px;">📅</div><div>لا توجد مواعيد لهذا اليوم</div></div>';
  } else {
    sorted.forEach(function(e){
      var _bc = getApptColor(e);
      var lb = getApptLabBadge(e);
      var lbHtml = lb
        ? `<span style="display:inline-block;background:${lb.color}22;color:${lb.color};border:1px solid ${lb.color}55;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px;" title="${lb.title}">${lb.icon} ${lb.title.split(':')[0] || 'مخبر'}</span>`
        : '';
      var ps = getApptProceduresSummary(e.id);
      var psHtml = ps
        ? `<span style="display:inline-block;background:#2ee89e22;color:#2ee89e;border:1px solid #2ee89e55;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px;" title="${ps.count} علاج — ${fmtCost(ps.totalCost)} ل.س">🦷 ${ps.count} • ${fmtCost(ps.totalCost)}</span>`
        : '';
      var waHtml = getReminderBadgeHtml(e);
      html += `
        <div class="time-slot">
          <div class="slot-time">${(e.time||'').slice(0,5)}</div>
          <div class="slot-content">
            <div class="appt-block" style="background:${hexA(_bc.fill,0.12)};border-right:3px solid ${_bc.fill};" onclick="editAppt('${e.id}')">
              <div class="appt-name">${escapeHtml(e.patient_name)||'—'} ${lbHtml}${psHtml}${waHtml}</div>
              <div class="appt-type">${escapeHtml(e.type)||'—'} (${e.duration} د)</div>
              ${renderTimeStrip(e)}
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
                <span class="appt-status ${statusClass(e.status)}">${statusLabel(e.status)}</span>
                <span onclick="event.stopPropagation()">${renderTimeActionBtn(e)}</span>
              </div>
            </div>
          </div>
        </div>`;
    });
  }
  document.getElementById('timeline').innerHTML = html;
}

function renderList() {
  document.getElementById('calMonth').textContent = MONTHS_AR[currentDate.getMonth()]+' '+currentDate.getFullYear();
  // group by date, next 30 days — Gap 1: exclude finished statuses
  // (completed/cancelled/broken/no_show) since they're not "upcoming" anymore.
  // Gap 7: also exclude planned appointments (they live in their own tab).
  const today = new Date(); today.setHours(0,0,0,0);
  const groups = {};
  appointments
    .filter(a => !isPlannedAppt(a) && a.date && new Date(a.date) >= today && !isFinishedStatus(a.status))
    .sort((a,b) => (a.date+(a.time||'')).localeCompare(b.date+(b.time||'')))
    .forEach(a => {
      if (!groups[a.date]) groups[a.date] = [];
      groups[a.date].push(a);
    });

  if (Object.keys(groups).length === 0) {
    document.getElementById('listContent').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--text2)">
        <div style="font-size:48px;margin-bottom:12px">📅</div>
        <div style="font-size:16px;color:var(--text)">لا توجد مواعيد قادمة</div>
      </div>`;
    return;
  }

  let html = '';
  Object.entries(groups).forEach(([ds, evts]) => {
    const d  = new Date(ds);
    const dn = DAYS_AR[d.getDay()]+' '+d.getDate()+' '+MONTHS_AR[d.getMonth()];
    const isToday = ds === dateStr(new Date());
    html += `<div class="list-group">
      <div class="list-date-header">
        ${dn}
        ${isToday ? '<span class="date-badge">اليوم</span>' : ''}
      </div>`;
    evts.forEach(e => {
      var lb = getApptLabBadge(e);
      var lbHtml = lb
        ? `<span style="display:inline-block;background:${lb.color}22;color:${lb.color};border:1px solid ${lb.color}55;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px;" title="${lb.title}">${lb.icon}</span>`
        : '';
      var ps = getApptProceduresSummary(e.id);
      var psHtml = ps
        ? `<span style="display:inline-block;background:#2ee89e22;color:#2ee89e;border:1px solid #2ee89e55;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-right:6px;" title="${ps.count} علاج — ${fmtCost(ps.totalCost)} ل.س">🦷 ${ps.count}</span>`
        : '';
      var waHtml = getReminderBadgeHtml(e);
      html += `
        <div class="list-item" style="border-right:3px solid ${getApptColor(e).fill};" onclick="editAppt('${e.id}')">
          <div class="list-time">${(e.time||'').slice(0,5)}</div>
          <div class="list-avatar" style="background:${avatarColor(e.patient_name||'؟')}22;color:${avatarColor(e.patient_name||'؟')}">${escapeHtml(initials(e.patient_name||'؟'))}</div>
          <div class="list-info">
            <div class="list-name">${escapeHtml(e.patient_name)||'—'} ${lbHtml}${psHtml}${waHtml}</div>
            <div class="list-type">${escapeHtml(e.type)||'—'} — ${e.duration} دقيقة</div>
            ${renderTimeStrip(e)}
          </div>
          <span class="list-badge ${statusClass(e.status)}">${statusLabel(e.status)}</span>
          <div class="list-actions" onclick="event.stopPropagation()">
            ${renderTimeActionBtn(e)}
            <button class="list-action-btn" onclick="editAppt('${e.id}')">✏️</button>
            <button class="list-action-btn danger" onclick="deleteAppt('${e.id}')">🗑️</button>
          </div>
        </div>`;
    });
    html += '</div>';
  });
  document.getElementById('listContent').innerHTML = html;
}

// ─── Modal ───────────────────────────────────────────

async function openModal(prefillDate) {
  editingId = null;
  selectedColor = 'green';
  document.getElementById('modalTitle').textContent = 'موعد جديد';
  document.getElementById('saveBtn').textContent    = 'حفظ الموعد';
  document.querySelector('form').reset();
  document.getElementById('fPatient').value  = '';
  document.getElementById('fDate').value     = prefillDate || dateStr(new Date());
  document.getElementById('fTime').value     = '';
  document.getElementById('fDuration').value = '60';
  populateApptTypes();
  if (TREATMENTS.length > 0) document.getElementById('fType').value = TREATMENTS[0].id;
  document.getElementById('fStatus').value   = 'confirmed';
  document.getElementById('fNotes').value    = '';
  // إخفاء زر الحذف عند إضافة موعد جديد
  document.getElementById('deleteApptBtn').style.display = 'none';
  // إخفاء قسم العلاجات (يظهر فقط في وضع التعديل)
  document.getElementById('apptProcSection').style.display = 'none';
  // إخفاء قسم المخبر (يظهر فقط في التعديل ولو فيه طلبات مرتبطة)
  document.getElementById('apptLabSection').style.display = 'none';
  // إخفاء زر "تطبيق رسم عدم الحضور" (يظهر فقط في التعديل عند الحاجة)
  var noShowBtn = document.getElementById('noShowFeeBtn');
  if (noShowBtn) noShowBtn.style.display = 'none';
  // Gap 7: planned-appointment fields — show toggle, reset state
  var plannedWrap = document.getElementById('plannedToggleWrap');
  if (plannedWrap) plannedWrap.style.display = 'flex';
  var plannedChk = document.getElementById('fIsPlanned');
  if (plannedChk) plannedChk.checked = false;
  var reasonInp = document.getElementById('fReason');
  if (reasonInp) reasonInp.value = '';
  // Hide schedule-now button (only meaningful when editing existing planned)
  var schedNowBtn = document.getElementById('scheduleNowBtn');
  if (schedNowBtn) schedNowBtn.style.display = 'none';
  // Gap 8: show + populate template picker (only available on NEW appts).
  // If pre-migration or zero templates, just hide it — keeps the form clean.
  var atPickerWrap = document.getElementById('apptTypePickerWrap');
  if (atPickerWrap) {
    if (_gap8TableMissing || _appointmentTypes.length === 0) {
      atPickerWrap.style.display = 'none';
    } else {
      populateApptTypePicker();
      atPickerWrap.style.display = '';
    }
  }
  onPlannedToggle();  // sync visibility of date/time/reason/note
  updateColorPreview();

  // Populate provider picker (uses OpenDental 3-tier default)
  await populateApptProviderPicker(null);

  // تعبئة قائمة المرضى من Supabase
  const names = await loadPatientNames();
  document.getElementById('patientsList').innerHTML = names.map(n => `<option value="${escapeHtml(n)}">`).join('');

  document.getElementById('modalOverlay').classList.add('open');
}

async function editAppt(id) {
  const a = appointments.find(x=>x.id===id);
  if (!a) return;
  editingId = id;
  selectedColor = a.color;
  // Gap 7: distinguish planned vs scheduled when editing
  var isPlanned = isPlannedAppt(a);
  document.getElementById('modalTitle').textContent = isPlanned ? 'تعديل موعد مخطّط' : 'تعديل الموعد';
  document.getElementById('saveBtn').textContent    = isPlanned ? 'حفظ التعديلات' : 'حفظ التعديلات';
  document.getElementById('fPatient').value  = a.patient_name || '';
  document.getElementById('fDate').value     = a.date || '';
  document.getElementById('fTime').value     = a.time || '';
  document.getElementById('fDuration').value = a.duration;
  // Gap 7: configure planned-related UI before showing modal
  var plannedWrap = document.getElementById('plannedToggleWrap');
  if (plannedWrap) plannedWrap.style.display = 'flex';
  var plannedChk = document.getElementById('fIsPlanned');
  if (plannedChk) plannedChk.checked = isPlanned;
  var reasonInp = document.getElementById('fReason');
  if (reasonInp) reasonInp.value = (isPlanned ? (a.notes || '') : '');
  onPlannedToggle();
  // Gap 8: template picker is for new appointments only — hide it in edit mode
  // so we don't accidentally overwrite the existing appointment's settings.
  var atPickerWrap = document.getElementById('apptTypePickerWrap');
  if (atPickerWrap) atPickerWrap.style.display = 'none';
  // أظهر المودال أولاً
  document.getElementById('deleteApptBtn').style.display = 'inline-block';
  // Gap 7: show "Schedule now" button only when editing a planned appt
  var schedNowBtn = document.getElementById('scheduleNowBtn');
  if (schedNowBtn) schedNowBtn.style.display = isPlanned ? 'inline-block' : 'none';
  document.getElementById('modalOverlay').classList.add('open');
  // ثم انتظر تحميل العلاجات قبل ضبط النوع
  await populateApptTypes();
  var _foundT = null;
  for (var _i=0; _i<TREATMENTS.length; _i++) if (TREATMENTS[_i].name === a.type) { _foundT = TREATMENTS[_i]; break; }
  document.getElementById('fType').value = _foundT ? _foundT.id : '_other';
  updateColorPreview();
  // Map legacy 'broken' status to 'no_show' since the dropdown no longer
  // offers 'broken' (Phase 2C reverted — broken and no_show were merged into
  // a single "عدم حضور" concept). Without this remap, setting .value='broken'
  // would silently fail and the getter would return "" on save, causing a
  // DB check constraint violation. The migration is graceful: the user sees
  // "عدم حضور" and the next save commits status='no_show' to the DB.
  var _statusForUi = (a.status === 'broken') ? 'no_show' : a.status;
  document.getElementById('fStatus').value = _statusForUi;
  // For planned: reason is the primary note; for scheduled: notes is the note.
  document.getElementById('fNotes').value  = isPlanned ? '' : (a.notes || '');
  // كذلك تعبئة قائمة المرضى للـ datalist
  const names = await loadPatientNames();
  document.getElementById('patientsList').innerHTML = names.map(n => `<option value="${escapeHtml(n)}">`).join('');

  // Provider picker — preselect this appt's provider if any
  await populateApptProviderPicker(a.provider_id || null);

  // Show procedures section + render attached procs + planned options
  // Gap 7: hide the procedures section for planned appointments — they have
  // no date yet, so attaching procedures + "Set Complete" don't make sense.
  // User must schedule first, then manage procedures.
  document.getElementById('apptProcSection').style.display = isPlanned ? 'none' : 'block';
  if (!isPlanned) renderApptProcedures(a);

  // Show lab orders section (if any orders are linked to this appointment)
  // Gap 7: also hide on planned — lab orders require a real appointment date.
  if (isPlanned) {
    var labSec = document.getElementById('apptLabSection');
    if (labSec) labSec.style.display = 'none';
  } else {
    renderApptLabOrders(a);
  }

  // Show/hide the no-show fee button based on current state (Gap 5).
  // Fire-and-forget — fetches settings + checks for existing fee in DB.
  // Gap 7: no-show fee doesn't apply to planned appointments (no chair time).
  if (isPlanned) {
    var nsb = document.getElementById('noShowFeeBtn');
    if (nsb) nsb.style.display = 'none';
  } else {
    updateNoShowFeeBtnVisibility(a);
  }
}

/* Build the provider <select>. Visible only if >= 1 clinic doctor exists. */
async function populateApptProviderPicker(preselectId) {
  await loadClinicDoctors();
  var group = document.getElementById('fProviderGroup');
  var sel = document.getElementById('fProvider');
  if (!sel || !group) return;
  if (!CLINIC_DOCTORS.length) {
    group.style.display = 'none';
    sel.innerHTML = '';
    return;
  }
  group.style.display = 'block';
  sel.innerHTML = '';
  // Active first, then inactive
  var active = CLINIC_DOCTORS.filter(function(d){ return d.is_active !== false; });
  var inactive = CLINIC_DOCTORS.filter(function(d){ return d.is_active === false; });
  var ordered = active.concat(inactive);
  ordered.forEach(function(d){
    var opt = document.createElement('option');
    opt.value = d.id;
    var prefix = '';
    if (d.user_id === (currentUser && currentUser.id)) prefix = '🔗 ';
    else if (d.is_owner) prefix = '⭐ ';
    opt.textContent = prefix + d.name + (d.is_active === false ? ' (غير نشط)' : '');
    sel.appendChild(opt);
  });
  // Preselect: explicit id if provided, else default
  var pick = preselectId || getDefaultProviderId(CLINIC_DOCTORS);
  if (pick) sel.value = pick;
}

/* Render attached procedures + the dropdown of planned procedures available to attach. */
function renderApptProcedures(appt) {
  var listEl = document.getElementById('apptProcList');
  var statsEl = document.getElementById('apptProcStats');
  var selEl = document.getElementById('addPlannedSelect');
  var completeBtn = document.getElementById('completeApptBtn');
  var addBtn = document.getElementById('addPlannedBtn');
  if (!listEl || !selEl) return;

  var attached = sessionsByAppt[appt.id] || [];
  if (attached.length) {
    var html = '';
    attached.forEach(function(s){
      var statusBadge = '';
      if (s.status === 'planned') statusBadge = '<span style="background:#ef444422;color:#ef4444;border:1px solid #ef444455;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">مخطّط</span>';
      else if (s.status === 'completed') statusBadge = '<span style="background:#3b82f622;color:#3b82f6;border:1px solid #3b82f655;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">منجز</span>';
      else statusBadge = '<span style="background:rgba(255,255,255,0.06);color:var(--text2);padding:2px 8px;border-radius:10px;font-size:11px;">' + (s.status||'—') + '</span>';
      var toothPart = s.tooth_num ? ' • السن ' + s.tooth_num + (s.surface && s.surface !== 'WHOLE' ? '/' + s.surface : '') : '';
      // Phase 3 Feature G: show regional area inline (matches the description field)
      if (!s.tooth_num) {
        var QLBL = {'UR':'الربع العلوي الأيمن','UL':'الربع العلوي الأيسر','LL':'الربع السفلي الأيسر','LR':'الربع السفلي الأيمن'};
        var ALBL = {'U':'الفك العلوي','L':'الفك السفلي'};
        if (s.quadrant && QLBL[s.quadrant]) toothPart = ' • ' + QLBL[s.quadrant];
        else if (s.arch && ALBL[s.arch]) toothPart = ' • ' + ALBL[s.arch];
      }
      html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;">'
        + '<div style="flex:1;min-width:140px;font-size:13px;color:var(--text);">' + escapeHtml(s.type || s.description || 'علاج') + toothPart + '</div>'
        + '<div style="font-size:12px;color:var(--text2);">' + fmtCost(s.cost) + ' ل.س</div>'
        + statusBadge
        + '<button type="button" onclick="unlinkSessionFromAppt(\'' + s.id + '\')" style="background:transparent;border:1px solid rgba(239,83,80,0.4);color:#ef5350;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:11px;" title="فصل عن الموعد">✕</button>'
        + '</div>';
    });
    listEl.innerHTML = html;
    var totalC = attached.reduce(function(s,x){ return s + (parseFloat(x.cost)||0); }, 0);
    var plannedC = attached.filter(function(x){ return x.status === 'planned'; }).length;
    var completedC = attached.filter(function(x){ return x.status === 'completed'; }).length;
    statsEl.textContent = attached.length + ' علاج • ' + fmtCost(totalC) + ' ل.س • مخطّط ' + plannedC + ' / منجز ' + completedC;
    completeBtn.style.display = plannedC > 0 ? 'block' : 'none';
  } else {
    listEl.innerHTML = '<div style="padding:8px;color:var(--text2);font-size:12px;text-align:center;">لا توجد علاجات مرتبطة بهذا الموعد بعد</div>';
    statsEl.textContent = '';
    completeBtn.style.display = 'none';
  }

  // Planned sessions dropdown (unattached, same patient)
  var pid = appt.patient_id;
  var planned = pid ? (plannedSessionsByPatient[pid] || []) : [];
  selEl.innerHTML = '';
  if (!pid) {
    var opt = document.createElement('option');
    opt.value = '';
    opt.textContent = '— هذا الموعد لا يحتوي patient_id (إصدار قديم) —';
    selEl.appendChild(opt);
    addBtn.disabled = true;
    addBtn.style.opacity = '0.4';
    return;
  }
  if (!planned.length) {
    var opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = '— لا توجد علاجات مخطّطة غير مرتبطة لهذا المريض —';
    selEl.appendChild(opt0);
    addBtn.disabled = true;
    addBtn.style.opacity = '0.4';
    return;
  }
  var placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = '— اختر علاجاً مخطّطاً —';
  selEl.appendChild(placeholder);
  planned.forEach(function(s){
    // Phase 3 Feature G: dropdown for attaching planned procedures to an appointment
    // — show region info instead of tooth number for regional sessions
    var toothPart;
    if (s.tooth_num) {
      toothPart = ' (سن ' + s.tooth_num + ')';
    } else if (s.quadrant) {
      var QLBL2 = {'UR':'الربع العلوي الأيمن','UL':'الربع العلوي الأيسر','LL':'الربع السفلي الأيسر','LR':'الربع السفلي الأيمن'};
      toothPart = ' (' + (QLBL2[s.quadrant] || s.quadrant) + ')';
    } else if (s.arch) {
      var ALBL2 = {'U':'الفك العلوي','L':'الفك السفلي'};
      toothPart = ' (' + (ALBL2[s.arch] || s.arch) + ')';
    } else {
      toothPart = '';
    }
    var opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = (s.type || s.description || 'علاج') + toothPart + ' — ' + fmtCost(s.cost) + ' ل.س';
    selEl.appendChild(opt);
  });
  addBtn.disabled = false;
  addBtn.style.opacity = '1';
}

/* Render lab orders linked to the currently-edited appointment (read-only). */
function renderApptLabOrders(appt) {
  var section = document.getElementById('apptLabSection');
  var listEl  = document.getElementById('apptLabList');
  if (!section || !listEl) return;
  var orders = (appt && appt.id) ? (labOrdersByAppt[appt.id] || []) : [];
  if (!orders.length) {
    section.style.display = 'none';
    listEl.innerHTML = '';
    return;
  }
  section.style.display = 'block';
  var apptDate = appt.date ? String(appt.date).slice(0,10) : '';
  var html = '';
  orders.forEach(function(o){
    var statusAr  = '—';
    var statusBg  = 'rgba(255,255,255,0.06)';
    var statusCol = 'var(--text2)';
    if (o.status === 'sent')     { statusAr = 'تم التسليم للمخبر';    statusBg = 'rgba(99,179,237,0.15)';  statusCol = '#63b3ed'; }
    else if (o.status === 'received')  { statusAr = 'تم الاستلام من المخبر'; statusBg = 'rgba(245,200,66,0.15)';  statusCol = '#f5c842'; }
    else if (o.status === 'checked')   { statusAr = 'تم الفحص';              statusBg = 'rgba(46,232,158,0.15)';  statusCol = '#2ee89e'; }

    // Late tag only applies when work hasn't physically arrived yet (status='sent').
    // Once received/checked, the lab work is at the clinic — no point warning "late".
    // Direct-linked orders without an explicit date_due become late once the
    // appointment day has arrived (the user tied this work to that visit).
    // Use local-time dateStr so the "today" boundary matches the user's clock.
    var atRisk = (o.status === 'sent');
    var todayStr = dateStr(new Date());
    var late;
    if (!atRisk) {
      late = false;
    } else if (o.date_due) {
      late = (apptDate && o.date_due.slice(0,10) <= apptDate);
    } else {
      // Direct-linked (this list is always direct) without explicit due → late once appt day arrives.
      late = (apptDate && apptDate <= todayStr);
    }
    var lateTag = late ? '<span style="background:rgba(239,83,80,0.15);color:#ef5350;border:1px solid rgba(239,83,80,0.4);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">⚠️ متأخر</span>' : '';

    var toothPart = o.tooth_num ? ' • السن ' + o.tooth_num : '';
    var dueDate   = o.date_due ? new Date(o.date_due).toLocaleDateString('ar-SY', { year:'numeric', month:'short', day:'numeric' }) : '—';
    var labLabel  = o.lab_name || '—';

    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;">'
      + '<div style="flex:1;min-width:160px;font-size:13px;color:var(--text);">' + escapeHtml(o.work_type || 'طلب مخبر') + toothPart + '</div>'
      + '<div style="font-size:11px;color:var(--text2);">المخبر: ' + escapeHtml(labLabel) + '</div>'
      + '<div style="font-size:11px;color:var(--text2);">استحقاق: ' + dueDate + '</div>'
      + lateTag
      + '<span style="background:' + statusBg + ';color:' + statusCol + ';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;">' + statusAr + '</span>'
      + '</div>';
  });
  listEl.innerHTML = html;
}

/* Attach a planned session to the currently-open appointment. */
async function attachPlannedToAppt() {
  if (!editingId) { showToast('⚠️ احفظ الموعد أولاً'); return; }
  var sel = document.getElementById('addPlannedSelect');
  var sessId = sel ? sel.value : '';
  if (!sessId) { showToast('⚠️ اختر علاجاً'); return; }
  const { error } = await window.sb.from('ledger_sessions')
    .update({ appointment_id: editingId })
    .eq('id', sessId).eq('doctor_id', currentUser.id);
  if (error) { showToast('❌ خطأ في الربط: ' + error.message); return; }
  showToast('✅ تم ربط العلاج بالموعد');
  await loadAppointments();
  var appt = appointments.find(function(a){ return a.id === editingId; });
  if (appt) renderApptProcedures(appt);
}

/* Unlink a session from an appointment (sets appointment_id = NULL). */
async function unlinkSessionFromAppt(sessId) {
  if (!confirm('فصل هذا العلاج عن الموعد؟ (لن يُحذف العلاج نفسه)')) return;
  const { error } = await window.sb.from('ledger_sessions')
    .update({ appointment_id: null })
    .eq('id', sessId).eq('doctor_id', currentUser.id);
  if (error) { showToast('❌ خطأ في الفصل: ' + error.message); return; }
  showToast('✅ تم فصل العلاج عن الموعد');
  await loadAppointments();
  var appt = appointments.find(function(a){ return a.id === editingId; });
  if (appt) renderApptProcedures(appt);
}

/* Set Complete: convert all planned attached procedures (+ their teeth_status rows)
   to completed and set the appointment status to 'completed' (Gap 1).
   Gap 2: warn before completing if any attached procedure has a provider that
   doesn't match the appointment's provider, with three choices:
     - Proceed as-is  (keep each procedure's own provider)
     - Unify          (rewrite all attached procedures to the appointment's provider)
     - Cancel         (do nothing)
   Mirrors OpenDental: "If the appointment provider does not match the provider on
   at least one attached procedure, there is a prompt." */
async function completeApptWithProcedures() {
  if (!editingId) return;
  // Gap 7: Set Complete is meaningless on a planned appointment — it has no
  // date, no time, no chair-side reality. Force the user to schedule it first.
  var _curAppt = appointments.find(function(a){ return a.id === editingId; });
  if (_curAppt && isPlannedAppt(_curAppt)) {
    showToast('⚠️ يجب جدولة الموعد أولاً قبل إكماله');
    return;
  }
  var attached = sessionsByAppt[editingId] || [];
  var plannedOnes = attached.filter(function(s){ return s.status === 'planned'; });
  if (!plannedOnes.length) { showToast('⚠️ لا توجد علاجات مخطّطة'); return; }

  // Guard: refuse to silently flip a no_show / cancelled / (legacy) broken
  // appointment to 'completed'. If the doctor reached this button on such
  // an appointment, it's almost certainly a misclick — confirm explicitly
  // before overriding. The fee button (💸) is the intended workflow for
  // no_show; Set Complete is for visits that actually happened.
  // 'broken' is kept in the check for backward compatibility with any
  // legacy appointments still marked that way (UI no longer offers it).
  if (_curAppt && (_curAppt.status === 'no_show' || _curAppt.status === 'broken' || _curAppt.status === 'cancelled')) {
    var statusLabelMap = { no_show: 'عدم حضور', broken: 'عدم حضور (قديم)', cancelled: 'ملغى' };
    var lbl = statusLabelMap[_curAppt.status] || _curAppt.status;
    var overrideMsg = '⚠️ هذا الموعد محدّد حالياً كـ "' + lbl + '".\n\n'
                    + 'هل تريد فعلاً تحويله إلى "مكتمل" وإكمال العلاجات المخطّطة؟\n\n'
                    + '• موافق → تحويل الحالة + إكمال العلاجات\n'
                    + '• إلغاء → إبقاء الموعد كما هو';
    if (!confirm(overrideMsg)) return;
  }

  // ── Gap 2: provider-mismatch check ────────────────────────────────────────
  // The appointment's provider is the source of truth. Only flag mismatches
  // when the procedure has an explicit provider that differs (NULL means
  // "use the appointment's provider" → not a mismatch).
  var apptObj = appointments.find(function(a){ return a.id === editingId; });
  var apptProviderId = apptObj ? (apptObj.provider_id || null) : null;
  var mismatched = plannedOnes.filter(function(s){
    return s.provider_id && apptProviderId && s.provider_id !== apptProviderId;
  });
  var unifyProviders = false;  // becomes true if user picks "Unify"

  if (mismatched.length > 0) {
    var apptProvName = '—';
    if (apptProviderId) {
      var ap = CLINIC_DOCTORS.find(function(d){ return d.id === apptProviderId; });
      if (ap) apptProvName = ap.name;
    } else {
      apptProvName = '(لا يوجد طبيب على الموعد)';
    }
    // OK = unify everything to the appointment provider (the safe default).
    // Cancel = open the manual choice prompt: proceed as-is or abort.
    var msg = '⚠️ تنبيه: ' + mismatched.length + ' من العلاجات المرفقة مسجّلة لطبيب مختلف عن طبيب الموعد.\n\n'
            + 'طبيب الموعد: ' + apptProvName + '\n\n'
            + 'هل تريد توحيد كل العلاجات لطبيب الموعد؟\n\n'
            + '• موافق  → توحيد لطبيب الموعد\n'
            + '• إلغاء → خيارات أخرى (متابعة كما هو / إلغاء العملية)';
    if (confirm(msg)) {
      unifyProviders = true;
    } else {
      // Second prompt — OK = proceed as-is, Cancel = abort entirely.
      var msg2 = 'متابعة الإكمال مع احتفاظ كل علاج بطبيبه الحالي؟\n\n'
               + '• موافق  → متابعة كما هو\n'
               + '• إلغاء → إلغاء العملية';
      if (!confirm(msg2)) {
        return;  // user aborted
      }
      // else: proceed as-is
    }
  }

  // Build confirmation message that also mentions lab orders that will be auto-completed.
  var linkedLabsForPrompt = (labOrdersByAppt[editingId] || []).filter(function(o){
    return o.status === 'sent' || o.status === 'received' || o.status === 'checked';
  });
  var promptMsg = 'إكمال ' + plannedOnes.length + ' علاج مخطّط دفعة واحدة؟';
  if (unifyProviders) {
    promptMsg += '\n\nسيتم أيضاً توحيد طبيب جميع العلاجات لطبيب الموعد.';
  }
  if (linkedLabsForPrompt.length) {
    promptMsg += '\n\nسيتم أيضاً تسجيل ' + linkedLabsForPrompt.length + ' طلب مخبر كـ "تم التركيب".';
  }
  if (!confirm(promptMsg)) return;

  var btn = document.getElementById('completeApptBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'جارٍ الإكمال…'; }

  var failed = 0;
  for (var i=0; i<plannedOnes.length; i++) {
    var s = plannedOnes[i];
    // 1) update session — also rewrite provider_id when unifying.
    var sessPatch = { status: 'completed' };
    if (unifyProviders && apptProviderId) sessPatch.provider_id = apptProviderId;
    var u1 = await window.sb.from('ledger_sessions')
      .update(sessPatch)
      .eq('id', s.id).eq('doctor_id', currentUser.id);
    if (u1.error) { failed++; console.error('session complete err:', u1.error); continue; }
    // 2) update matching teeth_status row(s) — only if session has tooth_num
    if (s.tooth_num) {
      var teethPatch = { status: 'completed' };
      if (unifyProviders && apptProviderId) teethPatch.provider_id = apptProviderId;
      var q = window.sb.from('teeth_status').update(teethPatch)
        .eq('doctor_id', currentUser.id)
        .eq('patient_id', s.patient_id)
        .eq('tooth_num', String(s.tooth_num))
        .eq('status', 'planned');
      if (s.surface) q = q.eq('surface', s.surface);
      var u2 = await q;
      if (u2.error) console.warn('teeth_status complete warn:', u2.error);
    }
  }

  // 3) Mark appointment as 'completed' (Gap 1).
  //    If the DB constraint hasn't been migrated yet, the UPDATE will fail —
  //    fall back to 'confirmed' so the rest of the workflow keeps working.
  var u3 = await window.sb.from('appointments')
    .update({ status: 'completed' })
    .eq('id', editingId).eq('doctor_id', currentUser.id);
  var migrationMissing = false;
  if (u3.error) {
    // 23514 = check_violation (PostgreSQL); also handle the generic message.
    var errMsg = (u3.error.message || '') + ' ' + (u3.error.code || '');
    if (/check constraint|23514|appointments_status_check/i.test(errMsg)) {
      migrationMissing = true;
      console.warn("appointments.status='completed' rejected — falling back to 'confirmed'. Run Migration: ALTER TABLE appointments DROP CONSTRAINT appointments_status_check; ALTER TABLE appointments ADD CONSTRAINT appointments_status_check CHECK (status IN ('scheduled','confirmed','pending','completed','cancelled','broken','no_show'));");
      var u3b = await window.sb.from('appointments')
        .update({ status: 'confirmed' })
        .eq('id', editingId).eq('doctor_id', currentUser.id);
      if (u3b.error) console.warn('appt update fallback warn:', u3b.error);
    } else {
      console.warn('appt update warn:', u3.error);
    }
  }

  // 4) OpenDental-style: when an appointment is set complete, the lab cases attached
  //    to it are also marked complete (delivered). If any of them are still in
  //    'sent' or 'received' or 'checked' status, advance them to 'delivered' since
  //    the patient is leaving the chair with the work done.
  //    We use the same column names labs.html already writes (date_delivered) and
  //    guard against missing column / missing migration silently.
  var linkedLabs = labOrdersByAppt[editingId] || [];
  var labFailed = 0;
  var labUpdated = 0;
  for (var k=0; k<linkedLabs.length; k++) {
    var lo = linkedLabs[k];
    if (lo.status === 'sent' || lo.status === 'received' || lo.status === 'checked') {
      try {
        var labRes = await window.sb.from('lab_orders')
          .update({ status: 'delivered', date_delivered: new Date().toISOString() })
          .eq('id', lo.id).eq('doctor_id', currentUser.id);
        if (labRes.error) { labFailed++; console.warn('auto-complete lab order err:', labRes.error); }
        else labUpdated++;
      } catch(e) { labFailed++; console.warn('auto-complete linked lab order:', e); }
    }
  }

  // Build a complete summary that covers both sessions and labs, success and failure.
  var parts = [];
  if (failed === 0) {
    parts.push('تم إكمال ' + plannedOnes.length + ' علاج');
  } else {
    parts.push('اكتمل ' + (plannedOnes.length - failed) + ' من ' + plannedOnes.length + ' علاج');
  }
  if (labUpdated > 0) parts.push(labUpdated + ' طلب مخبر');
  if (labFailed > 0)  parts.push('تعذّر تحديث ' + labFailed + ' طلب مخبر');
  if (migrationMissing) parts.push('حالة الموعد محفوظة كـ "مؤكد" (يلزم ترقية قاعدة البيانات)');
  var icon = (failed === 0 && labFailed === 0 && !migrationMissing) ? '✅' : '⚠️';
  showToast(icon + ' ' + parts.join(' • '));

  await loadAppointments();
  var appt = appointments.find(function(a){ return a.id === editingId; });
  if (appt) {
    renderApptProcedures(appt);
    renderApptLabOrders(appt);
    document.getElementById('fStatus').value = appt.status;
  }
  if (btn) { btn.disabled = false; btn.textContent = '✅ إكمال الموعد + كل العلاجات المخطّطة'; }
}

// ─── Gap 5: explicit "Apply No-Show Fee" button handler ──────────────────────
// Surfaces the no-show fee prompt as a dedicated button so the doctor can
// trigger it any time the appointment is already saved as no_show — not only
// during the status-change transition inside saveAppt.
// Same flow as the auto-prompt in saveAppt:
//   step 1: confirm to apply (or skip)
//   step 2: optional reason text
// On success the fee is inserted and the button hides itself.
async function applyNoShowFeeFromModal() {
  if (!editingId) return;
  var appt = appointments.find(function(a){ return a.id === editingId; });
  if (!appt) { showToast('⚠️ تعذّر العثور على الموعد'); return; }

  // Guard: must be no_show (or legacy 'broken' which we treat as equivalent).
  // The button only renders in this case but a stale DOM could theoretically
  // still fire — keep the check.
  if (appt.status !== 'no_show' && appt.status !== 'broken') {
    showToast('⚠️ هذا الإجراء متاح فقط لمواعيد "عدم حضور"');
    return;
  }
  if (!appt.patient_id) {
    showToast('⚠️ لا يمكن تطبيق الرسم — الموعد بلا مريض مسجّل');
    return;
  }

  // Re-check everything against DB (settings + already-applied) since the
  // user might have changed things in another tab since the modal opened.
  var feeCfg = await getNoShowFeeConfig();
  if (!feeCfg.enabled || feeCfg.amount <= 0) {
    showToast('⚠️ رسم "عدم الحضور" غير مفعّل في الإعدادات');
    return;
  }
  var alreadyApplied = await noShowFeeAlreadyApplied(editingId);
  if (alreadyApplied) {
    showToast('ℹ️ الرسم مُطبَّق على هذا الموعد مسبقاً');
    var bn = document.getElementById('noShowFeeBtn');
    if (bn) bn.style.display = 'none';
    return;
  }

  var msg = '🚫 تطبيق رسم عدم الحضور؟\n\n'
          + 'المريض: ' + (appt.patient_name || '—') + '\n'
          + 'المبلغ: ' + feeCfg.amount.toLocaleString('en-US') + ' ل.س\n\n'
          + '• موافق → تطبيق الرسم\n'
          + '• إلغاء → عدم التطبيق';
  if (!confirm(msg)) return;
  var reason = prompt('سبب عدم الحضور (اختياري):', '') || '';

  // Guard: the user may have closed this modal during the confirm/prompt
  // dialogs (esc, click outside, or opened another appointment). If so,
  // bail out — we don't want to silently apply a fee to a different appt.
  if (editingId !== appt.id) {
    console.info('No-show fee canceled — modal switched during prompt.');
    return;
  }

  var btn = document.getElementById('noShowFeeBtn');
  var originalText = '';
  if (btn) {
    originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'جارٍ تطبيق الرسم…';
  }

  var ok = await applyNoShowFee({
    patientId:  appt.patient_id,
    providerId: appt.provider_id || null,
    amount:     feeCfg.amount,
    reason:     reason,
    apptId:     editingId,
    apptDate:   appt.date
  });

  if (btn) { btn.disabled = false; btn.textContent = originalText; }
  if (ok) {
    showToast('✅ تم تطبيق رسم عدم الحضور');
    if (btn) btn.style.display = 'none';  // hide so the doctor can't double-apply
  }
  // On failure applyNoShowFee already showed an error toast; leave the
  // button visible so the user can retry.
}

// Show/hide the no-show fee button based on the currently-loaded appointment.
// Called from editAppt() right after the modal fields are populated.
// Conditions (all must be true to show):
//   1. appt.status === 'no_show'
//   2. appt has a patient_id
//   3. clinic settings: no-show fee enabled with amount > 0
//   4. no existing no-show fee session linked to this appointment
// Show/hide the no-show fee button based on the currently-loaded appointment.
// Called from editAppt() right after the modal fields are populated.
// Conditions (all must be true to show):
//   1. appt.status === 'no_show'
//   2. appt has a patient_id
//   3. clinic settings: no-show fee enabled with amount > 0
//   4. no existing no-show fee session linked to this appointment
// Stale-update guard: by the time the async checks finish, the user might
// have closed this modal and opened another appointment. We compare appt.id
// to editingId before touching the DOM so a slow DB call can't leak the
// button into a different appointment's modal.
async function updateNoShowFeeBtnVisibility(appt) {
  var btn = document.getElementById('noShowFeeBtn');
  if (!btn) return;
  btn.style.display = 'none';  // safe default
  // Treat legacy 'broken' as 'no_show' (Phase 2C reverted — both map to the
  // same "عدم حضور" concept in the UI now).
  var st = appt && appt.status;
  var isAbsence = (st === 'no_show' || st === 'broken');
  if (!appt || !isAbsence || !appt.patient_id) return;
  try {
    var feeCfg = await getNoShowFeeConfig();
    // Guard: editingId may have changed while we awaited the DB.
    if (editingId !== appt.id) return;
    if (!feeCfg.enabled || feeCfg.amount <= 0) return;
    var alreadyApplied = await noShowFeeAlreadyApplied(appt.id);
    if (editingId !== appt.id) return;  // re-check after second await
    if (alreadyApplied) return;
    // Update label with the amount so the doctor sees the cost up-front
    btn.textContent = '💸 تطبيق رسم عدم الحضور (' + feeCfg.amount.toLocaleString('en-US') + ' ل.س)';
    btn.style.display = 'block';
  } catch (e) {
    console.warn('updateNoShowFeeBtnVisibility:', e);
  }
}

// حذف الموعد من داخل المودال
async function deleteApptFromModal() {
  if (!editingId) return;
  if (!confirm('هل أنت متأكد من حذف هذا الموعد؟')) return;
  const { error } = await window.sb.from('appointments').delete()
    .eq('id', editingId).eq('doctor_id', currentUser.id);
  if (error) { showToast('❌ خطأ في الحذف'); return; }
  closeModal();
  showToast('🗑️ تم حذف الموعد');
  await loadAppointments();
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) {

});

function selectColor(c, el) {

  document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');

function updateColorPreview() {
