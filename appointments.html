async function submitAppt(e) {
  e.preventDefault();
  var typeVal   = document.getElementById('fType').value;
  var _t        = getTreatment(typeVal);
  var typeName  = _t ? _t.name : (typeVal === '_other' ? 'أخرى' : typeVal);
  const apptColor  = _t ? _t.fill   : '#2ee89e';
  const apptStroke = _t ? _t.stroke : '#1fba7e';

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'جارٍ الحفظ…';

  var providerSel = document.getElementById('fProvider');
  var providerId = (providerSel && providerSel.value) ? providerSel.value : getDefaultProviderId(CLINIC_DOCTORS);

  var patientName = document.getElementById('fPatient').value.trim();

  // Lookup patient_id from name (so newer features that rely on it work).
  // If not found, leave patient_id null — older flow still works.
  var patientId = null;
  if (patientName) {
    try {
      const { data: prow } = await window.sb.from('patients')
        .select('id').eq('doctor_id', currentUser.id).eq('name', patientName).maybeSingle();
      if (prow && prow.id) patientId = prow.id;
    } catch(_) { /* ignore */ }
  }

  const apptData = {
    doctor_id:    currentUser.id,
    patient_id:   patientId,
    patient_name: patientName,
    date:         document.getElementById('fDate').value,
    time:         document.getElementById('fTime').value || null,
    duration:     parseInt(document.getElementById('fDuration').value),
    type:         typeName,
    status:       document.getElementById('fStatus').value,
    notes:        document.getElementById('fNotes').value.trim(),
    color:        apptColor,
    stroke:       apptStroke,
    provider_id:  providerId
  };

  // ── Gap 5: No-show fee workflow ─────────────────────────────────────────
  // Trigger conditions (all must be true):
  //   1. new status is 'no_show'
  //   2. previous status was NOT 'no_show' (i.e. we're transitioning into it)
  //   3. patient is identified (no point charging an unknown name)
  //   4. clinic has enabled the fee with a positive amount
  //   5. no existing fee row is linked to this appointment (no double-charge)
  // If all met, show a confirm prompt + optional reason field.
  // Fee is OPTIONAL: the user can choose "without fee" and still mark no-show.
  var pendingNoShowFee = null;  // {amount, reason} if user opted in, else null
  if (apptData.status === 'no_show') {
    var previousStatus = null;
    if (editingId) {
      var prevAppt = appointments.find(function(a){ return a.id === editingId; });
      if (prevAppt) previousStatus = prevAppt.status;
    }
    var isTransition = (previousStatus !== 'no_show');
    if (isTransition && patientId) {
      var feeCfg = await getNoShowFeeConfig();
      if (feeCfg.enabled && feeCfg.amount > 0) {
        var alreadyApplied = editingId ? await noShowFeeAlreadyApplied(editingId) : false;
        if (!alreadyApplied) {
          // Two-step prompt — simpler than building a custom modal for MVP:
          //   step 1: ask whether to apply the fee at all (yes/no/cancel)
          //   step 2: only if yes, ask for optional reason
          var msg = '🚫 المريض لم يحضر للموعد\n\n'
                  + 'هل تريد تطبيق رسم لم يحضر على ' + patientName + '؟\n\n'
                  + 'المبلغ: ' + feeCfg.amount.toLocaleString('en-US') + ' ل.س\n\n'
                  + '• موافق  → تطبيق الرسم\n'
                  + '• إلغاء → حفظ الموعد بدون رسم';
          if (confirm(msg)) {
            var reason = prompt('سبب عدم الحضور (اختياري):', '') || '';
            pendingNoShowFee = { amount: feeCfg.amount, reason: reason };
          }
          // If user cancelled the first prompt, pendingNoShowFee stays null
          // and we proceed to save the appointment as no_show WITHOUT a fee.
          // This is the "fee is optional" behavior the user asked for.
        }
      }
    } else if (isTransition && !patientId) {
      // Edge: appt has no patient linked → can't charge. Save status anyway,
      // but notify so the user knows why no fee was applied.
      console.info('No-show fee skipped: appointment has no linked patient.');
    }
  }

  // Helper: detect "status not in check constraint" errors so we can fall back
  // to 'confirmed' when the appointments_status_check migration isn't applied
  // yet. Same logic used in completeApptWithProcedures — keeps the two write
  // paths consistent so a not-yet-migrated DB never blocks the user.
  function isStatusConstraintError(err) {
    if (!err) return false;
    var msg = (err.message || '') + ' ' + (err.code || '');
    return /check constraint|23514|appointments_status_check/i.test(msg);
  }
  var newStatuses = ['completed','scheduled','broken','no_show'];
  var migrationMissing = false;

  if (editingId) {
    var upd = await window.sb.from('appointments').update(apptData)
      .eq('id', editingId).eq('doctor_id', currentUser.id);
    // Retry with 'confirmed' if the DB rejects a new lifecycle status.
    if (upd.error && isStatusConstraintError(upd.error) && newStatuses.indexOf(apptData.status) !== -1) {
      migrationMissing = true;
      console.warn("appointments.status='" + apptData.status + "' rejected on UPDATE — falling back to 'confirmed'. Run: ALTER TABLE appointments DROP CONSTRAINT appointments_status_check; ALTER TABLE appointments ADD CONSTRAINT appointments_status_check CHECK (status IN ('scheduled','confirmed','pending','completed','cancelled','broken','no_show'));");
      var fallback = Object.assign({}, apptData, { status: 'confirmed' });
      upd = await window.sb.from('appointments').update(fallback)
        .eq('id', editingId).eq('doctor_id', currentUser.id);
    }
    if (upd.error) {
      showToast('❌ خطأ في التعديل: ' + upd.error.message);
    } else {
      // ── Apply the no-show fee AFTER the appt save succeeded, never before.
      // If the fee insert fails, the appt itself is already saved correctly —
      // applyNoShowFee shows its own error toast and we don't roll back.
      if (pendingNoShowFee) {
        await applyNoShowFee({
          patientId:  patientId,
          providerId: providerId,
          amount:     pendingNoShowFee.amount,
          reason:     pendingNoShowFee.reason,
          apptId:     editingId,
          apptDate:   apptData.date
        });
      }
      if (migrationMissing) {
        showToast('⚠️ تم الحفظ كـ "مؤكد" — يلزم ترقية قاعدة البيانات');
      } else if (pendingNoShowFee) {
        showToast('✅ تم الحفظ + تطبيق رسم لم يحضر');
      } else {
        showToast('✅ تم تعديل الموعد');
      }
      selectedDate = new Date(apptData.date + 'T12:00:00');
      currentDate  = new Date(apptData.date + 'T12:00:00');
      closeModal();
      await loadAppointments();
    }
  } else {
    var ins = await window.sb.from('appointments').insert(apptData).select().single();
    if (ins.error && isStatusConstraintError(ins.error) && newStatuses.indexOf(apptData.status) !== -1) {
      migrationMissing = true;
      console.warn("appointments.status='" + apptData.status + "' rejected on INSERT — falling back to 'confirmed'.");
      var fallbackIns = Object.assign({}, apptData, { status: 'confirmed' });
      ins = await window.sb.from('appointments').insert(fallbackIns).select().single();
    }
    if (ins.error) {
      showToast('❌ خطأ في الإضافة: ' + ins.error.message);
    } else {
      // New appointment created as no_show with a pending fee — rare flow,
      // but supported. We need the freshly-inserted id to link the fee row.
      if (pendingNoShowFee && ins.data && ins.data.id) {
        await applyNoShowFee({
          patientId:  patientId,
          providerId: providerId,
          amount:     pendingNoShowFee.amount,
          reason:     pendingNoShowFee.reason,
          apptId:     ins.data.id,
          apptDate:   apptData.date
        });
      }
      if (migrationMissing) {
        showToast('⚠️ تمت الإضافة كـ "مؤكد" — يلزم ترقية قاعدة البيانات');
      } else if (pendingNoShowFee) {
        showToast('✅ تمت الإضافة + تطبيق رسم لم يحضر');
      } else {
        showToast('✅ تمت إضافة الموعد');
      }
      selectedDate = new Date(apptData.date + 'T12:00:00');
      currentDate  = new Date(apptData.date + 'T12:00:00');
      closeModal();
      await loadAppointments();
    }
  }

  btn.disabled = false; btn.textContent = editingId ? 'حفظ التعديلات' : 'حفظ الموعد';
}

async function deleteAppt(id) {
  if (!confirm('حذف هذا الموعد؟')) return;
  const { error } = await window.sb.from('appointments').delete()
    .eq('id', id).eq('doctor_id', currentUser.id);
  if (error) { showToast('❌ خطأ في الحذف'); return; }
  showToast('🗑️ تم حذف الموعد');
  await loadAppointments();
}

// ─── Toast ───────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ─── Init ────────────────────────────────────────────
(async function init() {
  await new Promise(r => setTimeout(r, 80));
  const { data } = await window.sb.auth.getUser();
  if (!data || !data.user) { window.location.href = 'auth.html'; return; }
  currentUser = data.user;
  await loadClinicDoctors();
  await loadAppointments();
})();

initSidebar('appointments');

window.onPTRRefresh = function() { loadAppointments(); };

document.addEventListener('DOMContentLoaded', function() {
  var btn = document.createElement('button');
  btn.className = 'sb-hamburger';
  btn.innerHTML = '<span></span><span></span><span></span>';
  btn.onclick   = function() { window.sbToggle(); };
  window._sbBtn = btn;
  var topbar = document.querySelector('.topbar');
  if (topbar) topbar.insertBefore(btn, topbar.firstChild);
});
</script>
